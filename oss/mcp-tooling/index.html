    <!-- FAQPage JSON-LD -->
    <script type="application/ld+json">
    {
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What is the Model Context Protocol (MCP)?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "MCP is Anthropic's open standard for connecting LLMs to external tools and data sources via a uniform server interface. MCP Overflow is the discovery and testing layer for that ecosystem."
      }
    },
    {
      "@type": "Question",
      "name": "Can I test an MCP server before installing it?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Every server in the directory ships with a hosted sandbox where you can invoke its tools without adding it to your editor."
      }
    },
    {
      "@type": "Question",
      "name": "Is MCP Overflow open source?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The directory schema, certification rules, and CLI are open source under MIT. The hosted service is a commercial layer on top."
      }
    },
    {
      "@type": "Question",
      "name": "Which clients does the generated config work with?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Claude Desktop, Claude Code, Cursor, VS Code, Windsurf, and Aider. We add new clients as the protocol matures."
      }
    },
    {
      "@type": "Question",
      "name": "How do you certify MCP servers?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Automated capability scan + security scan + manual review for publishers who opt in. The certification rubric is public on /docs/certification."
      }
    }
  ]
}
    </script>
