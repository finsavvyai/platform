# MCPOverflow Workers - Production Configuration
name = "mcpoverflow-api"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Enable workers.dev subdomain for testing
workers_dev = true

# D1 Database
[[d1_databases]]
binding = "MCP_DB"
database_name = "mcpoverflow-production"
database_id = "69992e87-3b16-400a-8e77-9e05d26be364"

# KV Namespace for sessions/cache
[[kv_namespaces]]
binding = "MCP_KV"
id = "88d85bd18112498697ae456d20a837a9"

# R2 Storage for artifacts
[[r2_buckets]]
binding = "MCP_STORAGE"
bucket_name = "mcpoverflow-storage"

# Environment variables
[vars]
ENVIRONMENT = "production"

# Routes - API subdomain
[[routes]]
pattern = "api.mcpoverflow.com/*"
zone_name = "mcpoverflow.com"
