services:
  # PostgreSQL Database (via Supabase Local)
  postgres:
    image: supabase/postgres:15.1.0.88
    container_name: mcpoverflow_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: --auth-host=md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: pg_isready -U postgres -h localhost
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: mcpoverflow_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 10

  # Neo4j for knowledge graph
  neo4j:
    image: neo4j:5.15-community
    container_name: mcpoverflow_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/mcpoverflow_password
      NEO4J_dbms_default__database: mcpoverflow
      NEO4J_dbms_security_procedures_unrestricted: gds.*,apoc.*
      NEO4J_dbms_security_procedures_allowlist: gds.*,apoc.*
      NEO4J_PLUGINS: '["gds", "apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: cypher-shell -u neo4j -p mcpoverflow_password "RETURN 1"
      interval: 5s
      timeout: 5s
      retries: 10

  # MinIO for S3-compatible storage (alternative to Cloudflare R2 for local dev)
  minio:
    image: minio/minio:latest
    container_name: mcpoverflow_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: curl -f http://localhost:9000/minio/health/live
      interval: 5s
      timeout: 5s
      retries: 10

  # LocalStack for AWS services simulation (for testing AWS Lambda deployment)
  localstack:
    image: localstack/localstack:latest
    container_name: mcpoverflow_localstack
    ports:
      - "4566:4566"
      - "4571:4571"
    environment:
      SERVICES: s3,lambda,apigateway,iam,dynamodb,cloudwatch
      DEBUG: 1
      DATA_DIR: /tmp/localstack/data
      DOCKER_HOST: unix:///var/run/docker.sock
      DEFAULT_REGION: us-east-1
    volumes:
      - localstack_data:/tmp/localstack
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: awslocal s3 ls
      interval: 5s
      timeout: 5s
      retries: 10

  # Vector database (Qdrant) for semantic search
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mcpoverflow_qdrant
    ports:
      - "6333:6333"
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: curl -f http://localhost:6333/health
      interval: 5s
      timeout: 5s
      retries: 10

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: mcpoverflow_prometheus
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:9090/metrics
      interval: 5s
      timeout: 5s
      retries: 10

  # Grafana for monitoring dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: mcpoverflow_grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: mcpoverflow_admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3000/api/health
      interval: 5s
      timeout: 5s
      retries: 10

  # Mailhog for email testing in development
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mcpoverflow_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8025
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: mcpoverflow_redis_exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    networks:
      - default

  # PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: mcpoverflow_postgres_exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/postgres?sslmode=disable"
    depends_on:
      - postgres
    networks:
      - default

  # Node Exporter for system metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: mcpoverflow_node_exporter
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host/root'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    networks:
      - default

  # Database Backup Service
  backup:
    image: postgres:15-alpine
    container_name: mcpoverflow_backup
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
      - postgres_backups:/backups
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=mcpoverflow
      - BACKUP_DIR=/backups
      - S3_BUCKET=mcpoverflow-backups
      # AWS Credentials should be passed via .env or secrets in production
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - SCHEDULE=${BACKUP_SCHEDULE:-0 2 * * *} # Default: 2 AM daily
    entrypoint: >
      /bin/sh -c "
        apk add --no-cache aws-cli bash &&
        chmod +x /scripts/backup.sh &&
        echo \"Starting backup scheduler... Schedule: $${SCHEDULE}\" &&
        echo \"$${SCHEDULE} /scripts/backup.sh >> /var/log/cron.log 2>&1\" > /etc/crontabs/root &&
        crond -f -l 8
      "
    networks:
      - default

volumes:
  postgres_data:
  postgres_backups:
  redis_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  minio_data:
  localstack_data:
  qdrant_data:
  prometheus_data:
  grafana_data:


networks:
  default:
    name: mcpoverflow_network
