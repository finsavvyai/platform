events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upstream API service
    upstream api_service {
        server api-service:8080;
    }

    # Marketing site - mcpoverflow.com
    server {
        listen 80;
        listen [::]:80;
        server_name mcpoverflow.com www.mcpoverflow.com;

        # Redirect to HTTPS
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name mcpoverflow.com www.mcpoverflow.com;

        # SSL certificates
        ssl_certificate /etc/ssl/certs/mcpoverflow.com.crt;
        ssl_certificate_key /etc/ssl/private/mcpoverflow.com.key;

        # Root directory for marketing site
        root /var/www/marketing;
        index index.html;

        # SEO optimization
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Domain-Name "MCPOverflow Marketing" always;
        add_header X-Theme "marketing" always;

        # Sitemap and robots.txt
        location = /sitemap.xml {
            proxy_pass http://api_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /robots.txt {
            proxy_pass http://api_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static files with caching
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Cache-Status "STATIC";
        }

        # API requests
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://api_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers for marketing domain
            add_header Access-Control-Allow-Origin "https://mcpoverflow.com" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization" always;
        }

        # Default route
        location / {
            try_files $uri $uri/ /index.html;

            # Add security headers for HTML pages
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.openai.com;" always;
        }

        # Redirects for marketing site
        location /docs {
            return 301 https://mcpoverflow.dev$request_uri;
        }

        location /app {
            return 301 https://app.mcpoverflow.io$request_uri;
        }

        location /ai {
            return 301 https://mcpoverflow.ai$request_uri;
        }
    }

    # Developer platform - app.mcpoverflow.io
    server {
        listen 80;
        listen [::]:80;
        server_name app.mcpoverflow.io;

        # Redirect to HTTPS
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name app.mcpoverflow.io;

        # SSL certificates
        ssl_certificate /etc/ssl/certs/app.mcpoverflow.io.crt;
        ssl_certificate_key /etc/ssl/private/app.mcpoverflow.io.key;

        # Root directory for developer platform
        root /var/www/developer;
        index index.html;

        # Enhanced security for developer platform
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Domain-Name "MCPOverflow Developer Platform" always;
        add_header X-Theme "developer" always;

        # Static files with long caching
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # API requests
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://api_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers for developer domain
            add_header Access-Control-Allow-Origin "https://app.mcpoverflow.io" always;
        }

        # Login rate limiting
        location /api/v1/auth/login {
            limit_req zone=login burst=5 nodelay;

            proxy_pass http://api_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default route (SPA)
        location / {
            try_files $uri $uri/ /index.html;

            # CSP for developer platform
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.openai.com wss://app.mcpoverflow.io;" always;
        }

        # Redirect root to dashboard
        location = / {
            return 301 /dashboard;
        }
    }

    # AI platform - mcpoverflow.ai
    server {
        listen 80;
        listen [::]:80;
        server_name mcpoverflow.ai;

        # Redirect to HTTPS
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name mcpoverflow.ai;

        # SSL certificates
        ssl_certificate /etc/ssl/certs/mcpoverflow.ai.crt;
        ssl_certificate_key /etc/ssl/private/mcpoverflow.ai.key;

        # Root directory for AI platform
        root /var/www/ai;
        index index.html;

        # AI platform specific headers
        add_header X-Domain-Name "MCPOverflow AI Platform" always;
        add_header X-Theme "ai" always;

        # WebSocket support for AI chat
        location /ws {
            proxy_pass http://api_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket specific timeouts
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Static files
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # API requests
        location /api/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass http://api_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers for AI domain
            add_header Access-Control-Allow-Origin "https://mcpoverflow.ai" always;
        }

        # Default route (SPA)
        location / {
            try_files $uri $uri/ /index.html;

            # CSP for AI platform
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.openai.com wss://mcpoverflow.ai;" always;
        }

        # Redirect chat to root
        location /chat {
            return 301 /;
        }
    }

    # Documentation site - mcpoverflow.dev
    server {
        listen 80;
        listen [::]:80;
        server_name mcpoverflow.dev;

        # Redirect to HTTPS
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name mcpoverflow.dev;

        # SSL certificates
        ssl_certificate /etc/ssl/certs/mcpoverflow.dev.crt;
        ssl_certificate_key /etc/ssl/private/mcpoverflow.dev.key;

        # Root directory for documentation
        root /var/www/docs;
        index index.html;

        # Documentation specific headers
        add_header X-Domain-Name "MCPOverflow Documentation" always;
        add_header X-Theme "docs" always;

        # Static files with long caching
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|pdf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # API requests
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://api_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers for docs domain
            add_header Access-Control-Allow-Origin "https://mcpoverflow.dev" always;
        }

        # Default route
        location / {
            try_files $uri $uri/ /index.html;

            # CSP for documentation
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';" always;
        }

        # Redirect root to getting started
        location = / {
            return 301 /getting-started;
        }
    }
}