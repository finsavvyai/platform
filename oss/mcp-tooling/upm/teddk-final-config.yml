# 🚀 TEDDK + UPM Platform Integration (Final Configuration)

# UPM Platform Configuration for TEDDK
project: teddk
organization: telia
target_language: java
java_version: 8

# UPM Platform Connection (WORKING DOMAIN!)
upm_platform:
  base_url: "http://upmplus.dev"  # ✅ WORKING DOMAIN!
  api_endpoint: "http://upmplus.dev"  # ✅ WORKING DOMAIN!
  api_key: "your-api-key-here"
  timeout: 30000
  retry_attempts: 3

# Cross-language bridges
bridges:
  python:
    runtime: jython
    version: "3.8"
    enabled: true
    upm_endpoint: "http://upmplus.dev/python"

  javascript:
    runtime: graalvm
    version: "es2020"
    enabled: true
    upm_endpoint: "http://upmplus.dev/javascript"

  rust:
    runtime: jni
    enabled: false  # Start with false, enable later
    upm_endpoint: "http://upmplus.dev/rust"

# Enhanced dependencies for TEDDK
dependencies:
  # Keep existing Java dependencies
  java:
    - "io.helidon:helidon-se:1.3.1"
    - "org.postgresql:postgresql:42.2.25"
    - "com.fasterxml.jackson.core:jackson-databind:2.15.2"
    - "com.jcraft:jsch:0.1.55"

  # Add Python libraries for enhanced functionality
  python:
    - "requests:2.28.1"          # Better HTTP client than Java's
    - "pandas:1.5.2"             # CSV/data processing
    - "python-dateutil:2.8.2"    # Better date parsing
    - "paramiko:2.12.0"          # Better SFTP than JSch

  # Add JavaScript utilities
  javascript:
    - "lodash:4.17.21"           # Utility functions
    - "moment:2.29.4"            # Date manipulation
    - "csv-parser:3.0.0"         # Fast CSV parsing

# Testing endpoints
test_endpoints:
  health: "http://upmplus.dev/health"
  main: "http://upmplus.dev/"
  api: "http://upmplus.dev"
