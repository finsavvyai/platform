name: UDP Dependency Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  dependency-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for better analysis
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install UDP CLI
      run: |
        pip install -e .
        pip install rich httpx
    
    - name: Run dependency analysis
      env:
        UDP_API_URL: ${{ secrets.UDP_API_URL || 'http://localhost:8040' }}
        UDP_ORG_ID: ${{ secrets.UDP_ORG_ID }}
      run: |
        # Find all manifest files
        find . -name "package.json" -o -name "requirements.txt" -o -name "pyproject.toml" -o -name "pom.xml" -o -name "Cargo.toml" | head -10 > manifest_files.txt
        
        # Run UDP analysis
        python -m udp.cli analyze $(cat manifest_files.txt) --format json --output udp-analysis.json
        
        # Display results
        cat udp-analysis.json
    
    - name: Generate SBOM
      env:
        UDP_API_URL: ${{ secrets.UDP_API_URL || 'http://localhost:8040' }}
        UDP_ORG_ID: ${{ secrets.UDP_ORG_ID }}
      run: |
        find . -name "package.json" -o -name "requirements.txt" -o -name "pyproject.toml" -o -name "pom.xml" -o -name "Cargo.toml" | head -10 > manifest_files.txt
        python -m udp.cli sbom $(cat manifest_files.txt) --format cyclonedx --output sbom.json
    
    - name: Vulnerability scan
      env:
        UDP_API_URL: ${{ secrets.UDP_API_URL || 'http://localhost:8040' }}
        UDP_ORG_ID: ${{ secrets.UDP_ORG_ID }}
      run: |
        find . -name "package.json" -o -name "requirements.txt" -o -name "pyproject.toml" -o -name "pom.xml" -o -name "Cargo.toml" | head -10 > manifest_files.txt
        python -m udp.cli scan $(cat manifest_files.txt) --output vulnerabilities.json
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: udp-analysis-results
        path: |
          udp-analysis.json
          sbom.json
          vulnerabilities.json
    
    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          
          // Read analysis results
          const analysis = JSON.parse(fs.readFileSync('udp-analysis.json', 'utf8'));
          const vulnerabilities = JSON.parse(fs.readFileSync('vulnerabilities.json', 'utf8'));
          
          // Create comment
          const comment = `## 🔍 UDP Dependency Analysis Results
          
          ### Summary
          - **Total Packages**: ${analysis.summary.total_packages}
          - **Vulnerabilities**: ${analysis.summary.vulnerabilities}
          - **Policy Violations**: ${analysis.summary.policy_violations}
          - **License Violations**: ${analysis.summary.license_violations}
          
          ### Vulnerabilities Found
          ${analysis.vulnerabilities.length > 0 ? 
            analysis.vulnerabilities.map(v => `- **${v.package}@${v.version}**: ${v.cve} (${v.severity})`).join('\n') :
            '✅ No vulnerabilities found'
          }
          
          ### Next Steps
          ${analysis.summary.vulnerabilities > 0 ? 
            '⚠️ Please review and address the vulnerabilities found.' :
            '✅ All dependencies are secure!'
          }
          
          ---
          *Generated by Universal Dependency Platform*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
    
    - name: Fail on critical vulnerabilities
      if: failure()
      run: |
        if [ -f vulnerabilities.json ]; then
          critical_count=$(jq '.results | to_entries | map(select(.value[] | .severity == "critical")) | length' vulnerabilities.json)
          if [ "$critical_count" -gt 0 ]; then
            echo "❌ Critical vulnerabilities found! Build failed."
            exit 1
          fi
        fi

  security-compliance:
    runs-on: ubuntu-latest
    needs: dependency-analysis
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download analysis artifacts
      uses: actions/download-artifact@v3
      with:
        name: udp-analysis-results
    
    - name: Check compliance
      run: |
        # Check for policy violations
        violations=$(jq '.summary.policy_violations' udp-analysis.json)
        if [ "$violations" -gt 0 ]; then
          echo "❌ Policy violations found: $violations"
          exit 1
        fi
        
        # Check for license violations
        license_violations=$(jq '.summary.license_violations' udp-analysis.json)
        if [ "$license_violations" -gt 0 ]; then
          echo "❌ License violations found: $license_violations"
          exit 1
        fi
        
        echo "✅ Compliance check passed"
    
    - name: Upload SBOM to security tools
      run: |
        # Upload SBOM to security scanning tools
        echo "📋 SBOM generated and ready for security tools integration"
        echo "SBOM file: sbom.json"
        echo "Format: CycloneDX"
        echo "Packages: $(jq '.components | length' sbom.json)"
