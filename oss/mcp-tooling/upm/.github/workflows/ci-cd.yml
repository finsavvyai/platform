name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ created ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: universal-dependency-platform

jobs:
  # Security and quality checks
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # Code quality and testing
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: udp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache Poetry dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pypoetry
        key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          ${{ runner.os }}-poetry-

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.7.1
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: poetry install --with dev,docs

    - name: Run linting
      run: |
        poetry run ruff check src/ tests/
        poetry run ruff format --check src/ tests/

    - name: Run type checking
      run: poetry run mypy src/udp

    - name: Run security checks
      run: poetry run bandit -r src/udp

    - name: Run tests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/udp_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key-for-ci-cd-pipeline-testing
        ENVIRONMENT: testing
      run: |
        poetry run pytest tests/ -v \
          --cov=src/udp \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=95 \
          --junit-xml=test-results.xml

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          test-results.xml
          coverage.xml

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # Build and push Docker images
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push API image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.cloud
        target: production
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ github.repository }}/api:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ github.repository }}/api:latest
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: Build and push Worker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.cloud
        target: celery-worker
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ github.repository }}/worker:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ github.repository }}/worker:latest
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: Build and push Beat image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.cloud
        target: celery-beat
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ github.repository }}/beat:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ github.repository }}/beat:latest
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  # Deploy to development environment
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://dev-api.universaldependency.com

    steps:
    - uses: actions/checkout@v4

    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG_DEV }}

    - name: Deploy to development
      run: |
        # Update image tags in kustomization
        cd k8s/overlays/development
        kustomize edit set image ghcr.io/${{ github.repository }}/api:${{ github.sha }}
        kustomize edit set image ghcr.io/${{ github.repository }}/worker:${{ github.sha }}
        kustomize edit set image ghcr.io/${{ github.repository }}/beat:${{ github.sha }}

        # Apply with kustomize
        kustomize build . | kubectl apply -f -

        # Wait for rollout
        kubectl rollout status deployment/udp-api -n udp-dev --timeout=600s
        kubectl rollout status deployment/udp-worker -n udp-dev --timeout=600s

  # Deploy to staging environment
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://staging-api.universaldependency.com

    steps:
    - uses: actions/checkout@v4

    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

    - name: Deploy to staging
      run: |
        cd k8s/overlays/staging
        kustomize edit set image ghcr.io/${{ github.repository }}/api:${{ github.sha }}
        kustomize edit set image ghcr.io/${{ github.repository }}/worker:${{ github.sha }}
        kustomize edit set image ghcr.io/${{ github.repository }}/beat:${{ github.sha }}
        kustomize build . | kubectl apply -f -
        kubectl rollout status deployment/udp-api -n udp-staging --timeout=600s

  # Deploy to production environment
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    environment:
      name: production
      url: https://api.universaldependency.com

    steps:
    - uses: actions/checkout@v4

    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

    - name: Deploy to production
      run: |
        cd k8s/overlays/production
        kustomize edit set image ghcr.io/${{ github.repository }}/api:${{ github.sha }}
        kustomize edit set image ghcr.io/${{ github.repository }}/worker:${{ github.sha }}
        kustomize edit set image ghcr.io/${{ github.repository }}/beat:${{ github.sha }}
        kustomize build . | kubectl apply -f -
        kubectl rollout status deployment/udp-api -n udp-prod --timeout=600s

    - name: Run post-deployment tests
      run: |
        # Health check
        curl -f https://api.universaldependency.com/health

        # Smoke tests
        cd tests/e2e
        poetry run pytest test_smoke.py --base-url=https://api.universaldependency.com

  # Performance testing
  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/staging'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install locust

    - name: Run load tests
      run: |
        cd tests/performance
        locust --headless --users 100 --spawn-rate 10 --run-time 300s \
          --host https://staging-api.universaldependency.com \
          --html performance-report.html

    - name: Upload performance report
      uses: actions/upload-artifact@v3
      with:
        name: performance-report
        path: tests/performance/performance-report.html