name: Plugin CI/CD Pipeline

on:
  push:
    paths:
      - 'plugins/**'
      - 'src/udp/plugins/**'
    branches: [ main, develop ]
  pull_request:
    paths:
      - 'plugins/**'
      - 'src/udp/plugins/**'
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  PLUGIN_IMAGE_PREFIX: universal-dependency-platform/plugins

jobs:
  # Detect changed plugins
  detect-changes:
    name: Detect Plugin Changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.changes }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect changed plugins
      id: changes
      run: |
        # Get list of changed plugin directories
        CHANGED_PLUGINS=$(git diff --name-only HEAD~1 HEAD | grep -E '^plugins/[^/]+/' | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n")[:-1]')
        echo "changes=$CHANGED_PLUGINS" >> $GITHUB_OUTPUT

  # Test and build plugins
  build-plugins:
    name: Build Plugin
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '[]'
    strategy:
      matrix:
        plugin: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.7.1

    - name: Install base dependencies
      run: poetry install --with dev

    - name: Test plugin
      run: |
        if [ -f "plugins/${{ matrix.plugin }}/tests/" ]; then
          poetry run pytest plugins/${{ matrix.plugin }}/tests/ -v
        fi

    - name: Validate plugin manifest
      run: |
        poetry run python -c "
        import json
        import sys

        with open('plugins/${{ matrix.plugin }}/plugin.json') as f:
            manifest = json.load(f)

        required_fields = ['name', 'version', 'description', 'entry_point', 'supported_ecosystems']
        for field in required_fields:
            if field not in manifest:
                print(f'Missing required field: {field}')
                sys.exit(1)

        print('Plugin manifest is valid')
        "

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push plugin image
      uses: docker/build-push-action@v5
      with:
        context: plugins/${{ matrix.plugin }}
        file: plugins/${{ matrix.plugin }}/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.PLUGIN_IMAGE_PREFIX }}/${{ matrix.plugin }}:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.PLUGIN_IMAGE_PREFIX }}/${{ matrix.plugin }}:latest
        labels: |
          org.opencontainers.image.title=${{ matrix.plugin }}
          org.opencontainers.image.description=UDP Plugin: ${{ matrix.plugin }}
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Register plugins in marketplace
  register-plugins:
    name: Register Plugins
    runs-on: ubuntu-latest
    needs: [detect-changes, build-plugins]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.matrix != '[]'
    strategy:
      matrix:
        plugin: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
    - uses: actions/checkout@v4

    - name: Register plugin in marketplace
      run: |
        # Read plugin manifest
        PLUGIN_MANIFEST=$(cat plugins/${{ matrix.plugin }}/plugin.json)

        # Register with UDP marketplace API
        curl -X POST https://api.universaldependency.com/api/v1/marketplace/plugins \
          -H "Authorization: Bearer ${{ secrets.UDP_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d "$PLUGIN_MANIFEST"

  # Security scan for plugins
  security-scan-plugins:
    name: Security Scan Plugin
    runs-on: ubuntu-latest
    needs: [detect-changes, build-plugins]
    if: needs.detect-changes.outputs.matrix != '[]'
    strategy:
      matrix:
        plugin: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy container scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.PLUGIN_IMAGE_PREFIX }}/${{ matrix.plugin }}:${{ github.sha }}
        format: 'sarif'
        output: 'trivy-results-${{ matrix.plugin }}.sarif'

    - name: Upload scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results-${{ matrix.plugin }}.sarif'
        category: 'plugin-${{ matrix.plugin }}'