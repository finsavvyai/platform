apiVersion: v1
kind: ConfigMap
metadata:
  name: udp-config
  namespace: udp
  labels:
    app: udp
    component: config
    environment: production
data:
  # Application Configuration
  APP_NAME: "Universal Dependency Platform"
  APP_VERSION: "0.1.0"
  ENVIRONMENT: "production"
  DEBUG: "false"
  HOST: "0.0.0.0"
  PORT: "8000"

  # Database Configuration
  DATABASE_ECHO: "false"
  DATABASE_POOL_SIZE: "5"
  DATABASE_MAX_OVERFLOW: "10"
  DATABASE_POOL_TIMEOUT: "30"
  DATABASE_POOL_RECYCLE: "3600"

  # Redis Configuration
  REDIS_MAX_CONNECTIONS: "10"
  REDIS_RETRY_ON_TIMEOUT: "true"
  REDIS_SOCKET_TIMEOUT: "5.0"

  # Security Configuration
  SECURITY_ALGORITHM: "HS256"
  SECURITY_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  SECURITY_REFRESH_TOKEN_EXPIRE_DAYS: "7"
  SECURITY_PASSWORD_BCRYPT_ROUNDS: "12"
  SECURITY_CORS_CREDENTIALS: "true"
  SECURITY_CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
  SECURITY_CORS_HEADERS: "*"

  # Logging Configuration
  LOGGING_LEVEL: "INFO"
  LOGGING_FORMAT: "json"
  LOGGING_SHOW_LOCALS: "false"
  LOGGING_JSON_LOGS: "true"

  # Monitoring Configuration
  MONITORING_ENABLE_PROMETHEUS: "true"
  MONITORING_ENABLE_TRACING: "true"
  MONITORING_METRICS_PORT: "8001"
  MONITORING_HEALTH_CHECK_INTERVAL: "30"

  # Package Registry Configuration
  PACKAGE_REGISTRY_NPM_REGISTRY_URL: "https://registry.npmjs.org"
  PACKAGE_REGISTRY_PYPI_REGISTRY_URL: "https://pypi.org/simple"
  PACKAGE_REGISTRY_MAVEN_CENTRAL_URL: "https://repo1.maven.org/maven2"
  PACKAGE_REGISTRY_CRATES_IO_URL: "https://crates.io/api/v1"
  PACKAGE_REGISTRY_REQUEST_TIMEOUT: "30"
  PACKAGE_REGISTRY_MAX_RETRIES: "3"
  PACKAGE_REGISTRY_RATE_LIMIT_PER_SECOND: "10"

  # Workflow Configuration
  WORKFLOW_MAX_ITERATIONS: "50"
  WORKFLOW_TIMEOUT_SECONDS: "300"
  WORKFLOW_CHECKPOINT_STORAGE: "database"
  WORKFLOW_ENABLE_HUMAN_IN_LOOP: "true"
  WORKFLOW_APPROVAL_TIMEOUT_HOURS: "24"

  # Celery Configuration
  CELERY_TASK_SERIALIZER: "json"
  CELERY_RESULT_SERIALIZER: "json"
  CELERY_ACCEPT_CONTENT: "json"
  CELERY_TIMEZONE: "UTC"
  CELERY_ENABLE_UTC: "true"

  # GCP Specific Configuration
  GOOGLE_CLOUD_REGION: "us-central1"
  GOOGLE_CLOUD_ZONE: "us-central1-a"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: udp-cors-config
  namespace: udp
  labels:
    app: udp
    component: cors-config
data:
  # CORS Origins - Update based on your domain
  SECURITY_CORS_ORIGINS: |
    [
      "http://localhost:3000",
      "http://localhost:8080",
      "https://your-domain.com"
    ]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: udp
  labels:
    app: udp
    component: nginx
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        upstream udp_api {
            server udp-api-service:8000;
        }

        server {
            listen 80;
            server_name _;

            # Health check endpoint
            location /health {
                proxy_pass http://udp_api;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # API endpoints
            location /api/ {
                proxy_pass http://udp_api;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # Timeouts
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;

                # CORS headers
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

                if ($request_method = 'OPTIONS') {
                    add_header 'Access-Control-Allow-Origin' '*';
                    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                    add_header 'Access-Control-Max-Age' 1728000;
                    add_header 'Content-Type' 'text/plain; charset=utf-8';
                    add_header 'Content-Length' 0;
                    return 204;
                }
            }

            # Metrics endpoint (protected)
            location /metrics {
                proxy_pass http://udp_api;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # Add basic authentication or IP restriction here
                # allow 10.0.0.0/8;
                # deny all;
            }

            # Root endpoint
            location / {
                proxy_pass http://udp_api;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
    }