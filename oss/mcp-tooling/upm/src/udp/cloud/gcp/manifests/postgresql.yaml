# PostgreSQL connection service
# This connects to Google Cloud SQL instance
apiVersion: v1
kind: Service
metadata:
  name: udp-postgresql-service
  namespace: udp
  labels:
    app: udp
    component: database
    tier: data
spec:
  type: ExternalName
  externalName: udp-postgres  # This will be updated by deployment script
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP

---
# Cloud SQL Proxy deployment for secure connection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: udp-cloudsql-proxy
  namespace: udp
  labels:
    app: udp
    component: cloudsql-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: udp
      component: cloudsql-proxy
  template:
    metadata:
      labels:
        app: udp
        component: cloudsql-proxy
        version: v1
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: udp-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.7.0
        args:
          - "--structured-logs"
          - "--port=5432"
          - "$(GOOGLE_CLOUD_PROJECT):$(GOOGLE_CLOUD_REGION):udp-postgres"
        env:
        - name: GOOGLE_CLOUD_PROJECT
          valueFrom:
            configMapKeyRef:
              name: udp-config
              key: GOOGLE_CLOUD_PROJECT
        - name: GOOGLE_CLOUD_REGION
          valueFrom:
            configMapKeyRef:
              name: udp-config
              key: GOOGLE_CLOUD_REGION
        ports:
        - containerPort: 5432
          name: postgres
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        livenessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
# Service for Cloud SQL Proxy
apiVersion: v1
kind: Service
metadata:
  name: udp-postgres
  namespace: udp
  labels:
    app: udp
    component: cloudsql-proxy
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: udp
    component: cloudsql-proxy

---
# Database initialization job
apiVersion: batch/v1
kind: Job
metadata:
  name: udp-db-init
  namespace: udp
  labels:
    app: udp
    component: db-init
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    metadata:
      labels:
        app: udp
        component: db-init
    spec:
      serviceAccountName: udp-api
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
      - name: wait-for-postgres
        image: postgres:13
        command:
        - sh
        - -c
        - |
          until pg_isready -h udp-postgres -p 5432 -U udp; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: udp-database-secret
              key: DATABASE_PASSWORD
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
      containers:
      - name: db-init
        image: gcr.io/PROJECT_ID/udp:latest  # Will be replaced by deployment script
        command:
        - sh
        - -c
        - |
          echo "Running database migrations..."
          alembic upgrade head
          echo "Database initialization completed"
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: udp-database-secret
              key: DATABASE_URL
        envFrom:
        - configMapRef:
            name: udp-config
        - secretRef:
            name: udp-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.cache
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
  backoffLimit: 3