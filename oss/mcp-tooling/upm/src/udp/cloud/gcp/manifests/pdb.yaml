# Pod Disruption Budget for UDP API
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: udp-api-pdb
  namespace: udp
  labels:
    app: udp
    component: api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: udp
      component: api

---
# Pod Disruption Budget for UDP Workers
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: udp-worker-pdb
  namespace: udp
  labels:
    app: udp
    component: worker
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app: udp
      component: worker

---
# Pod Disruption Budget for Cloud SQL Proxy
apiVersion: policy/v1
