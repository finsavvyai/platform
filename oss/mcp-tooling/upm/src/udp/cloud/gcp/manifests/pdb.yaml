metadata:
  name: udp-cloudsql-proxy-pdb
  namespace: udp
  labels:
    app: udp
    component: cloudsql-proxy
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: udp
      component: cloudsql-proxy

---
# Pod Disruption Budget for Redis Proxy
