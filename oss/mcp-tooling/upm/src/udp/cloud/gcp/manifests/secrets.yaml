# This is a template file for Kubernetes secrets
# The actual secrets will be created by the deployment script
# using Google Secret Manager integration

apiVersion: v1
kind: Secret
metadata:
  name: udp-secrets
  namespace: udp
  labels:
    app: udp
    component: secrets
  annotations:
    # Google Secret Manager integration
    reloader.stakater.com/match: "true"
type: Opaque
stringData:
  # These will be populated from Google Secret Manager
  SECRET_KEY: ""
  JWT_SECRET: ""
  SESSION_SECRET: ""
  ENCRYPTION_KEY: ""
  DATABASE_PASSWORD: ""

---
# Secret for database connection
apiVersion: v1
kind: Secret
metadata:
  name: udp-database-secret
  namespace: udp
  labels:
    app: udp
    component: database
type: Opaque
stringData:
  # Database connection details
  DATABASE_HOST: ""
  DATABASE_PORT: "5432"
  DATABASE_NAME: "udp"
  DATABASE_USER: "udp"
  DATABASE_PASSWORD: ""

  # Full database URL will be constructed in deployment
  DATABASE_URL: ""

---
# Secret for Redis connection
apiVersion: v1
kind: Secret
metadata:
  name: udp-redis-secret
  namespace: udp
  labels:
    app: udp
    component: redis
type: Opaque
stringData:
  REDIS_HOST: ""
  REDIS_PORT: "6379"
  REDIS_URL: ""

---
# Secret for external service API keys
apiVersion: v1
kind: Secret
metadata:
  name: udp-external-apis
  namespace: udp
  labels:
    app: udp
    component: external-apis
type: Opaque
stringData:
  # Add API keys for external services here
  # GITHUB_TOKEN: ""
  # GITLAB_TOKEN: ""
  # JIRA_API_KEY: ""
  # SLACK_WEBHOOK_URL: ""

---
# TLS Secret template for HTTPS
apiVersion: v1
kind: Secret
metadata:
  name: udp-tls-secret
  namespace: udp
  labels:
    app: udp
    component: tls
type: kubernetes.io/tls
data:
  # TLS certificate and key will be managed by cert-manager
  # or provided through Google Cloud Load Balancer
  tls.crt: ""
  tls.key: ""

---
# Service Account Key Secret (for external access)
apiVersion: v1
kind: Secret
metadata:
  name: udp-service-account-key
  namespace: udp
  labels:
    app: udp
    component: service-account
  annotations:
    kubernetes.io/service-account.name: udp-api
type: kubernetes.io/service-account-token