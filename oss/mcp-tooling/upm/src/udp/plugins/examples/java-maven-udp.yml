# UDP Configuration for Java Maven Project
project: enterprise-java-app
target_language: java
java_version: "11"

dependencies:
  # Native Java dependencies (handled by Maven)
  java:
    - "org.springframework.boot:spring-boot-starter-web:3.2.0"
    - "org.postgresql:postgresql:42.7.1"
    - "com.fasterxml.jackson.core:jackson-databind:2.16.1"

  # Python libraries for data science
  python:
    - "pandas:2.1.4"
    - "scikit-learn:1.3.2"
    - "matplotlib:3.8.2"
    - "numpy:1.26.2"

  # JavaScript utilities
  javascript:
    - "lodash:4.17.21"
    - "moment:2.30.1"
    - "validator:13.11.0"

  # Rust libraries for performance
  rust:
    - "serde:1.0.193"
    - "regex:1.10.2"
    - "rayon:1.8.0"

bridges:
  python:
    enabled: true
    runtime: jython
    version: "3.8"
    dependencies_path: "src/main/resources/python"

  javascript:
    enabled: true
    runtime: graalvm
    version: "es2020"
    dependencies_path: "src/main/resources/js"

  rust:
    enabled: true
    runtime: jni
    target: "x86_64-unknown-linux-gnu"
    dependencies_path: "src/main/resources/native"

udp_service:
  url: "https://api.universaldependency.com"
  api_key: "${UDP_API_KEY}"
  organization_id: "${UDP_ORGANIZATION_ID}"

security:
  scan_vulnerabilities: true
  fail_on_critical: true
  allowed_licenses:
    - "Apache-2.0"
    - "MIT"
    - "BSD-3-Clause"

plugins:
  maven:
    phase: "generate-sources"
    goals: ["udp:setup"]