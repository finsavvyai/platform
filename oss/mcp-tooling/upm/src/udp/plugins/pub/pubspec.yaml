name: udp_pub_plugin
description: Pub plugin for Universal Dependency Platform (UDP) integration
version: 1.0.0
homepage: https://universaldependency.com
repository: https://github.com/universal-dependency-platform/udp-pub-plugin
issue_tracker: https://github.com/universal-dependency-platform/udp-pub-plugin/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core dependencies
  args: ^2.4.2
  yaml: ^3.1.2
  http: ^1.1.0
  path: ^1.8.3
  io: ^1.0.4

  # File system operations
  file: ^7.0.0

  # Logging and CLI
  logging: ^1.2.0
  cli_util: ^0.4.0

  # JSON and serialization
  json_annotation: ^4.8.1

  # Template engine
  mustache_template: ^2.0.0

  # Process execution
  process: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Testing
  test: ^1.24.6
  mockito: ^5.4.2

  # Code generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

  # Linting
  flutter_lints: ^3.0.1

executables:
  udp: udp

flutter:
  plugin:
    platforms:
      android:
        package: com.udp.pub_plugin
        pluginClass: UdpPubPlugin
      ios:
        pluginClass: UdpPubPlugin
      linux:
        pluginClass: UdpPubPlugin
      macos:
        pluginClass: UdpPubPlugin
      web:
        pluginClass: UdpPubPlugin
        fileName: udp_pub_plugin_web.dart
      windows:
        pluginClass: UdpPubPlugin

topics:
  - dependency-management
  - cross-language
  - flutter
  - dart
  - build-tools