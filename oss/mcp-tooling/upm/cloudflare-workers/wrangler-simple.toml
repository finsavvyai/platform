name = "upm-api-gateway"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[env.staging]
name = "upm-api-gateway-staging"

[env.production]
name = "upm-api-gateway"

# R2 Storage for file uploads
[[r2_buckets]]
binding = "UPM_STORAGE"
bucket_name = "upm-storage-staging"

[[env.production.r2_buckets]]
binding = "UPM_STORAGE"
bucket_name = "upm-storage-production"

# Variable bindings
[vars]
ENVIRONMENT = "staging"
API_VERSION = "v1"
MAX_REQUEST_SIZE = "104857600"  # 100MB
CACHE_TTL = "3600"  # 1 hour
RATE_LIMIT = "1000"  # requests per minute

[env.production.vars]
ENVIRONMENT = "production"
