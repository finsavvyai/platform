apiVersion: v1
kind: Secret
metadata:
  name: udp-secrets
  namespace: udp-system
  labels:
    app.kubernetes.io/name: universal-dependency-platform
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database credentials (use external secret manager in production)
  DATABASE_URL: "postgresql://udp_user:REPLACE_WITH_ACTUAL_PASSWORD@postgres-service:5432/udp_prod"
  POSTGRES_PASSWORD: "REPLACE_WITH_ACTUAL_PASSWORD"

  # Redis connection
  REDIS_URL: "redis://redis-service:6379/0"

  # JWT secrets (generate secure values)
  SECRET_KEY: "REPLACE_WITH_ACTUAL_SECRET_KEY_AT_LEAST_32_CHARS"
  JWT_PRIVATE_KEY: "REPLACE_WITH_ACTUAL_RS256_PRIVATE_KEY"
  JWT_PUBLIC_KEY: "REPLACE_WITH_ACTUAL_RS256_PUBLIC_KEY"

  # External service API keys
  OPENAI_API_KEY: "REPLACE_WITH_ACTUAL_OPENAI_KEY"
  GITHUB_TOKEN: "REPLACE_WITH_ACTUAL_GITHUB_TOKEN"

  # Monitoring credentials
  GRAFANA_ADMIN_PASSWORD: "REPLACE_WITH_ACTUAL_GRAFANA_PASSWORD"

  # Email/notification credentials
  SMTP_PASSWORD: "REPLACE_WITH_ACTUAL_SMTP_PASSWORD"
  SLACK_WEBHOOK_URL: "REPLACE_WITH_ACTUAL_SLACK_WEBHOOK"
---
apiVersion: v1
kind: Secret
metadata:
  name: udp-tls-secret
  namespace: udp-system
  labels:
    app.kubernetes.io/name: universal-dependency-platform
    app.kubernetes.io/component: tls
type: kubernetes.io/tls
data:
  # Base64 encoded TLS certificate and key
  # Generate using: kubectl create secret tls udp-tls-secret --cert=tls.crt --key=tls.key
  tls.crt: LS0tLS1CRUdJTi... # REPLACE_WITH_ACTUAL_CERT
  tls.key: LS0tLS1CRUdJTi... # REPLACE_WITH_ACTUAL_KEY
---
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: udp-system
  labels:
    app.kubernetes.io/name: universal-dependency-platform
    app.kubernetes.io/component: registry
type: kubernetes.io/dockerconfigjson
data:
  # Base64 encoded Docker registry credentials
  # Generate using: kubectl create secret docker-registry docker-registry-secret --docker-server=<registry> --docker-username=<username> --docker-password=<password>
  .dockerconfigjson: ewogICJhdXRocyI6IHsKICAgICJodHRwczovL2luZGV4LmRvY2tlci5pby92MS8iOiB7CiAgICAgICJhdXRoIjogIlJFUExBQ0VfV0lUSF9BQ1RVQUxfQkFTRTY0X0FVVEgiCiAgICB9CiAgfQp9