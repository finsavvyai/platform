apiVersion: v2
name: udp
description: Universal Dependency Platform - Enterprise-grade dependency management
type: application
version: 0.1.0
appVersion: "0.1.0"
home: https://universaldependency.com
sources:
  - https://github.com/universaldependency/udp
maintainers:
  - name: UDP Team
    email: team@universaldependency.com
keywords:
  - dependency-management
  - supply-chain
  - security
  - analytics
  - workflow-orchestration

dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "17.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: prometheus
    version: "23.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: monitoring.prometheus.enabled
  - name: grafana
    version: "6.x.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: monitoring.grafana.enabled