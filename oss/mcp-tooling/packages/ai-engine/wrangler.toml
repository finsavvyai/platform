name = "mcpoverflow-ai-engine"
main = "src/worker.ts"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

# Account settings
# account_id = "" # Add your Cloudflare account ID
workers_dev = true

# Production environment
[env.production]
kv_namespaces = [
  { binding = "AI_JOBS", id = "483af3655143464e86f87c94d2aaca25", preview_id = "56332783f7ce4d11ab25ada828e4365e" }
]

[env.production.vars]
ENVIRONMENT = "production"
LOG_LEVEL = "info"

# Staging environment
[env.staging]
kv_namespaces = [
  { binding = "AI_JOBS", id = "483af3655143464e86f87c94d2aaca25", preview_id = "56332783f7ce4d11ab25ada828e4365e" }
]

[env.staging.vars]
ENVIRONMENT = "staging"
LOG_LEVEL = "debug"

# Secrets (set via: wrangler secret put OPENHANDS_API_KEY)
# - OPENHANDS_API_KEY
# - OPENHANDS_API_URL

# Limits
[limits]
cpu_ms = 50000  # 50 seconds for AI operations

# Routes (if using custom domain)
# routes = [
#   { pattern = "ai.mcpoverflow.io", custom_domain = true }
# ]

# Build configuration
[build]
command = "npm run build:worker"

# Triggers (for scheduled jobs)
# [triggers]
# crons = ["0 */6 * * *"]  # Every 6 hours for cleanup
