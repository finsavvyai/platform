<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-label="Cost Comparison — Direct API vs ClawPipe">
<title>Cost Comparison — Direct API vs ClawPipe</title>
<rect width="640" height="360" fill="#0f0f10" rx="12"/>
<text x="320" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Cost Comparison — Direct API vs ClawPipe</text>
<text x="320" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="#22c55e" text-anchor="middle">400 prompts · saved $0.063 (57.3%)</text>
<text x="122" y="107" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="rgba(255,255,255,0.55)" text-anchor="end">Direct API</text>
<rect x="130" y="80" width="430" height="44" fill="rgba(229,231,235,0.12)" rx="4"/>
<rect x="130" y="80" width="430" height="44" fill="#e5e7eb" rx="4"/>
<text x="554" y="107" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0f0f10" text-anchor="end">$0.11</text>
<text x="122" y="179" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="rgba(255,255,255,0.55)" text-anchor="end">ClawPipe</text>
<rect x="130" y="152" width="430" height="44" fill="rgba(229,231,235,0.12)" rx="4"/>
<rect x="130" y="152" width="184" height="44" fill="#6366f1" rx="4"/>
<text x="320" y="179" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#6366f1" text-anchor="start">$0.047</text>
<line x1="314" y1="142" x2="560" y2="142" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 2"/>
<text x="437" y="137" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#22c55e" text-anchor="middle">↑ 57.3% savings</text>
<text x="320" y="346" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="rgba(255,255,255,0.55)" text-anchor="middle">USD cost (400 prompts)</text>
</svg>