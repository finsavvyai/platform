<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-label="Pipeline Stage Latency">
<title>Pipeline Stage Latency</title>
<rect width="640" height="360" fill="#0f0f10" rx="12"/>
