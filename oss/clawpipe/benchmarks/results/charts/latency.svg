<text x="320" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="rgba(255,255,255,0.55)" text-anchor="middle">Average milliseconds per stage (pipeline only, excl. gateway)</text>
<rect x="90" y="82" width="440" height="36" fill="rgba(255,255,255,0.04)" rx="4"/>
