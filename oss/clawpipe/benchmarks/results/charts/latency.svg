<text x="538" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6366f1" text-anchor="start">0.0125ms</text>
<rect x="90" y="138" width="440" height="36" fill="rgba(255,255,255,0.04)" rx="4"/>
<rect x="90" y="138" width="187" height="36" fill="#3b82f6" rx="4"/>
<text x="82" y="161" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="rgba(255,255,255,0.55)" text-anchor="end">Packer</text>
<text x="285" y="161" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="start">0.0053ms</text>
<rect x="90" y="194" width="440" height="36" fill="rgba(255,255,255,0.04)" rx="4"/>
<rect x="90" y="194" width="4" height="36" fill="#22c55e" rx="4"/>
<text x="82" y="217" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="rgba(255,255,255,0.55)" text-anchor="end">Cache</text>
<text x="102" y="217" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="start">0.0001ms</text>
<rect x="90" y="250" width="440" height="36" fill="rgba(255,255,255,0.04)" rx="4"/>
<rect x="90" y="250" width="141" height="36" fill="#f97316" rx="4"/>
<text x="82" y="273" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="rgba(255,255,255,0.55)" text-anchor="end">Router</text>
<text x="239" y="273" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#f97316" text-anchor="start">0.004ms</text>
<text x="320" y="346" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="rgba(255,255,255,0.55)" text-anchor="middle">Total pipeline overhead: 0.0218ms</text>
