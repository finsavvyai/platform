startCommand:
  type: stdio
  configSchema:
    type: object
    required: [apiKey]
    properties:
      apiKey:
        type: string
        description: ClawPipe API key (get one at https://app.clawpipe.ai)
      projectId:
        type: string
        description: Project id (default mcp-default)
        default: mcp-default
  commandFunction: |
    (config) => ({
      command: "npx",
      args: ["-y", "clawpipe-mcp-server"],
      env: {
        CLAWPIPE_API_KEY: config.apiKey,
        CLAWPIPE_PROJECT_ID: config.projectId || "mcp-default",
      },
    })
metadata:
  name: clawpipe
  displayName: ClawPipe
  description: >
    The intelligent AI pipeline. Booster -> Packer -> Cache -> Router -> Call.
    Cut LLM cost 30-50% without changing application logic.
  homepage: https://clawpipe.ai
  repository: https://github.com/finsavvyai/clawpipe
  license: MIT
  categories:
    - productivity
    - developer-tools
    - ai-ml
  tools:
    - clawpipe_prompt
    - clawpipe_analyze_cost
    - clawpipe_stats
    - clawpipe_booster_check
