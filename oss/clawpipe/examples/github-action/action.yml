name: 'ClawPipe PR Review'
description: 'AI-powered pull request review using ClawPipe intelligent pipeline'
author: 'ClawPipe'

inputs:
  clawpipe-api-key:
    description: 'ClawPipe API key'
    required: true
  max-files:
    description: 'Maximum number of changed files to review'
    required: false
    default: '20'
  comment-mode:
    description: 'Comment mode: "summary" or "inline"'
    required: false
    default: 'summary'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'code'
  color: 'blue'
