<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="ClawPipe — Booster, Pack, Cache, Route, Call, Learn">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0e1a2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <style>
      .heading { font: 800 80px "Inter", -apple-system, system-ui, sans-serif; fill: #fff; letter-spacing: -2px; }
      .sub { font: 600 30px "Inter", -apple-system, system-ui, sans-serif; fill: #a3b3c4; }
      .stage { font: 600 22px "JetBrains Mono", "SF Mono", monospace; fill: #cbd5e1; }
      .pill { font: 700 18px "Inter", system-ui, sans-serif; fill: #fff; letter-spacing: 1px; }
      .arrow { stroke: #475569; stroke-width: 2; fill: none; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle dotted grid -->
  <g opacity="0.05" fill="#fff">
    <circle cx="50"  cy="60"  r="1.5"/><circle cx="150" cy="60"  r="1.5"/><circle cx="250" cy="60"  r="1.5"/>
    <circle cx="350" cy="60"  r="1.5"/><circle cx="450" cy="60"  r="1.5"/><circle cx="550" cy="60"  r="1.5"/>
    <circle cx="650" cy="60"  r="1.5"/><circle cx="750" cy="60"  r="1.5"/><circle cx="850" cy="60"  r="1.5"/>
    <circle cx="950" cy="60"  r="1.5"/><circle cx="1050" cy="60" r="1.5"/><circle cx="1150" cy="60" r="1.5"/>
  </g>

  <!-- brand pill -->
  <rect x="80" y="74" width="200" height="36" rx="18" fill="url(#accent)"/>
  <text x="180" y="98" text-anchor="middle" class="pill">CLAWPIPE</text>

  <!-- headline -->
  <text x="80" y="220" class="heading">The only AI gateway</text>
  <text x="80" y="305" class="heading">that skips LLM calls.</text>

  <!-- subhead -->
  <text x="80" y="365" class="sub">Booster resolves deterministic prompts before they ever leave the SDK.</text>
  <text x="80" y="405" class="sub">21 providers. Sub-ms pipeline. Public benchmark in progress.</text>

  <!-- pipeline -->
  <g transform="translate(80, 480)">
    <rect x="0"   y="0" width="160" height="72" rx="12" fill="#1e293b" stroke="url(#accent)" stroke-width="2"/>
    <text x="80"  y="32" text-anchor="middle" class="stage">BOOSTER</text>
    <text x="80"  y="56" text-anchor="middle" class="sub" style="font-size:14px;fill:#64748b">deterministic</text>

    <line class="arrow" x1="160" y1="36" x2="180" y2="36"/>
    <polyline class="arrow" points="174,30 180,36 174,42" />

    <rect x="180" y="0" width="140" height="72" rx="12" fill="#1e293b"/>
    <text x="250" y="32" text-anchor="middle" class="stage">PACK</text>
    <text x="250" y="56" text-anchor="middle" class="sub" style="font-size:14px;fill:#64748b">compress</text>

    <line class="arrow" x1="320" y1="36" x2="340" y2="36"/>
    <polyline class="arrow" points="334,30 340,36 334,42" />

    <rect x="340" y="0" width="140" height="72" rx="12" fill="#1e293b"/>
    <text x="410" y="32" text-anchor="middle" class="stage">CACHE</text>
    <text x="410" y="56" text-anchor="middle" class="sub" style="font-size:14px;fill:#64748b">semantic</text>

    <line class="arrow" x1="480" y1="36" x2="500" y2="36"/>
    <polyline class="arrow" points="494,30 500,36 494,42" />

    <rect x="500" y="0" width="140" height="72" rx="12" fill="#1e293b"/>
    <text x="570" y="32" text-anchor="middle" class="stage">ROUTE</text>
    <text x="570" y="56" text-anchor="middle" class="sub" style="font-size:14px;fill:#64748b">cost-aware</text>

    <line class="arrow" x1="640" y1="36" x2="660" y2="36"/>
    <polyline class="arrow" points="654,30 660,36 654,42" />

    <rect x="660" y="0" width="140" height="72" rx="12" fill="#1e293b"/>
    <text x="730" y="32" text-anchor="middle" class="stage">CALL</text>
    <text x="730" y="56" text-anchor="middle" class="sub" style="font-size:14px;fill:#64748b">21 providers</text>

    <line class="arrow" x1="800" y1="36" x2="820" y2="36"/>
    <polyline class="arrow" points="814,30 820,36 814,42" />

    <rect x="820" y="0" width="140" height="72" rx="12" fill="#1e293b"/>
    <text x="890" y="32" text-anchor="middle" class="stage">LEARN</text>
    <text x="890" y="56" text-anchor="middle" class="sub" style="font-size:14px;fill:#64748b">self-tunes</text>
  </g>

  <!-- corner url -->
  <text x="1120" y="595" text-anchor="end" class="sub" style="font-size:18px;fill:#475569">clawpipe.ai</text>
</svg>
