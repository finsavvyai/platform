global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'finsavvyai-production'
    environment: 'production'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Rule files
rule_files:
  - 'alerts/*.yml'

# Scrape configurations
scrape_configs:
  # FinSavvyAI Gateway
  - job_name: 'finsavvyai-gateway'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Docker containers (if using cAdvisor)
  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']
