version: '3.8'

services:
  # FinSavvyAI Gateway
  finsavvyai-gateway:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: finsavvyai/production:latest
    container_name: finsavvyai-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - FINSAVVYAI_ENV=production
      - FINSAVVYAI_NOTEBOOKLM_ENABLED=true
      - FINSAVVYAI_SOURCES_PATH=/app/sources
      - FINSAVVYAI_NOTEBOOKS_PATH=/app/notebooks
      - LMSTUDIO_BASE_URL=http://host.docker.internal:1234
    volumes:
      - ./sources:/app/sources
      - ./notebooks:/app/notebooks
      - ./logs/production:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - finsavvyai-network
    restart: unless-stopped

  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: finsavvyai-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - finsavvyai-network
    depends_on:
      - finsavvyai-gateway

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: finsavvyai-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - finsavvyai-network
    depends_on:
      - prometheus

  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: finsavvyai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - finsavvyai-network
    depends_on:
      - finsavvyai-gateway
    profiles:
      - with-nginx

networks:
  finsavvyai-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
