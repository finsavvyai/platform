{{- $fullName := include "finsavvyai.fullname" . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-gateway
  labels:
    {{- include "finsavvyai.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "finsavvyai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
