apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "finsavvyai.fullname" . }}-config
  labels:
    {{- include "finsavvyai.labels" . | nindent 4 }}
data:
  FINSAVVYAI_LOG_LEVEL: {{ .Values.gateway.env.FINSAVVYAI_LOG_LEVEL | quote }}
  FINSAVVYAI_AUTH_ENABLED: {{ .Values.gateway.env.FINSAVVYAI_AUTH_ENABLED | quote }}
  FINSAVVYAI_RATE_LIMIT_REQUESTS: {{ .Values.gateway.env.FINSAVVYAI_RATE_LIMIT_REQUESTS | quote }}
  {{- if .Values.config.ollamaBaseUrl }}
  OLLAMA_BASE_URL: {{ .Values.config.ollamaBaseUrl | quote }}
  {{- end }}
  {{- if .Values.config.masterHost }}
  FINSAVVYAI_MASTER_HOST: {{ .Values.config.masterHost | quote }}
  {{- else }}
  FINSAVVYAI_MASTER_HOST: {{ include "finsavvyai.fullname" . }}-master
  {{- end }}
