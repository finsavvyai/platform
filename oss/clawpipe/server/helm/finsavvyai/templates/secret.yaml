apiVersion: v1
kind: Secret
metadata:
  name: {{ include "finsavvyai.fullname" . }}-secrets
  labels:
    {{- include "finsavvyai.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.finsavvyaiApiKey }}
  FINSAVVYAI_API_KEY: {{ .Values.secrets.finsavvyaiApiKey | quote }}
  {{- end }}
