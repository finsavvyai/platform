global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert-rules.yaml"

scrape_configs:
  # FinSavvyAI API Gateway
  - job_name: "finsavvyai-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: gateway

  # FinSavvyAI Master Server
  - job_name: "finsavvyai-master"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: master

  # FinSavvyAI Worker Nodes (add more targets as workers are deployed)
  - job_name: "finsavvyai-workers"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8001"]
        labels:
          service: worker
          worker_id: worker-1

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
