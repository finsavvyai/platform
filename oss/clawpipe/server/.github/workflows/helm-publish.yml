name: Publish Helm Chart

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  helm-publish:
    name: Package and publish Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.VERSION }}/" helm/finsavvyai/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.VERSION }}\"/" helm/finsavvyai/Chart.yaml

      - name: Lint chart
        run: helm lint helm/finsavvyai/

      - name: Package chart
        run: helm package helm/finsavvyai/ --destination .helm-dist/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to GHCR OCI
        run: |
          helm push .helm-dist/finsavvyai-${{ steps.version.outputs.VERSION }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart-${{ steps.version.outputs.VERSION }}
          path: .helm-dist/
          retention-days: 90
