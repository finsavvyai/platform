name = "finsavvyai-llm-gateway"
main = "src/index.js"
compatibility_date = "2024-12-01"
workers_dev = true

# KV Namespaces
kv_namespaces = [
  { binding = "API_KEYS", id = "b9f7063ea8ac446ba312a096d6a664ff", preview_id = "d20ec17401fd4d93a4010db55239767d" },
  { binding = "RATE_LIMIT", id = "3cad10d06f9e4e72b9cdbed33cec6fa9", preview_id = "f5cc3aa80f1e472695213f1e2a08d9db" }
]

# Secrets (wrangler secret put <NAME>):
#   OPENAI_API_KEY      - OpenAI key
#   ANTHROPIC_API_KEY   - Anthropic key
#   OLLAMA_BASE_URL     - Ollama endpoint (optional)
#   ADMIN_SECRET        - Admin key for managing customer API keys

[env.production]
name = "finsavvyai-llm-gateway"
routes = [
  { pattern = "llm.finsavvyai.com/*", zone_name = "finsavvyai.com" },
  { custom_domain = true, pattern = "llm.finsavvyai.com" }
]
kv_namespaces = [
  { binding = "API_KEYS", id = "b9f7063ea8ac446ba312a096d6a664ff" },
  { binding = "RATE_LIMIT", id = "3cad10d06f9e4e72b9cdbed33cec6fa9" }
]

[env.staging]
name = "finsavvyai-llm-gateway-staging"
