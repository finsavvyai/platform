global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "finsavvyai-master"
    static_configs:
      - targets: ["master:8000"]

  - job_name: "finsavvyai-worker"
    static_configs:
      - targets: ["worker:8001"]

  - job_name: "finsavvyai-gateway"
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: "openclaw"
    static_configs:
      - targets: ["openclaw:11434"]
