version: '3.9'

services:
  fastapi:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: finsavvyai-api
    ports:
      - "8040:8040"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ENVIRONMENT=production
      - FINSAVVYAI_AUTH_ENABLED=${FINSAVVYAI_AUTH_ENABLED:-true}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRY_MINUTES=${JWT_EXPIRY_MINUTES:-60}
      - FINSAVVYAI_CORS_ORIGINS=${FINSAVVYAI_CORS_ORIGINS}
      - ALLOW_CREDENTIALS=${ALLOW_CREDENTIALS:-true}
      - FINSAVVYAI_PAYMENT_WEBHOOK_SECRET=${FINSAVVYAI_PAYMENT_WEBHOOK_SECRET}
      - FINSAVVYAI_CHECKOUT_BASE_URL=${FINSAVVYAI_CHECKOUT_BASE_URL:-https://checkout.finsavvyai.com/sessions}
      - FINSAVVYAI_LOG_LEVEL=${FINSAVVYAI_LOG_LEVEL:-INFO}
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8040/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - finsavvyai
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  postgres:
    image: postgres:15-alpine
    container_name: finsavvyai-db
    environment:
      - POSTGRES_DB=${DB_NAME:-finsavvyai}
      - POSTGRES_USER=${DB_USER:-finsavvy}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finsavvyai
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-finsavvy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finsavvyai-cache
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - finsavvyai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: finsavvyai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - finsavvyai
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: finsavvyai-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - finsavvyai
    restart: unless-stopped

networks:
  finsavvyai:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
