name = "tokenforge-api"
main = "src/index.ts"
compatibility_date = "2026-04-27"
compatibility_flags = ["nodejs_compat"]

# Production binding — the actual D1 ID is filled by a one-time
# `wrangler d1 create tokenforge` then committed here.
[[d1_databases]]
binding = "DB"
database_name = "tokenforge"
database_id = "REPLACE_WITH_REAL_ID"
migrations_dir = "../../packages/db/migrations"

[[kv_namespaces]]
binding = "NONCES"
id = "REPLACE_WITH_REAL_ID"

# Per-tenant API keys + bearer auth secret are runtime secrets:
#   wrangler secret put BETTER_AUTH_SECRET
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put LEMON_SQUEEZY_KEY

[vars]
ENVIRONMENT = "production"

[env.staging]
name = "tokenforge-api-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

[observability]
enabled = true
