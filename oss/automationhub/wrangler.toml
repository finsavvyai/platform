name = "upm-plus-gateway"
main = "src/upm-plus-gateway-worker.js"
compatibility_date = "2024-01-01"

# UPM.Plus Multi-Domain Configuration
[env.production]
name = "upm-plus-production"
routes = [
  { pattern = "upm.plus/*", zone_name = "upm.plus" },
  { pattern = "api.upm.plus/*", zone_name = "upm.plus" },
  { pattern = "app.upm.plus/*", zone_name = "upm.plus" },
  { pattern = "dashboard.upm.plus/*", zone_name = "upm.plus" },
  { pattern = "admin.upm.plus/*", zone_name = "upm.plus" },
  { pattern = "docs.upm.plus/*", zone_name = "upm.plus" },
  { pattern = "cdn.upm.plus/*", zone_name = "upm.plus" },
  { pattern = "static.upm.plus/*", zone_name = "upm.plus" },
  { pattern = "assets.upm.plus/*", zone_name = "upm.plus" }
]

[env.development]
name = "upm-plus-development"
routes = [
  { pattern = "upmplus.dev/*", zone_name = "upmplus.dev" },
  { pattern = "api.upmplus.dev/*", zone_name = "upmplus.dev" },
  { pattern = "app.upmplus.dev/*", zone_name = "upmplus.dev" },
  { pattern = "dashboard.upmplus.dev/*", zone_name = "upmplus.dev" },
  { pattern = "admin.upmplus.dev/*", zone_name = "upmplus.dev" },
  { pattern = "docs.upmplus.dev/*", zone_name = "upmplus.dev" },
  { pattern = "cdn.upmplus.dev/*", zone_name = "upmplus.dev" },
  { pattern = "static.upmplus.dev/*", zone_name = "upmplus.dev" },
  { pattern = "assets.upmplus.dev/*", zone_name = "upmplus.dev" }
]

[env.staging]
name = "upm-plus-staging"
routes = [
  { pattern = "upmplus.io/*", zone_name = "upmplus.io" },
  { pattern = "api.upmplus.io/*", zone_name = "upmplus.io" },
  { pattern = "app.upmplus.io/*", zone_name = "upmplus.io" },
  { pattern = "dashboard.upmplus.io/*", zone_name = "upmplus.io" },
  { pattern = "admin.upmplus.io/*", zone_name = "upmplus.io" },
  { pattern = "docs.upmplus.io/*", zone_name = "upmplus.io" },
  { pattern = "cdn.upmplus.io/*", zone_name = "upmplus.io" },
  { pattern = "static.upmplus.io/*", zone_name = "upmplus.io" },
  { pattern = "assets.upmplus.io/*", zone_name = "upmplus.io" }
]

[env.ai-production]
name = "upm-plus-ai-production"
routes = [
  { pattern = "upmplus.ai/*", zone_name = "upmplus.ai" },
  { pattern = "api.upmplus.ai/*", zone_name = "upmplus.ai" },
  { pattern = "app.upmplus.ai/*", zone_name = "upmplus.ai" },
  { pattern = "dashboard.upmplus.ai/*", zone_name = "upmplus.ai" },
  { pattern = "admin.upmplus.ai/*", zone_name = "upmplus.ai" },
  { pattern = "docs.upmplus.ai/*", zone_name = "upmplus.ai" },
  { pattern = "cdn.upmplus.ai/*", zone_name = "upmplus.ai" },
  { pattern = "static.upmplus.ai/*", zone_name = "upmplus.ai" },
  { pattern = "assets.upmplus.ai/*", zone_name = "upmplus.ai" }
]

# KV Namespaces for global data
[[kv_namespaces]]
binding = "UPM_PLUS_CACHE"
id = "25baf2394d9c4d36b2385308d8e6155a"

[[kv_namespaces]]
binding = "UPM_CONFIG"
id = "upm-plus-config-kv"
preview_id = "upm-plus-config-kv-preview"

# D1 Database for UPM.Plus Configuration
[[d1_databases]]
binding = "UPM_CONFIG_DB"
database_name = "upm-plus-config"
database_id = "upm-plus-config-db"

# D1 Database for UPM.Plus Main Data
[[d1_databases]]
binding = "UPM_PLUS_DB"
database_name = "upm-plus-production-db"
database_id = "01c45f4f-ba3a-4302-8c13-a48942601f51"

# Environment variables
[vars]
ENVIRONMENT = "production"
DOMAIN = "upm.plus"
API_BASE_URL = "https://api.upm.plus"
CDN_BASE_URL = "https://cdn.upm.plus"
CACHE_TTL = "3600"
RATE_LIMIT = "100"

# Environment-specific variables
[env.production.vars]
ENVIRONMENT = "production"
DOMAIN = "upm.plus"
API_BASE_URL = "https://api.upm.plus"

[env.development.vars]
ENVIRONMENT = "development"
DOMAIN = "upmplus.dev"
API_BASE_URL = "https://api.upmplus.dev"
CACHE_TTL = "300"

[env.staging.vars]
ENVIRONMENT = "staging"
DOMAIN = "upmplus.io"
API_BASE_URL = "https://api.upmplus.io"
CACHE_TTL = "600"

[env.ai-production.vars]
ENVIRONMENT = "ai-production"
DOMAIN = "upmplus.ai"
API_BASE_URL = "https://api.upmplus.ai"
CACHE_TTL = "1800"

# Workers AI binding
[ai]
binding = "AI"

# Queue configuration (disabled for now due to permissions)
