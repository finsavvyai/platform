<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPM.Plus - Production Features Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .card-content {
            color: #333;
        }

        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin: 5px 0;
        }

        .status.healthy {
            background: #10b981;
            color: white;
        }

        .status.warning {
            background: #f59e0b;
            color: white;
        }

        .status.error {
            background: #ef4444;
            color: white;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background 0.3s ease;
            margin: 5px;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #6b7280;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        .usage-bar {
            background: #e5e7eb;
            border-radius: 10px;
            height: 25px;
            margin: 10px 0;
            overflow: hidden;
        }

        .usage-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8em;
            font-weight: bold;
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .pricing-card {
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        .pricing-card:hover {
            border-color: #667eea;
        }

        .pricing-card.featured {
            border-color: #667eea;
            background: #f3f4f6;
        }

        .pricing-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .price {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }

        .price .period {
            font-size: 0.5em;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .success {
            background: #d1fae5;
            color: #065f46;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
            margin: 5px 0;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group {
            margin: 15px 0;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 UPM.Plus</h1>
            <p>Production Features Demo - Billing • Usage • Health • Payments</p>
        </div>

        <div class="dashboard">
            <!-- Health Status Card -->
            <div class="card">
                <h2>System Health</h2>
                <div class="card-content" id="health-status">
                    <div class="loading">Checking health...</div>
                </div>
                <button class="btn" onclick="checkHealth()">Refresh Health</button>
            </div>

            <!-- Current Subscription Card -->
            <div class="card">
                <h2>Current Subscription</h2>
                <div class="card-content" id="subscription-status">
                    <div class="loading">Loading subscription...</div>
                </div>
                <button class="btn" onclick="getSubscription()">Refresh</button>
            </div>

            <!-- Usage Summary Card -->
            <div class="card">
                <h2>Usage Summary</h2>
                <div class="card-content" id="usage-summary">
                    <div class="loading">Loading usage...</div>
                </div>
                <button class="btn" onclick="getUsage()">Refresh Usage</button>
            </div>
        </div>

        <!-- Pricing Section -->
        <div class="card">
            <h2>Subscription Pricing</h2>
            <div class="card-content">
                <div id="pricing-info">
                    <div class="loading">Loading pricing...</div>
                </div>
                <button class="btn" onclick="getPricing()">Refresh Pricing</button>
            </div>
        </div>

        <!-- Subscription Management -->
        <div class="card">
            <h2>Manage Subscription</h2>
            <div class="card-content">
                <div class="form-group">
                    <label>Subscription Tier</label>
                    <select id="tier-select">
                        <option value="free">Free</option>
                        <option value="starter">Starter ($29/month)</option>
                        <option value="professional">Professional ($99/month)</option>
                        <option value="business">Business ($299/month)</option>
                        <option value="enterprise">Enterprise ($999/month)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Billing Period</label>
                    <select id="period-select">
                        <option value="monthly">Monthly</option>
                        <option value="yearly">Yearly (Save 2 months)</option>
                    </select>
                </div>
                <button class="btn" onclick="createSubscription()">Create Subscription</button>
                <button class="btn btn-secondary" onclick="cancelSubscription()">Cancel Subscription</button>
            </div>
        </div>

        <!-- API Configuration -->
        <div class="card">
            <h2>API Configuration</h2>
            <div class="card-content">
                <div class="form-group">
                    <label>API Base URL</label>
                    <input type="text" id="api-url" value="http://localhost:8000/api/v1" placeholder="http://localhost:8000/api/v1">
                </div>
                <div class="form-group">
                    <label>Access Token (from login)</label>
                    <input type="text" id="access-token" placeholder="Bearer token from /auth/login">
                </div>
                <button class="btn" onclick="saveConfig()">Save Configuration</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = localStorage.getItem('api_base') || 'http://localhost:8000/api/v1';
        let ACCESS_TOKEN = localStorage.getItem('access_token') || '';

        // Update API URL input
        document.getElementById('api-url').value = API_BASE;
        document.getElementById('access-token').value = ACCESS_TOKEN;

        function getHeaders() {
            const headers = {
                'Content-Type': 'application/json'
            };
            const token = document.getElementById('access-token').value || ACCESS_TOKEN;
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            return headers;
        }

        async function apiCall(endpoint, method = 'GET', body = null) {
            const url = endpoint.startsWith('http') ? endpoint : `${API_BASE}${endpoint}`;
            try {
                const options = {
                    method,
                    headers: getHeaders()
                };
                if (body) {
                    options.body = JSON.stringify(body);
                }
                const response = await fetch(url, options);
                const data = await response.json();
                return { ok: response.ok, status: response.status, data };
            } catch (error) {
                return { ok: false, error: error.message };
            }
        }

        async function checkHealth() {
            const statusDiv = document.getElementById('health-status');
            statusDiv.innerHTML = '<div class="loading">Checking...</div>';

            // Basic health
            const health = await apiCall('/health');
            // Detailed health
            const detailed = await apiCall('/health/detailed');

            if (health.ok && detailed.ok) {
                const checks = detailed.data.checks || {};
                let html = '<div>';
                
                for (const [service, status] of Object.entries(checks)) {
                    const isHealthy = status.status === 'healthy';
                    const statusClass = isHealthy ? 'healthy' : 'error';
                    html += `<span class="status ${statusClass}">${service}: ${status.status}</span> `;
                }
                
                html += '</div>';
                html += `<p style="margin-top: 10px;"><strong>Service:</strong> ${health.data.service || 'UPM.Plus'}</p>`;
                html += `<p><strong>Version:</strong> ${health.data.version || '1.0.0'}</p>`;
                statusDiv.innerHTML = html;
            } else {
                statusDiv.innerHTML = '<div class="error">Failed to check health. Make sure server is running.</div>';
            }
        }

        async function getSubscription() {
            const statusDiv = document.getElementById('subscription-status');
            statusDiv.innerHTML = '<div class="loading">Loading...</div>';

            const result = await apiCall('/billing/subscriptions/current');
            
            if (result.ok) {
                const sub = result.data.subscription;
                if (sub) {
                    statusDiv.innerHTML = `
                        <div>
                            <p><strong>Tier:</strong> <span style="color: #667eea; font-weight: bold;">${sub.tier.toUpperCase()}</span></p>
                            <p><strong>Status:</strong> <span class="status ${sub.status === 'active' ? 'healthy' : 'warning'}">${sub.status}</span></p>
                            <p><strong>Billing Period:</strong> ${sub.billing_period}</p>
                            <p><strong>Period End:</strong> ${new Date(sub.current_period_end).toLocaleDateString()}</p>
                        </div>
                    `;
                } else {
                    statusDiv.innerHTML = '<div class="success">No active subscription - You are on the Free tier</div>';
                }
            } else {
                statusDiv.innerHTML = '<div class="error">Failed to load subscription. Check your access token.</div>';
            }
        }

        async function getUsage() {
            const summaryDiv = document.getElementById('usage-summary');
            summaryDiv.innerHTML = '<div class="loading">Loading...</div>';

            const result = await apiCall('/billing/usage/summary');
            
            if (result.ok) {
                const usage = result.data.usage || {};
                let html = '<div>';
                
                for (const [metric, info] of Object.entries(usage)) {
                    const used = info.used || 0;
                    const limit = info.limit || 0;
                    const remaining = info.remaining || 0;
                    const percentage = limit > 0 ? (used / limit) * 100 : 0;
                    const isUnlimited = limit === -1;
                    
                    html += `<div style="margin: 15px 0;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <strong>${metric.replace(/_/g, ' ').toUpperCase()}</strong>
                            <span>${isUnlimited ? 'Unlimited' : `${used} / ${limit} (${remaining} remaining)`}</span>
                        </div>
                        ${!isUnlimited ? `<div class="usage-bar">
                            <div class="usage-fill" style="width: ${Math.min(percentage, 100)}%">
                                ${percentage.toFixed(1)}%
                            </div>
                        </div>` : ''}
                    </div>`;
                }
                
                html += '</div>';
                summaryDiv.innerHTML = html;
            } else {
                summaryDiv.innerHTML = '<div class="error">Failed to load usage. Check your access token.</div>';
            }
        }

        async function getPricing() {
            const pricingDiv = document.getElementById('pricing-info');
            pricingDiv.innerHTML = '<div class="loading">Loading...</div>';

            const result = await apiCall('/billing/pricing');
            
            if (result.ok) {
                const pricing = result.data.pricing || {};
                let html = '<div class="pricing-grid">';
                
                for (const [tier, info] of Object.entries(pricing)) {
                    const isFeatured = tier === 'professional';
                    html += `
                        <div class="pricing-card ${isFeatured ? 'featured' : ''}">
                            <h3>${tier.charAt(0).toUpperCase() + tier.slice(1)}</h3>
                            <div class="price">
                                $${info.monthly}
                                <span class="period">/month</span>
                            </div>
                            <p style="color: #666; font-size: 0.9em;">$${info.yearly}/year</p>
                            <ul style="text-align: left; margin-top: 15px; font-size: 0.9em;">
                                ${info.features.slice(0, 3).map(f => `<li>${f}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }
                
                html += '</div>';
                pricingDiv.innerHTML = html;
            } else {
                pricingDiv.innerHTML = '<div class="error">Failed to load pricing</div>';
            }
        }

        async function createSubscription() {
            const tier = document.getElementById('tier-select').value;
            const period = document.getElementById('period-select').value;
            
            const result = await apiCall('/billing/subscriptions', 'POST', {
                tier: tier,
                billing_period: period
            });
            
            if (result.ok) {
                alert(`Subscription created successfully!\nTier: ${result.data.tier}\nStatus: ${result.data.status}`);
                getSubscription();
            } else {
                alert(`Failed to create subscription: ${result.data?.detail || result.error || 'Unknown error'}\n\nNote: This requires Stripe configuration in production.`);
            }
        }

        async function cancelSubscription() {
            if (!confirm('Are you sure you want to cancel your subscription?')) {
                return;
            }
            
            // First get current subscription
            const subResult = await apiCall('/billing/subscriptions/current');
            if (subResult.ok && subResult.data.subscription) {
                const subId = subResult.data.subscription.id;
                const result = await apiCall(`/billing/subscriptions/${subId}/cancel`, 'POST', {
                    cancel_immediately: false
                });
                
                if (result.ok) {
                    alert('Subscription will be canceled at the end of the billing period.');
                    getSubscription();
                } else {
                    alert(`Failed to cancel subscription: ${result.data?.detail || result.error}`);
                }
            } else {
                alert('No active subscription found.');
            }
        }

        function saveConfig() {
            const apiUrl = document.getElementById('api-url').value;
            const token = document.getElementById('access-token').value;
            
            localStorage.setItem('api_base', apiUrl);
            localStorage.setItem('access_token', token);
            
            ACCESS_TOKEN = token;
            alert('Configuration saved!');
        }

        // Initialize on load
        window.onload = function() {
            checkHealth();
            getSubscription();
            getUsage();
            getPricing();
        };
    </script>
</body>
</html>
