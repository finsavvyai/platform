apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-rate-limit-config
  namespace: ingress-nginx
data:
  rate-limiting.conf: |
    # Global rate limiting configuration
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=workflow_limit:10m rate=20r/s;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

    # Request size limits
    client_max_body_size 50m;
    client_body_buffer_size 128k;
    client_header_timeout 3m;
    client_body_timeout 3m;
    send_timeout 3m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' wss: https:; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # WebSocket configuration
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeout configurations
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Rate limiting rules
    server {
        listen 80;
        server_name _;

        # Apply connection limits
        limit_conn conn_limit_per_ip 20;

        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://upm-plus-backend;
        }

        location /api/v1/knowledge/upload {
            limit_req zone=upload_limit burst=2 nodelay;
            proxy_pass http://upm-plus-backend;
        }

        location /api/v1/workflows/ {
            limit_req zone=workflow_limit burst=10 nodelay;
            proxy_pass http://upm-plus-backend;
        }

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://upm-plus-backend;
        }

        location /ws/ {
            # WebSocket connections have different rate limiting
            limit_req zone=workflow_limit burst=50 nodelay;
            proxy_pass http://upm-plus-backend;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-ingress-controller
  namespace: ingress-nginx
spec:
  template:
    spec:
      containers:
      - name: nginx-ingress-controller
        volumeMounts:
        - name: rate-limit-config
          mountPath: /etc/nginx/conf.d/rate-limiting.conf
          subPath: rate-limiting.conf
      volumes:
      - name: rate-limit-config
        configMap:
          name: nginx-rate-limit-config