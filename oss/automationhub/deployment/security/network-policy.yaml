apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: upm-plus-network-policy
  namespace: upm-plus
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 8000
  # Allow traffic within namespace
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 8000  # Backend
    - protocol: TCP
      port: 9090  # Prometheus
    - protocol: TCP
      port: 3000  # Grafana
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
  # Allow external API calls
  - to: []
    ports:
    - protocol: TCP
      port: 443  # HTTPS
    - protocol: TCP
      port: 80   # HTTP
  # Allow traffic within namespace
  - to:
    - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-ingress-to-database
  namespace: upm-plus
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  # Only allow connections from backend and celery workers
  - from:
    - podSelector:
        matchLabels:
          app: upm-plus-backend
    - podSelector:
        matchLabels:
          app: upm-plus-celery-worker
    ports:
    - protocol: TCP
      port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-ingress-to-redis
  namespace: upm-plus
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  # Only allow connections from backend, celery workers, and frontend
  - from:
    - podSelector:
        matchLabels:
          app: upm-plus-backend
    - podSelector:
        matchLabels:
          app: upm-plus-celery-worker
    - podSelector:
        matchLabels:
          app: upm-plus-frontend
    ports:
    - protocol: TCP
      port: 6379