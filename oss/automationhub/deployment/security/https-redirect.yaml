apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: upm-plus-https-redirect
  namespace: upm-plus
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/permanent-redirect: "https://$host$request_uri"
    nginx.ingress.kubernetes.io/permanent-redirect-code: "301"
spec:
  rules:
  - host: upmplus.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: upm-plus-frontend
            port:
              number: 80
  - host: www.upmplus.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: upm-plus-frontend
            port:
              number: 80
  - host: api.upmplus.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: upm-plus-backend
            port:
              number: 8000