apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-upmplus
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@upm.plus
    privateKeySecretRef:
      name: letsencrypt-prod-upmplus-private-key
    solvers:
    - http01:
        ingress:
          class: nginx
          podTemplate:
            spec:
              nodeSelector:
                "kubernetes.io/os": linux
              tolerations:
              - key: "node-role.kubernetes.io/master"
                operator: "Exists"
                effect: "NoSchedule"
              - key: "node-role.kubernetes.io/control-plane"
                operator: "Exists"
                effect: "NoSchedule"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: upm-plus-production-wildcard
  namespace: upm-plus
spec:
  secretName: upm-plus-production-tls
  issuerRef:
    name: letsencrypt-prod-upmplus
    kind: ClusterIssuer
  dnsNames:
  - upm.plus
  - www.upm.plus
  - api.upm.plus
  - app.upm.plus
  - dashboard.upm.plus
  - "*.upm.plus"