apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: upm-plus-production-ingress
  namespace: upm-plus
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: "upm-plus-backend"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/client-max-body-size: "50m"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
spec:
  tls:
  - hosts:
    - upm.plus
    - www.upm.plus
    - api.upm.plus
    - app.upm.plus
    - dashboard.upm.plus
  secretName: upm-plus-production-tls
  rules:
  # Main application - upm.plus
  - host: upm.plus
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: upm-plus-frontend
            port:
              number: 80

  # WWW redirect - www.upm.plus
  - host: www.upm.plus
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: upm-plus-frontend
            port:
              number: 80

  # API endpoints - api.upm.plus
  - host: api.upm.plus
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: upm-plus-backend
            port:
              number: 8000
      - path: /ws(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: upm-plus-backend
            port:
              number: 8000

  # App subdomain - app.upm.plus
  - host: app.upm.plus
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: upm-plus-frontend
            port:
              number: 80

  # Dashboard subdomain - dashboard.upm.plus
  - host: dashboard.upm.plus
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: upm-plus-frontend
            port:
              number: 80