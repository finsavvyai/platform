# UPM.Plus Domain Configuration
# All domains configured for UPM.Plus deployment

# Primary domains
PRIMARY_DOMAIN="upm.plus"
DEVELOPMENT_DOMAIN="upmplus.dev"
STAGING_DOMAIN="upmplus.io"
PRODUCTION_DOMAIN="upmplus.ai"

# All domains array (for automation)
ALL_DOMAINS=(
    "upm.plus"
    "upmplus.dev"
    "upmplus.io"
    "upmplus.ai"
)

# Domain mapping (using simple variables for compatibility)
DOMAIN_MAPPING_UPM_PLUS="production"
DOMAIN_MAPPING_UPMPLUS_DEV="development"
DOMAIN_MAPPING_UPMPLUS_IO="staging"
DOMAIN_MAPPING_UPMPLUS_AI="production"

# Email configuration
EMAIL="admin@upm.plus"

# Subdomains to configure for each domain
SUBDOMAINS=(
    "www"
    "api"
    "app"
    "dashboard"
    "admin"
    "docs"
    "cdn"
    "static"
    "assets"
)

# LoadBalancer IP (will be populated dynamically)
LOAD_BALANCER_IP=""

# Cloudflare configuration
CLOUDFLARE_API_TOKEN=""
ZONE_IDS=""