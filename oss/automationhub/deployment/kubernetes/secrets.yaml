# Secrets for UPM.Plus AutomationHub
# Note: These are templates - actual secrets should be created using kubectl apply -f - or sealed secrets
apiVersion: v1
kind: Secret
metadata:
  name: upm-plus-secrets
  namespace: upm-plus-staging
  labels:
    app: upm-plus
    component: secrets
type: Opaque
data:
  # Base64 encoded values - replace with actual encoded secrets
  DATABASE_PASSWORD: <BASE64_ENCODED_DB_PASSWORD>
  REDIS_PASSWORD: <BASE64_ENCODED_REDIS_PASSWORD>
  SECRET_KEY: <BASE64_ENCODED_SECRET_KEY>
  JWT_SECRET_KEY: <BASE64_ENCODED_JWT_SECRET_KEY>
  OPENAI_API_KEY: <BASE64_ENCODED_OPENAI_API_KEY>
  ANTHROPIC_API_KEY: <BASE64_ENCODED_ANTHROPIC_API_KEY>
  SENTRY_DSN: <BASE64_ENCODED_SENTRY_DSN>
  SMTP_PASSWORD: <BASE64_ENCODED_SMTP_PASSWORD>
  CHROMA_AUTH_TOKEN: <BASE64_ENCODED_CHROMA_AUTH_TOKEN>
  AWS_ACCESS_KEY_ID: <BASE64_ENCODED_AWS_ACCESS_KEY>
  AWS_SECRET_ACCESS_KEY: <BASE64_ENCODED_AWS_SECRET_KEY>
  SLACK_WEBHOOK_URL: <BASE64_ENCODED_SLACK_WEBHOOK>
  DISCORD_WEBHOOK_URL: <BASE64_ENCODED_DISCORD_WEBHOOK>
---
apiVersion: v1
kind: Secret
metadata:
  name: upm-plus-secrets
  namespace: upm-plus-production
  labels:
    app: upm-plus
    component: secrets
type: Opaque
data:
  # Base64 encoded values - replace with actual encoded secrets
  DATABASE_PASSWORD: <BASE64_ENCODED_DB_PASSWORD>
  REDIS_PASSWORD: <BASE64_ENCODED_REDIS_PASSWORD>
  SECRET_KEY: <BASE64_ENCODED_SECRET_KEY>
  JWT_SECRET_KEY: <BASE64_ENCODED_JWT_SECRET_KEY>
  OPENAI_API_KEY: <BASE64_ENCODED_OPENAI_API_KEY>
  ANTHROPIC_API_KEY: <BASE64_ENCODED_ANTHROPIC_API_KEY>
  SENTRY_DSN: <BASE64_ENCODED_SENTRY_DSN>
  SMTP_PASSWORD: <BASE64_ENCODED_SMTP_PASSWORD>
  CHROMA_AUTH_TOKEN: <BASE64_ENCODED_CHROMA_AUTH_TOKEN>
  AWS_ACCESS_KEY_ID: <BASE64_ENCODED_AWS_ACCESS_KEY>
  AWS_SECRET_ACCESS_KEY: <BASE64_ENCODED_AWS_SECRET_KEY>
  SLACK_WEBHOOK_URL: <BASE64_ENCODED_SLACK_WEBHOOK>
  DISCORD_WEBHOOK_URL: <BASE64_ENCODED_DISCORD_WEBHOOK>
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-secret
  namespace: upm-plus-staging
  labels:
    app: upm-plus
    component: registry
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64_ENCODED_DOCKER_CONFIG>
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-secret
  namespace: upm-plus-production
  labels:
    app: upm-plus
    component: registry
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64_ENCODED_DOCKER_CONFIG>
---
apiVersion: v1
kind: Secret
metadata:
  name: ssl-certs
  namespace: upm-plus-production
  labels:
    app: upm-plus
    component: ssl
type: kubernetes.io/tls
data:
  tls.crt: <BASE64_ENCODED_SSL_CERTIFICATE>
  tls.key: <BASE64_ENCODED_SSL_PRIVATE_KEY>
---
# Example script to create secrets:
# apiVersion: v1
# kind: Secret
# metadata:
#   name: upm-plus-secrets
#   namespace: upm-plus-staging
# type: Opaque
# stringData:
#   DATABASE_PASSWORD: "your_database_password"
#   REDIS_PASSWORD: "your_redis_password"
#   SECRET_KEY: "your_secret_key"
#   JWT_SECRET_KEY: "your_jwt_secret_key"
#   OPENAI_API_KEY: "your_openai_api_key"
#   ANTHROPIC_API_KEY: "your_anthropic_api_key"
#   SENTRY_DSN: "your_sentry_dsn"
#   SMTP_PASSWORD: "your_smtp_password"
#   CHROMA_AUTH_TOKEN: "your_chroma_auth_token"
#   AWS_ACCESS_KEY_ID: "your_aws_access_key"
#   AWS_SECRET_ACCESS_KEY: "your_aws_secret_key"
#   SLACK_WEBHOOK_URL: "your_slack_webhook_url"
#   DISCORD_WEBHOOK_URL: "your_discord_webhook_url"