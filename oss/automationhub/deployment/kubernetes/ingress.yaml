apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: upm-plus-ingress
  namespace: upm-plus
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: "upm-plus-backend"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-set-headers: "upm-plus-proxy-headers"
spec:
  tls:
  - hosts:
    - upmplus.ai
    - www.upmplus.ai
    - api.upmplus.ai
    secretName: upm-plus-tls
  rules:
  - host: upmplus.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: upm-plus-frontend
            port:
              number: 80
  - host: www.upmplus.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: upm-plus-frontend
            port:
              number: 80
  - host: api.upmplus.ai
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: upm-plus-backend
            port:
              number: 8000
      - path: /ws(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: upm-plus-backend
            port:
              number: 8000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: upm-plus-proxy-headers
  namespace: upm-plus
data:
  X-Forwarded-Proto: "https"
  X-Forwarded-Port: "443"
  X-Forwarded-Host: "api.upmplus.ai"