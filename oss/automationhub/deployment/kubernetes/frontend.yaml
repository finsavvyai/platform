apiVersion: apps/v1
kind: Deployment
metadata:
  name: upm-plus-frontend
  namespace: upm-plus
  labels:
    app: upm-plus-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: upm-plus-frontend
  template:
    metadata:
      labels:
        app: upm-plus-frontend
    spec:
      containers:
      - name: frontend
        image: upmplus/frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: upm-plus-frontend
  namespace: upm-plus
spec:
  selector:
    app: upm-plus-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP