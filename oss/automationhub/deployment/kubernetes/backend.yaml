apiVersion: apps/v1
kind: Deployment
metadata:
  name: upm-plus-backend
  namespace: upm-plus
  labels:
    app: upm-plus-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: upm-plus-backend
  template:
    metadata:
      labels:
        app: upm-plus-backend
    spec:
      containers:
      - name: backend
        image: upmplus/backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: upm-plus-config
        - secretRef:
            name: upm-plus-secrets
        env:
        - name: DATABASE_URL
          value: "postgresql://upmplus:$(DATABASE_PASSWORD)@postgres:5432/upmplus"
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        - name: CHROMA_HOST
          value: "chromadb"
        - name: CHROMA_PORT
          value: "8000"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
---
apiVersion: v1
kind: Service
metadata:
  name: upm-plus-backend
  namespace: upm-plus
spec:
  selector:
    app: upm-plus-backend
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: upm-plus-backend-hpa
  namespace: upm-plus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: upm-plus-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60