apiVersion: v1
kind: ConfigMap
metadata:
  name: upm-plus-config
  namespace: upm-plus
data:
  DATABASE_URL: "postgresql://upmplus:password@postgres:5432/upmplus"
  REDIS_URL: "redis://redis:6379/0"
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  CHROMA_HOST: "chromadb"
  CHROMA_PORT: "8000"
  OPENAI_API_KEY: ""  # To be set via secrets
  SECRET_KEY: ""  # To be set via secrets
  ALLOWED_HOSTS: "*.upmplus.ai,localhost"
  CORS_ORIGINS: "https://upmplus.ai,https://www.upmplus.ai"
  JWT_SECRET_KEY: ""  # To be set via secrets
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRE_MINUTES: "30"
  WORKER_CONCURRENCY: "4"
  MAX_WORKFLOW_MEMORY: "512"
  WORKFLOW_TIMEOUT: "300"
  MAX_UPLOAD_SIZE: "10485760"  # 10MB
  ENABLE_ANALYTICS: "true"
  SENTRY_DSN: ""  # To be set via secrets