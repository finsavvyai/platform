apiVersion: apps/v1
kind: Deployment
metadata:
  name: upm-plus-celery-worker
  namespace: upm-plus
  labels:
    app: upm-plus-celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: upm-plus-celery-worker
  template:
    metadata:
      labels:
        app: upm-plus-celery-worker
    spec:
      containers:
      - name: celery-worker
        image: upmplus/backend:latest
        command: ["celery", "-A", "app.core.celery", "worker", "--loglevel=info", "--concurrency=4"]
        envFrom:
        - configMapRef:
            name: upm-plus-config
        - secretRef:
            name: upm-plus-secrets
        env:
        - name: DATABASE_URL
          value: "postgresql://upmplus:$(DATABASE_PASSWORD)@postgres:5432/upmplus"
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        - name: CHROMA_HOST
          value: "chromadb"
        - name: CHROMA_PORT
          value: "8000"
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 30"]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: upm-plus-celery-hpa
  namespace: upm-plus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: upm-plus-celery-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85