---
# PostgreSQL Primary Database
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-primary
  namespace: upm-plus-prod
  labels:
    app: postgres
    component: primary
    tier: database
spec:
  serviceName: postgres-primary
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      component: primary
  template:
    metadata:
      labels:
        app: postgres
        component: primary
        tier: database
    spec:
      serviceAccountName: upm-plus-sa
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: upm-plus-config
              key: DB_NAME
        - name: POSTGRES_USER
          value: "upm_plus"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: upm-plus-secrets
              key: database-password
        - name: POSTGRES_REPLICATION_USER
          value: "replicator"
        - name: POSTGRES_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: upm-plus-secrets
              key: database-password
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: postgres-config
          mountPath: /etc/postgresql/postgresql.conf
          subPath: postgresql.conf
        - name: postgres-config
          mountPath: /etc/postgresql/pg_hba.conf
          subPath: pg_hba.conf
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - upm_plus
            - -d
            - upm_plus_prod
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - upm_plus
            - -d
            - upm_plus_prod
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-config
        configMap:
          name: postgres-config
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: "fast-ssd"
      resources:
        requests:
          storage: "100Gi"

---
# PostgreSQL Primary Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: upm-plus-prod
  labels:
    app: postgres
    component: primary
    tier: database
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  selector:
    app: postgres
    component: primary

---
# PostgreSQL Read Replica
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-replica
  namespace: upm-plus-prod
  labels:
    app: postgres
    component: replica
    tier: database
spec:
  serviceName: postgres-replica
  replicas: 2
  selector:
    matchLabels:
      app: postgres
      component: replica
  template:
    metadata:
      labels:
        app: postgres
        component: replica
        tier: database
    spec:
      serviceAccountName: upm-plus-sa
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: PGUSER
          value: "upm_plus"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: upm-plus-secrets
              key: database-password
        - name: POSTGRES_MASTER_SERVICE
          value: "postgres-primary"
        - name: POSTGRES_REPLICATION_USER
          value: "replicator"
        - name: POSTGRES_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: upm-plus-secrets
              key: database-password
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - upm_plus
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - upm_plus
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: "fast-ssd"
      resources:
        requests:
          storage: "50Gi"

---
# PostgreSQL Replica Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: upm-plus-prod
  labels:
    app: postgres
    component: replica
    tier: database
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  selector:
    app: postgres
    component: replica

---
# PostgreSQL Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: upm-plus-prod
  labels:
    app: postgres
    component: config
data:
  postgresql.conf: |
    # Connection Settings
    listen_addresses = '*'
    port = 5432
    max_connections = 200

    # Memory Settings
    shared_buffers = 1GB
    effective_cache_size = 3GB
    work_mem = 4MB
    maintenance_work_mem = 64MB

    # WAL Settings
    wal_level = replica
    max_wal_senders = 3
    max_replication_slots = 3
    wal_keep_segments = 32

    # Checkpoint Settings
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB

    # Autovacuum Settings
    autovacuum = on
    autovacuum_max_workers = 3
    autovacuum_naptime = 1min

    # Logging Settings
    logging_collector = on
    log_directory = 'pg_log'
    log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
    log_statement = 'mod'
    log_min_duration_statement = 1000

    # Performance Settings
    random_page_cost = 1.1
    effective_io_concurrency = 200

    # Security Settings
    ssl = on
    ssl_cert_file = '/var/lib/postgresql/server.crt'
    ssl_key_file = '/var/lib/postgresql/server.key'

  pg_hba.conf: |
    # TYPE  DATABASE        USER            ADDRESS                 METHOD

    # Local connections
    local   all             postgres                                peer
    local   all             upm_plus                                md5

    # IPv4 local connections
    host    all             all             127.0.0.1/32            md5
    host    all             all             10.0.0.0/8              md5

    # IPv6 local connections
    host    all             all             ::1/128                 md5

    # Allow replication connections from localhost
    host    replication     replicator      127.0.0.1/32            md5
    host    replication     replicator      ::1/128                 md5

    # Allow application connections
    host    upm_plus_prod   upm_plus        0.0.0.0/0               md5
    host    upm_plus_prod   upm_plus        ::/0                    md5

---
# PostgreSQL Backup CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: upm-plus-prod
  labels:
    app: postgres
    component: backup
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: postgres-backup
            image: postgres:15-alpine
            env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: upm-plus-secrets
                  key: database-password
            command:
            - /bin/bash
            - -c
            - |
              DATE=$(date +%Y%m%d_%H%M%S)
              BACKUP_FILE="/backup/upm_plus_prod_${DATE}.sql"

              # Create backup
              pg_dump -h postgres-primary -U upm_plus -d upm_plus_prod > ${BACKUP_FILE}

              # Compress backup
              gzip ${BACKUP_FILE}

              # Keep only last 7 days of backups
              find /backup -name "*.sql.gz" -mtime +7 -delete

              echo "Backup completed: ${BACKUP_FILE}.gz"
            volumeMounts:
            - name: backup-storage
              mountPath: /backup
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "200m"
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: postgres-backup-pvc
          restartPolicy: OnFailure
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1