worker_processes 1;
events { worker_connections 1024; }

http {
  upstream vllm_pool {
    least_conn;
    # Replace with the IPs/hostnames of your own OpenAI-compatible inference nodes.
    server node-a.example.local:8000 max_fails=2 fail_timeout=5s;
    server node-b.example.local:8000 max_fails=2 fail_timeout=5s;
    server 127.0.0.1:8000             max_fails=2 fail_timeout=5s;
  }

  server {
    listen 8200;
    location /v1/ {
      proxy_pass http://vllm_pool;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_read_timeout 60s;
      add_header Access-Control-Allow-Origin *;
      add_header Access-Control-Allow-Headers *;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    }
  }
}
