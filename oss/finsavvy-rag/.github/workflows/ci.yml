name: finsavvy-rag CI

# Runs the hermetic pytest suite for the RAG service + gateway proxy.
# The suite stubs the embedding model and the DB layer, so CI needs neither
# a GPU, a model download, nor a live Postgres.

on:
  push:
    branches: [main]
    paths:
      - "oss/finsavvy-rag/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "oss/finsavvy-rag/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: oss/finsavvy-rag

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt

      - name: Run pytest
        run: pytest -v
