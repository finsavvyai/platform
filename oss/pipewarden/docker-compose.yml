services:
  pipewarden:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pipewarden
    ports:
      - "8080:8080"
    environment:
      PIPEWARDEN_SERVER_PORT: "8080"
      PIPEWARDEN_DATABASE_DRIVER: sqlite
      PIPEWARDEN_DATABASE_PATH: /app/data/pipewarden.db
      PIPEWARDEN_LOGGING_LEVEL: info
      PIPEWARDEN_VAULT_KEY: ${PIPEWARDEN_VAULT_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      LEMONSQUEEZY_API_KEY: ${LEMONSQUEEZY_API_KEY:-}
      LEMONSQUEEZY_STORE_ID: ${LEMONSQUEEZY_STORE_ID:-}
      LEMONSQUEEZY_WEBHOOK_SECRET: ${LEMONSQUEEZY_WEBHOOK_SECRET:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_PRIVATE_KEY_PATH: ${GITHUB_PRIVATE_KEY_PATH:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      PIPEWARDEN_HOSTED_MODE: ${PIPEWARDEN_HOSTED_MODE:-false}
      PIPEWARDEN_EXPERIMENTAL_PROVIDERS: ${PIPEWARDEN_EXPERIMENTAL_PROVIDERS:-false}
    volumes:
      - pipewarden-data:/app/data
      - ${GITHUB_PRIVATE_KEY_DIR:-.}:/run/secrets:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  pipewarden-data:
    driver: local
