environment: development

server:
  host: 0.0.0.0
  port: 8080
  readTimeout: 5s
  writeTimeout: 10s
  idleTimeout: 120s
  corsOrigins:
    - "http://localhost:8080"
    - "http://127.0.0.1:8080"
    - "http://localhost:3000"

database:
  driver: sqlite
  path: pipewarden.db
  walMode: true

analysis:
  claudeApiKey: ""
  claudeModel: claude-sonnet-4-20250514
  claudeBaseUrl: https://api.anthropic.com
  heuristicEnabled: true
  dlpEnabled: true
  policyEnabled: true

vault:
  encryptionKey: ""

clawpipe:
  apiKey: ""
  projectId: ""
  endpoint: https://api.clawpipe.dev
  offlineMode: false
  offlineProviders:
    - ollama
    - llamafile
    - lmstudio

billing:
  lemonsqueezyApiKey: ""
  lemonsqueezyStoreId: ""
  lemonsqueezyWebhookSecret: ""

auth:
  disabled: true
  opensyber:
    enabled: false
    jwksUrl: ""
  githubApp:
    enabled: false
    slug: ""
    appId: 0
    privateKeyPath: ""
    clientId: ""
    clientSecret: ""
    webhookSecret: ""
    apiBaseUrl: https://api.github.com

features:
  experimentalProviders: false
  billing: true
  dlp: true
  policy: true
  hostedMode: false

logging:
  level: info
  json: false
  format: text

# Supply secrets via environment variables rather than checked-in placeholder strings.
