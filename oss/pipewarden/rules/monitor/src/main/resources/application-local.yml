server:
  port: 9098

logging:
  level:
    root: DEBUG
    com.bsl.service.monitor: DEBUG
    org.springframework.security: DEBUG

# Disable OAuth2 for local development (optional)
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://login.microsoftonline.com/05764a73-8c6f-4538-83cd-413f1e1b5665/v2.0

# Local development database (if needed)
# database:
#   datasources:
#     - {name: local_test, jdbc_url: jdbc:h2:mem:testdb, user: sa, password: "", driver_class_name: "org.h2.Driver"}

# Email settings for local development
zapier_enabled: false
email_enabled: false
sms_enabled: false
envname: LOCAL
message_subject: "BSL Monitor - Local Development"

# Scheduler settings
scheduler:
  period: PT2M  # Run every 2 minutes for faster local testing

# Minimal sanity-app config for local testing (empty services to prevent NPE)
sanity-app:
  services: []

# Time-based monitoring disabled for local
time-based-monitoring:
  enabled: false

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    shutdown:
      enabled: true