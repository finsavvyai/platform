name: PipeWarden Security Scan
description: Scan CI/CD pipeline configuration for security vulnerabilities
author: PipeWarden
branding:
  icon: shield
  color: red

inputs:
  server:
    description: PipeWarden server URL
    required: false
    default: https://app.pipewarden.com
  connection:
    description: Connection name to scan
    required: true
  severity:
    description: Minimum severity to fail on (critical|high|medium|low|all)
    required: false
    default: high
  token:
    description: PipeWarden API token
    required: false

outputs:
  findings_count:
    description: Number of findings
    value: ${{ steps.parse.outputs.findings_count }}
  risk_score:
    description: Overall risk score (0-100)
    value: ${{ steps.parse.outputs.risk_score }}
  sarif_file:
    description: Path to SARIF output file
    value: ${{ steps.scan.outputs.sarif_file }}

runs:
  using: composite
  steps:
    - name: Download PipeWarden CLI
      shell: bash
      run: |
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
        RELEASE_URL="https://github.com/finsavvyai/pipewarden/releases/latest/download/pipewarden_${OS}_${ARCH}.tar.gz"
        echo "Downloading PipeWarden for ${OS}/${ARCH}..."
        curl -sSL "${RELEASE_URL}" | tar xz
        chmod +x pipewarden
        echo "PipeWarden version: $(./pipewarden --version 2>/dev/null || echo 'unknown')"

    - name: Run scan
      id: scan
      shell: bash
      env:
        PIPEWARDEN_TOKEN: ${{ inputs.token }}
      run: |
        set +e
        ./pipewarden scan \
          --server "${{ inputs.server }}" \
          --connection "${{ inputs.connection }}" \
          --severity "${{ inputs.severity }}" \
          --format sarif \
          --output pipewarden-results.sarif
        SCAN_EXIT=$?
        echo "sarif_file=pipewarden-results.sarif" >> "$GITHUB_OUTPUT"
        exit $SCAN_EXIT

    - name: Parse scan results
      id: parse
      shell: bash
      if: always()
      run: |
        if [ ! -f pipewarden-results.sarif ]; then
          echo "findings_count=0" >> "$GITHUB_OUTPUT"
          echo "risk_score=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        FINDINGS=$(python3 -c "
        import json, sys
        try:
          data = json.load(open('pipewarden-results.sarif'))
          runs = data.get('runs', [])
          count = sum(len(r.get('results', [])) for r in runs)
          print(count)
        except Exception:
          print(0)
        " 2>/dev/null || echo 0)
        RISK=$(python3 -c "
        import json, sys
        try:
          data = json.load(open('pipewarden-results.sarif'))
          props = data.get('runs', [{}])[0].get('properties', {})
          print(props.get('riskScore', 0))
        except Exception:
          print(0)
        " 2>/dev/null || echo 0)
        echo "findings_count=${FINDINGS}" >> "$GITHUB_OUTPUT"
        echo "risk_score=${RISK}" >> "$GITHUB_OUTPUT"
        echo "### PipeWarden Results" >> "$GITHUB_STEP_SUMMARY"
        echo "- Findings: ${FINDINGS}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Risk Score: ${RISK}/100" >> "$GITHUB_STEP_SUMMARY"

    - name: Annotate PR with findings
      shell: bash
      if: always() && github.event_name == 'pull_request'
      run: |
        if [ ! -f pipewarden-results.sarif ]; then exit 0; fi
        python3 - <<'PYEOF'
        import json, sys
        SEVERITY_MAP = {
          "error": "error",
          "warning": "warning",
          "note": "notice",
          "none": "notice",
        }
        try:
          data = json.load(open("pipewarden-results.sarif"))
          for run in data.get("runs", []):
            rules = {r["id"]: r for r in run.get("tool", {}).get("driver", {}).get("rules", [])}
            for result in run.get("results", []):
              level = result.get("level", "warning")
              cmd = SEVERITY_MAP.get(level, "warning")
              msg = result.get("message", {}).get("text", "Security finding")
              locations = result.get("locations", [])
              if locations:
                loc = locations[0].get("physicalLocation", {})
                filepath = loc.get("artifactLocation", {}).get("uri", "")
                line = loc.get("region", {}).get("startLine", 1)
                print(f"::{cmd} file={filepath},line={line}::{msg}")
              else:
                print(f"::{cmd}::{msg}")
        except Exception as e:
          print(f"::notice::Could not annotate findings: {e}", file=sys.stderr)
        PYEOF

    - name: Upload SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@45775bd8235c68ba998b57afb7ea4ef1bb5513d3 # v3.28.15
      if: always() && hashFiles('pipewarden-results.sarif') != ''
      with:
        sarif_file: pipewarden-results.sarif
        category: pipewarden
