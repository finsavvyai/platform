# GitHub App Marketplace listing metadata
# Submit at: https://github.com/settings/apps/<your-app-slug>/marketplace

name: PipeWarden
tagline: AI-powered CI/CD pipeline security scanner for GitHub Actions
description: |
  PipeWarden monitors what your CI/CD pipelines actually do — catching
  hardcoded secrets, vulnerable dependencies, SAST violations, and dangerous
  permission scopes before they reach production.

  Security checks on every push:
  - 13 secret patterns (AWS, GitHub, Slack, JWT, SSH keys, etc.)
  - OSV.dev dependency vulnerability scan
  - Semgrep SAST on pipeline YAML configs
  - OPA policy enforcement (require-tests, no-secrets, SAST gate, etc.)
  - OWASP Top 10 pipeline audit
  - AI analysis via Claude for complex findings

  Integrations: Slack, PagerDuty, Jira, SARIF → GitHub Security tab

pricing_model: free_and_paid
# Tiers defined in LemonSqueezy — Free / Starter $29 / Pro $79 / Enterprise $299

categories:
  - security
  - code-quality
  - continuous-integration

permissions:
  contents: read
  actions: read
  security_events: write
  checks: write
  pull_requests: write

events:
  - push
  - pull_request
  - workflow_run

homepage_url: https://pipewarden.com
support_url: https://github.com/finsavvyai/pipewarden/issues
documentation_url: https://github.com/finsavvyai/pipewarden/wiki
privacy_policy_url: https://pipewarden.com/privacy
terms_of_service_url: https://pipewarden.com/terms
