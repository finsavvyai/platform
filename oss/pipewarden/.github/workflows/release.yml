name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
          check-latest: false

      - name: Install arm64 cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install zig (for darwin + windows cross-compile of CGO)
        uses: goto-bus-stop/setup-zig@7ab2955eb728f5440978d5824358023be3a2802d # v2.2.0
        with:
          version: 0.13.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5730bff80f7c9b6c39cdb4df8ab3c3fccf580e8 # v3.11.1

      - name: Log in to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@9c156ee2a99f2f9b3e5d457b4d7d67e2e1e9e22c # v6.3.0
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

      - name: Trigger PushCI npm publish
        if: success()
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.PUSHCI_WEBHOOK_TOKEN }}" \
            -d "{\"event\":\"pipewarden_release\",\"version\":\"${VERSION}\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            "${{ secrets.PUSHCI_WEBHOOK_URL }}" || true
