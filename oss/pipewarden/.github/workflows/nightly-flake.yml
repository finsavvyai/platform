name: nightly-flake

on:
  schedule:
    - cron: '17 3 * * *'   # 03:17 UTC every day
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  flake-stress:
    name: Flake-stress recently changed tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 30

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run flake-stress on changed tests (30-day window × 25 iters)
        id: stress
        run: |
          set +e
          recent=$(git log --since="30 days ago" --name-only --pretty=format: -- '*_test.go' | sort -u | head -20)
          failed=()
          for f in $recent; do
            pkg="./$(dirname "$f")"
            echo "::group::flake-stress $pkg"
            if ! go test -count=25 -failfast -timeout=10m "$pkg"; then
              failed+=("$pkg")
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -gt 0 ]; then
            printf 'FLAKE_PKGS=%s\n' "$(IFS=','; echo "${failed[*]}")" >> "$GITHUB_OUTPUT"
            echo "found flakes in: ${failed[*]}"
            exit 1
          fi

      - name: Open issue on flake detection
        if: failure() && steps.stress.outputs.FLAKE_PKGS != ''
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const pkgs = '${{ steps.stress.outputs.FLAKE_PKGS }}'.split(',');
            const title = `flake: nightly detected instability in ${pkgs.length} package(s)`;
            const body = [
              '## Flaky packages',
              '',
              ...pkgs.map(p => `- \`${p}\``),
              '',
              '## How to reproduce locally',
              '```',
              `make flake FLAKE_PKG=${pkgs[0]} FLAKE_N=50`,
              '```',
              '',
              `Run log: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['flaky', 'automated'],
            });
