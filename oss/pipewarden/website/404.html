<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — PipeWarden</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/design-system/tokens.css">
    <style>
        body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: var(--s-6); }
        .container { max-width: 480px; }
        .code {
          font-size: var(--fs-60); font-weight: var(--fw-bold);
          background: linear-gradient(135deg, var(--sys-blue), var(--sys-indigo));
          -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
          line-height: 1; margin-bottom: var(--s-4); letter-spacing: -0.03em;
        }
        h1 { font-size: var(--fs-28); color: var(--text); margin: 0 0 var(--s-3); font-weight: var(--fw-semibold); letter-spacing: -0.018em; }
        p { color: var(--text-secondary); font-size: var(--fs-17); margin: 0 0 var(--s-8); }
        a.btn-primary {
          display: inline-flex; align-items: center; justify-content: center;
          min-height: 44px; padding: 0 var(--s-6);
          background: var(--accent); color: #fff;
          border-radius: var(--r-sm); text-decoration: none;
          font-weight: var(--fw-semibold); font-size: var(--fs-15);
          box-shadow: var(--shadow-sm);
          transition: background var(--dur-short) var(--ease-standard),
                      box-shadow var(--dur-short) var(--ease-standard),
                      transform var(--dur-micro) var(--ease-standard);
        }
        a.btn-primary:hover { background: var(--accent-hover); box-shadow: var(--shadow-md); }
        a.btn-primary:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>Page not found</h1>
        <p>This page doesn't exist. If you followed a link, it may have moved.</p>
        <a class="btn-primary" href="/">Back to PipeWarden</a>
    </div>
</body>
</html>
