# PipeWarden GitLab CI Component — security-scan
#
# Layout follows GitLab's CI/CD Catalog requirement:
#   templates/<component>/template.yml
# See https://docs.gitlab.com/ci/components/ for catalog publish steps.
#
# Usage from a downstream pipeline:
#
#   include:
#     - component: gitlab.com/finsavvyai/pipewarden/security-scan@~latest
#       inputs:
#         server: https://app.pipewarden.com
#         connection: my-gitlab
#         severity: high
#
#   variables:
#     PIPEWARDEN_TOKEN: $PIPEWARDEN_TOKEN  # set as a masked CI/CD variable
#
# Outputs (artifacts):
#   pipewarden-results.sarif — uploaded as a `sast` SARIF report so
#                              GitLab's Security Dashboard ingests it
#                              alongside its built-in scanners.

spec:
  inputs:
    server:
      description: PipeWarden server URL
      default: "https://app.pipewarden.com"
    connection:
      description: Connection name configured in PipeWarden
    severity:
      description: Minimum severity to fail on (critical|high|medium|low|all)
      default: "high"
    stage:
      description: Pipeline stage to run in
      default: "test"
    image:
      description: Container image used to run the CLI
      default: "alpine:3.20"
---

pipewarden-scan:
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image ]]
  variables:
    PIPEWARDEN_RESULTS: pipewarden-results.sarif
  before_script:
    - apk add --no-cache curl ca-certificates jq tar
    - |
      set -eu
      OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
      ARCH="$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')"
      RELEASE_URL="https://github.com/finsavvyai/pipewarden/releases/latest/download/pipewarden_${OS}_${ARCH}.tar.gz"
      echo "Fetching PipeWarden CLI for ${OS}/${ARCH}..."
      curl -fsSL "${RELEASE_URL}" | tar xz
      chmod +x pipewarden
      ./pipewarden --version || true
  script:
    - |
      set +e
      ./pipewarden scan \
        --server "$[[ inputs.server ]]" \
        --connection "$[[ inputs.connection ]]" \
        --severity "$[[ inputs.severity ]]" \
        --format sarif \
        --output "$PIPEWARDEN_RESULTS"
      RC=$?
      if [ -f "$PIPEWARDEN_RESULTS" ]; then
        FINDINGS=$(jq '[.runs[].results[]] | length' "$PIPEWARDEN_RESULTS" 2>/dev/null || echo 0)
        RISK=$(jq '.runs[0].properties.riskScore // 0' "$PIPEWARDEN_RESULTS" 2>/dev/null || echo 0)
        echo "Findings: $FINDINGS"
        echo "Risk: $RISK/100"
      fi
      exit $RC
  artifacts:
    when: always
    paths:
      - pipewarden-results.sarif
    reports:
      sast: pipewarden-results.sarif
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
