# PipeWarden gitleaks configuration.
#
# PipeWarden's product detects secrets in CI/CD pipelines, so the test
# fixtures intentionally contain fake/redacted high-entropy strings.
# These paths are allowlisted because the "leaks" are required for the
# DLP scanner test corpus and the demo seed data — they are not real
# credentials.
#
# Production code paths are NOT allowlisted; any leak found outside the
# paths below blocks CI.

[extend]
useDefault = true

[allowlist]
description = "Test fixtures and demo seed data"
paths = [
  '''internal/analysis/dlp_test\.go''',
  '''internal/analysis/coverage_boost_test\.go''',
  '''internal/auth/github_app_test\.go''',
  '''internal/handlers/dlp_policy_test\.go''',
  '''internal/handlers/oauth_flow_full_test\.go''',
  '''internal/handlers/auth_flow_test\.go''',
  '''internal/router/router_dispatch_test\.go''',
  '''scripts/seed-demo-data\.go''',
  '''tests/api_test\.go''',
  '''tests/e2e/.*_test\.go''',
  '''README\.md''',
  '''docs/.*\.md''',
  '''\.env$''',
  '''\.env\.bak-.*''',
]
