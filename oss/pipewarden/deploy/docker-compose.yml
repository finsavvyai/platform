version: '3.9'

services:
  pipewarden:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: pipewarden
    expose:
      - "8080"
    environment:
      - PIPEWARDEN_SERVER_PORT=8080
      - PIPEWARDEN_DATABASE_URL=${PIPEWARDEN_DATABASE_URL}
      - PIPEWARDEN_LOGGING_LEVEL=${PIPEWARDEN_LOGGING_LEVEL:-info}
      - PIPEWARDEN_VAULT_KEY=${PIPEWARDEN_VAULT_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - LEMONSQUEEZY_API_KEY=${LEMONSQUEEZY_API_KEY}
      - LEMONSQUEEZY_STORE_ID=${LEMONSQUEEZY_STORE_ID}
      - LEMONSQUEEZY_WEBHOOK_SECRET=${LEMONSQUEEZY_WEBHOOK_SECRET}
      - GITHUB_APP_SLUG=${GITHUB_APP_SLUG}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_API_BASE_URL=${GITHUB_API_BASE_URL:-https://api.github.com}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - SLACK_CHANNEL=${SLACK_CHANNEL}
      - PAGERDUTY_INTEGRATION_KEY=${PAGERDUTY_INTEGRATION_KEY}
      - JIRA_BASE_URL=${JIRA_BASE_URL}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - JIRA_PROJECT_KEY=${JIRA_PROJECT_KEY}
      - PIPEWARDEN_DASHBOARD_URL=${PIPEWARDEN_DASHBOARD_URL:-https://app.pipewarden.io}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - pipewarden-net

  # Cloudflare Tunnel — exposes pipewarden to app.pipewarden.com without opening ports.
  # Set TUNNEL_TOKEN by running: cloudflared tunnel create pipewarden
  # then: cloudflared tunnel token <tunnel-id>
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: pipewarden-tunnel
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      pipewarden:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pipewarden-net

networks:
  pipewarden-net:
    driver: bridge
