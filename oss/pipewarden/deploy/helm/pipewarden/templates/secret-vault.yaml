{{- if and (not .Values.vault.existingSecret) (or .Values.vault.autoGenerate .Values.vault.value) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pipewarden.vaultSecretName" . }}
  labels: {{- include "pipewarden.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if .Values.vault.value }}
  vault-key: {{ .Values.vault.value | b64enc | quote }}
  {{- else }}
  vault-key: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}
{{- end }}
