{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pipewarden.fullname" . }}
  labels: {{- include "pipewarden.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "pipewarden.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
      {{- range .Values.networkPolicy.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
      {{- end }}
      ports:
        - port: 8080
          protocol: TCP
  egress:
    {{- if .Values.airGap.enabled }}
    # Air-gap: allow only DNS + in-cluster LLM + internal DB
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
    {{- else }}
    - {}
    {{- end }}
{{- end }}
