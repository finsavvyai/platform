environment: development
server:
  port: 8080
  readTimeout: 5s
  writeTimeout: 10s
  idleTimeout: 120s
database:
  path: pipewarden.db
auth:
  jwtSecret: "your-secret-key-here"
  tokenDuration: 24h
logging:
  level: debug
  json: false

# Connections are managed via the web dashboard at http://localhost:8080
# or the REST API: POST /api/v1/connections
