version: 2
updates:
  # Root npm workspace (pnpm)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels: [dependencies, javascript]
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]
      security:
        applies-to: security-updates
        update-types: [minor, patch, major]
    ignore:
      # Pin major bumps that we want to evaluate manually
      - dependency-name: typescript
        update-types: [version-update:semver-major]

  # GitHub Actions workflow updates
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  # Go modules — Amliq engines
  - package-ecosystem: gomod
    directory: /products/amliq/engines/quantumbeam/
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels: [dependencies, go, amliq]
    groups:
      go-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /products/amliq/engines/ml-fraud/
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels: [dependencies, go, amliq]
    groups:
      go-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]
