name: deploy-staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA). Defaults to main."
        required: false
        default: main

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-staging
  cancel-in-progress: false

# Required secrets (set in repo settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN  - scoped token with Workers + Pages deploy perms
#   CLOUDFLARE_ACCOUNT_ID - Cloudflare account ID for finsavvyai
# Required variables (vars):
#   STAGING_WORKER_PREFIX - typically "finsavvy" (worker name: finsavvy-<service>-staging)

jobs:
  deploy:
    name: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.finsavvyai.com
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Verify Cloudflare secrets present
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets are required."
            exit 1
          fi

      # WRANGLER agent owns infrastructure/cloudflare/ and per-worker wrangler.toml files.
      # This step assumes ai-gateway is deployable from its package directory.
      - name: wrangler deploy (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd packages/ai-gateway
          npx --yes wrangler@3 deploy --env staging
