name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test

  coverage:
    name: coverage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run coverage (vitest thresholds enforced by root vitest.config.ts)
        run: pnpm -r test -- --coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            **/coverage/lcov.info
            **/coverage/index.html
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (block on high/critical)
        run: pnpm audit --prod --audit-level=high

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install --upgrade pip pip-audit
      - name: Audit oss/finsavvy-rag/services/* requirements (block on HIGH/CRITICAL)
        run: |
          set -e
          shopt -s nullglob
          fail=0
          for req in oss/finsavvy-rag/services/*/requirements.txt; do
            echo "::group::pip-audit $req"
            # --strict: any vuln fails; --vulnerability-service osv (default PyPI + OSV).
            # Re-runs with explicit ignore list possible; for now any HIGH or CRITICAL fails.
            pip-audit -r "$req" --strict --disable-pip || fail=1
            echo "::endgroup::"
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::pip-audit detected vulnerabilities in one or more requirements files"
            exit 1
          fi

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  amliq-go:
    name: amliq-go
    # Gate on amliq paths to keep CI fast; full Go matrix only runs when
    # AMLIQ Go source, modules, or this workflow changes.
    runs-on: ubuntu-latest
    # paths-filter at job level: re-evaluate per PR/push using changed files.
    # GitHub Actions doesn't support job-level paths, so we filter via a
    # quick dorny/paths-filter step and skip the rest when irrelevant.
    steps:
      - uses: actions/checkout@v4
      - name: Detect AMLIQ Go changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            amliq:
              - 'products/amliq/api/**'
              - 'products/amliq/engines/quantumbeam/**'
              - 'products/amliq/internal/**'
              - 'products/amliq/go.work'
              - 'products/amliq/go.work.sum'
              - '.github/workflows/ci.yml'
      - name: Set up Go
        if: steps.changes.outputs.amliq == 'true'
        uses: actions/setup-go@v5
        with:
          # Highest version across api (1.26) and quantumbeam (1.25.0).
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            products/amliq/api/go.sum
            products/amliq/engines/quantumbeam/go.sum
      # The api module depends on github.com/finsavvyai/sdlc-core via a
      # local `replace` directive (../sdlc-core). On dev workstations this
      # is a symlink to /Users/.../portfolio/sdlc-core. In CI we shallow-clone
      # the public sdlc-core repo to the same relative path so the replace
      # resolves and `go build ./...` works without any go.mod edits.
      - name: Clone sdlc-core sibling repo (resolves api's local replace)
        if: steps.changes.outputs.amliq == 'true'
        run: |
          git clone --depth=1 https://github.com/finsavvyai/sdlc-core.git \
            products/amliq/sdlc-core
      - name: Build quantumbeam engine
        if: steps.changes.outputs.amliq == 'true'
        working-directory: products/amliq/engines/quantumbeam
        run: go build ./...
      - name: Test quantumbeam engine
        if: steps.changes.outputs.amliq == 'true'
        working-directory: products/amliq/engines/quantumbeam
        run: go test ./... -count=1 -short -timeout 5m
      - name: Build AMLIQ api
        if: steps.changes.outputs.amliq == 'true'
        working-directory: products/amliq/api
        run: go build ./...
      - name: Test AMLIQ api
        if: steps.changes.outputs.amliq == 'true'
        working-directory: products/amliq/api
        run: go test ./... -count=1 -short -timeout 5m
