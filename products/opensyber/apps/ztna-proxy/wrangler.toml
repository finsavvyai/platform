name = "opensyber-ztna-proxy"
main = "src/index.ts"
compatibility_date = "2025-02-18"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
workers_dev = false

# Catch-all route — protects any hostname configured in tf_ztna_apps.
# In production, customers point their app DNS (CNAME) at this worker.
routes = [
  { pattern = "ztna.opensyber.cloud/*", zone_name = "opensyber.cloud" },
]

[[d1_databases]]
binding = "DB"
database_name = "opensyber-db"
database_id = "fb34a1a9-e91b-44f8-94f9-40a2ce6c7bcf"
migrations_dir = "../../packages/db/migrations"

[[kv_namespaces]]
binding = "TF_NONCES"
id = "251a5e1b1af3443caae9af765f156916"

[vars]
ENVIRONMENT = "production"

[observability]
enabled = true
