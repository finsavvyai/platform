name = "tokenforge-web"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "tokenforge-web"

# Custom domain — routes through opensyber.cloud zone
[[routes]]
pattern = "tokenforge.opensyber.cloud/*"
zone_name = "opensyber.cloud"

# Auth secrets — set via wrangler secret:
# wrangler secret put AUTH_SECRET
# wrangler secret put GOOGLE_CLIENT_ID
# wrangler secret put GOOGLE_CLIENT_SECRET
# wrangler secret put GITHUB_CLIENT_ID
# wrangler secret put GITHUB_CLIENT_SECRET

[vars]
NEXT_PUBLIC_APP_URL = "https://tokenforge.opensyber.cloud"
NEXT_PUBLIC_API_URL = "https://tokenforge-api.opensyber.cloud"
AUTH_URL = "https://tokenforge.opensyber.cloud"
# NEXT_PUBLIC_LS_TEST_COUPON = "A3OTE0NW"
