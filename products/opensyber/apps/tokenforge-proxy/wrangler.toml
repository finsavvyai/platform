name = "tokenforge-proxy"
main = "src/index.ts"
compatibility_date = "2025-02-18"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Shared KV with tokenforge-api (proxy configs stored as proxy:{hostname})
[[kv_namespaces]]
binding = "PROXY_CONFIG"
id = "59007c716b5d4ee481f2d5d061dbed01"

[vars]
VERIFY_API = "https://tokenforge-api.opensyber.cloud"
SDK_SCRIPT_URL = "https://tokenforge-api.opensyber.cloud/sdk.js"
# SERVICE_API_KEY must be set via `wrangler secret put SERVICE_API_KEY`
