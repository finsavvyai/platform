name = "tokenforge-api"
main = "src/index.ts"
compatibility_date = "2025-02-18"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# D1 Database (shared with opensyber-api, tenant-scoped in code)
[[d1_databases]]
binding = "DB"
database_name = "opensyber-db"
database_id = "fb34a1a9-e91b-44f8-94f9-40a2ce6c7bcf"
migrations_dir = "../../packages/db/migrations"

# KV Namespaces
[[kv_namespaces]]
binding = "CACHE"
id = "59007c716b5d4ee481f2d5d061dbed01"

# Environment variables (set via wrangler secret)
# LEMONSQUEEZY_API_KEY
# LEMONSQUEEZY_WEBHOOK_SECRET
# RESEND_API_KEY
# TF_LS_VARIANT_PRO
# TF_LS_VARIANT_TEAM
# TF_LS_VARIANT_ENTERPRISE
# TF_LS_PRODUCT_ID

# Custom domain — routes through opensyber.cloud zone
[[routes]]
pattern = "tokenforge-api.opensyber.cloud/*"
zone_name = "opensyber.cloud"

[vars]
ENVIRONMENT = "production"

# Hourly usage check cron
[triggers]
crons = ["0 * * * *"]
