name = "opensyber-web"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
workers_dev = false

routes = [
  { pattern = "opensyber.cloud/*", zone_name = "opensyber.cloud" },
]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "opensyber-web"

# ─── Runtime Secrets (set via `wrangler secret put <NAME>`) ───────────
# AUTH_SECRET             — Session JWT signing (generate: openssl rand -hex 32)
# GOOGLE_CLIENT_ID        — Google OAuth (console.cloud.google.com/apis/credentials)
# GOOGLE_CLIENT_SECRET
# GITHUB_CLIENT_ID        — GitHub OAuth (github.com/settings/developers)
# GITHUB_CLIENT_SECRET
# APPLE_CLIENT_ID         — Apple Sign In (developer.apple.com/account/resources)
# APPLE_CLIENT_SECRET     — Generated JWT (see Apple docs)
# LINKEDIN_CLIENT_ID      — LinkedIn OAuth (linkedin.com/developers/apps)
# LINKEDIN_CLIENT_SECRET
# AZURE_AD_CLIENT_ID      — Microsoft Entra ID (portal.azure.com → App registrations)
# AZURE_AD_CLIENT_SECRET
# AZURE_AD_TENANT_ID      — "common" for multi-tenant, or specific tenant ID

[vars]
NEXT_PUBLIC_APP_URL = "https://opensyber.cloud"
NEXT_PUBLIC_API_URL = "https://api.opensyber.cloud"
API_URL = "https://api.opensyber.cloud"
AUTH_URL = "https://opensyber.cloud"
# ─── LemonSqueezy Billing (required for checkout links) ─────────────
NEXT_PUBLIC_LEMONSQUEEZY_STORE_ID = "finsavvy"
NEXT_PUBLIC_OPENSYBER_LS_VARIANT_PERSONAL = "1450514"
NEXT_PUBLIC_OPENSYBER_LS_VARIANT_PRO = "1450638"
NEXT_PUBLIC_OPENSYBER_LS_VARIANT_TEAM = "1450639"
# NEXT_PUBLIC_LS_TEST_COUPON = "A3OTE0NW"
