name: tokenforge-e2e

# Cross-browser smoke matrix for @opensyber/tokenforge browser SDK.
# Runs on every PR + push to main that touches the package, plus
# manually via workflow_dispatch. Tests the BUILT package (dist/)
# across Chromium / Firefox / WebKit using Playwright.

on:
  pull_request:
    paths:
      - 'packages/tokenforge/**'
      - '.github/workflows/tokenforge-e2e.yml'
      - 'pnpm-lock.yaml'
  push:
    branches: [main]
    paths:
      - 'packages/tokenforge/**'
      - '.github/workflows/tokenforge-e2e.yml'
  workflow_dispatch:

jobs:
  cross-browser:
    name: cross-browser smoke (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TokenForge SDK
        run: pnpm --filter @opensyber/tokenforge build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser (${{ matrix.browser }})
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @opensyber/tokenforge exec playwright install ${{ matrix.browser }} --with-deps

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @opensyber/tokenforge exec playwright install-deps ${{ matrix.browser }}

      - name: Run e2e against ${{ matrix.browser }}
        run: pnpm --filter @opensyber/tokenforge exec playwright test --project=${{ matrix.browser }} --reporter=github
        env:
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: packages/tokenforge/playwright-report/
          retention-days: 7

      - name: Upload test traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: packages/tokenforge/test-results/
          retention-days: 7

  summary:
    name: cross-browser summary
    needs: cross-browser
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix outcome
        run: |
          if [ "${{ needs.cross-browser.result }}" != "success" ]; then
            echo "::error::At least one browser failed the e2e suite."
            exit 1
          fi
          echo "All 3 browser engines (chromium / firefox / webkit) passed."
