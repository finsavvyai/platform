version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: opensyber-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-opensyber}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-opensyber}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-opensyber}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opensyber-network

  redis:
    image: redis:7-alpine
    container_name: opensyber-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opensyber-network

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: api
    container_name: opensyber-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-opensyber}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-opensyber}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      LEMON_SQUEEZY_API_KEY: ${LEMON_SQUEEZY_API_KEY}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - opensyber-network
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: web
    container_name: opensyber-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      API_URL: http://api:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - opensyber-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  opensyber-network:
    driver: bridge
