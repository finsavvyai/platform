name: Docker CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.6.2'

jobs:
  # Type check and lint
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  # Build Docker images
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        service: [web, tokenforge-web, mock-api]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          if [ "${{ matrix.service }}" = "mock-api" ]; then
            docker build -f .luna/sprint-24-agent-security-platform/docker/Dockerfile.mock-api -t opensyber-${{ matrix.service }}:latest .
          else
            docker build -f .luna/sprint-24-agent-security-platform/docker/Dockerfile --target development -t opensyber-${{ matrix.service }}:latest .
          fi

      - name: Image info
        run: docker images opensyber-${{ matrix.service }}:latest

  # Run tests in Docker
  test:
    name: Test in Docker
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: |
          docker build -f .luna/sprint-24-agent-security-platform/docker/Dockerfile \
            --target development \
            -t opensyber-test:latest .

      - name: Run tests
        run: |
          docker run --rm \
            -v $(pwd):/app \
            -w /app \
            opensyber-test:latest \
            pnpm test

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/coverage/'
          retention-days: 7

  # Security scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
