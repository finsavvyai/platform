version: '3.8'

services:
  # OpenSyber Web Application
  web:
    build:
      context: ../..
      dockerfile: .luna/sprint-24-agent-security-platform/docker/Dockerfile
      target: development
    container_name: opensyber-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - ENVIRONMENT=development
      - NODE_ENV=development
    volumes:
      - ../../apps/web:/app/apps/web:delegated
      - ../../packages:/app/packages:delegated
      - /app/apps/web/.next
      - /app/node_modules/.cache
    working_dir: /app/apps/web
    command: pnpm dev
    networks:
      - opensyber-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # TokenForge Web Application
  tokenforge-web:
    build:
      context: ../..
      dockerfile: .luna/sprint-24-agent-security-platform/docker/Dockerfile
      target: development
    container_name: tokenforge-web
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - ENVIRONMENT=development
      - NODE_ENV=development
      - PORT=3001
    volumes:
      - ../../tokenforge/apps/web:/app/tokenforge/apps/web:delegated
      - ../../packages:/app/packages:delegated
      - /app/tokenforge/apps/web/.next
      - /app/node_modules/.cache
    working_dir: /app/tokenforge/apps/web
    command: pnpm dev
    networks:
      - opensyber-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Mock API (simulates Cloudflare Workers APIs)
  mock-api:
    build:
      context: ../..
      dockerfile: .luna/sprint-24-agent-security-platform/docker/Dockerfile.mock-api
    container_name: opensyber-mock-api
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    volumes:
      - ../../apps/api:/app/apps/api:ro
      - ../../packages:/app/packages:ro
    networks:
      - opensyber-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  opensyber-network:
    driver: bridge
    name: opensyber-network

volumes:
  node_modules_cache:
    name: opensyber-node-modules
  next_cache:
    name: opensyber-next-cache
