<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob:;
      connect-src 'self' http://localhost:* https://api.queryflux.com;
    " />
    <title>QueryFlux</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        /* Loading screen before React hydrates */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        #root {
            min-height: 100vh;
        }

        .app-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 24px;
        }

        .app-loading-logo {
            width: 80px;
            height: 80px;
            animation: pulse 2s ease-in-out infinite;
        }

        .app-loading-text {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .app-loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }
    </style>
</head>

<body>
    <div id="root">
        <div class="app-loading">
            <svg class="app-loading-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" stroke="#6366f1" stroke-width="3" fill="none" />
                <circle cx="50" cy="30" r="8" fill="#6366f1" />
                <circle cx="30" cy="60" r="8" fill="#818cf8" />
                <circle cx="70" cy="60" r="8" fill="#818cf8" />
                <path d="M50 38 L30 52" stroke="#6366f1" stroke-width="2" />
                <path d="M50 38 L70 52" stroke="#6366f1" stroke-width="2" />
                <path d="M30 60 L70 60" stroke="#818cf8" stroke-width="2" />
            </svg>
            <span class="app-loading-text">QueryFlux</span>
            <div class="app-loading-spinner"></div>
        </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
</body>

</html>
