version: '3.8'

services:
  electron-builder:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    volumes:
      - ./release:/app/release
      - ./dist:/app/dist
    environment:
      - NODE_ENV=production
      - CSC_LINK=${CSC_LINK}
      - CSC_KEY_PASSWORD=${CSC_KEY_PASSWORD}
      - WIN_CSC_LINK=${WIN_CSC_LINK}
      - WIN_CSC_KEY_PASSWORD=${WIN_CSC_KEY_PASSWORD}
      - APPLE_ID=${APPLE_ID}
      - APPLE_ID_PASSWORD=${APPLE_ID_PASSWORD}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    command: npm run dist:all

  electron-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DISPLAY=:99
    ports:
      - "5174:5174"
    command: npm run dev

  electron-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
      - DISPLAY=:99
    command: |
      sh -c "
        npm run typecheck &&
        npm run lint &&
        npm run build &&
        npm start
      "