<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea" />
      <stop offset="100%" style="stop-color:#764ba2" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#logo-gradient)" filter="url(#shadow)" />

  <!-- Database representation -->
  <g transform="translate(20, 20)">
    <!-- Database cylinder -->
    <ellipse cx="30" cy="10" rx="25" ry="8" fill="rgba(255,255,255,0.3)" />
    <rect x="5" y="10" width="50" height="40" fill="rgba(255,255,255,0.2)" />
    <ellipse cx="30" cy="50" rx="25" ry="8" fill="rgba(255,255,255,0.4)" />

    <!-- Query/Code lines -->
    <line x1="15" y1="20" x2="45" y2="20" stroke="white" stroke-width="2" opacity="0.8" />
    <line x1="15" y1="28" x2="40" y2="28" stroke="white" stroke-width="2" opacity="0.8" />
    <line x1="15" y1="36" x2="35" y2="36" stroke="white" stroke-width="2" opacity="0.8" />

    <!-- AI spark -->
    <g transform="translate(48, 12)">
      <path d="M0,0 L4,-8 L6,-2 L14,-4 L8,2 L12,8 L4,6 L2,12 Z" fill="white" opacity="0.9" />
    </g>
  </g>

  <!-- Text -->
  <text x="50" y="85" font-family="monospace" font-size="14" font-weight="bold"
        fill="white" text-anchor="middle">QF</text>
</svg>