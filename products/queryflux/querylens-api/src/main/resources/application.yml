server:
  port: 8093

spring:
  application:
    name: querylens-api

openai:
  api-key: ${OPENAI_API_KEY:sk-placeholder}
  model: gpt-4o
  timeout-seconds: 30
  max-tokens: 500

vectorize:
  worker:
    url: ${VECTORIZE_WORKER_URL:https://querylens-vectorize-worker.workers.dev}
  ingress-secret: ${VECTORIZE_INGRESS_SECRET:}
  similarity:
    threshold: 0.78
  search:
    topK: 10
    maxTables: 5

claw:
  enabled: ${CLAW_ENABLED:false}
  api-key: ${CLAW_API_KEY:}
  base-url: ${CLAW_BASE_URL:https://gateway.clawapi.com/v1}
  project-id: ${CLAW_PROJECT_ID:}
  cache:
    ttl-minutes: 60
    max-size: 10000

querylens:
  default-dialect: postgresql
  api-key: ${QUERYLENS_API_KEY:}
  safety:
    max-query-length: 5000

logging:
  level:
    com.queryflux.querylens: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
