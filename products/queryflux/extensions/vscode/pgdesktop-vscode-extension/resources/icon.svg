<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title>Ultimate DB Manager</title>
  <desc>Stylized database cylinder with AI spark on a blue gradient tile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="dbBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0B1220" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background tile -->
  <rect x="8" y="8" width="240" height="240" rx="36" fill="url(#bg)"/>

  <!-- Database (cylinder) -->
  <g transform="translate(0,0)" filter="url(#shadow)">
    <!-- Top ellipse -->
    <ellipse cx="128" cy="86" rx="64" ry="22" fill="#FFFFFF" opacity="0.95"/>
    <!-- Body -->
    <rect x="64" y="86" width="128" height="110" fill="url(#dbBody)"/>
    <!-- Bottom ellipse -->
    <ellipse cx="128" cy="196" rx="64" ry="22" fill="#D1D5DB"/>
    <!-- Band lines -->
    <g stroke="#B6BCC6" stroke-width="2" opacity="0.8">
      <path d="M64 116c0 12 28 22 64 22s64-10 64-22" fill="none"/>
      <path d="M64 146c0 12 28 22 64 22s64-10 64-22" fill="none"/>
    </g>
  </g>

  <!-- AI spark (top-right) -->
  <g transform="translate(172,48) scale(1.0)">
    <path d="M16 0l3.2 7.6L28 10l-8.8 4 2 9.2L16 18l-5.2 5.2 2-9.2L4 10l8.8-2.4z" fill="#FBBF24"/>
    <circle cx="16" cy="10" r="2.6" fill="#F59E0B"/>
  </g>

  <!-- Simple AI circuitry lines -->
  <g stroke="#93C5FD" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.95">
    <path d="M188 70 C150 78, 142 96, 128 112"/>
    <circle cx="128" cy="112" r="4" fill="#93C5FD"/>
    <path d="M188 70 C148 92, 120 128, 112 148"/>
    <circle cx="112" cy="148" r="4" fill="#93C5FD"/>
  </g>

  <!-- Subtle highlight -->
  <ellipse cx="128" cy="76" rx="46" ry="12" fill="#FFFFFF" opacity="0.25"/>
</svg>

