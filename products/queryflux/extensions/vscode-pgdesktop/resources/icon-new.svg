<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient with Apple-inspired colors -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5856D6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#AF52DE;stop-opacity:1" />
    </linearGradient>

    <!-- Secondary gradient for depth -->
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34C759;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#30D158;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background with rounded rectangle (Apple style) -->
  <rect x="8" y="8" width="112" height="112" rx="24" ry="24" fill="url(#mainGradient)" filter="url(#shadow)"/>

  <!-- Main database icon container -->
  <g transform="translate(24, 20)" filter="url(#glow)">
    <!-- Central database cylinder -->
    <ellipse cx="40" cy="20" rx="32" ry="8" fill="white" opacity="0.9"/>
    <rect x="8" y="20" width="64" height="40" fill="white" opacity="0.8"/>
    <ellipse cx="40" cy="60" rx="32" ry="8" fill="white" opacity="0.9"/>

    <!-- Data lines -->
    <rect x="16" y="28" width="48" height="2" rx="1" fill="url(#mainGradient)" opacity="0.6"/>
    <rect x="16" y="34" width="36" height="2" rx="1" fill="url(#mainGradient)" opacity="0.5"/>
    <rect x="16" y="40" width="42" height="2" rx="1" fill="url(#mainGradient)" opacity="0.5"/>
    <rect x="16" y="46" width="30" height="2" rx="1" fill="url(#mainGradient)" opacity="0.4"/>
    <rect x="16" y="52" width="38" height="2" rx="1" fill="url(#mainGradient)" opacity="0.4"/>
  </g>

  <!-- Connection indicators (small database icons) -->
  <g transform="translate(16, 72)">
    <!-- PostgreSQL -->
    <circle cx="8" cy="8" r="6" fill="#336791" opacity="0.8"/>
    <rect x="5" y="6" width="6" height="1" fill="white" opacity="0.8"/>
    <rect x="5" y="8" width="4" height="1" fill="white" opacity="0.6"/>
    <rect x="5" y="10" width="5" height="1" fill="white" opacity="0.6"/>

    <!-- MongoDB -->
    <circle cx="24" cy="8" r="6" fill="#4DB33D" opacity="0.8"/>
    <path d="M24 5C23 5 22.5 6 22.5 7c0 1.5 1 2.5 1.5 4 0.5-1.5 1.5-2.5 1.5-4 0-1-0.5-2-1.5-2z" fill="white" opacity="0.8"/>

    <!-- Redis -->
    <circle cx="40" cy="8" r="6" fill="#DC382D" opacity="0.8"/>
    <rect x="38" y="6" width="4" height="1" fill="white" opacity="0.8"/>
    <rect x="37" y="8" width="6" height="1" fill="white" opacity="0.6"/>
    <rect x="38" y="10" width="4" height="1" fill="white" opacity="0.6"/>
  </g>

  <!-- Active connection indicator -->
  <circle cx="96" cy="32" r="8" fill="url(#secondaryGradient)" stroke="white" stroke-width="2" filter="url(#glow)"/>
  <path d="M93 32l2 2 4-4" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AI indicator -->
  <g transform="translate(88, 88)">
    <circle cx="8" cy="8" r="8" fill="#FF9500" opacity="0.9" filter="url(#glow)"/>
    <path d="M6 6h4v4h-4z" fill="white" opacity="0.2" rx="1"/>
    <circle cx="7" cy="7" r="0.5" fill="white"/>
    <circle cx="9" cy="7" r="0.5" fill="white"/>
    <circle cx="7" cy="9" r="0.5" fill="white"/>
    <circle cx="9" cy="9" r="0.5" fill="white"/>
    <circle cx="8" cy="8" r="0.8" fill="white" opacity="0.3"/>
  </g>

  <!-- Sparkle effects for premium feel -->
  <g opacity="0.6">
    <circle cx="32" cy="24" r="1" fill="white">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="88" cy="48" r="1.5" fill="white">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="72" cy="16" r="1" fill="white">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>