# Product-local pnpm workspace for queryflux.
#
# The root /pnpm-workspace.yaml deliberately excludes products/* (see root
# file comment) because migrated trees carry conflicting dep graphs. This
# file isolates queryflux so its packages can resolve each other via the
# @queryflux/* scope without polluting the platform workspace.
#
# Globs only include directories that currently have a package.json. New
# packages must add an explicit entry or fall under an existing glob.
packages:
  - "website"
  - "desktop"
  - "mobile"
  - "mcp-server"
  - "lens"
  - "lens/vectorize-worker"
  - "workers/api"
  - "extensions/*"
