# Development Environment Configuration
# Inherits from config.yaml with development-specific overrides

# Server Configuration - Development
PORT: "8080"
HOST: "localhost"
LOG_LEVEL: "debug"
TIMEOUT: "30s"
ENVIRONMENT: "development"
DEBUG: true

# Database Configuration - Development
DATABASE_URL: "postgres://localhost:5432/queryflux_dev?sslmode=disable"
REDIS_URL: "redis://localhost:6379/0"
DATABASE_POOL_SIZE: 5
DATABASE_TIMEOUT: "30s"

# JWT Configuration - Development (shorter expiry for testing)
JWT_SECRET: "development-jwt-secret-change-in-production"
JWT_EXPIRATION: "1h"
JWT_REFRESH_EXPIRY: "24h"
JWT_ISSUER: "queryflux-dev"

# AI Service Configuration - Development
OPENAI_API_KEY: ""
CLAUDE_API_KEY: ""
AI_TIMEOUT: "30s"
AI_RATE_LIMIT_RPS: 5
AI_MODEL: "gpt-3.5-turbo"

# Security Configuration - Development (relaxed for local development)
CORS_ORIGINS:
  - "http://localhost:3000"
  - "http://localhost:5198"
  - "http://localhost:8080"
  - "http://127.0.0.1:3000"
  - "http://127.0.0.1:5198"
  - "http://127.0.0.1:8080"
RATE_LIMIT_RPS: 1000
MAX_REQUEST_SIZE_MB: 50
ENABLE_REQUEST_LOGGING: true

# Development-only settings
ENABLE_PPROF: true
ENABLE_SWAGGER: true
MOCK_EXTERNAL_SERVICES: true
