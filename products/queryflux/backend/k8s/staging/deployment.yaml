apiVersion: apps/v1
kind: Deployment
metadata:
  name: queryflux-backend
  namespace: queryflux-staging
  labels:
    app: queryflux-backend
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: queryflux-backend
  template:
    metadata:
      labels:
        app: queryflux-backend
        environment: staging
    spec:
      containers:
      - name: queryflux-backend
        image: queryflux/backend:staging
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: GIN_MODE
          value: "debug"
        - name: LOG_LEVEL
          value: "info"
        - name: ENVIRONMENT
          value: "staging"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: queryflux-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: queryflux-secrets
              key: jwt-secret
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: queryflux-config
              key: redis-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config-volume
          mountPath: /app/configs
          readOnly: true
        - name: logs-volume
          mountPath: /app/logs
      volumes:
      - name: config-volume
        configMap:
          name: queryflux-config
      - name: logs-volume
        emptyDir: {}
      imagePullSecrets:
      - name: registry-secret
      restartPolicy: Always