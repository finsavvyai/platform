apiVersion: v1
kind: Service
metadata:
  name: queryflux-backend-service
  namespace: queryflux-staging
  labels:
    app: queryflux-backend
    environment: staging
spec:
  selector:
    app: queryflux-backend
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  type: ClusterIP