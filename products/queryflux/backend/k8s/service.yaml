apiVersion: v1
kind: Service
metadata:
  name: queryflux-backend-service
  namespace: queryflux
  labels:
    app: queryflux-backend
    component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: queryflux-backend
    component: api

---
apiVersion: v1
kind: Service
metadata:
  name: queryflux-backend-headless
  namespace: queryflux
  labels:
    app: queryflux-backend
    component: api
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: queryflux-backend
    component: api

