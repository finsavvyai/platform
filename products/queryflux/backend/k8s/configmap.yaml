apiVersion: v1
kind: ConfigMap
metadata:
  name: queryflux-config
  namespace: queryflux
data:
  config.yaml: |
    server:
      port: 8080
      host: "0.0.0.0"
      read_timeout: 30s
      write_timeout: 30s
      idle_timeout: 60s

    logging:
      level: "info"
      format: "json"
      output: "stdout"

    database:
      host: "postgres-primary"
      port: 5432
      name: "queryflux"
      user: "queryflux"
      ssl_mode: "require"
      max_connections: 25
      max_idle_connections: 5
      max_connection_lifetime: "30m"
      max_idle_time: "5m"

    redis:
      host: "redis-cluster"
      port: 6379
      database: 0
      pool_size: 10
      min_idle_connections: 3
      dial_timeout: "5s"
      read_timeout: "3s"
      write_timeout: "3s"

    monitoring:
      prometheus:
        enabled: true
        port: 9090
        path: "/metrics"
      jaeger:
        enabled: true
        endpoint: "http://jaeger-collector:14268/api/traces"
        service_name: "queryflux-backend"

    security:
      jwt_secret: "${JWT_SECRET}"
      encryption_key: "${ENCRYPTION_KEY}"
      rate_limit:
        enabled: true
        requests_per_minute: 1000
        burst: 100

    features:
      ai_enabled: true
      collaboration_enabled: true
      websocket_enabled: true
      real_time_dashboard: true

    storage:
      upload_path: "/app/uploads"
      log_path: "/app/logs"
      temp_path: "/app/tmp"