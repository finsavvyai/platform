apiVersion: v1
kind: Secret
metadata:
  name: queryflux-secrets
  namespace: queryflux
type: Opaque
data:
  # Base64 encoded values - replace with actual encoded values
  db-password: <base64-encoded-db-password>
  redis-password: <base64-encoded-redis-password>
  jwt-secret: <base64-encoded-jwt-secret>
  encryption-key: <base64-encoded-encryption-key>
  sentry-dsn: <base64-encoded-sentry-dsn>
  grafana-password: <base64-encoded-grafana-password>
  elastic-password: <base64-encoded-elastic-password>
  replication-password: <base64-encoded-replication-password>

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: queryflux
type: Opaque
data:
  postgres-user: cXVlcnlmbHV4  # queryflux
  postgres-password: <base64-encoded-postgres-password>
  postgres-db: cXVlcnlmbHV4  # queryflux

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: queryflux
type: Opaque
data:
  redis-password: <base64-encoded-redis-password>

---
apiVersion: v1
kind: Secret
metadata:
  name: elasticsearch-credentials
  namespace: queryflux
type: Opaque
data:
  elastic-user: ZWxhc3RpYw==  # elastic
  elastic-password: <base64-encoded-elastic-password>