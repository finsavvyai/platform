# Test Environment Configuration
# Used for running unit tests and integration tests

# Server Configuration - Test
PORT: "8081"
HOST: "localhost"
LOG_LEVEL: "error"
TIMEOUT: "10s"
ENVIRONMENT: "test"
DEBUG: false

# Database Configuration - Test (uses test database)
DATABASE_URL: "postgres://localhost:5432/queryflux_test?sslmode=disable"
REDIS_URL: "redis://localhost:6379/1"
DATABASE_POOL_SIZE: 2
DATABASE_TIMEOUT: "10s"

# JWT Configuration - Test (minimal expiry for testing)
JWT_SECRET: "test-jwt-secret-for-testing-only"
JWT_EXPIRATION: "5m"
JWT_REFRESH_EXPIRY: "1h"
JWT_ISSUER: "queryflux-test"

# AI Service Configuration - Test (mocked)
OPENAI_API_KEY: "test-openai-key"
CLAUDE_API_KEY: "test-claude-key"
AI_TIMEOUT: "5s"
AI_RATE_LIMIT_RPS: 100
AI_MODEL: "gpt-3.5-turbo"

# External Services - Test (mock or test values)
LEMONSQUEEZY_API_KEY: "test-lemonsqueezy-key"
LEMONSQUEEZY_STORE_ID: "test-store-id"
LEMONSQUEEZY_WEBHOOK_SECRET: "test-webhook-secret"

# Security Configuration - Test (relaxed for testing)
CORS_ORIGINS:
  - "http://localhost:3000"
  - "http://localhost:5198"
  - "http://localhost:8081"
RATE_LIMIT_RPS: 10000
MAX_REQUEST_SIZE_MB: 100
ENABLE_REQUEST_LOGGING: false

# Test-specific settings
ENABLE_PPROF: false
ENABLE_SWAGGER: false
MOCK_EXTERNAL_SERVICES: true
MOCK_AI_RESPONSES: true
SKIP_AUTHORIZATION: true

# Database testing settings
DB_MIGRATE_ON_START: true
DB_RESET_AFTER_TEST: true
SEED_TEST_DATA: true
