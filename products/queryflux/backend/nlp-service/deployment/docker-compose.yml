version: "3.8"

services:
  postgres:
    image: postgres:14
    container_name: querylens-postgres
    environment:
      POSTGRES_DB: querylens
      POSTGRES_USER: querylens
      POSTGRES_PASSWORD: querylens
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
