# Production Environment Configuration
# Inherits from config.yaml with production-specific overrides

# Server Configuration - Production
PORT: "8080"
HOST: "0.0.0.0"
LOG_LEVEL: "info"
TIMEOUT: "30s"
ENVIRONMENT: "production"
DEBUG: false

# Database Configuration - Production
DATABASE_URL: "${DATABASE_URL}"  # Read from environment variable
REDIS_URL: "${REDIS_URL}"        # Read from environment variable
DATABASE_POOL_SIZE: 20
DATABASE_TIMEOUT: "30s"

# JWT Configuration - Production
JWT_SECRET: "${JWT_SECRET}"      # Read from environment variable
JWT_EXPIRATION: "24h"
JWT_REFRESH_EXPIRY: "168h"       # 7 days
JWT_ISSUER: "queryflux"

# AI Service Configuration - Production
OPENAI_API_KEY: "${OPENAI_API_KEY}"
CLAUDE_API_KEY: "${CLAUDE_API_KEY}"
AI_TIMEOUT: "60s"
AI_RATE_LIMIT_RPS: 10
AI_MODEL: "gpt-4"

# External Services - Production
LEMONSQUEEZY_API_KEY: "${LEMONSQUEEZY_API_KEY}"
LEMONSQUEEZY_STORE_ID: "${LEMONSQUEEZY_STORE_ID}"
LEMONSQUEEZY_WEBHOOK_SECRET: "${LEMONSQUEEZY_WEBHOOK_SECRET}"

# Security Configuration - Production
CORS_ORIGINS:
  - "https://queryflux.ai"
  - "https://www.queryflux.ai"
  - "https://app.queryflux.ai"
RATE_LIMIT_RPS: 100
MAX_REQUEST_SIZE_MB: 10
ENABLE_REQUEST_LOGGING: true

# Production-only settings
ENABLE_PPROF: false
ENABLE_SWAGGER: false
MOCK_EXTERNAL_SERVICES: false

# Monitoring and Observability
ENABLE_METRICS: true
METRICS_PORT: "9090"
ENABLE_TRACING: true
TRACE_SAMPLE_RATE: 0.1

# SSL/TLS Configuration
TLS_CERT_FILE: "${TLS_CERT_FILE}"
TLS_KEY_FILE: "${TLS_KEY_FILE}"
ENABLE_HTTPS: true
