groups:
  - name: queryflux.rules
    rules:
      # Alert if the backend service is down
      - alert: QueryFluxBackendDown
        expr: up{job="queryflux-backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: queryflux-backend
        annotations:
          summary: "QueryFlux backend service is down"
          description: "QueryFlux backend service has been down for more than 1 minute."

      # Alert for high error rate
      - alert: QueryFluxHighErrorRate
        expr: rate(http_requests_total{job="queryflux-backend",status=~"5.."}[5m]) / rate(http_requests_total{job="queryflux-backend"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: queryflux-backend
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} for the last 5 minutes."

      # Alert for high response time
      - alert: QueryFluxHighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="queryflux-backend"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
          service: queryflux-backend
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }}s for the last 5 minutes."

      # Alert for database connection issues
      - alert: QueryFluxDatabaseConnectionIssues
        expr: rate(db_connections_failed_total{job="queryflux-backend"}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "Database connection issues detected"
          description: "Database connection failure rate is {{ $value }} per second."

      # Alert for Redis connection issues
      - alert: QueryFluxRedisConnectionIssues
        expr: redis_up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          service: cache
        annotations:
          summary: "Redis is down"
          description: "Redis instance has been down for more than 1 minute."

      # Alert for high memory usage
      - alert: QueryFluxHighMemoryUsage
        expr: (container_memory_usage_bytes{pod=~"queryflux-backend.*"} / container_spec_memory_limit_bytes{pod=~"queryflux-backend.*"}) > 0.9
        for: 5m
        labels:
          severity: warning
          service: queryflux-backend
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value | humanizePercentage }} of the limit."

      # Alert for high CPU usage
      - alert: QueryFluxHighCPUUsage
        expr: rate(container_cpu_usage_seconds_total{pod=~"queryflux-backend.*"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          service: queryflux-backend
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value | humanizePercentage }} for the last 5 minutes."

      # Alert for disk space usage
      - alert: QueryFluxHighDiskUsage
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: critical
          service: infrastructure
        annotations:
          summary: "Low disk space"
          description: "Disk space is {{ $value | humanizePercentage }} available."

      # Alert for too many database connections
      - alert: QueryFluxTooManyDBConnections
        expr: pg_stat_database_numbackends{job="postgres-exporter"} > 20
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "Too many database connections"
          description: "There are {{ $value }} active database connections."

      # Alert for slow queries
      - alert: QueryFluxSlowQueries
        expr: rate(pg_stat_statements_mean_time_seconds{job="postgres-exporter"}[5m]) > 1
        for: 2m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "Slow queries detected"
          description: "Average query execution time is {{ $value }}s."

      # Alert for WebSocket connection issues
      - alert: QueryFluxWebSocketIssues
        expr: rate(websocket_connections_failed_total{job="queryflux-backend"}[5m]) > 0.05
        for: 3m
        labels:
          severity: warning
          service: websocket
        annotations:
          summary: "WebSocket connection issues"
          description: "WebSocket connection failure rate is {{ $value }} per second."

      # SLA: Service availability
      - record: queryflux:service_availability
        expr: |
          (
            sum(rate(http_requests_total{job="queryflux-backend",status!~"5.."}[5m])) /
            sum(rate(http_requests_total{job="queryflux-backend"}[5m]))
          ) * 100

      # SLA: Error rate
      - record: queryflux:error_rate
        expr: |
          (
            sum(rate(http_requests_total{job="queryflux-backend",status=~"5.."}[5m])) /
            sum(rate(http_requests_total{job="queryflux-backend"}[5m]))
          ) * 100

      # SLA: Response time percentiles
      - record: queryflux:response_time_p95
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="queryflux-backend"}[5m]))

      - record: queryflux:response_time_p99
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="queryflux-backend"}[5m]))

      # Business metrics: Active users
      - record: queryflux:active_users
        expr: count(increase(user_sessions_total{job="queryflux-backend"}[5m]))

      # Business metrics: Queries executed
      - record: queryflux:queries_per_minute
        expr: sum(rate(queries_executed_total{job="queryflux-backend"}[1m]))

      # Business metrics: Collaboration sessions
      - record: queryflux:active_sessions
        expr: count(collaboration_sessions_active{job="queryflux-backend"})