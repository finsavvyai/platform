# Default values for queryflux helm chart

replicaCount: 1

image:
  repository: queryflux/backend
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1001
  runAsUser: 1001
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.queryflux.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Application configuration
config:
  environment: production
  ginMode: release
  logLevel: warn
  databaseUrl: ""
  redisUrl: ""
  jwtSecret: ""

# Secrets
secrets:
  enabled: true
  # Create secrets from existing values
  existingSecret: ""
  databaseUrl: ""
  jwtSecret: ""

# Health checks
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Persistence
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi

# Metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Horizontal Pod Autoscaler
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Vertical Pod Autoscaler
vpa:
  enabled: false
  updateMode: "Auto"

# Network policies
networkPolicy:
  enabled: false
  ingress:
    enabled: true
    from:
      - namespaceSelector:
          matchLabels:
            name: ingress
  egress:
    enabled: true
    to:
      - namespaceSelector:
          matchLabels:
            name: kube-system
    ports:
      - protocol: TCP
        port: 53
        endPort: 53
      - protocol: UDP
        port: 53
        endPort: 53

# Resource quotas
resourceQuota:
  enabled: false
  requests:
    cpu: "2"
    memory: 4Gi
  limits:
    cpu: "4"
    memory: 8Gi

# Pod security policies
podSecurityPolicy:
  enabled: false
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'

# Pod topology spread constraints
topologySpreadConstraints:
  enabled: false
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: DoNotSchedule

# Priority class
priorityClass:
  enabled: false
  name: ""

# Init containers
initContainers: []

# Additional containers
additionalContainers: []

# Sidecar containers
sidecars: []

# Extra volumes
extraVolumes: []

# Extra volume mounts
extraVolumeMounts: []

# Extra labels
extraLabels: {}

# Extra annotations
extraAnnotations: {}

# ConfigMap creation
configMap:
  create: true
  data: {}

# Secret creation
secret:
  create: true
  data: {}

# Environment variables from existing configmaps/secrets
envFrom: []

# Additional environment variables
env: []

# Lifecycle hooks
lifecycle: {}

# Additional annotations for pods
podAnnotations: {}

# Additional labels for pods
podLabels: {}

# Service monitor for Prometheus
serviceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s

# Pod disruption budget
pdb:
  enabled: false
  minAvailable: 1

# Additional manifests to deploy
extraManifests: []