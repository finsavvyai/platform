# Cloudflare Pages Build Configuration
name = "queryflux"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# Environment Variables for Pages
[env.production.vars]
ENVIRONMENT = "production"
VITE_SUPABASE_URL = "https://demo.supabase.co"
VITE_SUPABASE_ANON_KEY = "demo-key-for-testing"
VITE_OLLAMA_URL = "http://localhost:11434"
VITE_APP_URL = "https://queryflux.ai"
VITE_API_URL = "https://api.queryflux.ai"
VITE_ENABLE_OFFLINE_MODE = "true"

[env.preview.vars]
ENVIRONMENT = "preview"
VITE_SUPABASE_URL = "https://demo.supabase.co"
VITE_SUPABASE_ANON_KEY = "demo-key-for-testing"
VITE_OLLAMA_URL = "http://localhost:11434"
VITE_APP_URL = "https://preview.queryflux.ai"
VITE_API_URL = "https://api-preview.queryflux.ai"
VITE_ENABLE_OFFLINE_MODE = "true"
