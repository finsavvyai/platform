version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  kafka:
    image: bitnami/kafka:latest
    environment:
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports: ["9092:9092"]

  opa:
    image: openpolicyagent/opa:latest-rootless
    command: ["run","--server","/policy/policy.rego"]
    volumes:
      - ../packages/policy:/policy
    ports: ["8181:8181"]

  gateway:
    build: ../apps/gateway-go
    environment:
      OPA_URL: "http://opa:8181/v1/data/sdlc/policy"
    depends_on: [opa]
    ports: ["8080:8080"]

  rag:
    build: ../apps/rag-py
    command: ["uvicorn", "service:app", "--host", "0.0.0.0", "--port", "8090"]
    ports: ["8090:8090"]
