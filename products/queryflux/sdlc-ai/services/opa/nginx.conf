events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain application/json application/javascript text/css;

    # Bundle server configuration
    server {
        listen 80;
        server_name localhost;

        # Serve policy bundles
        location /bundles/ {
            alias /usr/share/nginx/html/bundles/;
            add_header Content-Type application/gzip;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";

            # Enable CORS for OPA
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Allow-Headers "If-Modified-Since";

            # Health check endpoint
            location = /bundles/health {
                access_log off;
                return 200 "OK\n";
                add_header Content-Type text/plain;
            }
        }

        # Status endpoint
        location /status {
            access_log off;
            return 200 "Bundle server is running\n";
            add_header Content-Type text/plain;
        }

        # Default location
        location / {
            return 404;
        }
    }
}
