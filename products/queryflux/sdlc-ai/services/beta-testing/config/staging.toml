# Beta Testing Service Configuration

service:
  name: beta-testing
  version: 1.0.0
  environment: production

# Beta Program Settings
beta:
  # Program limits
  maxBetaUsers: 100
  betaDurationWeeks: 8
  maxApplicationsPerDay: 50

  # Reward system
  rewards:
    feedbackCredits: 100
    criticalBugCredits: 500
    scenarioCompletionMultiplier: 0.1
    surveyCompletionCredits: 50
    weeklyActiveBonus: 25

  # Features available to beta users
  features:
    advancedSearch: true
    multiModalProcessing: true
    customIntegrations: true
    prioritySupport: true
    unlimitedApiCalls: false

  # Usage limits for beta users
  limits:
    documentsPerUser: 1000
    apiCallsPerDay: 10000
    storagePerUser: 10737418240  # 10GB in bytes
    vectorSearchesPerDay: 5000

  # Onboarding
  onboarding:
    requiredScenarios: 3
    welcomeEmailDelayMinutes: 5
    followUpDays: [1, 3, 7, 14]
    officeHoursSchedule: "Tuesday, Thursday 2-4 PM EST"

# Feedback Analysis
feedbackAnalysis:
  # AI analysis settings
  ai:
    model: claude-3-sonnet
    temperature: 0.1
    maxTokens: 1000
    batchSize: 10

  # Auto-categorization
  autoCategorization:
    enabled: true
    confidenceThreshold: 0.7
    criticalKeywords:
      - crash
      - broken
      - not working
      - unable to
      - fails to
      - cannot
      - security
      - data loss
      - unauthorized

  # Similarity matching
  similarity:
    threshold: 0.7
    maxRelatedIssues: 10
    vectorIndex: beta-feedback

  # Trend analysis
  trends:
    analysisWindowDays: 30
    minimumOccurrences: 3
    topKeywordsCount: 5

# Testing Scenarios
scenarios:
  # Scenario categories
  categories:
    - integration
    - security
    - performance
    - usability
    - feature

  # Phase definitions
  phases:
    onboarding:
      durationDays: 7
      requiredScenarios: 3
      passingThreshold: 100

    core:
      durationDays: 14
      requiredScenarios: 5
      passingThreshold: 80

    advanced:
      durationDays: 14
      requiredScenarios: 4
      passingThreshold: 70

    load:
      durationDays: 7
      requiredScenarios: 3
      passingThreshold: 60

    integration:
      durationDays: 14
      requiredScenarios: 2
      passingThreshold: 50

# Communication Settings
communication:
  # Email templates
  emails:
    provider: sendgrid
    templates:
      applicationReceived: beta-application-received
      applicationApproved: beta-approved
      applicationRejected: beta-rejected
      welcome: beta-welcome
      feedbackReceived: beta-feedback-received
      feedbackResolved: beta-feedback-resolved
      phaseTransition: beta-phase-transition
      weeklyDigest: beta-weekly-digest

  # Slack integration
  slack:
    enabled: true
    webhookUrl: ${SLACK_WEBHOOK_URL}
    channels:
      feedback: "#beta-feedback"
      alerts: "#beta-alerts"
      announcements: "#beta-announcements"

  # Discord integration
  discord:
    enabled: true
    webhookUrl: ${DISCORD_WEBHOOK_URL}
    roleId: "beta-tester"

# Analytics and Monitoring
analytics:
  # Metrics to track
  metrics:
    - user_engagement
    - feedback_volume
    - bug_reports
    - feature_requests
    - scenario_completion
    - satisfaction_score
    - nps_score

  # Reporting schedule
  reports:
    weeklyDigest: Monday 9 AM EST
    monthlyReport: 1st of month 9 AM EST
    adhocReports: on-demand

  # Dashboard settings
  dashboard:
    refreshIntervalSeconds: 60
    retentionDays: 90
    exportFormats: [pdf, csv, json]

# Database Settings
database:
  # Connection settings
  pool:
    minConnections: 5
    maxConnections: 20
    idleTimeoutSeconds: 300

  # Query optimization
  indexes:
    - beta_users_email
    - beta_users_status
    - beta_users_phase
    - beta_feedback_user_id
    - beta_feedback_status
    - beta_feedback_created_at
    - beta_activities_user_id
    - beta_activities_created_at

  # Cleanup settings
  cleanup:
    oldActivitiesDays: 90
    resolvedFeedbackDays: 180
    surveyResponsesDays: 365

# Cache Settings
cache:
  # KV namespace
  kv:
    namespace: beta-testing-cache
    ttl:
      userSessions: 86400  # 24 hours
      metrics: 3600         # 1 hour
      reports: 2592000      # 30 days
      invitations: 604800   # 7 days

# Security Settings
security:
  # Rate limiting
  rateLimit:
    feedback: 10 per minute
    applications: 5 per day
    surveys: 3 per day

  # Authentication
  auth:
    requireBetaStatus: true
    allowedRoles: [beta_user, admin]

  # Data protection
  dataProtection:
    anonymizeFeedback: false
    retentionPolicyDays: 365
    gdprCompliant: true

# Integration Settings
integrations:
  # LLM service for analysis
  llm:
    provider: anthropic
    model: claude-3-sonnet
    apiKey: ${ANTHROPIC_API_KEY}

  # Vector search for similarity
  vectorSearch:
    provider: cloudflare
    indexName: beta-feedback-vectors
    dimensions: 1536

  # Email service
  email:
    provider: sendgrid
    apiKey: ${SENDGRID_API_KEY}
    fromEmail: beta@sdlc.ai
    fromName: SDLC.ai Beta Team

  # Monitoring service
  monitoring:
    provider: datadog
    apiKey: ${DATADOG_API_KEY}
    site: us1.datadoghq.com

# Feature Flags
featureFlags:
  # Enable/disable features
  aiAnalysis: true
  autoTriage: true
  communityFeatures: true
  rewardsProgram: true
  officeHours: true

  # Experimental features
  experimental:
    aiSummaries: false
    predictiveAnalytics: false
    voiceFeedback: false

# Development Settings
development:
  # Debug mode
  debug: false

  # Mock data
  mockData: false

  # Test users
  testUsers:
    - email: test-beta-1@sdlc.ai
      role: admin
    - email: test-beta-2@sdlc.ai
      role: beta_user

# Production Settings
production:
  # Scaling
  autoscaling:
    minInstances: 2
    maxInstances: 10
    targetCpuUtilization: 70
    targetMemoryUtilization: 80

  # Backup
  backup:
    enabled: true
    schedule: "0 2 * * *"  # Daily at 2 AM
    retentionDays: 30

  # Health checks
  healthCheck:
    enabled: true
    intervalSeconds: 30
    timeoutSeconds: 10
    path: /health
