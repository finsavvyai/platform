# File Upload and Storage Service Configuration
# Copy this file to config.yaml and update with your settings

# Service Configuration
service:
  name: "file-upload-service"
  version: "1.0.0"
  environment: "development" # development, staging, production
  debug: true
  log_level: "info" # debug, info, warn, error

# HTTP Server Configuration
server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "30m"
  write_timeout: "30m"
  idle_timeout: "60m"
  max_header_bytes: 1048576 # 1MB
  enable_cors: true
  cors_origins:
    - "http://localhost:3000"
    - "https://app.sdlc.ai"

# Database Configuration
database:
  host: "localhost"
  port: 5432
  name: "sdlc_platform"
  user: "sdlc_user"
  password: "${DB_PASSWORD}"
  ssl_mode: "require"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"

# Redis Configuration (for caching and sessions)
redis:
  host: "localhost"
  port: 6379
  password: "${REDIS_PASSWORD}"
  db: 0
  pool_size: 10
  min_idle_conns: 2
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"

# Cloudflare R2 Storage Configuration
r2:
  account_id: "${R2_ACCOUNT_ID}"
  access_key_id: "${R2_ACCESS_KEY_ID}"
  secret_access_key: "${R2_SECRET_ACCESS_KEY}"
  bucket_name: "sdlc-files"
  region: "auto"
  endpoint_url: "" # Auto-generated if empty
  public_url: "https://files.sdlc.ai"
  enable_encryption: true
  encryption_key: "${R2_ENCRYPTION_KEY}" # Optional, for client-side encryption

  # Performance settings
  max_idle_conns: 100
  max_idle_conns_per_host: 10
  idle_conn_timeout: "90s"
  timeout: "30m"

# Multi-part Upload Configuration
multipart_upload:
  max_file_size: 107374182400  # 100GB in bytes
  default_chunk_size: 8388608   # 8MB in bytes
  max_concurrent_chunks: 5
  upload_timeout: "2h"
  chunk_timeout: "5m"
  retry_attempts: 3
  retry_delay: "1s"
  temp_dir: "/tmp/uploads"
  enable_resume: true
  cleanup_interval: "24h"

# File Validation Configuration
validation:
  max_file_size: 107374182400  # 100GB
  allowed_extensions:
    - ".pdf"
    - ".doc"
    - ".docx"
    - ".xls"
    - ".xlsx"
    - ".ppt"
    - ".pptx"
    - ".txt"
    - ".csv"
    - ".json"
    - ".xml"
    - ".html"
    - ".md"
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
    - ".webp"
    - ".tiff"
    - ".bmp"

  allowed_mime_types:
    - "application/pdf"
    - "application/msword"
    - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    - "application/vnd.ms-excel"
    - "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
    - "application/vnd.ms-powerpoint"
    - "application/vnd.openxmlformats-officedocument.presentationml.presentation"
    - "text/plain"
    - "text/csv"
    - "application/json"
    - "text/xml"
    - "text/html"
    - "text/markdown"
    - "image/jpeg"
    - "image/png"
    - "image/gif"
    - "image/webp"
    - "image/tiff"
    - "image/bmp"

  # Security settings
  scan_for_malware: true
  validate_file_signatures: true
  check_embedded_content: true
  max_filename_length: 255

# ClamAV Virus Scanner Configuration
clamav:
  # Connection settings
  use_daemon: true
  clamd_socket: "/var/run/clamav/clamd.ctl"
  clamd_host: "localhost"
  clamd_port: 3310

  # Scanning settings
  timeout: "5m"
  max_file_size: 104857600 # 100MB
  enable_cache: true
  cache_ttl: "1h"
  scan_archives: true
  max_scan_size: 1048576000 # 1GB

  # Update settings
  auto_update_signatures: true
  update_interval: "6h"

  # Performance
  max_concurrent_scans: 10
  scan_timeout: "2m"

# Encryption Configuration
encryption:
  enabled: true
  algorithm: "aes-256-gcm"
  key_rotation_interval: "90d"
  key_derivation:
    algorithm: "pbkdf2"
    iterations: 100000
    salt_length: 32

  # Key management
  key_store_type: "vault" # vault, aws_kms, local
  vault:
    address: "${VAULT_ADDRESS}"
    token: "${VAULT_TOKEN}"
    mount_path: "secret"
    key_path: "sdlc/encryption-keys"

# Metadata Extraction Configuration
metadata_extraction:
  enable_exif_extraction: true
  enable_document_metadata: true
  enable_text_preview: true
  preview_max_length: 500
  enable_content_analysis: true
  language_detection: true
  enable_cache: true
  cache_size: 1000
  cache_ttl: "1h"
  timeout: "30s"

  # Office documents
  office_extraction:
    enable_text_extraction: true
    extract_images: false
    extract_tables: true
    max_extracted_text_size: 10485760 # 10MB

  # PDF processing
  pdf_extraction:
    extract_text: true
    extract_metadata: true
    extract_images: false
    max_pages: 1000
    ocr_enabled: false

# Access Control Configuration
access_control:
  enable_cache: true
  cache_size: 10000
  cache_ttl: "5m"
  default_access_level: "private"
  enable_inheritance: true
  session_timeout: "30m"
  audit_enabled: true
  max_permission_entries: 1000

  # Role definitions
  roles:
    owner:
      permissions: ["read", "write", "delete", "share", "download", "print", "copy"]
    editor:
      permissions: ["read", "write", "download", "print", "copy"]
    viewer:
      permissions: ["read", "download"]
    commenter:
      permissions: ["read", "download", "comment"]

  # Share links
  share_links:
    default_expiry: "24h"
    max_expiry: "30d"
    require_password: false
    allow_anonymous: false

# Retention and Cleanup Configuration
retention_cleanup:
  # Job settings
  max_concurrent_jobs: 5
  batch_size: 100
  job_timeout: "2h"
  retry_attempts: 3
  retry_delay: "1m"
  enable_audit_log: true
  default_cleanup_window: "24h"
  max_files_per_job: 10000
  enable_dry_run: false
  schedule_cleanup: true
  cleanup_interval: "6h"

  # Default retention policies
  default_policies:
    documents:
      retention_days: 2555 # 7 years
      archive_after_days: 1095 # 3 years
    temporary_files:
      retention_days: 30
      cleanup_immediately: true
    audit_logs:
      retention_days: 365
    backups:
      retention_days: 2555 # 7 years

  # Cleanup actions
  backup_before_delete: true
  notification_recipients:
    - "admin@sdlc.ai"
    - "security@sdlc.ai"

# Monitoring and Analytics Configuration
monitoring:
  enable_metrics: true
  metrics_interval: "1m"
  enable_analytics: true
  analytics_interval: "5m"
  enable_alerts: true
  retention_period: "30d"
  max_metrics_per_type: 10000
  enable_real_time_monitoring: true
  batch_size: 1000
  flush_interval: "30s"

  # Alert thresholds
  alert_thresholds:
    upload_failure_rate: 5.0      # percentage
    storage_utilization: 80.0     # percentage
    response_time_p95: "5s"       # 95th percentile
    error_rate: 2.0               # percentage
    concurrent_uploads: 100
    virus_detection_rate: 1.0      # percentage

  # Metrics export
  prometheus:
    enabled: true
    port: 9090
    path: "/metrics"

  # OpenTelemetry
  opentelemetry:
    enabled: true
    endpoint: "${OTEL_ENDPOINT}"
    headers:
      - "api-key: ${OTEL_API_KEY}"
    service_name: "file-upload-service"
    service_version: "1.0.0"

# Logging Configuration
logging:
  level: "info" # debug, info, warn, error
  format: "json" # json, text
  output: "stdout" # stdout, file, both

  # File logging
  file:
    enabled: true
    path: "/var/log/file-service/app.log"
    max_size: 100 # MB
    max_backups: 10
    max_age: 30 # days
    compress: true

  # Structured logging fields
  fields:
    service: "file-upload-service"
    version: "1.0.0"
    environment: "${ENVIRONMENT}"

  # Log sampling
  sampling:
    enabled: true
    rate: 0.1 # Sample 10% of debug logs

# Security Configuration
security:
  # JWT Configuration
  jwt:
    signing_key: "${JWT_SIGNING_KEY}"
    issuer: "sdlc-platform"
    audience: "sdlc-users"
    expiry: "24h"
    refresh_expiry: "168h" # 7 days

  # Rate limiting
  rate_limiting:
    enabled: true
    requests_per_minute: 100
    burst: 20

  # CORS
  cors:
    allowed_origins:
      - "http://localhost:3000"
      - "https://app.sdlc.ai"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "Authorization"
      - "Content-Type"
      - "X-Requested-With"
    expose_headers:
      - "X-Total-Count"
    max_age: "12h"

  # Content Security Policy
  csp:
    enabled: true
    policy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"

# Performance Configuration
performance:
  # Connection pooling
  connection_pool:
    max_connections: 100
    max_idle_connections: 20
    connection_timeout: "30s"
    idle_timeout: "90s"

  # Caching
  cache:
    metadata_ttl: "1h"
    file_content_ttl: "30m"
    access_control_ttl: "5m"
    max_memory_usage: "512MB"

  # Throttling
  throttling:
    enabled: true
    concurrent_uploads_per_user: 5
    concurrent_downloads_per_user: 10
    max_file_operations_per_minute: 50

# Development Configuration (development only)
development:
  mock_services:
    r2: false
    clamav: false
    database: false

  hot_reload: true
  debug_endpoints: true
  profiling:
    enabled: true
    port: 6060
