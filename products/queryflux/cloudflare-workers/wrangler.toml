# Cloudflare Worker Configuration for API
name = "queryflux-api"
main = "cloudflare-workers/api/src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Custom Domain Configuration for API Worker
routes = [
  { pattern = "api.queryflux.ai/*" }
]

# Environment Variables for Worker
[env.production.vars]
ENVIRONMENT = "production"
SUPABASE_URL = "https://your-project.supabase.co"
SUPABASE_SERVICE_KEY = "your-supabase-service-key"
OLLAMA_URL = "https://api.queryflux.ai/ollama"
OPENAI_API_KEY = "your-openai-api-key"

[env.preview.vars]
ENVIRONMENT = "preview"
SUPABASE_URL = "https://your-project.supabase.co"
SUPABASE_SERVICE_KEY = "your-supabase-service-key"
OLLAMA_URL = "https://api-preview.queryflux.ai/ollama"
OPENAI_API_KEY = "your-openai-api-key"

# KV Namespace for caching
[[kv_namespaces]]
binding = "QUERYFLUX_CACHE"
id = "your-kv-namespace-id"
preview_id = "your-preview-kv-namespace-id"

# D1 Database
[[d1_databases]]
binding = "QUERYFLUX_DB"
database_name = "queryflux-db"
database_id = "your-d1-database-id"

# R2 Storage for file uploads
[[r2_buckets]]
binding = "QUERYFLUX_STORAGE"
bucket_name = "queryflux-storage"
