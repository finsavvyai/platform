name = "queryflux-backend"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Development
[env.development]
vars = { ENVIRONMENT = "development", LOG_LEVEL = "debug" }

# Production
[env.production]
name = "queryflux-backend-prod"
vars = { ENVIRONMENT = "production", LOG_LEVEL = "info" }
