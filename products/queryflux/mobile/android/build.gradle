buildscript {
    repositories {
        google()
        mavenCentral()
        maven { url "https://www.jitpack.io" }
    }

    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 21
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
    }
    dependencies {
        classpath("com.android.tools.build:gradle:7.4.2")

        // Add React Native plugin if available
        def reactNativeGradlePlugin = file("../node_modules/react-native-gradle-plugin")
        if (reactNativeGradlePlugin.exists()) {
            classpath("com.facebook.react:react-native-gradle-plugin")
        }
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "https://www.jitpack.io" }
    }
}