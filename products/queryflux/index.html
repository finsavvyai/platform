<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QueryFlux - AI-Powered Database Management</title>
  <meta name="description"
    content="Professional database management platform with AI assistance, real-time collaboration, and multi-database support." />

  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Theme color -->
  <meta name="theme-color" content="#0f172a" />
</head>

<body>
  <div id="root"></div>

  <!-- Initial Loader -->
  <div id="initial-loader" style="
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: #0f172a;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9999;
                color: white;
                font-family: 'Inter', sans-serif;
                transition: opacity 0.5s ease-out;
            ">
    <div style="text-align: center">
      <div style="
                        width: 40px;
                        height: 40px;
                        border: 3px solid rgba(255, 255, 255, 0.1);
                        border-top-color: #3b82f6;
                        border-radius: 50%;
                        animation: spin 1s linear infinite;
                        margin: 0 auto 16px;
                    "></div>
      <div style="font-size: 14px; color: #94a3b8;">Loading QueryFlux...</div>
    </div>
  </div>

  <style>
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    body {
      margin: 0;
      background-color: #0f172a;
      color: white;
    }
  </style>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
