spring:
  application:
    name: querylens-core
  profiles:
    active: h2
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

nlp:
  service:
    url: http://localhost:5000

mcp:
  server:
    url: http://localhost:3000
    enabled: false
    timeout: 10000

---
# H2 In-Memory Database Configuration
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:querylens
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

---
# PostgreSQL Configuration
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/querylens
    username: querylens
    password: querylens
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

---
# DuckDB Configuration
spring:
  config:
    activate:
      on-profile: duckdb
  datasource:
    driver-class-name: org.duckdb.DuckDBDriver
    url: jdbc:duckdb:querylens
    username:
    password:
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect