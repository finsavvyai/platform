version: "2"

run:
  timeout: 5m
  go: "1.22"

linters:
  disable:
    - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/finsavvyai/pushci

issues:
  exclude-rules:
    - path: testdata/
      linters: [all]
  max-issues-per-linter: 30
  max-same-issues: 5
