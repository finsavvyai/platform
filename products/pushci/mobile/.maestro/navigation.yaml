appId: dev.pushci.mobile
name: Tab Navigation
---
- launchApp:
    clearState: true
# Inject test token to skip OAuth
- evalScript: |
    ${output.token = 'e2e-test-token'}
- runScript: |
    // Inject via localStorage since we use the secureStore wrapper
    const token = "${output.token}";
    // This runs in the app's webview context if web-based
- assertVisible: "Runs"
- assertVisible: "Projects"
- assertVisible: "Skills"
- assertVisible: "Billing"
- assertVisible: "Settings"
- takeScreenshot: tabs-visible

# Tap each tab
- tapOn: "Projects"
- takeScreenshot: projects-tab
- tapOn: "Skills"
- takeScreenshot: skills-tab
- tapOn: "Billing"
- takeScreenshot: billing-tab
- tapOn: "Settings"
- takeScreenshot: settings-tab
- tapOn: "Runs"
- takeScreenshot: runs-tab
