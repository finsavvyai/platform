on:
  - push
  - pull_request

stages:
  - name: install
    checks:
      - name: npm-install
        run: pnpm install --frozen-lockfile

  - name: build
    checks:
      - name: build
        run: pnpm run build
    depends_on:
      - install

  - name: test
    checks:
      - name: test
        run: pnpm test
    depends_on:
      - install
    parallel: true

  - name: lint
    checks:
      - name: lint
        run: pnpm run lint
    depends_on:
      - install
    parallel: true

  - name: typecheck
    checks:
      - name: api-typecheck
        run: npx tsc --noEmit -p apps/api/tsconfig.json
      - name: line-limit
        run: bash scripts/check-max-lines.sh
    depends_on:
      - install
    parallel: true

deploy:
  - name: landing
    trigger: merge to main
    path: landing-page/deploy
    run: npx wrangler pages deploy landing-page/deploy --project-name=tenantiq-landing --branch=main --commit-dirty=true
    verify:
      url: https://tenantiq.app
      expect: 200
      retries: 6
      interval: 10s

  - name: api
    trigger: merge to main
    depends_on:
      - test
      - typecheck
    run: cd apps/api && npx wrangler deploy
    verify:
      url: https://api.tenantiq.app/health
      expect: "status.*healthy"
      retries: 12
      interval: 5s

  - name: web
    trigger: merge to main
    depends_on:
      - test
      - build
    run: npx wrangler pages deploy apps/web/.svelte-kit/cloudflare --project-name=tenantiq-web --branch=main --commit-dirty=true
    verify:
      url: https://app.tenantiq.app
      expect: 200
      retries: 6
      interval: 10s
