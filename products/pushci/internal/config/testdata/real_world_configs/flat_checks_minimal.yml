# Flat top-level checks form — what Default() and pre-1.4.1
# `pushci init` generated. The v1.4.3 dispatch bug silently
# ignored files like this because HasStages() returned false.
# Fixed in v1.4.4 by wrapping flat checks in an implicit stage.
on:
  - push

checks:
  - name: build
    run: go build ./...
  - name: test
    run: go test ./...
  - name: vet
    run: go vet ./...
