name: shared-build
on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
    outputs:
      artifact:
        description: Produced artifact name
        value: ${{ jobs.build.outputs.artifact }}
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact: ${{ steps.make.outputs.artifact }}
    steps:
      - id: make
        shell: bash
        run: |
          echo "Remote reusable built: ${{ inputs.project }}"
          echo "artifact=${{ inputs.project }}-1.0" >> "$GITHUB_OUTPUT"
