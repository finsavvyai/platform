name: Composite Action
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run local composite action
        id: greet
        uses: ./.github/actions/greet
        with:
          name: PushCI
      - name: Use composite output
        run: |
          echo "Greeting: ${{ steps.greet.outputs.message }}"
          test "${{ steps.greet.outputs.message }}" = "Hello, PushCI!"
