name: Matrix Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Print matrix slot
        run: |
          echo "Node: $(node --version)"
          echo "Matrix value: ${{ matrix.node }}"
