name: reusable-remote-caller
on: push
jobs:
  # Uses a remote reusable workflow. In tests we remap this ref to a
  # local directory via RunOptions.LocalRepositories so no network or
  # GitHub token is required.
  call-remote:
    uses: acme-enterprise/shared-workflows/.github/workflows/build.yml@v1
    with:
      project: "pushci"
    secrets: inherit
