name: Secrets Injection
on: [push]
jobs:
  use-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Read secret
        env:
          MY_TOKEN: ${{ secrets.MY_TOKEN }}
        run: |
          # The secret must be present and non-empty.
          test -n "$MY_TOKEN"
          # Length check (avoid printing the value).
          echo "Token length: ${#MY_TOKEN}"
