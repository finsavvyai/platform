name: Checkout and Node
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify node version
        run: |
          node --version | grep '^v20\.'
          npm --version
