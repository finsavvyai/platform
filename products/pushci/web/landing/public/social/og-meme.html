<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #0d0d0d;
    font-family: 'SF Pro Display', system-ui, sans-serif;
    overflow: hidden;
  }
  .split {
    display: flex;
    height: 100%;
  }
  .left, .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
  }
  .left {
    background: linear-gradient(180deg, #1a0a0a 0%, #0d0d0d 100%);
    border-right: 1px solid #2a2a2a;
  }
  .right {
    background: linear-gradient(180deg, #0a1a10 0%, #0d0d0d 100%);
  }
  .emoji { font-size: 80px; margin-bottom: 20px; }
  .label {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .left .label { color: #ef4444; }
  .right .label { color: #10b981; }
  .title {
    font-size: 28px;
    font-weight: 700;
    color: #f0f0f0;
    text-align: center;
    line-height: 1.3;
  }
  .detail {
    margin-top: 16px;
    font-size: 16px;
    color: #666;
    text-align: center;
    line-height: 1.5;
  }
  .price {
    margin-top: 24px;
    font-size: 48px;
    font-weight: 800;
  }
  .left .price { color: #ef4444; }
  .right .price { color: #10b981; }
  .price-note {
    font-size: 14px;
    color: #666;
    margin-top: 4px;
  }
  .vs {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 60px; height: 60px;
    background: #0d0d0d;
    border: 2px solid #2a2a2a;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 800;
    color: #666;
    z-index: 10;
  }
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50px;
    background: #141414;
    border-top: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    font-size: 14px;
    color: #666;
  }
  .bottom-bar .brand {
    font-weight: 800;
    font-size: 16px;
    color: #f0f0f0;
  }
  .bottom-bar .brand span { color: #10b981; }
</style>
</head>
<body>
  <div class="split">
    <div class="left">
      <div class="emoji">😤</div>
      <div class="label">GitHub Actions</div>
      <div class="title">50 lines of YAML<br>to run npm test</div>
      <div class="detail">VM spin-up: 45 seconds<br>Config time: 3 minutes</div>
      <div class="price">$14/mo</div>
      <div class="price-note">100 runs × $0.008/min</div>
    </div>
    <div class="vs">VS</div>
    <div class="right">
      <div class="emoji">😎</div>
      <div class="label">PushCI</div>
      <div class="title">Zero config<br>Zero YAML</div>
      <div class="detail">Runs locally: instant<br>Setup: 12 seconds</div>
      <div class="price">$0</div>
      <div class="price-note">forever</div>
    </div>
  </div>
  <div class="bottom-bar">
    <span class="brand">push<span>ci</span>.dev</span>
    <span>19 languages</span>
    <span>24 skills</span>
    <span>AI-powered</span>
  </div>
</body>
</html>
