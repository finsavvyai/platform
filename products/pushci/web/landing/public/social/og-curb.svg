<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="85%" cy="15%" r="40%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0d0d"/>
  <rect x="40" y="40" width="1120" height="550" rx="24" fill="#141414" stroke="#2a2a2a"/>
  <rect x="40" y="40" width="1120" height="550" rx="24" fill="url(#glow)"/>

  <!-- Badge -->
  <rect x="80" y="80" width="140" height="32" rx="16" fill="#10b98118" stroke="#10b98133"/>
  <text x="150" y="101" fill="#10b981" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle">$0/month forever</text>

  <!-- Quote -->
  <text x="80" y="170" fill="#f0f0f0" font-family="system-ui" font-size="38" font-weight="700">
    <tspan>So you're telling me I've been</tspan>
  </text>
  <text x="80" y="218" fill="#f0f0f0" font-family="system-ui" font-size="38" font-weight="700">
    <tspan fill="#10b981">paying</tspan><tspan>... to run </tspan><tspan fill="#10b981">npm test</tspan><tspan>...</tspan>
  </text>
  <text x="80" y="266" fill="#f0f0f0" font-family="system-ui" font-size="38" font-weight="700">
    on a <tspan fill="#10b981">computer in Virginia</tspan>?
  </text>

  <!-- Subtitle -->
  <text x="80" y="320" fill="#666" font-family="system-ui" font-size="18" font-style="italic">
    Pretty, pretty, pretty... expensive.
  </text>

  <!-- Terminal command -->
  <rect x="80" y="370" width="260" height="42" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
  <text x="100" y="397" fill="#666" font-family="monospace" font-size="15">$ </text>
  <text x="116" y="397" fill="#10b981" font-family="monospace" font-size="15">npx pushci init</text>

  <!-- Brand -->
  <text x="80" y="520" fill="#f0f0f0" font-family="system-ui" font-size="32" font-weight="800">push</text>
  <text x="186" y="520" fill="#10b981" font-family="system-ui" font-size="32" font-weight="800">ci</text>

  <!-- Stats -->
  <text x="1120" y="500" fill="#666" font-family="system-ui" font-size="14" text-anchor="end">
    <tspan fill="#a0a0a0" font-weight="600">19</tspan> languages  ·  <tspan fill="#a0a0a0" font-weight="600">69</tspan> skills  ·  <tspan fill="#10b981" font-weight="600">$0</tspan> cloud cost
  </text>
  <text x="1120" y="525" fill="#333" font-family="system-ui" font-size="12" text-anchor="end" font-style="italic">
    * Curb Your CI Costs
  </text>

  <!-- Decorative corner -->
  <circle cx="1050" cy="130" r="80" fill="none" stroke="#10b98110" stroke-width="1"/>
  <circle cx="1050" cy="130" r="50" fill="none" stroke="#10b98108" stroke-width="1"/>
</svg>
