<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #0d0d0d;
    font-family: 'SF Pro Display', system-ui, sans-serif;
    overflow: hidden;
  }
  .scene {
    width: 100%; height: 100%;
    display: flex;
    position: relative;
  }
  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    position: relative;
  }
  .panel:first-child { border-right: 3px solid #333; }
  .panel-label {
    position: absolute;
    top: 20px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #666;
  }
  /* Comic-style character using CSS */
  .character {
    width: 120px; height: 120px;
    border-radius: 50%;
    position: relative;
    margin-bottom: 20px;
  }
  .char-stressed {
    background: #fbbf24;
    box-shadow: 0 0 0 4px #333, 0 0 30px rgba(251,191,36,0.2);
  }
  .char-stressed::before {
    content: 'X  X';
    position: absolute;
    top: 35px; left: 50%;
    transform: translateX(-50%);
    font-size: 24px;
    letter-spacing: 8px;
    color: #333;
    font-weight: 900;
  }
  .char-stressed::after {
    content: '~';
    position: absolute;
    top: 70px; left: 50%;
    transform: translateX(-50%);
    font-size: 32px;
    color: #333;
  }
  .char-happy {
    background: #10b981;
    box-shadow: 0 0 0 4px #333, 0 0 30px rgba(16,185,129,0.3);
  }
  .char-happy::before {
    content: '^  ^';
    position: absolute;
    top: 35px; left: 50%;
    transform: translateX(-50%);
    font-size: 24px;
    letter-spacing: 8px;
    color: #fff;
    font-weight: 900;
  }
  .char-happy::after {
    content: 'v';
    position: absolute;
    top: 68px; left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    color: #fff;
  }
  .speech {
    background: #1a1a1a;
    border: 2px solid #333;
    border-radius: 16px;
    padding: 16px 24px;
    max-width: 280px;
    position: relative;
    margin-top: 10px;
  }
  .speech::before {
    content: '';
    position: absolute;
    top: -10px; left: 50%;
    transform: translateX(-50%);
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 10px solid #333;
  }
  .speech p {
    font-size: 16px;
    color: #f0f0f0;
    text-align: center;
    line-height: 1.4;
  }
  .speech .highlight { color: #10b981; font-weight: 700; }
  .speech .red { color: #ef4444; font-weight: 700; }
  /* Sweat drops for stressed character */
  .sweat {
    position: absolute;
    top: 15px; right: 25px;
    font-size: 20px;
  }
  /* Stars for happy character */
  .stars {
    position: absolute;
    top: 10px;
    font-size: 18px;
    color: #10b981;
  }
  .stars.l { left: 30px; }
  .stars.r { right: 30px; }
  /* Bottom */
  .bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(90deg, #141414, #0d0d0d, #141414);
    border-top: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .bottom .brand {
    font-size: 22px;
    font-weight: 800;
    color: #f0f0f0;
  }
  .bottom .brand span { color: #10b981; }
  .bottom .tag {
    font-size: 14px;
    color: #666;
    font-style: italic;
  }
  /* Comic title */
  .comic-title {
    position: absolute;
    top: 15px; left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    font-weight: 800;
    color: #fbbf24;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 5;
    background: #0d0d0d;
    padding: 4px 20px;
    border: 2px solid #333;
    border-radius: 8px;
  }
</style>
</head>
<body>
  <div class="scene">
    <div class="comic-title">Curb Your CI Bill</div>

    <!-- Panel 1: Stressed dev with GitHub Actions -->
    <div class="panel">
      <div class="panel-label">Before</div>
      <div class="character char-stressed">
        <div class="sweat">💧</div>
      </div>
      <div class="speech">
        <p>I just spent <span class="red">$47</span> this month to run <span class="red">npm test</span> on someone else's computer</p>
      </div>
    </div>

    <!-- Panel 2: Happy dev with PushCI -->
    <div class="panel">
      <div class="panel-label">After</div>
      <div class="stars l">✨</div>
      <div class="stars r">✨</div>
      <div class="character char-happy"></div>
      <div class="speech">
        <p>I run <span class="highlight">pushci init</span> and it just... works. For <span class="highlight">$0</span>. On my machine.</p>
      </div>
    </div>
  </div>

  <div class="bottom">
    <span class="brand">push<span>ci</span>.dev</span>
    <span class="tag">"Pretty, pretty, pretty... free."</span>
  </div>
</body>
</html>
