<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #0d0d0d;
    font-family: 'SF Pro Display', system-ui, sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    width: 1120px; height: 550px;
    background: linear-gradient(135deg, #141414 0%, #0d0d0d 50%, #141414 100%);
    border: 1px solid #2a2a2a;
    border-radius: 24px;
    padding: 60px 70px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .badge {
    display: inline-block;
    background: rgba(16,185,129,0.1);
    color: #10b981;
    font-size: 14px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid rgba(16,185,129,0.2);
    letter-spacing: 0.5px;
  }
  .quote {
    margin-top: 30px;
    font-size: 42px;
    font-weight: 700;
    color: #f0f0f0;
    line-height: 1.2;
    max-width: 800px;
  }
  .quote em {
    color: #10b981;
    font-style: normal;
  }
  .subtitle {
    margin-top: 20px;
    font-size: 20px;
    color: #666;
    line-height: 1.5;
  }
  .bottom {
    position: absolute;
    bottom: 50px;
    left: 70px;
    right: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    font-size: 28px;
    font-weight: 800;
    color: #f0f0f0;
  }
  .brand span { color: #10b981; }
  .stats {
    display: flex;
    gap: 30px;
    font-size: 15px;
    color: #666;
  }
  .stats strong { color: #a0a0a0; }
  .cmd {
    display: inline-block;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'SF Mono', monospace;
    font-size: 16px;
    color: #10b981;
  }
  .curb-tag {
    position: absolute;
    top: 50px;
    right: 70px;
    font-size: 13px;
    color: #333;
    font-style: italic;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="curb-tag">* Curb Your CI Costs</div>
    <div class="badge">$0/month forever</div>
    <div class="quote">
      So you're telling me I've been <em>paying</em>... to run <em>npm test</em>... on a <em>computer in Virginia</em>?
    </div>
    <div class="subtitle">
      Pretty, pretty, pretty... expensive. — pushci.dev
    </div>
    <div class="bottom">
      <div>
        <div class="brand">push<span>ci</span></div>
        <div class="cmd">npx pushci init</div>
      </div>
      <div class="stats">
        <span><strong>19</strong> languages</span>
        <span><strong>69</strong> skills</span>
        <span><strong>$0</strong> cloud cost</span>
      </div>
    </div>
  </div>
</body>
</html>
