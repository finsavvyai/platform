<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>PushCI Dashboard</title>
  </head>
  <body class="bg-surface text-zinc-100 antialiased">
    <script>
      // Mobile OAuth bounce — runs before React mounts so the native WebBrowser
      // session closes immediately and never loads the full dashboard inside
      // the OAuth modal. Matches state generated by mobile/src/hooks/useAuth.ts.
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          var state = params.get('state') || '';
          var code = params.get('code');
          if (state.indexOf('mobile:') === 0 && code) {
            window.stop && window.stop();
            window.location.replace(
              'pushci://auth/callback?code=' + encodeURIComponent(code) +
              '&state=' + encodeURIComponent(state)
            );
          }
        } catch (e) { /* noop */ }
      })();
    </script>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('pushci-theme') || 'midnight')</script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
