<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>sdlc.cc — popup</title>
<style>
  body { width: 320px; margin: 0; padding: 14px; background: #0e0e10; color: #ececef; font: 13px/1.5 ui-sans-serif, system-ui, sans-serif; }
  h1 { margin: 0 0 10px; font-size: 14px; }
  h1 .domain { color: #6ea8ff; }
  label { display: block; margin: 10px 0 4px; font-size: 11px; color: #8b8b94; text-transform: uppercase; letter-spacing: 0.05em; }
  input { width: 100%; padding: 7px 9px; box-sizing: border-box; background: #17171b; border: 1px solid #2a2a31; border-radius: 6px; color: #ececef; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  input:focus { outline: 2px solid #6ea8ff; }
  button { background: #6ea8ff; color: #000; border: 0; padding: 8px 14px; border-radius: 6px; font-weight: 600; font-size: 12px; cursor: pointer; margin-top: 12px; }
  button.secondary { background: transparent; color: #ececef; border: 1px solid #2a2a31; }
  .row { display: flex; gap: 6px; }
  .status { font-size: 11px; color: #8b8b94; margin-top: 8px; min-height: 14px; }
  .status.ok { color: #4ade80; }
  .status.err { color: #f87171; }
  .hint { font-size: 11px; color: #8b8b94; margin-top: 8px; }
  .hint a { color: #6ea8ff; text-decoration: none; }
</style>
</head>
<body>
<h1><span class="domain">sdlc.cc</span> — privacy scrub</h1>

<label>Endpoint</label>
<input id="endpoint" type="url" placeholder="https://api.sdlc.cc" />

<label>API key (sk_sdlc_*)</label>
<input id="apiKey" type="password" placeholder="sk_sdlc_..." autocomplete="off" />

<div class="row">
  <button id="save">Save</button>
  <button id="test" class="secondary">Test</button>
</div>
<div id="status" class="status"></div>

<div class="hint">
  Keys are stored via chrome.storage.sync — visible to you only.
  Don't have a key? Run <code>keytool issue --tenant tnt_personal --label browser-ext</code> against your gateway.
</div>

<script src="popup.js"></script>
</body>
</html>
