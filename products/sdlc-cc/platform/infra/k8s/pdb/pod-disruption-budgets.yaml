apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sdlc-gateway-pdb
  namespace: sdlc-platform
  labels:
    app: sdlc-platform
    component: gateway
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: sdlc-platform
      component: gateway
