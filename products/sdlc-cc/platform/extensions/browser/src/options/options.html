<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Privacy Gateway — Options</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      }
      body { margin: 0; padding: 32px; max-width: 560px; }
      h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
      p.lead { color: #666; margin: 0 0 24px; font-size: 13px; }
      label { display: block; margin: 16px 0 6px; font-size: 13px; font-weight: 500; }
      input[type="text"], input[type="url"], input[type="password"], select {
        width: 100%; padding: 8px 10px; border-radius: 8px;
        border: 1px solid #d0d0d0; font: inherit; box-sizing: border-box;
      }
      .row { display: flex; align-items: center; gap: 8px; margin: 16px 0; }
      .actions { margin-top: 24px; display: flex; gap: 8px; }
      button { padding: 8px 14px; border-radius: 8px; border: 0; background: #0a84ff; color: white; font: inherit; cursor: pointer; }
      button.secondary { background: #e5e5ea; color: #1c1c1e; }
      .status { margin-top: 12px; font-size: 12px; color: #008000; min-height: 16px; }
      .status.error { color: #c00; }
      fieldset { border: 1px solid #d0d0d0; border-radius: 8px; padding: 8px 12px; }
      legend { font-size: 12px; color: #666; padding: 0 4px; }
      .preset { display: inline-flex; align-items: center; gap: 4px; margin-right: 12px; font-size: 13px; }
    </style>
  </head>
  <body>
    <h1>Privacy Gateway</h1>
    <p class="lead">Scrub PII and secrets before they reach ChatGPT, Claude, Gemini, or Copilot.</p>

    <form id="form">
      <label for="gatewayUrl">Gateway URL</label>
      <input id="gatewayUrl" type="url" placeholder="http://localhost:8080" required />

      <label for="apiKey">API Key</label>
      <input id="apiKey" type="password" placeholder="Bearer token (optional for self-host)" />

      <label for="tenant">Tenant ID</label>
      <input id="tenant" type="text" placeholder="(optional)" />

      <label for="mode">Mode</label>
      <select id="mode">
        <option value="preview">Preview &amp; confirm before sending</option>
        <option value="auto">Auto-redact silently</option>
      </select>

      <fieldset style="margin-top:16px;">
        <legend>DLP presets</legend>
        <div id="presets">
          <label class="preset"><input type="checkbox" value="pii_default" /> pii_default</label>
          <label class="preset"><input type="checkbox" value="secrets" /> secrets</label>
          <label class="preset"><input type="checkbox" value="legal" /> legal</label>
          <label class="preset"><input type="checkbox" value="finance" /> finance</label>
          <label class="preset"><input type="checkbox" value="healthcare" /> healthcare</label>
        </div>
      </fieldset>

      <div class="row">
        <input id="enabled" type="checkbox" />
        <label for="enabled" style="margin:0;">Extension enabled</label>
      </div>

      <div class="actions">
        <button id="save" type="submit">Save</button>
        <button id="test" type="button" class="secondary">Test connection</button>
      </div>
      <div id="status" class="status"></div>
    </form>

    <script type="module" src="./options.ts"></script>
  </body>
</html>
