# Minimal K8s deployment — for production use the Helm chart in deployments/helm.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdlc-gateway
  labels:
    app: sdlc-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sdlc-gateway
  template:
    metadata:
      labels:
        app: sdlc-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/finsavvyai/sdlc-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: sdlc-gateway
spec:
  selector:
    app: sdlc-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
