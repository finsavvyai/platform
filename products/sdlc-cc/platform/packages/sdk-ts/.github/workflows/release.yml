# GitHub Actions workflow for releasing the SDK

name: Release SDK

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (do not publish)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20'
  REGISTRY: 'https://registry.npmjs.org'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: ${{ env.REGISTRY }}

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run tests
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: sdk

  build:
    name: Build SDK
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          echo "Checking bundle sizes..."
          npx bundlesize

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/

  test-installation:
    name: Test Installation
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [16, 18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist/

      - name: Pack SDK
        run: npm pack

      - name: Create test project
        run: |
          mkdir test-project
          cd test-project
          npm init -y
          npm install ../sdlc-sdln-js-*.tgz

      - name: Test import
        run: |
          cd test-project
          node -e "
          const { createClient } = require('@sdlc/sdln-js');
          console.log('✓ CommonJS import successful');
          const client = createClient({ baseURL: 'https://api.test.com' });
          console.log('✓ Client created successfully');
          "

      - name: Test ES modules
        run: |
          cd test-project
          echo '{"type": "module"}' > package.json
          node --input-type=module -e "
          import { createClient } from '@sdlc/sdln-js';
          console.log('✓ ES module import successful');
          const client = createClient({ baseURL: 'https://api.test.com' });
          console.log('✓ Client created successfully');
          "

  publish-docs:
    name: Publish Documentation
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist/

      - name: Build documentation
        run: npm run docs:build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist

  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [test, build, test-installation]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.REGISTRY }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist/

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION"

      - name: Update package.json version
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Dry run (if requested)
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "Dry run - not publishing"
          npm pack --dry-run

      - name: Publish to NPM
        if: github.event.inputs.dry_run != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          body: |
            ## Changes in ${{ steps.version.outputs.version }}

            See the [changelog](https://sdlc.cc/sdk-js/changelog) for detailed changes.

            ### Installation

            ```bash
            npm install @sdlc/sdln-js@${{ steps.version.outputs.version }}
            ```

            ### Quick Start

            ```typescript
            import { createClient } from '@sdlc/sdln-js';

            const client = createClient({
              baseURL: 'https://api.sdlc.cc',
              apiKey: 'your-api-key'
            });

            await client.auth.login({
              email: 'user@example.com',
              password: 'password'
            });
            ```
