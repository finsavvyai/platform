[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "insights-core"
version = "0.0.1"
description = "Shared signal publisher + types for Compliance Insights"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
nats = ["nats-py>=2.6"]
dev = ["pytest>=8", "pytest-asyncio>=0.23"]

[tool.setuptools.packages.find]
where = ["."]
include = ["insights_core*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
