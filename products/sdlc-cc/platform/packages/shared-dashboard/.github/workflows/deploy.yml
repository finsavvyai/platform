name: Deploy Unified Dashboard

on:
  push:
    branches:
      - main
      - production
    paths:
      - 'packages/shared-dashboard/**'
  pull_request:
    branches:
      - main
      - production
    paths:
      - 'packages/shared-dashboard/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - staging
          - production

env:
  NODE_VERSION: '18'
  WORKING_DIR: 'packages/shared-dashboard'

jobs:
  # Job 1: Code Quality Checks
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: Type check
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run type-check

      - name: Lint check
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run lint:check

      - name: Run tests
        working-directory: ${{ env.WORKING_DIR }}
        run: npm test

      - name: Build
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ${{ env.WORKING_DIR }}/dist
          retention-days: 7

  # Job 2: Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: Run npm audit
        working-directory: ${{ env.WORKING_DIR }}
        run: npm audit --production
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # Job 3: Deploy to Development
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [quality, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: development
      url: https://unified-dashboard-api-dev.workers.dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: Deploy to Cloudflare Workers
        working-directory: ${{ env.WORKING_DIR }}
        run: npx wrangler deploy --env=development
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run smoke tests
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          sleep 10
          npm run test:smoke -- https://unified-dashboard-api-dev.workers.dev
        continue-on-error: true

  # Job 4: Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [quality, security]
    if: github.ref == 'refs/heads/production' && github.event_name == 'push'
    environment:
      name: staging
      url: https://unified-dashboard-api-staging.workers.dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: Deploy to Cloudflare Workers
        working-directory: ${{ env.WORKING_DIR }}
        run: npx wrangler deploy --env=staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run integration tests
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          sleep 10
          ./scripts/test-api.sh https://unified-dashboard-api-staging.workers.dev

  # Job 5: Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/production' && github.event_name == 'push'
    environment:
      name: production
      url: https://dashboard.finsavvyai.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: Deploy to Cloudflare Workers
        working-directory: ${{ env.WORKING_DIR }}
        run: npx wrangler deploy --env=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Wait for deployment
        run: sleep 15

      - name: Health check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://dashboard.finsavvyai.com/health)
          if [ "$response" != "200" ]; then
            echo "Health check failed with status code: $response"
            exit 1
          fi
          echo "Health check passed!"

      - name: Run production tests
        working-directory: ${{ env.WORKING_DIR }}
        run: ./scripts/test-api.sh https://dashboard.finsavvyai.com
        continue-on-error: true

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment successful!"
          echo "Dashboard: https://dashboard.finsavvyai.com"
          echo "API: https://api.dashboard.finsavvyai.com"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Production deployment failed!"
          echo "Check logs for details"
          exit 1

  # Job 6: Rollback (Manual Trigger)
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Rollback deployment
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # List recent deployments
          npx wrangler deployments list --env=${{ github.event.inputs.environment }}

          # Note: Manual rollback requires deployment ID
          echo "⚠️ Manual rollback requires deployment ID"
          echo "Run: wrangler rollback <DEPLOYMENT_ID> --env=${{ github.event.inputs.environment }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
