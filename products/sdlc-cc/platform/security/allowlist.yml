# Security finding allowlist
#
# Every entry MUST include:
#   - cve: the CVE id (or vendor advisory id) being suppressed
#   - tool: which scanner produced the finding (gosec | npm-audit | pip-audit | cargo-audit | trivy)
#   - service: which service the suppression applies to
#   - reason: a sentence explaining why the finding is acceptable
#   - expires: ISO date — entry MUST be re-evaluated on or before this date.
#                       Past-expiry entries fail CI (handled by check-allowlist.sh).
#
# Adding an entry without an expiry is a CI failure.
# Lowering severity or skipping a tool to avoid an entry is forbidden by
# CLAUDE.md.

allowlist: []

# Example (commented):
# allowlist:
#   - cve: GHSA-xxxx-yyyy-zzzz
#     tool: npm-audit
#     service: admin-ui
#     reason: |
#       Transitive dep used only at build time, not in runtime bundle.
#       Upstream fix tracked in https://github.com/example/example/pull/123.
#     expires: 2026-07-01
