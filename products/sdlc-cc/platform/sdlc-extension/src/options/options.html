<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SDLC Guard — Settings</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font: 14px/1.5 -apple-system, system-ui, sans-serif;
        margin: 0; padding: 24px; max-width: 480px;
      }
      h1 { font-size: 18px; margin: 0 0 16px; }
      label { display: block; margin: 12px 0 4px; font-weight: 500; }
      input, select { width: 100%; padding: 8px; box-sizing: border-box; }
      button {
        margin-top: 16px; padding: 8px 14px; border: 0;
        border-radius: 6px; background: #0f172a; color: #fff; cursor: pointer;
      }
      .hint { color: #6b7280; font-size: 12px; margin-top: 4px; }
      .saved { color: #15803d; font-size: 12px; margin-top: 8px; min-height: 1em; }
    </style>
  </head>
  <body>
    <h1>SDLC Guard — Settings</h1>
    <label for="apiKey">SDLC API key</label>
    <input id="apiKey" type="password" placeholder="sk-..." />
    <div class="hint">Get one from <a href="https://sdlc.cc/dashboard" target="_blank">sdlc.cc/dashboard</a>. Audit events are tied to this key.</div>

    <label for="endpoint">Audit endpoint</label>
    <input id="endpoint" type="url" placeholder="https://api.sdlc.cc" />
    <div class="hint">Override only for self-hosted enterprise installs.</div>

    <label for="policy">Policy</label>
    <select id="policy">
      <option value="strict">Strict — redact + warn</option>
      <option value="balanced">Balanced — redact silently (default)</option>
      <option value="permissive">Permissive — audit only, no redaction</option>
    </select>

    <button id="save">Save</button>
    <div class="saved" id="saved"></div>
    <script src="options.js" type="module"></script>
  </body>
</html>
