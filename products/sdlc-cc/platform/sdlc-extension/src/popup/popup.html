<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SDLC Guard</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font: 14px/1.5 -apple-system, system-ui, sans-serif;
        margin: 0; padding: 16px; min-width: 260px;
      }
      h1 { font-size: 14px; margin: 0 0 12px; }
      .row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
      .stat { font-weight: 600; font-size: 18px; }
      a.btn {
        display: block; text-align: center; margin-top: 12px;
        padding: 8px 12px; border-radius: 6px; background: #0f172a; color: #fff;
        text-decoration: none;
      }
      .switch { display: inline-flex; align-items: center; gap: 6px; }
    </style>
  </head>
  <body>
    <h1>SDLC Guard</h1>
    <div class="row">
      <span>Status</span>
      <label class="switch">
        <input type="checkbox" id="enabled" />
        <span id="enabled-label">on</span>
      </label>
    </div>
    <div class="row">
      <span>Blocked today</span>
      <span class="stat" id="blocks">0</span>
    </div>
    <a class="btn" href="https://sdlc.cc/dashboard" target="_blank">Open dashboard</a>
    <script src="popup.js" type="module"></script>
  </body>
</html>
