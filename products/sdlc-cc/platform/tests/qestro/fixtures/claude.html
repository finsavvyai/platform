<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>claude.ai (fixture)</title>
    <style>
      body { font: 14px system-ui; padding: 24px; max-width: 640px; }
      .ProseMirror { display: block; min-height: 80px; padding: 10px; border: 1px solid #ccc; }
      button { margin-top: 8px; padding: 8px 14px; }
      pre { background: #f5f5f7; padding: 12px; }
    </style>
  </head>
  <body>
    <h1>Claude fixture</h1>
    <div class="ProseMirror" contenteditable="true"></div>
    <button aria-label="Send Message">Send</button>
    <pre id="sent"></pre>
    <script>
      const ed = document.querySelector(".ProseMirror");
      const btn = document.querySelector("[aria-label='Send Message']");
      const out = document.getElementById("sent");
      btn.addEventListener("click", () => {
        out.textContent = ed.textContent || "";
      });
    </script>
  </body>
</html>
