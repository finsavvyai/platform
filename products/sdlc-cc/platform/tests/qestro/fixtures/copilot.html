<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>copilot.microsoft.com (fixture)</title>
    <style>
      body { font: 14px system-ui; padding: 24px; max-width: 640px; }
      #userInput { display: block; width: 100%; min-height: 80px; padding: 10px; }
      button { margin-top: 8px; padding: 8px 14px; }
      pre { background: #f5f5f7; padding: 12px; }
    </style>
  </head>
  <body>
    <h1>Copilot fixture</h1>
    <textarea id="userInput"></textarea>
    <button data-testid="submit-button" type="submit">Send</button>
    <pre id="sent"></pre>
    <script>
      const ed = document.getElementById("userInput");
      const btn = document.querySelector("[data-testid='submit-button']");
      const out = document.getElementById("sent");
      btn.addEventListener("click", () => {
        out.textContent = ed.value || "";
      });
    </script>
  </body>
</html>
