<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>gemini.google.com (fixture)</title>
    <style>
      body { font: 14px system-ui; padding: 24px; max-width: 640px; }
      rich-textarea div[contenteditable="true"] {
        display: block; min-height: 80px; padding: 10px; border: 1px solid #ccc;
      }
      button { margin-top: 8px; padding: 8px 14px; }
      pre { background: #f5f5f7; padding: 12px; }
    </style>
  </head>
  <body>
    <h1>Gemini fixture</h1>
    <rich-textarea>
      <div contenteditable="true" class="ql-editor"></div>
    </rich-textarea>
    <button aria-label="Send message" class="send-button">Send</button>
    <pre id="sent"></pre>
    <script>
      const ed = document.querySelector("rich-textarea div[contenteditable='true']");
      const btn = document.querySelector(".send-button");
      const out = document.getElementById("sent");
      btn.addEventListener("click", () => {
        out.textContent = ed.textContent || "";
      });
    </script>
  </body>
</html>
