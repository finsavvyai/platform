<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>chat.openai.com (fixture)</title>
    <style>
      body { font: 14px system-ui; padding: 24px; max-width: 640px; }
      #prompt-textarea { display: block; width: 100%; min-height: 80px; padding: 10px; }
      button { margin-top: 8px; padding: 8px 14px; }
      pre { background: #f5f5f7; padding: 12px; }
    </style>
  </head>
  <body>
    <h1>ChatGPT fixture</h1>
    <p>Mimics the selectors our content script targets on chat.openai.com.</p>
    <div
      id="prompt-textarea"
      contenteditable="true"
      role="textbox"
    ></div>
    <button data-testid="send-button" aria-label="Send prompt">Send</button>
    <pre id="sent"></pre>
    <script>
      const ed = document.getElementById("prompt-textarea");
      const btn = document.querySelector("[data-testid='send-button']");
      const out = document.getElementById("sent");
      btn.addEventListener("click", () => {
        out.textContent = ed.textContent || "";
      });
    </script>
  </body>
</html>
