version: "3.9"

# Local observability stack for sdlc-platform.
# Bring up with:  docker compose -f deployments/docker-compose.observability.yml up -d
# Reach Prometheus at http://localhost:9090, Grafana at http://localhost:3001
# (admin / admin), Alertmanager at http://localhost:9093.

networks:
  observability:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: sdlc-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks: [observability]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: sdlc-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks: [observability]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: sdlc-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on: [prometheus]
    networks: [observability]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: sdlc-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks: [observability]
