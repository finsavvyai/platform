version: "3.9"

# Qdrant tier-2 vector store for the SDLC RAG service.
#
# Usage:
#   docker-compose -f deployments/qdrant/docker-compose.yml up -d
#
# The RAG service connects via the QDRANT_URL env var. Enable dual-write
# with QDRANT_ENABLED=true. Shadow-read validation: QDRANT_SHADOW_READ=true.
# pgvector remains the source of truth; this container is a read-optimized
# secondary store.

services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: sdlc-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP / REST
      - "6334:6334"   # gRPC
    environment:
      QDRANT__SERVICE__HTTP_PORT: "6333"
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__LOG_LEVEL: "INFO"
      # Optional API key; must match QDRANT_API_KEY in the RAG service env.
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY:-}"
      QDRANT__STORAGE__STORAGE_PATH: "/qdrant/storage"
      QDRANT__STORAGE__SNAPSHOTS_PATH: "/qdrant/snapshots"
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6333/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sdlc-rag

volumes:
  qdrant_storage:
    driver: local
  qdrant_snapshots:
    driver: local

networks:
  sdlc-rag:
    driver: bridge
