global:
  resolve_timeout: 5m

route:
  group_by: [alertname, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

receivers:
  - name: default
    # Slack/email webhooks injected at deploy time via env-based config.
    # Local dev intentionally has no receiver wired so alerts are visible
    # in the Alertmanager UI without leaking to a real channel.
    webhook_configs: []
