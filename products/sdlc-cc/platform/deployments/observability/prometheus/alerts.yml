groups:
  - name: sdlc-platform-baseline
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.service }} is down"
          description: "{{ $labels.instance }} has been unreachable for >2m."

      - alert: HighErrorRate5xx
        expr: |
          sum by (service) (rate(http_requests_total{status=~"5.."}[5m]))
            / sum by (service) (rate(http_requests_total[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} 5xx error rate >5% for 10m"

      - alert: HighRequestLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum by (service, le) (rate(http_request_duration_seconds_bucket[5m]))) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} p95 latency >2s for 10m"
