default-group: local
api:
  specs:
    - openapi: ../services/gateway/api/openapi.yaml
groups:
  local:
    generators:
      - name: fernapi/fern-typescript-sdk
        version: 2.0.0
        output:
          location: local-file-system
          path: ../packages/sdk-ts
        config:
          namespaceExport: SdlcClient
          allowCustomFetcher: true
          includeUtilsForTypescriptSdk: true
          noSerdeLayer: false
        metadata:
          package-name: "@sdlc/sdk"
          repository-url: "https://github.com/sdlc/sdlc-platform"
      - name: fernapi/fern-python-sdk
        version: 4.0.0
        output:
          location: local-file-system
          path: ../packages/sdk-py
        config:
          client_class_name: SdlcClient
          pydantic_config:
            version: v2
            use_str_enums: true
        metadata:
          package-name: "sdlc-sdk"
          repository-url: "https://github.com/sdlc/sdlc-platform"
      - name: fernapi/fern-go-sdk
        version: 1.0.0
        output:
          location: local-file-system
          path: ../packages/sdk-go
        config:
          module:
            path: github.com/sdlc/sdlc-platform/packages/sdk-go
            version: "1.0.0"
          packageName: sdlc
        metadata:
          package-name: "sdlc-go"
          repository-url: "https://github.com/sdlc/sdlc-platform"
