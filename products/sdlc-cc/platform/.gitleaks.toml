# Gitleaks config: allowlist test fixtures and known placeholders.
# See https://github.com/gitleaks/gitleaks#configuration
title = "SDLC Platform"

[allowlist]
description = "Exclude test files and known placeholder values"
paths = [
  '''(.*?)(_test|\.test|\.spec)(\.(go|py|ts|tsx|js|jsx))?$''',
  '''(.*?)/tests?/''',
  '''(.*?)/__tests__/''',
  '''(.*?)/test/''',
  '''(.*?)\.test\.''',
  '''(.*?)\.spec\.''',
  '''node_modules/''',
  '''vendor/''',
]
regexes = [
  '''sk_test_[0-9a-f]+''',           # Stripe test key placeholder
  '''sk-1234567890abcdef''',         # Fake API key in tests
  '''eyJ[A-Za-z0-9_-]*\.test\.[A-Za-z0-9_-]*''',  # JWT test placeholder
]
