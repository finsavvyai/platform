version: "2"

run:
  timeout: 5m
  go: "1.25"

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    staticcheck:
      checks: ["all", "-SA1019"]
    govet:
      enable:
        - assign
        - atomic
        - copylocks
        - httpresponse
        - loopclosure
        - nilfunc
        - shift
        - unreachable
  exclusions:
    rules:
      - path: internal/sdk/
        linters: [staticcheck, govet, unused]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
