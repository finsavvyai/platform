# ServiceAccount for Gateway
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway
  namespace: sdlc-platform
  labels:
    app: gateway
    component: api-gateway
automountServiceAccountToken: false

---
# PodDisruptionBudget for Gateway
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-pdb
  namespace: sdlc-platform
  labels:
    app: gateway
    component: api-gateway
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: gateway
      component: api-gateway

---
# NetworkPolicy for Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-netpol
  namespace: sdlc-platform
  labels:
    app: gateway
    component: api-gateway
spec:
  podSelector:
    matchLabels:
      app: gateway
      component: api-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
  # Allow metrics scraping
  - from:
    - namespaceSelector:
        matchLabels:
          name: observability
    ports:
    - protocol: TCP
      port: 9090
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  # Allow PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow external API calls
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 80
  # Allow tracing export
  - to:
    - namespaceSelector:
        matchLabels:
          name: observability
    ports:
    - protocol: TCP
      port: 4318
