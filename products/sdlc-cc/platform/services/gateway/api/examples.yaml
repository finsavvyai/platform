# API Examples for SDLC.ai Platform
# This file contains comprehensive example requests and responses for all API endpoints

# Authentication Examples
auth:
  login:
    request:
      summary: "User login example"
      description: "Authenticate a user with email and password"
      value:
        email: "john.doe@company.com"
        password: "SecurePass123!"
        tenant_id: "123e4567-e89b-12d3-a456-426614174000"
        remember_me: true
    response:
      success:
        summary: "Successful login response"
        description: "Returns JWT tokens and user information"
        value:
          success: true
          data:
            access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
            refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
            token_type: "Bearer"
            expires_in: 3600
            user:
              id: "123e4567-e89b-12d3-a456-426614174001"
              email: "john.doe@company.com"
              first_name: "John"
              last_name: "Doe"
              role: "admin"
              tenant_id: "123e4567-e89b-12d3-a456-426614174000"
              is_active: true
              last_login: "2025-01-15T10:30:00Z"
              created_at: "2025-01-01T00:00:00Z"
      error_invalid_credentials:
        summary: "Invalid credentials error"
        description: "Returned when email or password is incorrect"
        value:
          success: false
          error:
            code: "INVALID_CREDENTIALS"
            message: "Invalid email or password"
            details:
              field: "password"
              message: "Password does not match our records"
          meta:
            request_id: "req_123456789"
            timestamp: "2025-01-15T10:30:00Z"
            version: "v1"
      error_mfa_required:
        summary: "MFA required"
        description: "Returned when multi-factor authentication is required"
        value:
          success: false
          error:
            code: "MFA_REQUIRED"
            message: "Multi-factor authentication is required"
            details:
              mfa_methods: ["totp", "sms"]
              masked_phone: "***-***-7890"
          meta:
            request_id: "req_123456789"
            timestamp: "2025-01-15T10:30:00Z"
            version: "v1"

  logout:
    request:
      headers:
        Authorization: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
    response:
      success:
        value:
          success: true
          data:
            message: "Successfully logged out"
          meta:
            request_id: "req_123456789"
            timestamp: "2025-01-15T10:30:00Z"
            version: "v1"

# Document Management Examples
documents:
  upload:
    request:
      summary: "Upload document example"
      description: "Upload a PDF document with metadata"
      multipart_form:
        file:
          type: "file"
          filename: "contract.pdf"
          content_type: "application/pdf"
        metadata:
          type: "object"
          value:
            title: "Service Agreement"
            description: "Master service agreement for Q1 2025"
            tags: ["legal", "contract", "2025"]
            classification: "confidential"
            retention_days: 2555
        processing_options:
          type: "object"
          value:
            extract_text: true
            generate_embeddings: true
            run_dlp_scan: true
            chunk_size: 1000
            chunk_overlap: 200
    response:
      success:
        value:
          success: true
          data:
            id: "doc_1234567890"
            filename: "contract.pdf"
            content_type: "application/pdf"
            file_size: 2048576
