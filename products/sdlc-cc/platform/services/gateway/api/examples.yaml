# RAG Query Examples
rag:
  query:
    request:
      summary: "RAG query example"
      description: "Query documents using natural language"
      headers:
        Authorization: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        X-API-Version: "v1"
      body:
        query: "What are the payment terms in the service agreement?"
        model: "gpt-4"
        max_context_length: 4000
        temperature: 0.1
        max_tokens: 1000
        include_sources: true
        filters:
          document_types: ["application/pdf"]
          tags: ["legal", "contract"]
          date_range:
            start: "2025-01-01"
            end: "2025-01-31"
          classification: ["confidential", "internal"]
        rerank: true
        rerank_method: "cross-encoder"
        top_k: 5
        citations: true
        streaming: false
    response:
      success:
        value:
          success: true
          data:
            id: "query_1234567890"
            query: "What are the payment terms in the service agreement?"
            answer: "Based on the service agreement document, the payment terms are as follows:\n\n1. **Payment Schedule**: Payments are due monthly, within 30 days of invoice date\n2. **Payment Methods**: Accepted payment methods include bank transfer, credit card, and ACH\n3. **Late Fees**: Late payments incur a 1.5% monthly interest charge\n4. **Early Payment Discount**: 2% discount for payments made within 10 days\n5. **Currency**: All payments are in USD unless otherwise specified\n\nThe agreement also specifies that all payments must be made to the designated bank account provided in Section 4.2 of the contract."
            sources:
              - document_id: "doc_1234567890"
                document_title: "Service Agreement"
                chunk_id: "chunk_15"
                content: "Section 4.1 Payment Terms. The Client shall pay the Service Provider monthly fees as outlined in Schedule A. Payments are due within 30 days of invoice date. Late payments shall incur interest at a rate of 1.5% per month..."
                score: 0.95
                page: 8
                created_at: "2025-01-15T10:30:00Z"
              - document_id: "doc_1234567890"
                document_title: "Service Agreement"
                chunk_id: "chunk_16"
                content: "Section 4.2 Payment Methods. The Service Provider accepts payments via bank transfer, credit card, and ACH. Early payments made within 10 days of invoice date shall receive a 2% discount..."
                score: 0.89
                page: 9
                created_at: "2025-01-15T10:30:00Z"
            model_used: "gpt-4"
            tokens_used:
              prompt: 1250
              completion: 320
              total: 1570
            cost:
              prompt: 0.00625
              completion: 0.0096
              total: 0.01585
            citations:
              - text: "Payments are due within 30 days of invoice date"
                source: {
                  "document_id": "doc_1234567890",
                  "page": 8,
                  "chunk_id": "chunk_15"
                }
              - text: "Early payments made within 10 days of invoice date shall receive a 2% discount"
                source: {
                  "document_id": "doc_1234567890",
                  "page": 9,
                  "chunk_id": "chunk_16"
                }
            created_at: "2025-01-15T10:32:00Z"
            duration_ms: 1250
          meta:
            request_id: "req_123456789"
            timestamp: "2025-01-15T10:30:00Z"
            version: "v1"

# Vector Search Examples
vector_search:
  semantic:
    request:
      summary: "Semantic search example"
      description: "Search for documents using semantic similarity"
      headers:
        Authorization: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      body:
        query: "quarterly business review metrics"
        search_type: "semantic"
        top_k: 10
        threshold: 0.7
        filters:
          document_types: ["application/pdf", "application/vnd.openxmlformats-officedocument.presentationml.presentation"]
          date_range:
            start: "2024-01-01"
            end: "2025-01-31"
        rerank: true
        include_metadata: true
    response:
      success:
        value:
          success: true
          data:
            query_id: "search_1234567890"
            results:
              - document_id: "doc_1234567891"
                document_title: "Q1 Business Review"
                chunk_id: "chunk_5"
                content: "Our Q1 2025 business review shows exceptional growth metrics with revenue increasing by 35% year-over-year..."
                score: 0.94
                metadata:
                  page: 3
                  section: "Revenue Metrics"
                  created_at: "2025-01-14T14:20:00Z"
              - document_id: "doc_1234567892"
                document_title: "Annual Report 2024"
                chunk_id: "chunk_12"
                content: "The quarterly business review process has been streamlined to provide real-time insights into key performance indicators..."
                score: 0.88
                metadata:
                  page: 15
                  section: "Business Processes"
                  created_at: "2025-01-10T09:15:00Z"
            search_type: "semantic"
            model_used: "text-embedding-ada-002"
            total_results: 2
            search_time_ms: 45
            created_at: "2025-01-15T10:30:00Z"
          meta:
            request_id: "req_123456789"
            timestamp: "2025-01-15T10:30:00Z"
            version: "v1"

  hybrid:
    request:
      summary: "Hybrid search example"
      description: "Search using both semantic and keyword matching"
      headers:
        Authorization: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      body:
        query: "service agreement payment terms"
        search_type: "hybrid"
        top_k: 5
        semantic_weight: 0.7
        keyword_weight: 0.3
        filters:
          tags: ["legal", "contract"]
          classification: ["confidential"]
    response:
      success:
        value:
          success: true
          data:
            query_id: "search_1234567891"
            results:
              - document_id: "doc_1234567890"
                document_title: "Service Agreement"
                chunk_id: "chunk_15"
                content: "Section 4.1 Payment Terms. The Client shall pay the Service Provider monthly fees..."
                score: 0.92
                match_scores:
                  semantic: 0.89
                  keyword: 0.95
                metadata:
                  page: 8
                  section: "Payment Terms"
              - document_id: "doc_1234567890"
                document_title: "Service Agreement"
                chunk_id: "chunk_16"
                content: "Section 4.2 Payment Methods. The Service Provider accepts payments via bank transfer..."
                score: 0.88
                match_scores:
                  semantic: 0.85
                  keyword: 0.92
                metadata:
                  page: 9
                  section: "Payment Methods"
            search_type: "hybrid"
            total_results: 2
