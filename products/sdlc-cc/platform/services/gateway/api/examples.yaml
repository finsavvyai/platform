# DLP Examples
dlp:
  scan:
    request:
      summary: "DLP scan example"
      description: "Scan content for sensitive data"
      headers:
        Authorization: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      body:
        content: "Please contact John Smith at john.smith@company.com or call 555-123-4567. His SSN is 123-45-6789 and credit card is 4111-1111-1111-1111."
        scan_types: ["pii", "phi", "financial", "custom"]
        policies:
          - name: "email_detection"
            enabled: true
            action: "redact"
          - name: "phone_detection"
            enabled: true
            action: "mask"
          - name: "ssn_detection"
            enabled: true
            action: "tokenize"
          - name: "credit_card_detection"
            enabled: true
            action: "redact"
        return_tokens: true
    response:
      success:
        value:
          success: true
          data:
            scan_id: "scan_1234567890"
            status: "completed"
            findings:
              - type: "email"
                start: 31
                end: 52
                value: "john.smith@company.com"
                redacted_value: "***@***.com"
                confidence: 0.99
                policy: "email_detection"
                action: "redact"
              - type: "phone"
                start: 61
                end: 73
                value: "555-123-4567"
                redacted_value: "***-***-4567"
                confidence: 0.98
                policy: "phone_detection"
                action: "mask"
              - type: "ssn"
                start: 89
                end: 99
                value: "123-45-6789"
                token: "tok_abc123def456"
                redacted_value: "[SSN:TOK:tok_abc123def456]"
                confidence: 0.99
                policy: "ssn_detection"
                action: "tokenize"
              - type: "credit_card"
                start: 123
                end: 141
                value: "4111-1111-1111-1111"
                redacted_value: "[REDACTED]"
                confidence: 0.95
                policy: "credit_card_detection"
                action: "redact"
            redacted_content: "Please contact ***@***.com or call ***-***-4567. His SSN is [SSN:TOK:tok_abc123def456] and credit card is [REDACTED]."
            risk_score: 85
            risk_level: "high"
            tokens:
              - token: "tok_abc123def456"
                type: "ssn"
                value: "123-45-6789"
                expires_at: "2025-02-15T10:30:00Z"
            scan_time_ms: 125
            created_at: "2025-01-15T10:30:00Z"
          meta:
            request_id: "req_123456789"
            timestamp: "2025-01-15T10:30:00Z"
            version: "v1"

# Tenant Management Examples
tenants:
  create:
    request:
      summary: "Create tenant example"
      description: "Create a new tenant"
      headers:
        Authorization: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      body:
        name: "Acme Corporation"
        domain: "acme.sdlc.cc"
        plan: "enterprise"
        settings:
          max_users: 1000
          max_documents: 100000
          features: ["dlp", "advanced_search", "custom_models"]
          security:
            require_mfa: true
            session_timeout: 3600
            password_policy:
              min_length: 12
              require_special_chars: true
          ai:
            default_model: "gpt-4"
            max_tokens_per_month: 10000000
        admin_user:
          email: "admin@acme.com"
          first_name: "Admin"
          last_name: "User"
          password: "SecurePass123!"
          phone: "+1-555-123-4567"
