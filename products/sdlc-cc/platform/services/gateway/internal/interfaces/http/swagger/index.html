<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDLC.ai - Secure Data Learning Platform API Documentation</title>
    <link rel="icon" href="/favicon.ico">
    <meta name="description" content="Interactive API reference for the SDLC.ai Secure Data Learning Platform, powered by Scalar." />
    <style>
        :root {
            --sdlc-bg: #0a0a0f;
            --sdlc-bg-alt: #12121a;
            --sdlc-border: rgba(102, 126, 234, 0.3);
            --sdlc-accent: #667eea;
            --sdlc-accent-soft: #a0a0ff;
            --sdlc-text: #e2e8f0;
            --sdlc-text-muted: rgba(226, 232, 240, 0.7);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--sdlc-bg);
            color: var(--sdlc-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .sdlc-banner {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            border-bottom: 1px solid var(--sdlc-border);
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .sdlc-banner-brand h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--sdlc-accent-soft);
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .sdlc-banner-brand p {
            margin: 0.25rem 0 0;
            color: var(--sdlc-text-muted);
            font-size: 0.9rem;
        }

        .sdlc-banner-links {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .sdlc-banner-links a {
            color: var(--sdlc-accent-soft);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid var(--sdlc-border);
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .sdlc-banner-links a:hover {
            background: rgba(102, 126, 234, 0.15);
            transform: translateY(-1px);
        }

        /* Scalar honours CSS variables for its dark theme.
           deepSpace is configured via JS below; these variables fine-tune
           colours so the reference matches the SDLC HeyGen surface. */
        .scalar-api-reference {
            --scalar-background-1: var(--sdlc-bg);
            --scalar-background-2: var(--sdlc-bg-alt);
            --scalar-color-accent: var(--sdlc-accent);
        }
    </style>
</head>
<body>
    <header class="sdlc-banner">
        <div class="sdlc-banner-brand">
            <h1>SDLC.ai API Reference</h1>
            <p>Secure Data Learning Platform - powered by Scalar</p>
        </div>
        <nav class="sdlc-banner-links" aria-label="API documentation links">
            <a href="/openapi.yaml" download>Download Spec</a>
            <a href="/docs.json">API Info</a>
            <a href="https://docs.sdlc.cc" target="_blank" rel="noreferrer noopener">Full Docs</a>
        </nav>
    </header>

    <main>
        <script
            id="api-reference"
            data-url="/openapi.yaml"></script>
        <script>
            // Configure Scalar before the CDN bundle loads.
            var configuration = {
                theme: 'deepSpace',
                darkMode: true,
                layout: 'modern',
                showSidebar: true,
                hideDownloadButton: false,
                searchHotKey: 'k',
                metaData: {
                    title: 'SDLC.ai API Reference',
                    description: 'Secure Data Learning Platform API'
                },
                defaultHttpClient: { targetKey: 'shell', clientKey: 'curl' }
            };
            document.getElementById('api-reference')
                .dataset.configuration = JSON.stringify(configuration);
        </script>
        <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
    </main>
</body>
</html>
