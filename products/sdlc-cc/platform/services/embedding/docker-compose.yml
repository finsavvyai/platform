version: '3.8'

services:
  # Embedding Service
  embedding-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      # Database
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/sdlc
      - REDIS_URL=redis://redis:6379/0

      # Authentication
      - JWT_SECRET_KEY=your-super-secret-jwt-key-change-in-production
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION=3600

      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_ORGANIZATION_ID=${OPENAI_ORGANIZATION_ID:-}

      # Cohere
      - COHERE_API_KEY=${COHERE_API_KEY:-}

      # Application
      - APP_NAME=Embedding Service
      - APP_VERSION=1.0.0
      - ENVIRONMENT=development
      - DEBUG=true
      - HOST=0.0.0.0
      - PORT=8003

      # Gateway Service URL
      - GATEWAY_URL=http://gateway:8080
      - RAG_SERVICE_URL=http://rag:8001

      # Cache Settings
      - CACHE_TTL_SECONDS=86400
      - CACHE_COMPRESSION_ENABLED=true
      - CACHE_WARM_UP_ENABLED=true

      # Batch Processing
      - BATCH_MAX_BATCH_SIZE=1000
      - BATCH_CONCURRENT_BATCHES=5
      - BATCH_PROCESSING_TIMEOUT=3600

      # Cost Optimization
      - COST_OPTIMIZATION_ENABLED=true
      - COST_OPTIMIZATION_STRATEGY=balanced
      - COST_BUDGET_PER_TENANT=100.0

      # Quality Settings
      - QUALITY_ENABLED=true
      - QUALITY_SIMILARITY_THRESHOLD=0.8
      - QUALITY_CONSISTENCY_THRESHOLD=0.9

      # Monitoring
      - MONITORING_ENABLED=true
      - MONITORING_METRICS_PORT=9090
      - MONITORING_LOG_LEVEL=INFO
      - MONITORING_STRUCTURED_LOGGING=true

      # Rate Limiting
      - SECURITY_RATE_LIMIT_ENABLED=true
      - SECURITY_RATE_LIMIT_REQUESTS_PER_MINUTE=100

    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - sdlc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=sdlc
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/schema:/docker-entrypoint-initdb.d
    networks:
      - sdlc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - sdlc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
      - ./config/ssl:/etc/nginx/ssl
    depends_on:
      - embedding-service
    networks:
      - sdlc-network
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - sdlc-network
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - sdlc-network
    restart: unless-stopped

  # Redis Commander (Redis Management UI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - sdlc-network
    restart: unless-stopped

networks:
  sdlc-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
