# GitHub Branch Protection Rules Configuration
# This file defines the branch protection rules for the SDLC.ai repository

# Main branch protection
main:
  required_status_checks:
    strict: true
    contexts:
      - "CI/CD Pipeline (gateway)"
      - "CI/CD Pipeline (rag)"
      - "CI/CD Pipeline (vector-core)"
      - "CI/CD Pipeline (admin-ui)"
      - "Security Scanning"
      - "Integration Tests"
      - "Performance Tests"

  enforce_admins: true
  required_pull_request_reviews:
    required_approving_review_count: 2
    dismiss_stale_reviews: true
    require_code_owner_reviews: true
    require_last_push_approval: true

  restrictions:
    users: []
    teams: ["platform-engineers", "security-team"]

  allow_force_pushes: false
  allow_deletions: false
  required_linear_history: true

# Develop branch protection
develop:
  required_status_checks:
    strict: false
    contexts:
      - "CI/CD Pipeline (gateway)"
      - "CI/CD Pipeline (rag)"
      - "CI/CD Pipeline (vector-core)"
      - "CI/CD Pipeline (admin-ui)"
      - "Security Scanning"
      - "Integration Tests"

  enforce_admins: false
  required_pull_request_reviews:
    required_approving_review_count: 1
    dismiss_stale_reviews: true
    require_code_owner_reviews: false

  restrictions:
    users: []
    teams: ["platform-engineers", "developers"]

  allow_force_pushes: true
  allow_deletions: false

# Feature branch pattern
feature/*:
  required_status_checks:
    strict: false
    contexts:
      - "CI/CD Pipeline (gateway)"
      - "CI/CD Pipeline (rag)"
      - "CI/CD Pipeline (vector-core)"
      - "CI/CD Pipeline (admin-ui)"

  enforce_admins: false
  required_pull_request_reviews:
    required_approving_review_count: 1
    dismiss_stale_reviews: false

  restrictions:
    users: []
    teams: ["developers"]

  allow_force_pushes: true
  allow_deletions: true

# Hotfix branch pattern
hotfix/*:
  required_status_checks:
    strict: true
    contexts:
      - "CI/CD Pipeline (gateway)"
      - "CI/CD Pipeline (rag)"
      - "CI/CD Pipeline (vector-core)"
      - "CI/CD Pipeline (admin-ui)"
      - "Security Scanning"
      - "Integration Tests"
      - "Performance Tests"

  enforce_admins: true
  required_pull_request_reviews:
    required_approving_review_count: 2
    dismiss_stale_reviews: true
    require_code_owner_reviews: true

  restrictions:
    users: []
    teams: ["platform-engineers", "security-team", "reliability-engineers"]

  allow_force_pushes: false
  allow_deletions: false
