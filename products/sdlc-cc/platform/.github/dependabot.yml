# Dependency update policy: see docs/SECRET_SCAN_AND_DEPENDENCIES.md
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/landing-page"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/services/admin-ui"
    schedule:
      interval: "weekly"

  - package-ecosystem: "go-modules"
    directory: "/services/gateway"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/services/dlp"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/services/rag"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/packages/sdk-py"
    schedule:
      interval: "weekly"
