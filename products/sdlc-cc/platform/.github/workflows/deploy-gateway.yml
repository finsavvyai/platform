name: Deploy Gateway Service

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'services/gateway/**'
      - '.github/workflows/deploy-gateway.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sdlc-ai/platform/gateway

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: services/gateway/go.sum

      - name: Run tests
        working-directory: services/gateway
        run: |
          go vet ./...
          go test -race -coverprofile=coverage.out ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./services/gateway
          file: ./services/gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://api.staging.sdlc.finsavvyai.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          export IMAGE_TAG=${{ github.sha }}
          envsubst < services/gateway/deploy/kubernetes/deployment.yaml | kubectl apply -f -
          kubectl apply -f services/gateway/deploy/kubernetes/configmap.yaml
          kubectl apply -f services/gateway/deploy/kubernetes/service.yaml
          kubectl apply -f services/gateway/deploy/kubernetes/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/gateway -n sdlc-platform --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n sdlc-platform -l app=gateway

  deploy-production:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://api.sdlc.finsavvyai.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          export IMAGE_TAG=${{ github.ref_name }}
          envsubst < services/gateway/deploy/kubernetes/deployment.yaml | kubectl apply -f -
          kubectl apply -f services/gateway/deploy/kubernetes/configmap.yaml
          kubectl apply -f services/gateway/deploy/kubernetes/service.yaml
          kubectl apply -f services/gateway/deploy/kubernetes/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/gateway -n sdlc-platform --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n sdlc-platform -l app=gateway

      - name: Health check
        run: |
          kubectl wait --for=condition=ready pod -l app=gateway -n sdlc-platform --timeout=60s

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Gateway service deployed to production: ${{ github.ref_name }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  deploy-monitoring:
    name: Update Monitoring
    needs: [deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy monitoring rules
        run: |
          kubectl apply -f services/gateway/deploy/monitoring/prometheus-rules.yaml
          kubectl apply -f services/gateway/deploy/monitoring/prometheus-recording-rules.yaml
