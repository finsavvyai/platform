# Full-history secret scan (scheduled + manual). See docs/SECRET_SCAN_AND_DEPENDENCIES.md
name: Secret Scan (Full History)

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks-full:
    name: Gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.0_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks (full history)
        run: gitleaks detect --source=. --config=.gitleaks.toml --report-format=sarif --report-path=gitleaks-full.sarif --verbose

      - name: Upload SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-full.sarif
          category: gitleaks-full-history
