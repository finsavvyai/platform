name: Live E2E (sdlc.cc)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - "landing-page/**"
      - ".github/workflows/live-e2e-sdlc.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - "landing-page/**"
      - ".github/workflows/live-e2e-sdlc.yml"

permissions:
  contents: read

concurrency:
  group: live-e2e-sdlc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-live:
    name: Playwright Live Validation
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      PLAYWRIGHT_TEST_BASE_URL: https://sdlc.cc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Live Landing E2E
        run: npm run test:e2e:sdlc:ci -- --retries=2

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-live-sdlc
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-live-sdlc
          path: test-results/
          retention-days: 14
