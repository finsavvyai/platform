name: Lint gate

on:
  pull_request:
    paths:
      - "services/**"
      - ".github/workflows/lint.yml"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  golangci:
    name: golangci-lint (new findings only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # need history so --new-from-rev works
      - uses: actions/setup-go@v5
        with: { go-version: "1.24", cache: true }
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | \
            sh -s -- -b $(go env GOPATH)/bin v2.11.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Lint changed code only (no new findings)
        working-directory: services/gateway
        run: |
          # The full repo has a backlog (Day 15 triage). Gate PRs on the
          # delta only so the queue strictly drains.
          golangci-lint run --new-from-rev=origin/main --max-same-issues=0 ./...

  admin-ui-typecheck:
    name: admin-ui — tsc --noEmit
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: services/admin-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/admin-ui/package-lock.json
      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: TypeScript strict typecheck
        run: npx tsc --noEmit

  doc-processor-jest:
    name: document-processor — jest
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: services/document-processor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/document-processor/package-lock.json
      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Jest (compile + run)
        # No --silent so failures show; --colors=false keeps CI logs clean.
        run: npx jest --colors=false
