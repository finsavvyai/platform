name: SDKs CI

on:
  pull_request:
    paths:
      - "packages/sdk-ts/**"
      - "packages/sdk-py/**"
      - "packages/sdk-go/**"
      - ".github/workflows/sdks-ci.yml"
  push:
    branches: [main]
    paths:
      - "packages/sdk-ts/**"
      - "packages/sdk-py/**"
      - "packages/sdk-go/**"

permissions:
  contents: read

jobs:
  ts:
    name: sdk-ts (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["18", "20"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - working-directory: packages/sdk-ts
        run: |
          npm ci
          npm test --if-present
          npm run build --if-present

  py:
    name: sdk-py (python ${{ matrix.py }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        py: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
      - working-directory: packages/sdk-py
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev]" || pip install -e .
          python -m pytest -q || echo "no tests yet"
          python -m build

  go:
    name: sdk-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - working-directory: packages/sdk-go
        run: |
          go vet ./...
          go test ./... -count=1
          go build ./...
