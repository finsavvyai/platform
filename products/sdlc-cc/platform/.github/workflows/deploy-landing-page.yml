name: Deploy Landing Page

on:
  push:
    branches:
      - main
    paths:
      - "landing-page/**"
      - ".github/workflows/deploy-landing-page.yml"
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_PROJECT_NAME: sdlc-landing-page

jobs:
  build:
    name: Build Landing Page
    runs-on: ubuntu-latest

    outputs:
      cache-key: ${{ steps.cache-keys.outputs.key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: landing-page/package-lock.json

      - name: Install dependencies
        working-directory: landing-page
        run: npm ci

      - name: Generate cache key
        id: cache-keys
        working-directory: landing-page
        run: echo "key=${{ runner.os }}-node-20-${{ hashFiles('**/package-lock.json') }}" >> $GITHUB_OUTPUT

      - name: Build for Cloudflare Pages
        working-directory: landing-page
        run: npm run pages:build
        env:
          NEXT_PUBLIC_SITE_URL: https://sdlc.cc

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: landing-page/.vercel/output/static
          retention-days: 1

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: landing-page/package-lock.json

      - name: Install dependencies
        working-directory: landing-page
        run: npm ci

      - name: Run unit tests
        working-directory: landing-page
        run: npm run test:run

      - name: Run integration tests
        working-directory: landing-page
        run: npm run test:integration
        env:
          CI: true

      - name: Generate coverage report
        working-directory: landing-page
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: landing-page/coverage/lcov.info
          flags: landing-page
          name: landing-page-coverage
          fail_ci_if_error: false

  deploy-preview:
    name: Deploy Preview to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: landing-page/.vercel/output/static

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ env.CLOUDFLARE_PROJECT_NAME }}
          directory: landing-page/.vercel/output/static
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "3"

  deploy-production:
    name: Deploy Production to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: landing-page/.vercel/output/static

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ env.CLOUDFLARE_PROJECT_NAME }}
          directory: landing-page/.vercel/output/static
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          deploymentTrigger: push
          wranglerVersion: "3"

      - name: Verify deployment
        run: |
          curl -f -I https://sdlc.cc || exit 1

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Landing page deployed to production"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
