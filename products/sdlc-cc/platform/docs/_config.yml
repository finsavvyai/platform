# GitHub Pages Configuration for SDLC.ai Documentation

title: SDLC.ai Documentation
description: Enterprise AI platform with zero-trust security and compliance
url: "https://sdlc.cc"
baseurl: ""

# Theme
theme: jekyll-theme-cayman
remote_theme: pages-themes/cayman@v0.2.0

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO
lang: en-US
author: SDLC.ai Team
twitter:
  username: sdlc_ai
  card: summary_large_image
social:
  name: SDLC.ai
  links:
    - https://twitter.com/sdlc_ai
    - https://linkedin.com/company/sdlc-ai
    - https://github.com/sdlc-ai

# Logo and images
logo: /assets/images/logo.png
image: /assets/images/og-image.png

# Navigation
navigation:
  - title: Home
    url: /
  - title: Quick Start
    url: /guides/QUICK_START
  - title: API Docs
    url: /api
  - title: GitHub
    url: https://github.com/sdlc-ai/platform

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

# Collections
collections:
  guides:
    output: true
    permalink: /guides/:name
  architecture:
    output: true
    permalink: /architecture/:name

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "guides"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "architecture"
    values:
      layout: "default"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
