name: Setup Node + pnpm
description: Install pnpm, setup Node.js, and install dependencies with cache

inputs:
  node-version:
    default: "20"
  pnpm-version:
    default: "9.15.0"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
    - shell: bash
      run: pnpm install --frozen-lockfile
