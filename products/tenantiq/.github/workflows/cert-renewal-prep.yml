# Cert renewal preparation — runs annually 90 days before the cert expiry to
# (1) regenerate the evidence bundle, (2) re-run all live cert smoke suites,
# (3) regenerate auto-derived docs (architecture diagram, cover letter), and
# (4) open a tracking issue with the bundle attached.
#
# Adjust the cron when the actual cert anniversary is known (set after the
# first L1 issuance — until then, this is a placeholder schedule).

name: Cert Renewal Prep

on:
  schedule:
    # Annual at 09:00 UTC on Apr 30 — placeholder until real expiry is known.
    # Once cert is issued, set this to expiry minus ~90 days.
    - cron: "0 9 30 4 *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering renewal prep early?"
        required: false
        default: "manual"

permissions:
  contents: write
  issues: write

jobs:
  prep:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps

      - name: Regenerate auto-derived docs
        run: |
          pnpm tsx scripts/gen-architecture-diagram.ts
          pnpm tsx scripts/gen-cover-letter.ts

      - name: Run cert-prep-smoke against production
        env:
          BASE_URL: https://app.tenantiq.app
          API_URL: https://api.tenantiq.app
        run: pnpm exec playwright test cert-prep-smoke --reporter=list --project=chromium

      - name: Build evidence bundle
        run: pnpm tsx scripts/cert-evidence-bundle.ts

      - name: Upload bundle as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cert-evidence-bundle
          path: .luna/cert-evidence/cert-evidence-*.zip
          retention-days: 365

      - name: Open renewal tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const reason = context.payload?.inputs?.reason || 'scheduled';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `M365 Cert renewal prep — ${today}`,
              labels: ['cert', 'renewal'],
              body: [
                `Renewal prep ran (${reason}).`,
                '',
                'Action items:',
                '- [ ] Download the evidence bundle artifact from the run',
                '- [ ] Schedule a fresh external pen test if last one is >12 months old',
                '- [ ] Diff `docs/SUB_PROCESSORS.md` against current vendor list',
                '- [ ] Diff `docs/GRAPH_PERMISSIONS.md` against current OAUTH_SCOPES',
                '- [ ] Re-walk the threat model (`docs/THREAT_MODEL.md`)',
                '- [ ] Submit renewal package via Partner Center',
                '',
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
            });
