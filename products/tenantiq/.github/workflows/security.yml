# Security Pipeline — SAST, dependency audit, secret scan, license compliance
# Required by CLAUDE.md: block release on Critical/High vulnerabilities
name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep scan
        run: semgrep scan --config=auto --error --severity ERROR --severity WARNING --json --output=semgrep-results.json .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 30

  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit dependencies (fail on high+)
        run: pnpm audit --audit-level=high

  secret-scan:
    name: Secret Detection (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  license-compliance:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install license checker
        run: npm install -g license-checker
      - name: Check licenses
        run: |
          BLOCKED="GPL-3.0;AGPL-3.0;SSPL-1.0;EUPL-1.1"
          license-checker --failOn "$BLOCKED" --summary
          echo "No blocked licenses found"

  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dast:
    name: DAST (OWASP ZAP baseline)
    runs-on: ubuntu-latest
    # Only run on pushes to main — staging needs a deploy first.
    # ZAP baseline is non-intrusive (passive scan only) — safe vs. live staging.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: ZAP Baseline scan (staging)
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'https://staging-api.tenantiq.app'
          rules_file_name: '.zap/rules.tsv'
          fail_action: true
          allow_issue_writing: false
          cmd_options: '-a'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: report_html.html
          retention-days: 30

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [sast, dependency-audit, secret-scan, license-compliance, gitleaks]
    if: always()
    steps:
      - name: Evaluate security results
        run: |
          results=(
            "${{ needs.sast.result }}"
            "${{ needs.dependency-audit.result }}"
            "${{ needs.secret-scan.result }}"
            "${{ needs.license-compliance.result }}"
            "${{ needs.gitleaks.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" ]]; then
              echo "FAIL: security scan failed — blocking merge"
              exit 1
            fi
          done
          echo "All security checks passed"
