# Deploy — migrations -> API + Web deploy -> smoke tests -> rollback on failure
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_ENV: ${{ github.event.inputs.environment || 'production' }}

jobs:
  migrations:
    name: D1 Migrations
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: d1 migrations apply tenantiq-production --remote

  deploy-api:
    name: Deploy API (Workers)
    runs-on: ubuntu-latest
    needs: migrations
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://api.tenantiq.app
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy --var APP_VERSION:${{ github.sha }}
      - name: Health check (retry 12x / 60s)
        run: |
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://api.tenantiq.app/health)
            if [ "$status" -eq 200 ]; then echo "API healthy (attempt $i)"; exit 0; fi
            echo "Attempt $i/12 — status $status, retrying in 5s..."
            sleep 5
          done
          echo "API health check failed after 60s"; exit 1

  deploy-web:
    name: Deploy Web (Pages)
    runs-on: ubuntu-latest
    needs: migrations
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://app.tenantiq.app
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build web app
        run: pnpm build
        env:
          PUBLIC_API_URL: https://api.tenantiq.app
      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy apps/web/.svelte-kit/cloudflare \
            --project-name=tenantiq-web \
            --branch=${{ env.DEPLOY_ENV }} \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Landing page deploy handled by PushCI (see pushci.yml)

  smoke-test:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    steps:
      - name: API health + readiness
        run: |
          curl -sf https://api.tenantiq.app/health | grep -q '"status":"healthy"'
          curl -sf https://api.tenantiq.app/health/ready | grep -q '"status":"ready"'
          echo "API healthy and ready"
      - name: Web accessibility
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://app.tenantiq.app)
          [ "$status" -eq 200 ] && echo "Web OK ($status)"
      - name: Auth endpoint (expect 401)
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" -d '{}' \
            https://api.tenantiq.app/platform/auth/verify)
          [ "$status" -eq 401 ] && echo "Auth OK ($status)"
      - name: CORS headers
        run: |
          curl -sI -H "Origin: https://app.tenantiq.app" \
            https://api.tenantiq.app/health | grep -iq "access-control.*app.tenantiq.app"
          echo "CORS OK"

  changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: success()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update changelog [skip ci]"
          git push

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Rollback API deployment
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: rollback
      - name: Set rollback commit status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'error',
              context: 'deployment',
              description: 'Deploy failed — rolled back to previous version'
            })
