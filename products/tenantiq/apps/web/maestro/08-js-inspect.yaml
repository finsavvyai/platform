appId: com.apple.mobilesafari
---
- launchApp
- openLink: |
    javascript:document.title='DOM:'+document.body.innerText.length+'chars-' + document.body.children.length + 'kids-' + (document.querySelector('h1')?.innerText || 'NO-H1')
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: ios-js-result
