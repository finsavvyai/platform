# TenantIQ API — Staging Environment
# Deploy: npx wrangler deploy --config wrangler.staging.toml

name = "tenantiq-api-staging"
main = "src/index.ts"
compatibility_date = "2024-09-02"

[vars]
ENVIRONMENT = "staging"
APP_VERSION = "0.0.0-staging"
FRONTEND_URL = "https://staging.tenantiq.app"

[[d1_databases]]
binding = "DB"
database_name = "tenantiq-staging"
database_id = "REPLACE_WITH_STAGING_DB_ID"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_STAGING_KV_ID"

[[r2_buckets]]
binding = "R2"
bucket_name = "tenantiq-staging-exports"
