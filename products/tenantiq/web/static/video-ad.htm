<!--
  TenantIQ Ad Clip — 20 seconds (horizontal 16:9)
  =========================================
  HOW TO RECORD:
  1. Open this file in Chrome
  2. Set browser window to 1920x1080 (or use DevTools)
  3. Use OBS, ScreenFlow, or QuickTime to record
  4. Animations auto-play on load — no interaction needed
  5. Total duration: ~20 seconds
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>TenantIQ — Ad Clip</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #060b0f; --green: #10b981; --green-glow: rgba(16,185,129,0.4);
    --white: #ffffff; --gray: #94a3b8; --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }
  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: var(--bg); color: var(--white);
    font-family: 'Inter', sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .stage { width: 100vw; height: 100vh; position: relative; overflow: hidden; }

  .scene {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; opacity: 0;
  }

  /* Scene 1: Hook (0-3s) */
  .scene-hook { animation: scIn 0.2s 0.2s var(--ease) forwards, scOut 0.2s 3s var(--ease) forwards; }
  .scene-hook h1 {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 4.5rem; font-weight: 900;
    text-align: center; line-height: 1.1;
    animation: slamIn 0.4s 0.3s var(--ease) forwards; opacity: 0;
  }
  .scene-hook .stop { color: var(--gray); }
  .scene-hook .know { color: var(--green); text-shadow: 0 0 30px var(--green-glow); }

  /* Scene 2: Feature flash (3-10s) */
  .scene-features { animation: scIn 0.2s 3.2s var(--ease) forwards, scOut 0.3s 10s var(--ease) forwards; }
  .features-grid {
    display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; max-width: 1200px;
  }
  .feature-pill {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 1.5rem 2.5rem;
    display: flex; align-items: center; gap: 1rem;
    opacity: 0; transform: scale(0.8);
  }
  .feature-pill .icon { font-size: 2rem; }
  .feature-pill .text {
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 1.2rem;
  }
  .feature-pill:nth-child(1) { animation: pillPop 0.3s 3.5s var(--ease) forwards; }
  .feature-pill:nth-child(2) { animation: pillPop 0.3s 4s var(--ease) forwards; }
  .feature-pill:nth-child(3) { animation: pillPop 0.3s 4.5s var(--ease) forwards; }
  .feature-pill:nth-child(4) { animation: pillPop 0.3s 5s var(--ease) forwards; }
  .feature-pill:nth-child(5) { animation: pillPop 0.3s 5.5s var(--ease) forwards; }

  /* Highlight sweep on each pill */
  .feature-pill:nth-child(1) { animation: pillPop 0.3s 3.5s var(--ease) forwards, pillHighlight 0.6s 6s var(--ease) forwards; }
  .feature-pill:nth-child(2) { animation: pillPop 0.3s 4s var(--ease) forwards, pillHighlight 0.6s 6.5s var(--ease) forwards; }
  .feature-pill:nth-child(3) { animation: pillPop 0.3s 4.5s var(--ease) forwards, pillHighlight 0.6s 7s var(--ease) forwards; }
  .feature-pill:nth-child(4) { animation: pillPop 0.3s 5s var(--ease) forwards, pillHighlight 0.6s 7.5s var(--ease) forwards; }
  .feature-pill:nth-child(5) { animation: pillPop 0.3s 5.5s var(--ease) forwards, pillHighlight 0.6s 8s var(--ease) forwards; }

  @keyframes pillPop { to { opacity: 1; transform: scale(1); } }
  @keyframes pillHighlight {
    0% { border-color: rgba(255,255,255,0.1); }
    50% { border-color: var(--green); box-shadow: 0 0 20px var(--green-glow); }
    100% { border-color: rgba(16,185,129,0.3); }
  }

  /* Scene 3: Social proof (10-15s) */
  .scene-proof { animation: scIn 0.2s 10.2s var(--ease) forwards, scOut 0.2s 15s var(--ease) forwards; }
  .scene-proof h2 {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2.8rem; font-weight: 800;
    text-align: center; animation: slideUp 0.5s 10.5s var(--ease) forwards; opacity: 0;
  }
  .scene-proof .green { color: var(--green); }
  .trust-row {
    display: flex; gap: 1.5rem; margin-top: 2rem;
  }
  .trust-badge {
    background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25);
    border-radius: 10px; padding: 0.7rem 1.5rem; font-weight: 600; color: var(--green);
    opacity: 0; transform: translateY(10px);
  }
  .trust-badge:nth-child(1) { animation: cardIn 0.3s 11.5s var(--ease) forwards; }
  .trust-badge:nth-child(2) { animation: cardIn 0.3s 11.8s var(--ease) forwards; }
  .trust-badge:nth-child(3) { animation: cardIn 0.3s 12.1s var(--ease) forwards; }
  .trust-badge:nth-child(4) { animation: cardIn 0.3s 12.4s var(--ease) forwards; }

  /* Scene 4: CTA (15-20s) */
  .scene-cta { animation: scIn 0.2s 15.2s var(--ease) forwards; }
  .scene-cta .logo {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 3.5rem; font-weight: 900;
    margin-bottom: 1.5rem; text-shadow: 0 0 30px var(--green-glow);
    animation: slideUp 0.4s 15.4s var(--ease) forwards; opacity: 0;
  }
  .scene-cta .offer {
    font-size: 1.6rem; font-weight: 600; margin-bottom: 1.5rem;
    animation: slideUp 0.4s 15.8s var(--ease) forwards; opacity: 0;
  }
  .scene-cta .cta-btn {
    background: var(--green); color: var(--bg); font-weight: 700; font-size: 1.3rem;
    padding: 1rem 3rem; border-radius: 12px; display: inline-block;
    animation: slideUp 0.4s 16.2s var(--ease) forwards, pulse 1.5s 17s ease-in-out infinite; opacity: 0;
  }
  .scene-cta .url {
    color: var(--green); font-size: 1.1rem; margin-top: 1rem;
    animation: slideUp 0.3s 16.6s var(--ease) forwards; opacity: 0;
  }

  /* Shared keyframes */
  @keyframes scIn { to { opacity: 1; } }
  @keyframes scOut { to { opacity: 0; } }
  @keyframes slamIn { from { opacity: 0; transform: scale(1.8); } to { opacity: 1; transform: scale(1); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

  /* Subtle grid background */
  .stage::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(16,185,129,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(16,185,129,0.03) 1px, transparent 1px);
    background-size: 60px 60px; pointer-events: none;
  }
</style>
</head>
<body>
<div class="stage">
  <!-- Hook -->
  <div class="scene scene-hook">
    <h1><span class="stop">Stop guessing.</span><br><span class="know">Start knowing.</span></h1>
  </div>

  <!-- Features -->
  <div class="scene scene-features">
    <div class="features-grid">
      <div class="feature-pill"><span class="icon">🛡️</span><span class="text">Security Score</span></div>
      <div class="feature-pill"><span class="icon">📋</span><span class="text">CIS Scan</span></div>
      <div class="feature-pill"><span class="icon">🤖</span><span class="text">AI Agent</span></div>
      <div class="feature-pill"><span class="icon">💰</span><span class="text">License Optimizer</span></div>
      <div class="feature-pill"><span class="icon">🔄</span><span class="text">Config Drift</span></div>
    </div>
  </div>

  <!-- Social proof -->
  <div class="scene scene-proof">
    <h2>Trusted by MSPs managing<br><span class="green">1,000+ tenants</span></h2>
    <div class="trust-row">
      <div class="trust-badge">SOC 2</div>
      <div class="trust-badge">HIPAA</div>
      <div class="trust-badge">GDPR</div>
      <div class="trust-badge">Zero Trust</div>
    </div>
  </div>

  <!-- CTA -->
  <div class="scene scene-cta">
    <div class="logo">TenantIQ</div>
    <div class="offer">Free 14-day trial</div>
    <div class="cta-btn">Start now</div>
    <div class="url">app.tenantiq.app</div>
  </div>
</div>
</body>
</html>
