<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<meta name="theme-color" content="#4F46E5" />
	<title>Offline | TenantIQ</title>
	<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
	<style>
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background: #0a0a0a;
			color: #e2e8f0;
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			min-height: 100dvh;
			padding: 1.5rem;
			background-image:
				radial-gradient(at 20% 30%, rgba(79, 70, 229, 0.10), transparent 50%),
				radial-gradient(at 80% 70%, rgba(124, 58, 237, 0.08), transparent 50%);
		}
		.card {
			text-align: center;
			max-width: 460px;
			width: 100%;
			background: rgba(17, 17, 17, 0.7);
			border: 1px solid rgba(255, 255, 255, 0.08);
			border-radius: 1.5rem;
			padding: 2.5rem 2rem;
			backdrop-filter: blur(20px);
		}
		.icon {
			width: 72px;
			height: 72px;
			margin: 0 auto 1.5rem;
			background: linear-gradient(135deg, rgba(79, 70, 229, 0.2), rgba(124, 58, 237, 0.15));
			border: 1px solid rgba(79, 70, 229, 0.3);
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.icon svg { width: 36px; height: 36px; color: #818cf8; }
		h1 {
			font-size: 1.5rem;
			font-weight: 700;
			margin-bottom: 0.6rem;
			letter-spacing: -0.02em;
		}
		p { font-size: 0.95rem; color: #94a3b8; line-height: 1.6; margin-bottom: 1.25rem; }
		.actions {
			display: flex;
			gap: 0.75rem;
			justify-content: center;
			flex-wrap: wrap;
			margin-top: 0.5rem;
		}
		button {
			color: #fff;
			border: none;
			border-radius: 0.85rem;
			padding: 0.85rem 1.5rem;
			font-size: 0.9rem;
			font-weight: 600;
			cursor: pointer;
			min-height: 48px;
			min-width: 120px;
			transition: all 0.2s;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 0.5rem;
		}
		.btn-primary {
			background: linear-gradient(135deg, #4F46E5, #7C3AED);
			box-shadow: 0 6px 20px rgba(79, 70, 229, 0.3);
		}
		.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(79, 70, 229, 0.4); }
		.btn-secondary {
			background: rgba(255, 255, 255, 0.06);
			border: 1px solid rgba(255, 255, 255, 0.1);
		}
		.btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }
		.queue-info {
			margin-top: 1.25rem;
			padding: 0.75rem 1rem;
			background: rgba(34, 197, 94, 0.08);
			border: 1px solid rgba(34, 197, 94, 0.2);
			border-radius: 0.75rem;
			font-size: 0.8rem;
			color: #86efac;
			display: none;
		}
		.queue-info.has-items { display: block; }
		.brand {
			margin-top: 2rem;
			font-size: 0.75rem;
			color: #475569;
			letter-spacing: 0.08em;
			text-transform: uppercase;
		}
		.status-dot {
			display: inline-block;
			width: 8px;
			height: 8px;
			background: #ef4444;
			border-radius: 50%;
			margin-right: 0.5rem;
			animation: pulse 2s infinite;
		}
		@keyframes pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.4; }
		}
	</style>
</head>
<body>
	<div class="card">
		<div class="icon">
			<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
				<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
			</svg>
		</div>
		<h1><span class="status-dot"></span>You're offline</h1>
		<p>TenantIQ needs the internet to sync M365 data. Cached pages still work — actions you take will queue and sync when you reconnect.</p>

		<div class="actions">
			<button class="btn-primary" onclick="retry()">
				<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
				Retry
			</button>
			<button class="btn-secondary" onclick="goHome()">Go to dashboard</button>
		</div>

		<div class="queue-info" id="queue-info">
			<span id="queue-count">0</span> action(s) queued — will sync when you're back online.
		</div>

		<p class="brand">TenantIQ</p>
	</div>

	<script>
		function retry() {
			if (navigator.onLine) {
				window.location.href = '/';
			} else {
				document.querySelector('.btn-primary').textContent = 'Still offline…';
				setTimeout(() => location.reload(), 800);
			}
		}
		function goHome() { window.location.href = '/'; }

		// Listen for reconnect → auto-redirect.
		window.addEventListener('online', () => {
			document.querySelector('.btn-primary').textContent = 'Reconnected! Loading…';
			setTimeout(() => { window.location.href = '/'; }, 600);
		});

		// Read sync queue count from IndexedDB (matches sync-queue.ts schema).
		(async function showQueueCount() {
			if (!('indexedDB' in window)) return;
			try {
				const db = await new Promise((resolve, reject) => {
					const req = indexedDB.open('tenantiq-sync', 1);
					req.onsuccess = () => resolve(req.result);
					req.onerror = () => reject(req.error);
					req.onupgradeneeded = () => resolve(req.result); // schema not yet created — count is 0
				});
				if (!db.objectStoreNames.contains('actions')) return;
				const tx = db.transaction('actions', 'readonly');
				const store = tx.objectStore('actions');
				const countReq = store.count();
				countReq.onsuccess = () => {
					const n = countReq.result;
					if (n > 0) {
						document.getElementById('queue-count').textContent = String(n);
						document.getElementById('queue-info').classList.add('has-items');
					}
				};
			} catch { /* silent */ }
		})();
	</script>
</body>
</html>
