openapi: 3.1.0
info:
  title: TenantIQ API
  version: 1.0.0
  description: |
    MSP control plane for managing Microsoft 365 tenants at scale.
    CIS benchmark automation, drift detection, license optimization,
    cross-tenant rollups, and compliance posture mapping.
  contact:
    name: TenantIQ Support
    url: https://tenantiq.app/support
    email: support@tenantiq.app
  license:
    name: Proprietary
    url: https://tenantiq.app/terms

servers:
  - url: https://api.tenantiq.app
    description: Production
  - url: http://localhost:8787
    description: Development (Wrangler)

security:
  - cookieAuth: []
  - bearerAuth: []

tags:
  - name: Health
    description: Health checks and infrastructure status
  - name: Auth
    description: Authentication, OAuth, JWT exchange, logout
  - name: WebAuthn
    description: Passkey registration and authentication
  - name: SSO
    description: SAML/OIDC SSO connections and SCIM tokens
  - name: SCIM
    description: SCIM 2.0 user and group provisioning (RFC 7644)
  - name: Account
    description: Account deletion (GDPR Art. 17) and data export
  - name: Tenants
    description: Tenant CRUD, sync, dashboard, settings
  - name: TenantAlerts
    description: Per-tenant alerts and remediation plans
  - name: TenantSecurity
    description: Per-tenant security data, policies, certificates
  - name: SecurityStack
    description: Security stack configuration, monitoring, baselines
  - name: Hardening
    description: Security hardening assessment and execution
  - name: TenantEmail
    description: Email security, sign-in logs, inbox rules
  - name: TenantThreats
    description: Phishing, threats, UEBA, SDLC
  - name: TenantBackups
