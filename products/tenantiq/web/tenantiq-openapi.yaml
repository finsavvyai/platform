  - name: AIFeedback
    description: AI recommendation feedback and insights
  - name: AISEO
    description: AI-powered SEO audit and content generation
  - name: AnomalyDetection
    description: Login and activity anomaly scanning
  - name: CISBenchmark
    description: CIS benchmark scanning, controls, history, trend
  - name: CISOverrides
    description: Per-tenant CIS control overrides
  - name: CompliancePosture
    description: Compliance posture assessment and frameworks
  - name: ConfigSnapshots
    description: Configuration snapshots and scheduling
  - name: ConfigDrifts
    description: Configuration drift detection and suppression
  - name: CopilotReadiness
    description: Copilot readiness assessment, history, export
  - name: CopilotSecurity
    description: Copilot security posture and prompt analysis
  - name: CopilotUsage
    description: Copilot usage metrics
  - name: CostOptimization
    description: License cost analysis and AI recommendations
  - name: Remediations
    description: Remediation execution, dry-run, rollback, scheduling
  - name: Workflows
    description: Global workflow listing and template management
  - name: Users
    description: User listing, licenses, bulk operations
  - name: UserDelegation
    description: User delegation management
  - name: Security
    description: Global security dashboard, posture, compliance, risks
  - name: Audit
    description: Global audit logs and reports
  - name: Intelligence
    description: Intelligence scans and user activity
  - name: Governance
    description: Workspace governance, sites, AI usage
  - name: ExecutiveReport
    description: Executive report generation and PDF export
  - name: HealthScore
