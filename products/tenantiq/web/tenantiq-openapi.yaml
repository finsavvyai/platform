components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: tenantiq_session
      description: HttpOnly session cookie set after OAuth exchange
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT in Authorization header (alternative to cookie)
    scimBearerAuth:
      type: http
      scheme: bearer
      description: SCIM provisioning token

  schemas:
    # ---- Enums ----
    Severity:
      type: string
      enum: [critical, high, medium, low]
    SeverityExtended:
      type: string
      enum: [critical, high, medium, low, info]
    AlertCategory:
      type: string
      enum: [security, optimization, compliance, operational]
    AlertStatus:
      type: string
      enum: [active, acknowledged, resolved, dismissed]
    RemediationType:
      type: string
      enum: [automatic, semi_automatic, manual]
    RemediationStatus:
      type: string
      enum: [pending, executing, success, failed, rolled_back]
    TenantStatus:
      type: string
      enum: [active, suspended, disconnected]
    UserRole:
      type: string
      enum: [viewer, operator, admin, super_admin, platform_admin]
    WorkflowTriggerType:
      type: string
      enum: [cron, webhook, manual, conditional]
    WorkflowRunStatus:
      type: string
      enum: [pending_approval, running, completed, failed, cancelled]
    BackupType:
      type: string
      enum: [exchange, sharepoint, teams]
    BackupStatus:
      type: string
      enum: [pending, running, completed, failed]
    CisOverrideDecision:
      type: string
      enum: [accepted_risk, omit]
    PlanTier:
      type: string
      enum: [all, core, professional, security_suite, enterprise]
    PlanKey:
      type: string
      enum: [trial, free, core, professional, security_suite, enterprise]
    SkillCategory:
      type: string
      enum: [foundation, management, security, analytics, enterprise]
    SkillStatus:
      type: string
      enum: [active, locked, trial]

    # ---- Response Envelopes ----
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          const: true
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
      required: [ok]

    # ---- Auth & Users ----
    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        organizationId:
          type: string
        tenantIds:
          type: array
          items:
            type: string
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          type: string
          enum: [active, suspended]
        plan:
          type: string
        trialEndsAt:
          type: string
          format: date-time
          nullable: true
        scopeLevel:
          type: string
          enum: [admin, personal]
      required: [id, email, name, organizationId, tenantIds, role]

    PlatformUser:
      type: object
      properties:
        id:
          type: string
        organizationId:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        azureOid:
          type: string
          nullable: true
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, organizationId, email, name, role, createdAt]

    CachedUser:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        azureUserId:
          type: string
        displayName:
          type: string
        email:
          type: string
        userType:
          type: string
          enum: [member, guest]
        accountEnabled:
          type: boolean
        lastSignIn:
          type: string
          format: date-time
          nullable: true
        lastNonInteractiveSignIn:
          type: string
          format: date-time
          nullable: true
        assignedLicenses:
          type: array
          items:
            type: string
        assignedGroups:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, tenantId, azureUserId, displayName, email, userType, accountEnabled]

    # ---- Tenant & Organization ----
    Tenant:
      type: object
      properties:
        id:
          type: string
        organizationId:
          type: string
        azureTenantId:
          type: string
        displayName:
          type: string
        domain:
          type: string
        lastSyncAt:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: '#/components/schemas/TenantStatus'
        createdAt:
          type: string
          format: date-time
      required: [id, organizationId, azureTenantId, displayName, domain, status, createdAt]

    Organization:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [direct, msp]
        billingPlan:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, type, billingPlan, createdAt]

    # ---- Alert ----
    Alert:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        ruleId:
          type: string
        severity:
          $ref: '#/components/schemas/Severity'
        category:
          $ref: '#/components/schemas/AlertCategory'
        title:
          type: string
        description:
          type: string
        businessImpact:
          type: string
          nullable: true
        affectedResources:
          type: array
          items:
            type: object
        recommendedAction:
          type: string
          nullable: true
        remediationType:
          $ref: '#/components/schemas/RemediationType'
        status:
          $ref: '#/components/schemas/AlertStatus'
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        resolvedBy:
          type: string
          nullable: true
        metadata:
          type: object
      required: [id, tenantId, ruleId, severity, category, title, description, remediationType, status, createdAt]

    # ---- Remediation ----
    RemediationPlan:
      type: object
      properties:
        impactLevel:
          type: string
        impactExplanation:
          type: string
        riskScore:
          type: number
        affectedUsers:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              email:
                type: string
              role:
                type: string
        affectedResources:
          type: array
          items:
            type: object
        steps:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              description:
                type: string
              effect:
                type: string
        estimatedMinutes:
          type: integer
        reversible:
          type: boolean
        positiveOutcomes:
          type: array
          items:
            type: string
        negativeOutcomes:
          type: array
          items:
            type: string
        userEffects:
          type: array
          items:
            type: string
      required: [impactLevel, riskScore, steps, estimatedMinutes, reversible]

    RemediationLog:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        alertId:
          type: string
        actionId:
          type: string
        executedBy:
          type: string
        status:
          $ref: '#/components/schemas/RemediationStatus'
        beforeState:
          type: object
        afterState:
          type: object
        errorMessage:
          type: string
          nullable: true
        executedAt:
          type: string
          format: date-time
        rollbackAvailable:
          type: boolean
        rollbackExpiresAt:
          type: string
          format: date-time
          nullable: true
      required: [id, tenantId, alertId, actionId, executedBy, status, executedAt, rollbackAvailable]

    # ---- Audit ----
    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        actor:
          type: string
        action:
          type: string
        resourceType:
          type: string
          nullable: true
        resourceId:
          type: string
          nullable: true
        details:
          type: object
        ipAddress:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, tenantId, actor, action, createdAt]

    # ---- CIS Benchmark ----
    CisControl:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        section:
          type: string
        level:
          type: string
          enum: [L1, L2]
        status:
          type: string
          enum: [pass, fail, partial, not_applicable, error]
        severity:
          $ref: '#/components/schemas/Severity'
        evidence:
          type: string
        remediation:
          type: string
        remediationSteps:
          type: array
          items:
            type: string
        remediationScript:
          type: string
        estimatedMinutes:
          type: integer
        overrideDecision:
          $ref: '#/components/schemas/CisOverrideDecision'
        overrideJustification:
          type: string
      required: [id, title, description, section, level, status, severity, evidence, remediation]

    CisScanResult:
      type: object
      properties:
        overallScore:
          type: number
          nullable: true
        passCount:
          type: integer
        failCount:
          type: integer
        partialCount:
          type: integer
        totalControls:
          type: integer
        sectionScores:
          type: object
          additionalProperties:
            type: object
            properties:
              pass:
                type: integer
              fail:
                type: integer
              total:
                type: integer
              score:
                type: number
        controls:
          type: array
          items:
            $ref: '#/components/schemas/CisControl'
        scannedAt:
          type: string
          format: date-time
      required: [passCount, failCount, partialCount, totalControls, controls]

    CisOverride:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        controlId:
          type: string
        decision:
          $ref: '#/components/schemas/CisOverrideDecision'
        justification:
          type: string
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
      required: [id, tenantId, controlId, decision, justification, createdAt, createdBy]

    CisTrendPoint:
      type: object
      properties:
        date:
          type: string
        score:
          type: number
        passCount:
          type: integer
        failCount:
          type: integer
        partialCount:
          type: integer
        scansThatDay:
          type: integer

    # ---- Workflow ----
    Workflow:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        workflowType:
          type: string
        triggerType:
          $ref: '#/components/schemas/WorkflowTriggerType'
        triggerConfig:
          type: object
        steps:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStep'
        requiresApproval:
          type: boolean
        enabled:
          type: boolean
        lastRunAt:
          type: string
          format: date-time
          nullable: true
        lastRunStatus:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, tenantId, name, workflowType, triggerType, enabled, createdAt]

    WorkflowStep:
      type: object
      properties:
        action:
          type: string
        condition:
          type: string
        onFailure:
          type: string
          enum: [skip, abort, retry]
      required: [action, onFailure]

    WorkflowRun:
      type: object
      properties:
        id:
          type: string
        workflowId:
          type: string
        tenantId:
          type: string
        status:
          $ref: '#/components/schemas/WorkflowRunStatus'
        stepsCompleted:
          type: integer
        stepsTotal:
          type: integer
        results:
          type: object
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        approvedBy:
          type: string
          nullable: true
      required: [id, workflowId, tenantId, status, stepsCompleted, stepsTotal, startedAt]

    WorkflowTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [license, security, lifecycle, governance]
        triggerType:
          type: string
          enum: [schedule, event, manual, ai]
        steps:
          type: array
          items:
            type: object
        tags:
          type: array
          items:
            type: string
        estimatedDurationMinutes:
          type: integer
      required: [id, name, description, category, triggerType, steps]

    # ---- License ----
    License:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        skuId:
          type: string
        skuName:
          type: string
        total:
          type: integer
        assigned:
          type: integer
        costPerUnit:
          type: number
          nullable: true
        updatedAt:
          type: string
          format: date-time
      required: [id, tenantId, skuId, skuName, total, assigned]

    LicenseWasteItem:
      type: object
      properties:
        skuName:
          type: string
        unassigned:
          type: integer
        monthlyCost:
          type: number

    # ---- Notification ----
    Notification:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        body:
          type: string
        type:
          type: string
          enum: [alert, sync, drift, workflow, system]
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
        href:
          type: string
      required: [id, title, body, type, read, createdAt]

    # ---- Security Dashboard ----
    SecurityDashboard:
      type: object
      properties:
        secureScore:
          type: number
          nullable: true
        secureScoreMax:
          type: number
          nullable: true
        alertCounts:
          type: object
          properties:
            critical:
              type: integer
            high:
              type: integer
            medium:
              type: integer
            low:
              type: integer
        mfaCoverage:
          type: number
        riskyUsers:
          type: integer
        staleGuests:
          type: integer
        lastScanAt:
          type: string
          format: date-time
          nullable: true

    # ---- Backup ----
    BackupJob:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        type:
          $ref: '#/components/schemas/BackupType'
        status:
          $ref: '#/components/schemas/BackupStatus'
        sizeBytes:
          type: integer
        itemCount:
          type: integer
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
      required: [id, tenantId, type, status, sizeBytes, itemCount, startedAt]

    BackupSchedule:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/BackupType'
        cronExpression:
          type: string
        enabled:
          type: boolean
        lastRunAt:
          type: string
          format: date-time
          nullable: true
        nextRunAt:
          type: string
          format: date-time
          nullable: true

    # ---- SSO ----
    SSOConnection:
      type: object
      properties:
        id:
          type: string
        protocol:
          type: string
          enum: [saml, oidc]
        displayName:
          type: string
        issuer:
          type: string
        metadataUrl:
          type: string
        clientId:
          type: string
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, protocol, displayName, issuer, enabled, createdAt]

    ScimToken:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [active, revoked]
      required: [id, name, createdAt, status]

    # ---- Skill ----
    Skill:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        icon:
          type: string
        description:
          type: string
        category:
          $ref: '#/components/schemas/SkillCategory'
        href:
          type: string
        status:
          $ref: '#/components/schemas/SkillStatus'
        price:
          type: number
        includedIn:
          $ref: '#/components/schemas/PlanTier'
        trialDaysLeft:
          type: integer
      required: [id, name, icon, description, category, href, status, price, includedIn]

    # ---- Config Snapshot & Drift ----
    ConfigSnapshot:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        category:
          type: string
        data:
          type: object
        createdAt:
          type: string
          format: date-time
        version:
          type: integer
      required: [id, tenantId, category, createdAt, version]

    ConfigDrift:
      type: object
      properties:
        id:
          type: string
        snapshotId:
          type: string
        previousSnapshotId:
          type: string
        field:
          type: string
        previousValue:
          type: object
        currentValue:
          type: object
        severity:
          $ref: '#/components/schemas/Severity'
        category:
          type: string
        detectedAt:
          type: string
          format: date-time
      required: [id, snapshotId, field, severity, category, detectedAt]

    # ---- Copilot ----
    CopilotReadinessResult:
      type: object
      properties:
        overallScore:
          type: number
        categoryScores:
          type: object
          additionalProperties:
            type: number
        categories:
          type: object
          additionalProperties:
            type: object
            properties:
              score:
                type: number
              checks:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    status:
                      type: string
                      enum: [pass, fail, warning, error]
                    detail:
                      type: string
        recommendations:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              priority:
                $ref: '#/components/schemas/Severity'
              title:
                type: string
              description:
                type: string
      required: [overallScore, categoryScores, categories, recommendations]

    # ---- Dashboard ----
    DashboardMetrics:
      type: object
      properties:
        secureScore:
          type: number
          nullable: true
        secureScoreTrend:
          type: array
          items:
            type: number
        activeAlerts:
          type: object
          properties:
            critical:
              type: integer
            high:
              type: integer
            medium:
              type: integer
            low:
              type: integer
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        licenseWaste:
          type: number
        totalLicenseSpend:
          type: number
        userBreakdown:
          type: object
          properties:
            total:
              type: integer
            active:
              type: integer
            inactive:
              type: integer
            guests:
              type: integer
            disabled:
              type: integer
        topRiskyUsers:
          type: array
          items:
            type: object
            properties:
              displayName:
                type: string
              email:
                type: string
              riskReason:
                type: string
              daysSinceSignIn:
                type: integer
                nullable: true
              accountEnabled:
                type: boolean
        licenseUtilization:
          type: number
        licenseBreakdown:
          type: array
          items:
            type: object
            properties:
              skuName:
                type: string
              assigned:
                type: integer
              total:
                type: integer
              costPerUnit:
                type: number
        recentAlerts:
          type: array
          items:
            $ref: '#/components/schemas/Alert'
        lastSyncAt:
          type: string
          format: date-time
          nullable: true

    # ---- MSP ----
    MspSummary:
      type: object
      properties:
        totalTenants:
          type: integer
        activeTenants:
          type: integer
        totalUsers:
          type: integer
        totalAlerts:
          type: integer
        avgCisScore:
          type: number
          nullable: true
        avgLicenseUtilization:
          type: number

    # ---- UpsellInfo (402) ----
    UpsellInfo:
      type: object
      properties:
        required:
          type: object
          properties:
            display:
              type: string
            reason:
              type: string
            priceUsdPerUserPerMonth:
              type: number
            anyOf:
              type: array
              items:
                type: string
        suggestedSeats:
          type: integer
        estimatedMonthlyCostUsd:
          type: number

    # ---- Compliance ----
    ComplianceFramework:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        score:
          type: number
        controlsTotal:
          type: integer
        controlsPass:
          type: integer
      required: [id, name, score, controlsTotal, controlsPass]

    # ---- Deletion Report ----
    DeletionReport:
      type: object
      description: Report of GDPR Art. 17 cascade deletion across 33 tables
      properties:
        rowsDeleted:
          type: object
          additionalProperties:
            type: integer
        kvPurged:
          type: integer
        r2Purged:
          type: integer
        durationMs:
          type: number

    # ---- Sign-in ----
    SignInLog:
      type: object
      properties:
        id:
          type: string
        userDisplayName:
          type: string
        userPrincipalName:
          type: string
        ipAddress:
          type: string
        location:
          type: string
        status:
          type: string
        createdDateTime:
          type: string
          format: date-time
      required: [id, userDisplayName, userPrincipalName, ipAddress, status, createdDateTime]

    SignInSummary:
      type: object
      properties:
        total:
          type: integer
        success:
          type: integer
        failure:
          type: integer
        riskySigns:
          type: integer

    # ---- Integration ----
    Integration:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [connectwise, datto, kaseya, openclaw, generic_webhook]
        enabled:
          type: boolean
        lastSyncAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [connected, disconnected, error]
      required: [id, name, type, enabled, status]

    # ---- Branding ----
    OrgBranding:
      type: object
      properties:
        orgId:
          type: string
        logoUrl:
          type: string
          nullable: true
        faviconUrl:
          type: string
          nullable: true
        primaryColor:
          type: string
        secondaryColor:
          type: string
        companyName:
          type: string
        customDomain:
          type: string
          nullable: true
        emailFromName:
          type: string
          nullable: true

    # ---- Prospect Scan ----
    ProspectScanResult:
      type: object
      properties:
        domain:
          type: string
        score:
          type: number
        findings:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              severity:
                $ref: '#/components/schemas/Severity'
              description:
                type: string
              recommendation:
                type: string
        scannedAt:
          type: string
          format: date-time
      required: [domain, score, findings, scannedAt]

    # ---- Executive Report ----
    ExecutiveReport:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        period:
          type: string
        generatedAt:
          type: string
          format: date-time
        sections:
          type: array
          items:
            type: object
        financial:
          type: object
          properties:
            totalSpend:
              type: number
            wastedSpend:
              type: number
            savingsRealized:
              type: number
            projectedSavings:
              type: number
            costPerUser:
              type: number
            roi:
              type: number
        actions:
          type: array
          items:
            type: object

    # ---- Threat ----
    Threat:
      type: object
      properties:
        id:
          type: string
        severity:
          $ref: '#/components/schemas/Severity'
        type:
          type: string
        title:
          type: string
        description:
          type: string
        user:
          type: object
          nullable: true
        affectedUsers:
          type: integer
        details:
          type: object
        riskScore:
          type: number
        timestamp:
          type: string
          format: date-time
        status:
          type: string
        suggestedActions:
          type: array
          items:
            type: string
      required: [id, severity, type, title, description, riskScore, timestamp, status]

    # ---- UEBA ----
    UebaUser:
      type: object
      properties:
        userId:
          type: string
        displayName:
          type: string
        email:
          type: string
        riskScore:
          type: number
        anomalies:
          type: array
          items:
            type: object
        lastActivity:
          type: string

    UebaSummary:
      type: object
      properties:
        totalUsers:
          type: integer
        riskyUsers:
          type: integer
        anomalyCount:
          type: integer

    # ---- GDAP ----
    GdapRelationship:
      type: object
      properties:
        id:
          type: string
        customerId:
          type: string
        customerName:
          type: string
        roles:
          type: array
          items:
            type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true

    # ---- Announcement ----
    Announcement:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        body:
          type: string
        type:
          type: string
          enum: [info, warning, maintenance]
        publishedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
        active:
          type: boolean
      required: [id, title, body, type, publishedAt, active]

# ============================================================
# PATHS
# ============================================================
paths:
  # ---- Health & Infrastructure ----
  /health/:
    get:
      operationId: getHealth
      summary: Health check with database and service status
      tags: [Health]
      security: []
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  checks:
                    type: object
                    properties:
                      database:
                        type: string
                      timestamp:
                        type: string
                      version:
                        type: string
                      uptimeSeconds:
                        type: number
                  environment:
                    type: string
        '503':
          description: Unhealthy

  /health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      tags: [Health]
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ready, not_ready]
                  timestamp:
                    type: string

  /health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      tags: [Health]
      security: []
      responses:
        '200':
          description: Alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: alive
                  timestamp:
                    type: string

  /health/detailed:
    get:
      operationId: getHealthDetailed
      summary: Detailed health including KV, R2, queues
      tags: [Health]
      security: []
      responses:
        '200':
          description: Detailed health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  database:
                    type: string
                  kv:
                    type: string
                  r2:
                    type: string
                  queues:
                    type: string
                  timestamp:
                    type: string

  /health/ping:
    get:
      operationId: getHealthPing
      summary: Simple ping/pong
      tags: [Health]
      security: []
      responses:
        '200':
          description: Pong
          content:
            application/json:
              schema:
                type: object
                properties:
                  pong:
                    type: boolean
                    const: true

  /api/metrics:
    get:
      operationId: getMetrics
      summary: Platform metrics
      tags: [Health]
      responses:
        '200':
          description: Metrics data
          content:
            application/json:
              schema:
                type: object
                description: Platform metrics object

  /api/self-test/:
    get:
      operationId: getSelfTest
      summary: Post-deploy self-test verification
      tags: [Health]
      responses:
        '200':
          description: Self-test results
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  checks:
                    type: object
                  user:
                    type: object

  # ---- Authentication ----
  /api/auth/login:
    get:
      operationId: authLogin
      summary: Redirect to Microsoft OAuth login
      description: Rate-limited 5/min. Generates state nonce in KV.
      tags: [Auth]
      security: []
      responses:
        '302':
          description: Redirect to Microsoft OAuth

  /api/auth/login/personal:
    get:
      operationId: authLoginPersonal
      summary: Redirect to Microsoft OAuth with personal scopes
      description: Rate-limited 5/min.
      tags: [Auth]
      security: []
      responses:
        '302':
          description: Redirect to Microsoft OAuth (personal)

  /api/auth/onboard-org:
    get:
      operationId: authOnboardOrg
      summary: Redirect to Microsoft admin-consent for organization
      tags: [Auth]
      responses:
        '302':
          description: Redirect to admin-consent

  /api/auth/login/linkedin:
    get:
      operationId: authLoginLinkedIn
      summary: Redirect to LinkedIn OAuth
      description: Rate-limited 5/min.
      tags: [Auth]
      security: []
      responses:
        '302':
          description: Redirect to LinkedIn OAuth

  /api/auth/callback/linkedin:
    get:
      operationId: authCallbackLinkedIn
      summary: LinkedIn OAuth callback
      description: Rate-limited 5/min.
      tags: [Auth]
      security: []
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to frontend with auth code

  /api/auth/callback:
    get:
      operationId: authCallback
      summary: Microsoft OAuth callback (login and admin-consent)
      description: Rate-limited 5/min. Handles both login and admin-consent flows.
      tags: [Auth]
      security: []
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: admin_consent
          in: query
          schema:
            type: string
        - name: tenant
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to frontend with one-time auth code

  /api/auth/exchange:
    post:
      operationId: authExchange
      summary: Exchange one-time code for session cookie
      description: Rate-limited 5/min.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
              required: [code]
      responses:
        '200':
          description: Session created
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/AuthUser'

  /api/auth/refresh:
    post:
      operationId: authRefresh
      summary: Refresh JWT session
      description: Rate-limited 10/min. Reads token from cookie/header, re-mints with fresh tenant list.
      tags: [Auth]
      security: []
      responses:
        '200':
          description: Token refreshed
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  ok:
                    type: boolean
                  success:
                    type: boolean

  /api/auth/me:
    get:
      operationId: authMe
      summary: Get current authenticated user
      tags: [Auth]
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/AuthUser'
        '401':
          description: Not authenticated

  /api/auth/logout:
    post:
      operationId: authLogout
      summary: Logout and revoke session
      description: Revokes JTI in KV deny-list.
      tags: [Auth]
      security: []
      responses:
        '200':
          description: Logged out
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/auth/ws-ticket:
    get:
      operationId: authWsTicket
      summary: Get short-lived WebSocket/SSE ticket
      description: Returns a 60s short-lived ticket for WS/SSE connections.
      tags: [Auth]
      responses:
        '200':
          description: WS ticket
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket:
                    type: string

  /api/.well-known/jwks.json/:
    get:
      operationId: getJwks
      summary: JWKS endpoint (RS256 public key set)
      description: Cached 1hr. 404 if RS256 not configured.
      tags: [Auth]
      security: []
      responses:
        '200':
          description: JWKS
          content:
            application/json:
              schema:
                type: object
        '404':
          description: RS256 not configured

  # ---- WebAuthn ----
  /api/auth/webauthn/register/options:
    post:
      operationId: webauthnRegisterOptions
      summary: Get WebAuthn registration options
      tags: [WebAuthn]
      responses:
        '200':
          description: Registration options
          content:
            application/json:
              schema:
                type: object
                description: PublicKeyCredentialCreationOptions

  /api/auth/webauthn/register/verify:
    post:
      operationId: webauthnRegisterVerify
      summary: Verify WebAuthn registration
      tags: [WebAuthn]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                response:
                  type: object
                deviceName:
                  type: string
              required: [response]
      responses:
        '200':
          description: Registration verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                  credentialId:
                    type: string

  /api/auth/webauthn/auth/options:
    post:
      operationId: webauthnAuthOptions
      summary: Get WebAuthn authentication options
      tags: [WebAuthn]
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Authentication options
          content:
            application/json:
              schema:
                type: object
                description: PublicKeyCredentialRequestOptions

  /api/auth/webauthn/auth/verify:
    post:
      operationId: webauthnAuthVerify
      summary: Verify WebAuthn authentication
      tags: [WebAuthn]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                response:
                  type: object
              required: [response]
      responses:
        '200':
          description: Authentication verified
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      role:
                        type: string

  # ---- SSO ----
  /api/sso/:
    get:
      operationId: listSsoConnections
      summary: List SSO connections
      description: Rate-limited 30/min.
      tags: [SSO]
      responses:
        '200':
          description: SSO connections
          content:
            application/json:
              schema:
                type: object
                properties:
                  connections:
                    type: array
                    items:
                      $ref: '#/components/schemas/SSOConnection'
    post:
      operationId: createSsoConnection
      summary: Create SSO connection
      description: Rate-limited 30/min. Admin role required.
      tags: [SSO]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                displayName:
                  type: string
                domain:
                  type: string
                issuerUrl:
                  type: string
                clientId:
                  type: string
                metadataUrl:
                  type: string
                certificate:
                  type: string
                jitEnabled:
                  type: boolean
              required: [provider, displayName, domain]
      responses:
        '200':
          description: Connection created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  success:
                    type: boolean

  /api/sso/{id}:
    patch:
      operationId: updateSsoConnection
      summary: Update SSO connection
      tags: [SSO]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Partial SSO connection fields
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      operationId: deleteSsoConnection
      summary: Delete SSO connection
      tags: [SSO]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/sso/{id}/test:
    post:
      operationId: testSsoConnection
      summary: Test SSO connection
      tags: [SSO]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                type: object

  /api/sso/login/{domain}:
    get:
      operationId: ssoLoginByDomain
      summary: Initiate SSO login by domain
      description: Rate-limited 10/min. Public endpoint.
      tags: [SSO]
      security: []
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to IdP

  /api/sso/callback/oidc:
    get:
      operationId: ssoCallbackOidc
      summary: OIDC SSO callback
      description: Rate-limited 10/min.
      tags: [SSO]
      security: []
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: id_token
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to frontend with session cookie

  /api/sso/callback/saml:
    post:
      operationId: ssoCallbackSaml
      summary: SAML SSO callback
      description: Rate-limited 10/min.
      tags: [SSO]
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                state:
                  type: string
      responses:
        '302':
          description: Redirect to frontend with session cookie

  /api/sso/scim-tokens/:
    get:
      operationId: listScimTokens
      summary: List SCIM provisioning tokens
      tags: [SSO]
      responses:
        '200':
          description: SCIM tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScimToken'
    post:
      operationId: createScimToken
      summary: Create SCIM provisioning token
      description: Admin role required. Plaintext token shown once.
      tags: [SSO]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
              required: [name, scopes]
      responses:
        '200':
          description: Token created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  token:
                    type: string
                    description: Plaintext token, shown once

  /api/sso/scim-tokens/{id}:
    delete:
      operationId: deleteScimToken
      summary: Delete SCIM token
      tags: [SSO]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # ---- SCIM 2.0 ----
  /scim/v2/Users:
    get:
      operationId: scimListUsers
      summary: List SCIM users (RFC 7644)
      tags: [SCIM]
      security:
        - scimBearerAuth: []
      parameters:
        - name: filter
          in: query
          schema:
            type: string
        - name: startIndex
          in: query
          schema:
            type: integer
        - name: count
          in: query
          schema:
