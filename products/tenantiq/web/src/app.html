<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" type="image/png" sizes="512x512" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="description" content="AI-powered Microsoft 365 security, compliance, and cost intelligence for MSPs. 100+ CIS controls, AI security agent, license optimization, and compliance automation." />
		<meta name="theme-color" content="#4F46E5" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="TenantIQ" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/brand/app-icon.png" />
		<link rel="canonical" href="https://app.tenantiq.app" />

		<!-- SEO: Additional meta -->
		<meta name="keywords" content="Microsoft 365 security, MSP platform, CIS benchmark, M365 compliance, license optimization, AI security, tenant management, SOC 2, HIPAA, GDPR, Azure AD, managed service provider" />
		<meta name="author" content="TenantIQ" />
		<meta name="robots" content="index, follow" />

		<!-- Performance: preconnect to API -->
		<link rel="preconnect" href="https://api.tenantiq.app" crossorigin />
		<link rel="dns-prefetch" href="https://api.tenantiq.app" />

		<!-- OG/Twitter meta is emitted by the layout's <svelte:head> so per-route
		     overrides (e.g. /scan/:domain shareable URLs) can swap the image. -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="TenantIQ" />
		<meta property="og:locale" content="en_US" />

		<!-- JSON-LD Structured Data: Organization -->
		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "Organization",
			"name": "TenantIQ",
			"url": "https://app.tenantiq.app",
			"logo": "https://app.tenantiq.app/favicon.svg",
			"description": "AI-powered Microsoft 365 security, compliance, and cost intelligence platform for Managed Service Providers.",
			"contactPoint": {
				"@type": "ContactPoint",
				"url": "https://app.tenantiq.app/support",
				"contactType": "customer support"
			},
			"sameAs": []
		}
		</script>

		<!-- JSON-LD Structured Data: SoftwareApplication -->
		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "SoftwareApplication",
			"name": "TenantIQ",
			"applicationCategory": "SecurityApplication",
			"operatingSystem": "Web",
			"url": "https://app.tenantiq.app",
			"description": "AI-powered Microsoft 365 security, compliance, and cost intelligence for MSPs. Automate CIS benchmarks, detect threats, optimize licenses, and manage compliance across all tenants.",
			"offers": [
				{
					"@type": "Offer",
					"name": "Starter",
					"price": "49",
					"priceCurrency": "USD",
					"priceSpecification": {
						"@type": "UnitPriceSpecification",
						"price": "49",
						"priceCurrency": "USD",
						"unitText": "tenant/month"
					},
					"description": "Up to 9 tenants. 100+ CIS controls, security dashboard, license reports."
				},
				{
					"@type": "Offer",
					"name": "Professional",
					"price": "99",
					"priceCurrency": "USD",
					"priceSpecification": {
						"@type": "UnitPriceSpecification",
						"price": "99",
						"priceCurrency": "USD",
						"unitText": "tenant/month"
					},
					"description": "Up to 25 tenants. AI Agent, auto-remediation, SOC 2/HIPAA/GDPR compliance, workflow automation."
				},
				{
					"@type": "Offer",
					"name": "Enterprise",
					"price": "0",
					"priceCurrency": "USD",
					"description": "Custom pricing. Unlimited tenants, SSO/SAML, white-label, SLA guarantee."
				}
			],
			"featureList": [
				"100+ CIS Benchmark Controls",
				"AI Security Agent with 13+ Tools",
				"One-Click Auto-Remediation with Rollback",
				"License Optimization (20-40% savings)",
				"SOC 2, HIPAA, GDPR Compliance Mapping",
				"Real-Time Threat Detection",
				"Multi-Tenant Management",
				"Workflow Automation (25 templates)",
				"Email Security Analysis",
				"Microsoft Secure Score Tracking",
				"User Lifecycle Management",
				"Executive PDF Reports"
			],
			"screenshot": "https://app.tenantiq.app/favicon.svg",
			"softwareVersion": "2.0"
		}
		</script>

		<!-- JSON-LD Structured Data: FAQPage -->
		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "FAQPage",
			"mainEntity": [
				{
					"@type": "Question",
					"name": "What is TenantIQ?",
					"acceptedAnswer": {
						"@type": "Answer",
						"text": "TenantIQ is an AI-powered Microsoft 365 security, compliance, and cost intelligence platform built for Managed Service Providers (MSPs). It provides a unified control plane to secure, optimize, and manage all your Microsoft 365 tenants with 100+ CIS controls, an AI security agent, and automated remediation."
					}
				},
				{
					"@type": "Question",
					"name": "How much does TenantIQ cost?",
					"acceptedAnswer": {
						"@type": "Answer",
						"text": "TenantIQ offers three plans: Starter at $49/tenant/month (up to 9 tenants), Professional at $99/tenant/month (up to 25 tenants with AI Agent and compliance), and Enterprise with custom pricing for 50+ tenants. Volume discounts are available starting from $45/tenant/month. All plans include a 14-day free trial with no credit card required."
					}
				},
				{
					"@type": "Question",
					"name": "What compliance frameworks does TenantIQ support?",
					"acceptedAnswer": {
						"@type": "Answer",
						"text": "TenantIQ supports SOC 2, HIPAA, GDPR, Zero Trust, and CIS benchmark frameworks. It provides automated evidence collection, continuous monitoring, drift detection, and audit-ready PDF report generation for all supported frameworks."
					}
				},
				{
					"@type": "Question",
					"name": "How does TenantIQ's AI Agent work?",
					"acceptedAnswer": {
						"@type": "Answer",
						"text": "TenantIQ's AI Agent uses 13+ specialized tools powered by Anthropic Claude to answer natural language queries about your Microsoft 365 tenants. Ask questions like 'Who hasn't signed in for 90 days?' or 'Show me license waste across all tenants' and get actionable insights with specific recommendations."
					}
				}
			]
		}
		</script>

		<!-- Analytics: uncomment and set domain to enable -->
		<!-- <script defer data-domain="app.tenantiq.app" src="https://plausible.io/js/script.js"></script> -->

		<!-- LemonSqueezy overlay checkout -->
		<script src="https://app.lemonsqueezy.com/js/lemon.js" defer></script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
