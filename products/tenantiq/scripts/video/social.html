<!--
  TenantIQ Social Clip — 30 seconds (vertical 9:16)
  =========================================
  HOW TO RECORD:
  1. Open this file in Chrome
  2. The content is centered at 390x844px (mobile vertical)
  3. Use DevTools device toolbar or crop your recording to the phone frame
  4. Animations auto-play on load — no interaction needed
  5. Total duration: ~30 seconds
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TenantIQ — Social Clip</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #060b0f; --green: #10b981; --green-glow: rgba(16,185,129,0.4);
    --white: #ffffff; --gray: #94a3b8; --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }
  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #000; display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
  }
  .phone-frame {
    width: 390px; height: 844px; background: var(--bg); position: relative;
    overflow: hidden; border-radius: 20px;
    box-shadow: 0 0 60px rgba(16,185,129,0.1);
  }
  .scene {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem;
    opacity: 0; pointer-events: none;
  }

  /* Scene 1: Hook (0-3s) */
  .scene-hook { animation: scIn 0.3s 0.3s var(--ease) forwards, scOut 0.3s 3s var(--ease) forwards; }
  .scene-hook h1 {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2.6rem; font-weight: 900;
    text-align: center; color: var(--white); line-height: 1.15;
    animation: slamIn 0.5s 0.5s var(--ease) forwards; opacity: 0;
  }
  .scene-hook .money {
    color: var(--green); font-size: 3.2rem;
    animation: shake 0.4s 1.2s ease forwards;
  }
  @keyframes slamIn { from { opacity: 0; transform: scale(1.5); } to { opacity: 1; transform: scale(1); } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

  /* Scene 2: Problem (3-8s) */
  .scene-problem { animation: scIn 0.3s 3.3s var(--ease) forwards, scOut 0.3s 8s var(--ease) forwards; }
  .scene-problem h2 {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2rem; font-weight: 800;
    text-align: center; color: var(--gray); line-height: 1.3;
    animation: slideUp 0.5s 3.6s var(--ease) forwards; opacity: 0;
  }
  .scene-problem .highlight { color: var(--white); }
  .tenant-count {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 5rem; font-weight: 900;
    color: var(--green); margin-top: 1rem;
    animation: countPop 0.6s 4.5s var(--ease) forwards; opacity: 0;
  }
  .tenant-label { color: var(--gray); font-size: 1rem; margin-top: 0.3rem; animation: slideUp 0.4s 5s var(--ease) forwards; opacity: 0; }
  @keyframes countPop { from { opacity: 0; transform: scale(0.3); } to { opacity: 1; transform: scale(1); } }

  /* Scene 3: Solution (8-15s) */
  .scene-solution { animation: scIn 0.3s 8.3s var(--ease) forwards, scOut 0.3s 15s var(--ease) forwards; }
  .scene-solution .logo {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2.4rem; font-weight: 900;
    color: var(--white); margin-bottom: 1rem;
    animation: slideUp 0.4s 8.5s var(--ease) forwards; opacity: 0;
    text-shadow: 0 0 20px var(--green-glow);
  }
  .scene-solution h2 {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.6rem; font-weight: 700;
    text-align: center; color: var(--white); line-height: 1.4;
    animation: slideUp 0.4s 9s var(--ease) forwards; opacity: 0;
  }
  .scan-visual {
    width: 280px; height: 280px; border-radius: 50%; position: relative;
    margin-top: 2rem; animation: slideUp 0.5s 9.5s var(--ease) forwards; opacity: 0;
  }
  .scan-ring-outer {
    position: absolute; inset: 0; border: 3px solid var(--green);
    border-radius: 50%; border-top-color: transparent;
    animation: spin 1.5s 10s linear infinite;
  }
  .scan-ring-inner {
    position: absolute; inset: 30px; border: 2px dashed rgba(16,185,129,0.3);
    border-radius: 50%; animation: spin 2s 10s linear reverse infinite;
  }
  .scan-center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;
  }
  .scan-center .check { font-size: 3rem; opacity: 0; animation: countPop 0.5s 12s var(--ease) forwards; }
  .scan-center .text { font-size: 0.9rem; color: var(--green); font-weight: 600; margin-top: 0.3rem; opacity: 0; animation: slideUp 0.3s 12.5s var(--ease) forwards; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scene 4: Proof (15-22s) */
  .scene-proof { animation: scIn 0.3s 15.3s var(--ease) forwards, scOut 0.3s 22s var(--ease) forwards; }
  .proof-items { display: flex; flex-direction: column; gap: 1.5rem; align-items: center; }
  .proof-item {
    background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2);
    border-radius: 14px; padding: 1rem 2rem; text-align: center;
    font-weight: 700; font-size: 1.1rem; color: var(--white);
    opacity: 0; transform: translateY(20px);
  }
  .proof-item .num { color: var(--green); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.4rem; }
  .proof-item:nth-child(1) { animation: cardIn 0.4s 15.8s var(--ease) forwards; }
  .proof-item:nth-child(2) { animation: cardIn 0.4s 16.3s var(--ease) forwards; }
  .proof-item:nth-child(3) { animation: cardIn 0.4s 16.8s var(--ease) forwards; }

  /* Scene 5: CTA (22-30s) */
  .scene-cta { animation: scIn 0.3s 22.3s var(--ease) forwards; }
  .scene-cta .logo-end {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 3rem; font-weight: 900;
    margin-bottom: 2rem; animation: slideUp 0.5s 22.5s var(--ease) forwards; opacity: 0;
    text-shadow: 0 0 30px var(--green-glow); color: var(--white);
  }
  .scene-cta .cta-btn {
    background: var(--green); color: var(--bg); font-weight: 700; font-size: 1.2rem;
    padding: 1rem 3rem; border-radius: 14px; border: none;
    animation: slideUp 0.5s 23s var(--ease) forwards, pulse 1.5s 24s ease-in-out infinite; opacity: 0;
  }
  .scene-cta .url { color: var(--green); font-size: 1rem; margin-top: 1.2rem; animation: slideUp 0.4s 23.5s var(--ease) forwards; opacity: 0; }

  /* Shared */
  @keyframes scIn { to { opacity: 1; } }
  @keyframes scOut { to { opacity: 0; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="scene scene-hook">
    <h1>MSPs are losing<br><span class="money">$$$$</span><br>on unused M365 licenses</h1>
  </div>
  <div class="scene scene-problem">
    <h2>You manage <span class="highlight">50+ tenants</span><br>but can't see<br>what's wasted</h2>
    <div class="tenant-count">50+</div>
    <div class="tenant-label">tenants, zero visibility</div>
  </div>
  <div class="scene scene-solution">
    <div class="logo">TenantIQ</div>
    <h2>Scans every tenant<br>in seconds</h2>
    <div class="scan-visual">
      <div class="scan-ring-outer"></div>
      <div class="scan-ring-inner"></div>
      <div class="scan-center">
        <div class="check">&#10003;</div>
        <div class="text">Scan complete</div>
      </div>
    </div>
  </div>
  <div class="scene scene-proof">
    <div class="proof-items">
      <div class="proof-item"><span class="num">100+</span> CIS Controls</div>
      <div class="proof-item"><span class="num">AI-Powered</span> Anomaly Detection</div>
      <div class="proof-item"><span class="num">SOC 2</span> Compliant</div>
    </div>
  </div>
  <div class="scene scene-cta">
    <div class="logo-end">TenantIQ</div>
    <div class="cta-btn">Start free</div>
    <div class="url">app.tenantiq.app</div>
  </div>
</div>
</body>
</html>
