name = "tenantiq-ai-engine"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[placement]
mode = "smart"

# Secrets (set via `wrangler secret put`):
#   OPENAI_API_KEY        — Required: OpenAI API key for LLM calls
#   ANTHROPIC_API_KEY     — Optional: Anthropic/Claude fallback
#   OPENCLAW_URL          — Optional: OpenClaw backend URL (Luna agents)
#   OPENCLAW_SERVICE_KEY  — Optional: OpenClaw auth key

[vars]
ENVIRONMENT = "production"
