name: Feature Request
description: Request a new LunaForge capability
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: Your Idea
      placeholder: Explain the feature
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature useful?

  - type: textarea
    id: spec
    attributes:
      label: Expected Behavior / API