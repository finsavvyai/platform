name: Bug Report
description: Report a bug or unexpected behavior in LunaForge
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Activate Ritual Mode
        2. Run "Generate API"
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots

  - type: input
    id: version
    attributes:
      label: LunaForge Version