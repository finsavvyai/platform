name: Auto Version

on:
  push:
    branches: [main]

jobs:
  version:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
        
      - name: Install deps
        run: npm install

      - name: Bump version
        run: npx standard-version

      - name: Push tags
        run: |
          git push --follow-tags origin main