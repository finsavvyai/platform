<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Portal - LunaForge</title>
    <style>
        body {
            background: #050510;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .card {
            text-align: center;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #9d4edd;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="loader"></div>
        <h2>Redirecting to Secure Payment...</h2>
        <p style="color: rgba(255,255,255,0.6)">Please wait while we initialize the billing session.</p>
    </div>
    <script>
        // Simulate redirect to Stripe/PayPlus
        setTimeout(() => {
            alert("This is a demo billing portal. In production, this redirects to Stripe.");
        }, 1500);
    </script>
</body>

</html>
