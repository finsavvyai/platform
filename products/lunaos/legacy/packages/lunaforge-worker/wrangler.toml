name = "lunaforge-mcp"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
RATE_LIMIT_REQUESTS = 100
RATE_LIMIT_WINDOW_MS = 60000

# Production environment
[env.production]
vars = { ENVIRONMENT = "production", RATE_LIMIT_REQUESTS = 100, RATE_LIMIT_WINDOW_MS = 60000 }

# Staging environment (more permissive)
[env.staging]
vars = { ENVIRONMENT = "staging", RATE_LIMIT_REQUESTS = 1000, RATE_LIMIT_WINDOW_MS = 60000 }

# Development (no rate limiting)
[env.development]
vars = { ENVIRONMENT = "development", RATE_LIMIT_REQUESTS = 10000, RATE_LIMIT_WINDOW_MS = 60000 }

# Secrets (set via: npx wrangler secret put API_KEY)
# API_KEY = "secret"
