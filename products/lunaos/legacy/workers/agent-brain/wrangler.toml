name = "lunaforge-agent-brain-worker"
main = "src/index.ts"
compatibility_date = "2024-10-01"

[vars]
# Comma-separated fallback chain, e.g. "anthropic,openai"
LUNAFORGE_MYTHIC_PROVIDERS = "anthropic,openai"

# Non-secret routing hints (real secrets are set via `wrangler secret put`)
OPENAI_API_BASE = "https://api.openai.com/v1"
ANTHROPIC_API_BASE = "https://api.anthropic.com/v1"
ZAI_API_BASE = "https://api.zai.example.com"

# KV Namespace for subscription storage
# Created with: wrangler kv:namespace create SUBSCRIPTIONS
[[kv_namespaces]]
binding = "SUBSCRIPTIONS"
id = "7f8ee69e7db84947ba32a650e0f8a19c"

# Secrets to configure (use `wrangler secret put <NAME>`):
# - LEMONSQUEEZY_SIGNING_SECRET
# - LEMONSQUEEZY_API_KEY
# - OPENAI_API_KEY (if using OpenAI)
# - ANTHROPIC_API_KEY (if using Anthropic)
