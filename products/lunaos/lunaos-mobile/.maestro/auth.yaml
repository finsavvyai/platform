appId: org.name.LunaOS
---
- launchApp:
    clearState: true
- assertVisible: "Welcome Back"
- assertVisible: "Sign in to your LunaOS account"
- tapOn: "Sign In"
- assertVisible: "Email is required"

- tapOn: "you@example.com"
- inputText: "test@example.com"
- tapOn: "Sign In"
- assertVisible: "Password must be at least 8 characters"

- tapOn: "Min 8 characters"
- inputText: "123"
- tapOn: "Sign In"
- assertVisible: "Password must be at least 8 characters"
