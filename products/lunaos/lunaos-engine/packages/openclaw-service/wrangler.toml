name = "openclaw-service"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "openclaw"
VERSION = "1.0.0"

# D1 Database — shared with LunaOS engine
[[d1_databases]]
binding = "DB"
database_name = "lunaos-engine-db"
database_id = "38ff1ff7-8f09-482a-b348-ca4c76b7f5d5"

# KV for session cache & gateway state
[[kv_namespaces]]
binding = "KV"
id = "77db46cd05e7405b915114a87fba71fb"

# Workers AI for embeddings
[ai]
binding = "AI"

# Vectorize for RAG
[[vectorize]]
binding = "VECTORIZE"
index_name = "luna-code-index"

# Smart placement for global performance
[placement]
mode = "smart"

# Production overrides
[env.production]
name = "openclaw-service"

[env.production.vars]
ENVIRONMENT = "production"
