name = "luna-agents-api-auth"
main = "index.js"
compatibility_date = "2024-01-01"

# KV namespace for API keys and usage tracking
[[kv_namespaces]]
binding = "API_KEYS"
id = "db782e1cd35c4024beaa3c5c73c71757"

[vars]
# Public variables
ENVIRONMENT = "production"

# Secrets (set with: wrangler secret put SECRET_NAME)
# WEBHOOK_SECRET - Secret for webhook authentication
# Run: wrangler secret put WEBHOOK_SECRET

# Routes
routes = [
  { pattern = "auth.lunaos.ai/*", zone_name = "lunaos.ai" }
]

# Or use workers.dev for testing
workers_dev = true
