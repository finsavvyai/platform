name = "luna-vision-rag"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Account ID from your .zshrc
account_id = "d2fe608a92dc9faa2ce5b0fd2cad5eb7"

# Keep workers.dev subdomain active
workers_dev = true

# Custom domain configuration (add via Cloudflare Dashboard)
# Route: rag.lunaos.ai/* -> luna-vision-rag worker
# Zone ID: cb6caa02e2da8b39e826cd6ba9fb18df

[vars]
ENVIRONMENT = "production"
APP_NAME = "Luna Vision RAG"
APP_VERSION = "1.0.0"
CUSTOM_DOMAIN = "rag.lunaos.ai"

# R2 Buckets for storage (already created)
[[r2_buckets]]
binding = "SCREENSHOTS"
bucket_name = "luna-screenshots"

[[r2_buckets]]
binding = "REPORTS"
bucket_name = "luna-test-reports"
