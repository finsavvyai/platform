# PushCI config for luna-agents — agents.lunaos.ai
# Built by /impeccable. Edit freely; pushci respects what's here.
#
# Required secrets (set in PushCI dashboard):
#   cf-write-token   — Cloudflare API token, Pages:Edit scope
#   cf-account-id    — Cloudflare account id
# Wrangler reads CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID from env; we inject
# the kebab-case secrets into those env names at each deploy step.

version: 1
project: luna-agents
description: Luna Agents CLI + Claude Code plugin + agents.lunaos.ai site

# Triggers — when this pipeline runs
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "commands/**"          # lexicon regenerates from these
      - ".pushci.yml"
  pull_request:
    branches: [main]
    paths:
      - "site/**"
      - "commands/**"
  workflow_dispatch:           # manual trigger

# Reusable env
env:
  NODE_VERSION: "20"
  SITE_DIR: site
  CF_PROJECT: luna-agent
  CF_BRANCH_PROD: main

# Pipelines
jobs:
  # --------------------------------------------------------------------
  # 1. Build + verify the site
  # --------------------------------------------------------------------
  build-site:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - checkout
      - setup-node:
          version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: cd $SITE_DIR && npm ci
        name: install
      - run: cd $SITE_DIR && npm run build
        name: build (regenerates lexicon, then astro build)
      - run: |
          test -d $SITE_DIR/dist || (echo "no dist/" && exit 1)
          test -f $SITE_DIR/dist/index.html || (echo "no index.html" && exit 1)
          test -f $SITE_DIR/dist/lexicon/index.html || (echo "no lexicon/" && exit 1)
        name: verify dist
      - artifact:
          name: site-dist
          path: site/dist

  # --------------------------------------------------------------------
  # 2. Audit the build — design rules + a11y bans
  # --------------------------------------------------------------------
  audit-site:
    name: audit site
    runs-on: ubuntu-latest
    needs: [build-site]
    steps:
      - checkout
      - artifact-download:
          name: site-dist
          path: site/dist
      - run: |
          # Em / en dashes are banned per DESIGN.md
          if grep -rn "[—–]" site/dist/; then
            echo "::error::dashes found in built HTML"
            exit 1
          fi
          # Banned adjectives
          if grep -riE "blazing.?fast|AI.powered|cutting.edge" site/dist/; then
            echo "::error::banned adjective in copy"
            exit 1
          fi
          # No left-stripe side borders > 1px in inline CSS
          if grep -rnE 'border-(left|right):\s*[2-9]px' site/dist/; then
            echo "::error::side-stripe border detected"
            exit 1
          fi
        name: audit (dashes + banned copy + side-stripes)

  # --------------------------------------------------------------------
  # 3. Deploy to Cloudflare Pages — preview on PR, prod on main
  # --------------------------------------------------------------------
  deploy-preview:
    name: deploy preview
    runs-on: ubuntu-latest
    needs: [build-site, audit-site]
    if: github.event_name == 'pull_request'
    secrets: [cf-write-token, cf-account-id]
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.cf-write-token }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.cf-account-id }}
    steps:
      - artifact-download:
          name: site-dist
          path: site/dist
      - run: |
          npx wrangler@4 pages deploy site/dist \
            --project-name $CF_PROJECT \
            --branch pr-${{ github.event.pull_request.number }} \
            --commit-hash ${{ github.sha }}

  deploy-prod:
    name: deploy production
    runs-on: ubuntu-latest
    needs: [build-site, audit-site]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    secrets: [cf-write-token, cf-account-id]
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.cf-write-token }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.cf-account-id }}
    steps:
      - artifact-download:
          name: site-dist
          path: site/dist
      - run: |
          npx wrangler@4 pages deploy site/dist \
            --project-name $CF_PROJECT \
            --branch $CF_BRANCH_PROD \
            --commit-hash ${{ github.sha }} \
            --commit-message "${{ github.event.head_commit.message }}"
      - notify:
          on: success
          message: "agents.lunaos.ai deployed: ${{ github.sha }}"

# AI-native overrides — pushci will optimize within these bounds
ai:
  optimize: true               # let pushci suggest perf wins
  auto-rollback: true          # roll back on 5xx spike post-deploy
  budget:
    p95_ms: 250                # alert if p95 latency exceeds
    error_rate: 0.005          # 0.5% threshold
    bundle_kb: 250             # alert if any page bundle exceeds
