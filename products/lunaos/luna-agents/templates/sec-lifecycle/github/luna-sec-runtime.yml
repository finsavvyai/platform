name: Luna Security — Runtime DAST

on:
  workflow_run:
    workflows: ['Deploy']
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to scan'
        required: true

permissions:
  contents: read
  issues: write     # auto-file issues on Critical findings

jobs:
  luna-sec-runtime:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install luna-agents
        run: npm install -g luna-agents

      - name: Resolve target URL
        id: url
        run: echo "u=${{ github.event.inputs.target_url || vars.STAGING_URL }}" >> $GITHUB_OUTPUT

      - name: Run runtime DAST
        run: npx luna-agents ll-sec-runtime --target_url ${{ steps.url.outputs.u }} --rollback_on_critical false

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luna-sec-runtime-report
          path: .luna/*/security/runtime-summary.md
          retention-days: 30

      - name: Open issue on Critical
        if: failure()
        run: |
          gh issue create --title "Runtime DAST: Critical finding on ${{ steps.url.outputs.u }}" \
                          --label "security,critical" \
                          --body-file .luna/*/security/runtime-summary.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
