<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Luna Pipes, a small concatenative language for composing AI agent skills.">
  <defs>
    <style>
      .paper { fill: oklch(0.975 0.008 85); }
      .saffron { fill: oklch(0.74 0.165 62); }
      .ink { fill: oklch(0.18 0.012 70); }
      .deep { fill: oklch(0.58 0.18 50); }
      .display { font-family: "Instrument Serif", "Times New Roman", serif; font-style: italic; }
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-weight: 500; }
      .body { font-family: "Inter Tight", system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="630" class="paper"/>

  <!-- saffron sidebar -->
  <rect x="0" y="0" width="80" height="630" class="saffron"/>

  <!-- edition line -->
  <text x="140" y="100" class="mono ink" font-size="22" letter-spacing="4">FIRST EDITION · 2026</text>

  <!-- masthead -->
  <text x="140" y="240" class="display ink" font-size="180" letter-spacing="-3">Luna</text>
  <text x="440" y="240" class="display deep" font-size="180" letter-spacing="-3">Pipes</text>

  <!-- tagline -->
  <text x="140" y="310" class="display ink" font-size="44" letter-spacing="-0.5">A small concatenative language</text>
  <text x="140" y="360" class="display ink" font-size="44" letter-spacing="-0.5">for composing AI agent skills.</text>

  <!-- hello world -->
  <rect x="140" y="430" width="940" height="120" class="ink"/>
  <text x="170" y="475" class="mono saffron" font-size="22">$</text>
  <text x="200" y="475" class="mono paper" font-size="22">/persona generate</text>
  <text x="430" y="475" class="mono deep" font-size="22">&gt;&gt;</text>
  <text x="475" y="475" class="mono paper" font-size="22">ghost "launch post"</text>
  <text x="725" y="475" class="mono deep" font-size="22">&gt;&gt;</text>
  <text x="770" y="475" class="mono paper" font-size="22">publish notion</text>
  <text x="170" y="525" class="mono" fill="oklch(0.62 0.012 80)" font-size="18">ok. composed in 14ms.</text>

  <!-- footer -->
  <text x="140" y="600" class="mono ink" font-size="18" letter-spacing="2">AGENTS.LUNAOS.AI · 277 ENTRIES · MIT</text>
</svg>
