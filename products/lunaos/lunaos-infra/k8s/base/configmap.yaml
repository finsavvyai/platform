apiVersion: v1
kind: ConfigMap
metadata:
  name: lunaos-config
  labels:
    app: lunaos
data:
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  CORS_ORIGINS: "*"
  MAX_CONNECTIONS: "100"
  POOL_SIZE: "20"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
---
apiVersion: v1
kind: Secret
metadata:
  name: lunaos-secrets
  labels:
    app: lunaos
type: Opaque
stringData:
  database-url: "postgresql://lunaos:CHANGE_ME@postgres:5432/lunaos"
  redis-url: "redis://redis:6379/0"
  secret-key: "CHANGE_ME_TO_A_SECURE_SECRET_KEY"
  openai-api-key: ""
  anthropic-api-key: ""
