apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: service-invocation
  namespace: default
spec:
  type: middleware.http.serviceinvocation
  version: v1
  metadata:
    - name: timeout
      value: "30s"
    - name: retryPolicy
      value: "exponential"
    - name: retryCount
      value: "3"
    - name: retryInterval
      value: "1s"
    - name: circuitBreaker
      value: "true"
    - name: circuitBreakerThreshold
      value: "5"
    - name: circuitBreakerTimeout
      value: "30s"
    - name: loadBalancing
      value: "roundrobin"
    - name: healthCheck
      value: "true"
    - name: healthCheckPath
      value: "/health"
    - name: healthCheckInterval
      value: "30s"
  scopes:
    - lunaos-api
    - lunaos-agent-runtime
    - lunaos-plugin-gateway
