apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: observability
  namespace: default
spec:
  type: middleware.http.observability
  version: v1
  metadata:
    - name: tracing
      value: "true"
    - name: metrics
      value: "true"
    - name: samplingRate
      value: "1.0"
    - name: zipkinEndpoint
      value: "http://localhost:9411/api/v2/spans"
    - name: jaegerEndpoint
      value: "http://localhost:14268/api/traces"
    - name: otelExporterEndpoint
      value: "http://localhost:4317"
    - name: prometheusMetrics
      value: "true"
    - name: prometheusPort
      value: "9090"
    - name: prometheusPath
      value: "/metrics"
    - name: healthCheck
      value: "true"
    - name: healthCheckPath
      value: "/health"
    - name: healthCheckInterval
      value: "30s"
  scopes:
    - lunaos-api
    - lunaos-agent-runtime
    - lunaos-plugin-gateway
