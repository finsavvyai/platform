apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: default
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "localhost:6379"
    - name: redisPassword
      value: ""
    - name: enableTLS
      value: "false"
    - name: maxRetries
      value: "3"
    - name: maxRetryBackoff
      value: "2s"
    - name: processingTimeout
      value: "5s"
    - name: redeliverInterval
      value: "2s"
    - name: cleanupInterval
      value: "1h"
    - name: keyPrefix
      value: "lunaos:"
    - name: keyTTL
      value: "24h"
  scopes:
    - lunaos-api
    - lunaos-agent-runtime
    - lunaos-plugin-gateway
