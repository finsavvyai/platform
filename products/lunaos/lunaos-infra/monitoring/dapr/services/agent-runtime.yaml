apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: lunaos-agent-runtime-config
  namespace: default
spec:
  appId: lunaos-agent-runtime
  appPort: 8003
  daprHttpPort: 3501
  daprGrpcPort: 50002
  config: lunaos-config
  components:
    - name: statestore
      type: state.redis
      version: v1
    - name: pubsub
      type: pubsub.redis
      version: v1
  subscriptions:
    - pubsubname: pubsub
      topic: agent-events
      route: /runtime/events/agents
    - pubsubname: pubsub
      topic: plugin-events
      route: /runtime/events/plugins
    - pubsubname: pubsub
      topic: system-events
      route: /runtime/events/system
  httpPipeline:
    handlers:
      - name: serviceinvocation
        type: middleware.http.serviceinvocation
      - name: observability
        type: middleware.http.observability
  accessControl:
    defaultAction: allow
    trustDomain: "public"
    policies:
      - appId: lunaos-agent-runtime
        defaultAction: allow
        trustDomain: "public"
        operations:
          - name: /agents/*
            httpVerb: ["GET", "POST", "PUT", "DELETE"]
            action: allow
          - name: /runtime/*
            httpVerb: ["GET", "POST"]
            action: allow
