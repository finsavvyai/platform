events {
    worker_connections 1024;
}

http {
    upstream lunaos_api {
        server lunaos-api:8000;
    }

    upstream lunaos_dashboard {
        server lunaos-dashboard:3000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=dashboard:10m rate=5r/s;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # API server
    server {
        listen 80;
        server_name api.lunaos.ai;

        # Rate limiting
        limit_req zone=api burst=20 nodelay;

        # Proxy to LunaOS API
        location / {
            proxy_pass http://lunaos_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://lunaos_api/health;
            access_log off;
        }
    }

    # Dashboard server
    server {
        listen 80;
        server_name dashboard.lunaos.ai;

        # Rate limiting
        limit_req zone=dashboard burst=10 nodelay;

        # Proxy to LunaOS Dashboard
        location / {
            proxy_pass http://lunaos_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Main server (redirects to dashboard)
    server {
        listen 80 default_server;
        server_name _;

        location / {
            return 301 http://dashboard.lunaos.ai$request_uri;
        }
    }
}
