version: '3.8'

# =============================================================================
# LunaOS Production Docker Compose
# =============================================================================
# Usage: docker-compose -f docker-compose.production.yml up -d
# 
# Prerequisites:
# 1. Copy env.production.example to .env.production
# 2. Fill in all required values
# 3. Set up SSL certificates in ./certs/
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL with pgvector
  # ===========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lunaos-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lunaos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lunaos}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"  # Only bind to localhost
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lunaos} -d ${POSTGRES_DB:-lunaos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - lunaos-network

  # ===========================================================================
  # Redis for caching and queues
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: lunaos-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"  # Only bind to localhost
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - lunaos-network

  # ===========================================================================
  # LunaOS API (main application)
  # ===========================================================================
  lunaos-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: production
    container_name: lunaos-api-prod
    restart: always
    env_file:
      - ../../.env.production
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-lunaos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lunaos}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ENVIRONMENT=production
      - DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '0.5'
      replicas: 2
    networks:
      - lunaos-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.lunaos.ai`)"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  # ===========================================================================
  # Celery Worker (background tasks)
  # ===========================================================================
  celery-worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: production
    container_name: lunaos-celery-prod
    restart: always
    command: celery -A lunaos.tasks worker --loglevel=info --concurrency=4
    env_file:
      - ../../.env.production
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-lunaos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lunaos}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 256M
    networks:
      - lunaos-network

  # ===========================================================================
  # Celery Beat (scheduled tasks)
  # ===========================================================================
  celery-beat:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: production
    container_name: lunaos-celery-beat-prod
    restart: always
    command: celery -A lunaos.tasks beat --loglevel=info
    env_file:
      - ../../.env.production
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-lunaos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lunaos}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ENVIRONMENT=production
    depends_on:
      - celery-worker
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - lunaos-network

  # ===========================================================================
  # Traefik Reverse Proxy (with automatic SSL)
  # ===========================================================================
  traefik:
    image: traefik:v3.0
    container_name: lunaos-traefik-prod
    restart: always
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
      - traefik_logs:/var/log/traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.lunaos.ai`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
    networks:
      - lunaos-network

  # ===========================================================================
  # Prometheus (metrics collection)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: lunaos-prometheus-prod
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - lunaos-network

  # ===========================================================================
  # Grafana (metrics visualization)
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: lunaos-grafana-prod
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.lunaos.ai
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.lunaos.ai`)"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    networks:
      - lunaos-network

# =============================================================================
# Networks
# =============================================================================
networks:
  lunaos-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  traefik_certs:
    driver: local
  traefik_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
