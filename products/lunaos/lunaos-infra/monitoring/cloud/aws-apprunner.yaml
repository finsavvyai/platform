version: 1.0
runtime: python3
build:
  commands:
    build:
      - pip install -r requirements.txt
run:
  runtime-version: 3.9
  command: python -m lunaos.cli run --host 0.0.0.0 --port 8000
  network:
    port: 8000
    env: PORT
  env:
    - name: PORT
      value: "8000"
    - name: ENVIRONMENT
      value: "production"
    - name: DEBUG
      value: "false"
    - name: SECRET_KEY
      value: "your-secret-key"
    - name: DATABASE_URL
      value: "postgresql://user:pass@host:5432/lunaos"
    - name: REDIS_URL
      value: "redis://host:6379"
