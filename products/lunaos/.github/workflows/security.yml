name: Security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: npm audit (Critical/High block)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package:
          - lunaos-engine/packages/api
          - lunaos-dashboard
          - lunaos-studio
          - lunaos-mobile
          - luna-agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Audit ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: |
          if [ -f package.json ]; then
            npm install --no-audit --no-fund --legacy-peer-deps --ignore-scripts || true
            # Fail on Critical or High; allow Medium/Low for now
            npm audit --omit=dev --audit-level=high
          fi

  codeql:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
