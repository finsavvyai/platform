<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunaOS - AI Orchestration Platform</title>
    <meta name="description" content="Next-generation AI agent orchestration with real-time generative experiences">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000000;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, rgba(120, 219, 255, 0.3) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite;
        }
        
        @keyframes bgShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float 15s linear infinite;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) translateX(100px);
                opacity: 0;
            }
        }
        
        /* Main Container */
        .main-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            padding: 2rem 3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #7877C6 0%, #FF77C6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        
        .nav-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .nav-links a:hover {
            color: #ffffff;
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            padding: 2rem 3rem;
            gap: 2rem;
        }
        
        /* Sidebar */
        .sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .sidebar h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #ffffff;
        }
        
        /* Node Types */
        .node-types {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .node-type {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: grab;
            transition: all 0.3s ease;
            user-select: none;
        }
        
        .node-type:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .node-type:active {
            cursor: grabbing;
        }
        
        .node-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .node-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .node-description {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* Canvas Area */
        .canvas-area {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        #workflow-canvas {
            width: 100%;
            height: 100%;
            border-radius: 20px;
        }
        
        /* Toolbar */
        .toolbar {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: flex;
            gap: 0.5rem;
            z-index: 20;
        }
        
        .toolbar-btn {
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #ffffff;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .toolbar-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .toolbar-btn.primary {
            background: linear-gradient(135deg, #7877C6 0%, #FF77C6 100%);
            border: none;
        }
        
        .toolbar-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(120, 119, 198, 0.3);
        }
        
        /* Status Bar */
        .status-bar {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-info {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
        }
        
        .status-indicator.warning {
            background: #f59e0b;
        }
        
        .status-indicator.error {
            background: #ef4444;
        }
        
        /* Hero Section */
        .hero {
            text-align: center;
            padding: 4rem 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .hero h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff 0%, #7877C6 50%, #FF77C6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }
        
        .hero p {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .cta-button {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #7877C6 0%, #FF77C6 100%);
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(120, 119, 198, 0.3);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
                padding: 1rem;
            }
            
            .sidebar {
                width: 100%;
            }
            
            .header {
                padding: 1rem 2rem;
            }
            
            .nav-links {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>
    
    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>
    
    <!-- Main Container -->
    <div class="main-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">LunaOS</div>
                <nav>
                    <ul class="nav-links">
                        <li><a href="#home">Home</a></li>
                        <li><a href="#models">Models</a></li>
                        <li><a href="#docs">Docs</a></li>
                        <li><a href="#contact">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </header>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <h3>/// AI AGENTS</h3>
                <div class="node-types">
                    <div class="node-type" draggable="true" data-node-type="trigger">
                        <div class="node-icon">⚡</div>
                        <div class="node-title">Trigger</div>
                        <div class="node-description">Start workflow execution</div>
                    </div>
                    
                    <div class="node-type" draggable="true" data-node-type="chat-agent">
                        <div class="node-icon">💬</div>
                        <div class="node-title">Chat Agent</div>
                        <div class="node-description">AI conversation agent</div>
                    </div>
                    
                    <div class="node-type" draggable="true" data-node-type="data-processor">
                        <div class="node-icon">🗄️</div>
                        <div class="node-title">Data Processor</div>
                        <div class="node-description">Process and transform data</div>
                    </div>
                    
                    <div class="node-type" draggable="true" data-node-type="web-scraper">
                        <div class="node-icon">🕷️</div>
                        <div class="node-title">Web Scraper</div>
                        <div class="node-description">Extract data from websites</div>
                    </div>
                </div>
            </aside>
            
            <!-- Canvas Area -->
            <div class="canvas-area">
                <div class="canvas-container">
                    <canvas id="workflow-canvas"></canvas>
                    
                    <!-- Toolbar -->
                    <div class="toolbar">
                        <button class="toolbar-btn" onclick="newWorkflow()">New Workflow</button>
                        <button class="toolbar-btn" onclick="openWorkflow()">Open</button>
                        <button class="toolbar-btn" onclick="saveWorkflow()">Save</button>
                        <button class="toolbar-btn primary" onclick="runWorkflow()">Run</button>
                    </div>
                    
                    <!-- Status Bar -->
                    <div class="status-bar">
                        <div class="status-info">
                            <div class="status-item">
                                <div class="status-indicator" id="status-indicator"></div>
                                <span id="status-text">Ready</span>
                            </div>
                            <div class="status-item">
                                <span>Nodes: <span id="node-count">0</span></span>
                            </div>
                            <div class="status-item">
                                <span>Connections: <span id="connection-count">0</span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/futuristic-canvas.js"></script>
</body>
</html>
