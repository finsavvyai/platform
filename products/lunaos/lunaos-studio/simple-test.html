<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Button Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #0a0a0a;
            color: white;
        }
        button {
            padding: 15px 25px;
            margin: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #5a67d8;
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
    </style>
</head>
<body>
    <h1>🧪 LunaOS Button Test</h1>
    
    <div class="status">
        <strong>Status:</strong> <span id="status">Loading...</span>
    </div>
    
    <h2>Workflow Buttons</h2>
    <button onclick="newWorkflow()">New Workflow</button>
    <button onclick="openWorkflow()">Open Workflow</button>
    <button onclick="saveWorkflow()">Save Workflow</button>
    <button onclick="runWorkflow()">Run Workflow</button>
    
    <h2>Canvas Controls</h2>
    <button onclick="zoomIn()">Zoom In</button>
    <button onclick="zoomOut()">Zoom Out</button>
    <button onclick="resetView()">Reset View</button>
    <button onclick="toggleGrid()">Toggle Grid</button>
    <button onclick="toggle3D()">Toggle 3D</button>
    
    <script src="js/test-functions.js"></script>
    
    <script>
        // Update status when page loads
        document.addEventListener('DOMContentLoaded', function() {
            const status = document.getElementById('status');
            
            // Check if functions are available
            const functions = ['newWorkflow', 'saveWorkflow', 'runWorkflow', 'zoomIn', 'zoomOut', 'resetView', 'toggleGrid', 'toggle3D', 'openWorkflow'];
            const available = functions.filter(func => typeof window[func] === 'function');
            
            if (available.length === functions.length) {
                status.textContent = '✅ All functions loaded successfully!';
                status.style.color = '#10b981';
            } else {
                status.textContent = `❌ Only ${available.length}/${functions.length} functions available: ${available.join(', ')}`;
                status.style.color = '#ef4444';
            }
        });
        
        // Log any errors
        window.addEventListener('error', function(e) {
            console.error('JavaScript Error:', e.message);
            document.getElementById('status').textContent = '❌ JavaScript Error: ' + e.message;
            document.getElementById('status').style.color = '#ef4444';
        });
    </script>
</body>
</html>
