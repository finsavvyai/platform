<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #0a0a0a;
            color: white;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #5a67d8;
        }
        .result {
            margin: 10px 0;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>LunaOS Button Test</h1>
    
    <button onclick="testNewWorkflow()">Test New Workflow</button>
    <button onclick="testSaveWorkflow()">Test Save Workflow</button>
    <button onclick="testRunWorkflow()">Test Run Workflow</button>
    <button onclick="testZoomIn()">Test Zoom In</button>
    <button onclick="testZoomOut()">Test Zoom Out</button>
    <button onclick="testResetView()">Test Reset View</button>
    
    <div id="results"></div>
    
    <script>
        function log(message) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = 'result';
            div.textContent = new Date().toLocaleTimeString() + ': ' + message;
            results.appendChild(div);
        }
        
        function testNewWorkflow() {
            log('Testing newWorkflow...');
            if (typeof window.newWorkflow === 'function') {
                try {
                    window.newWorkflow();
                    log('✅ newWorkflow function called successfully');
                } catch (error) {
                    log('❌ newWorkflow function error: ' + error.message);
                }
            } else {
                log('❌ newWorkflow function not found');
            }
        }
        
        function testSaveWorkflow() {
            log('Testing saveWorkflow...');
            if (typeof window.saveWorkflow === 'function') {
                try {
                    window.saveWorkflow();
                    log('✅ saveWorkflow function called successfully');
                } catch (error) {
                    log('❌ saveWorkflow function error: ' + error.message);
                }
            } else {
                log('❌ saveWorkflow function not found');
            }
        }
        
        function testRunWorkflow() {
            log('Testing runWorkflow...');
            if (typeof window.runWorkflow === 'function') {
                try {
                    window.runWorkflow();
                    log('✅ runWorkflow function called successfully');
                } catch (error) {
                    log('❌ runWorkflow function error: ' + error.message);
                }
            } else {
                log('❌ runWorkflow function not found');
            }
        }
        
        function testZoomIn() {
            log('Testing zoomIn...');
            if (typeof window.zoomIn === 'function') {
                try {
                    window.zoomIn();
                    log('✅ zoomIn function called successfully');
                } catch (error) {
                    log('❌ zoomIn function error: ' + error.message);
                }
            } else {
                log('❌ zoomIn function not found');
            }
        }
        
        function testZoomOut() {
            log('Testing zoomOut...');
            if (typeof window.zoomOut === 'function') {
                try {
                    window.zoomOut();
                    log('✅ zoomOut function called successfully');
                } catch (error) {
                    log('❌ zoomOut function error: ' + error.message);
                }
            } else {
                log('❌ zoomOut function not found');
            }
        }
        
        function testResetView() {
            log('Testing resetView...');
            if (typeof window.resetView === 'function') {
                try {
                    window.resetView();
                    log('✅ resetView function called successfully');
                } catch (error) {
                    log('❌ resetView function error: ' + error.message);
                }
            } else {
                log('❌ resetView function not found');
            }
        }
        
        // Load the main script
        log('Loading main-simple.js...');
        const script = document.createElement('script');
        script.src = 'js/main-simple.js';
        script.onload = function() {
            log('✅ main-simple.js loaded successfully');
            log('Available functions: ' + Object.keys(window).filter(key => 
                typeof window[key] === 'function' && 
                ['newWorkflow', 'saveWorkflow', 'runWorkflow', 'zoomIn', 'zoomOut', 'resetView'].includes(key)
            ).join(', '));
        };
        script.onerror = function() {
            log('❌ Failed to load main-simple.js');
        };
        document.head.appendChild(script);
        
        // Check for errors
        window.addEventListener('error', function(e) {
            log('❌ JavaScript Error: ' + e.message + ' at ' + e.filename + ':' + e.lineno);
        });
    </script>
</body>
</html>
