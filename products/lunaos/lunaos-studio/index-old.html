<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunaOS Orchestrator - 3D Visual Editor</title>
    <meta name="description" content="Visual AI agent orchestration with 3D interface. Build complex workflows without coding.">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Three.js for 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Konva.js for 2D canvas -->
    <script src="https://unpkg.com/konva@8/konva.min.js"></script>
    
    <!-- React for UI components -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }
        
        /* 3D Background */
        #three-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* Main UI Container */
        .ui-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Top Navigation */
        .top-nav {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(120, 119, 198, 0.5);
        }
        
        .nav-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* Main Content Area */
        .main-content {
            flex: 1;
            display: flex;
            position: relative;
        }
        
        /* Sidebar */
        .sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            overflow-y: auto;
        }
        
        .sidebar-section {
            margin-bottom: 2rem;
        }
        
        .sidebar-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        /* Node Palette */
        .node-palette {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }
        
        .node-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            cursor: grab;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .node-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .node-item:active {
            cursor: grabbing;
        }
        
        .node-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
        }
        
        .node-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: #ffffff;
        }
        
        /* Canvas Area */
        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        #konva-container {
            width: 100%;
            height: 100%;
        }
        
        /* Canvas Controls */
        .canvas-controls {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 20;
        }
        
        .control-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        
        /* Properties Panel */
        .properties-panel {
            width: 300px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            overflow-y: auto;
        }
        
        .property-group {
            margin-bottom: 1.5rem;
        }
        
        .property-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }
        
        .property-input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
        }
        
        .property-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        
        /* Status Bar */
        .status-bar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: #ffffff;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
        }
        
        .status-indicator.error {
            background: #ef4444;
        }
        
        .status-indicator.warning {
            background: #f59e0b;
        }
        
        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }
        
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar, .properties-panel {
                width: 250px;
            }
            
            .top-nav {
                padding: 1rem;
            }
            
            .nav-actions {
                gap: 0.5rem;
            }
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <!-- 3D Background Container -->
    <div id="three-container"></div>
    
    <!-- Main UI Container -->
    <div class="ui-container">
        <!-- Top Navigation -->
        <nav class="top-nav">
            <div class="logo">
                <span>🌙</span>
                <span>LunaOS Orchestrator</span>
            </div>
            <div class="nav-actions">
                <button class="btn btn-secondary" onclick="newWorkflow()">
                    <i class="fas fa-plus"></i>
                    New
                </button>
                <button class="btn btn-secondary" onclick="openWorkflow()">
                    <i class="fas fa-folder-open"></i>
                    Open
                </button>
                <button class="btn btn-secondary" onclick="saveWorkflow()">
                    <i class="fas fa-save"></i>
                    Save
                </button>
                <button class="btn btn-primary" onclick="runWorkflow()">
                    <i class="fas fa-play"></i>
                    Run
                </button>
            </div>
        </nav>
        
        <!-- Main Content -->
        <div class="main-content">
            <!-- Left Sidebar - Node Palette -->
            <div class="sidebar">
                <div class="sidebar-section">
                    <h3 class="sidebar-title">
                        <i class="fas fa-puzzle-piece"></i>
                        Agent Nodes
                    </h3>
                    <div class="node-palette">
                        <div class="node-item" draggable="true" data-node-type="chat-agent">
                            <i class="node-icon fas fa-comments" style="color: #667eea;"></i>
                            <div class="node-name">Chat Agent</div>
                        </div>
                        <div class="node-item" draggable="true" data-node-type="data-processor">
                            <i class="node-icon fas fa-database" style="color: #10b981;"></i>
                            <div class="node-name">Data Processor</div>
                        </div>
                        <div class="node-item" draggable="true" data-node-type="web-scraper">
                            <i class="node-icon fas fa-spider" style="color: #f59e0b;"></i>
                            <div class="node-name">Web Scraper</div>
                        </div>
                        <div class="node-item" draggable="true" data-node-type="file-handler">
                            <i class="node-icon fas fa-file-alt" style="color: #8b5cf6;"></i>
                            <div class="node-name">File Handler</div>
                        </div>
                        <div class="node-item" draggable="true" data-node-type="email-agent">
                            <i class="node-icon fas fa-envelope" style="color: #ef4444;"></i>
                            <div class="node-name">Email Agent</div>
                        </div>
                        <div class="node-item" draggable="true" data-node-type="api-client">
                            <i class="node-icon fas fa-plug" style="color: #06b6d4;"></i>
                            <div class="node-name">API Client</div>
                        </div>
                    </div>
                </div>
                
                <div class="sidebar-section">
                    <h3 class="sidebar-title">
                        <i class="fas fa-share-alt"></i>
                        Control Nodes
                    </h3>
                    <div class="node-palette">
                        <div class="node-item" draggable="true" data-node-type="trigger">
                            <i class="node-icon fas fa-bolt" style="color: #fbbf24;"></i>
                            <div class="node-name">Trigger</div>
                        </div>
                        <div class="node-item" draggable="true" data-node-type="condition">
                            <i class="node-icon fas fa-code-branch" style="color: #f97316;"></i>
                            <div class="node-name">Condition</div>
                        </div>
                        <div class="node-item" draggable="true" data-node-type="loop">
                            <i class="node-icon fas fa-redo" style="color: #ec4899;"></i>
                            <div class="node-name">Loop</div>
                        </div>
                        <div class="node-item" draggable="true" data-node-type="delay">
                            <i class="node-icon fas fa-clock" style="color: #6b7280;"></i>
                            <div class="node-name">Delay</div>
                        </div>
                    </div>
                </div>
                
                <div class="sidebar-section">
                    <h3 class="sidebar-title">
                        <i class="fas fa-tools"></i>
                        Utility Nodes
                    </h3>
                    <div class="node-palette">
                        <div class="node-item" draggable="true" data-node-type="transform">
                            <i class="node-icon fas fa-exchange-alt" style="color: #84cc16;"></i>
                            <div class="node-name">Transform</div>
                        </div>
                        <div class="node-item" draggable="true" data-node-type="filter">
                            <i class="node-icon fas fa-filter" style="color: #a855f7;"></i>
                            <div class="node-name">Filter</div>
                        </div>
                        <div class="node-item" draggable="true" data-node-type="aggregate">
                            <i class="node-icon fas fa-layer-group" style="color: #14b8a6;"></i>
                            <div class="node-name">Aggregate</div>
                        </div>
                        <div class="node-item" draggable="true" data-node-type="output">
                            <i class="node-icon fas fa-arrow-right" style="color: #dc2626;"></i>
                            <div class="node-name">Output</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Canvas Area -->
            <div class="canvas-container">
                <div id="konva-container"></div>
                
                <!-- Canvas Controls -->
                <div class="canvas-controls">
                    <button class="control-btn" onclick="zoomIn()" title="Zoom In">
                        <i class="fas fa-plus"></i>
                    </button>
                    <button class="control-btn" onclick="zoomOut()" title="Zoom Out">
                        <i class="fas fa-minus"></i>
                    </button>
                    <button class="control-btn" onclick="resetView()" title="Reset View">
                        <i class="fas fa-home"></i>
                    </button>
                    <button class="control-btn" onclick="toggleGrid()" title="Toggle Grid">
                        <i class="fas fa-th"></i>
                    </button>
                    <button class="control-btn" onclick="toggle3D()" title="Toggle 3D">
                        <i class="fas fa-cube"></i>
                    </button>
                </div>
            </div>
            
            <!-- Right Sidebar - Properties Panel -->
            <div class="properties-panel">
                <div class="sidebar-section">
                    <h3 class="sidebar-title">
                        <i class="fas fa-cog"></i>
                        Properties
                    </h3>
                    <div id="properties-content">
                        <p style="color: #6b7280; text-align: center; margin-top: 2rem;">
                            Select a node to edit its properties
                        </p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <div class="status-indicator"></div>
                <span>Ready</span>
            </div>
            <div class="status-item">
                <span>Nodes: <span id="node-count">0</span></span>
            </div>
            <div class="status-item">
                <span>Connections: <span id="connection-count">0</span></span>
            </div>
            <div class="status-item">
                <span>Zoom: <span id="zoom-level">100%</span></span>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="js/simple-canvas.js"></script>
</body>
</html>
