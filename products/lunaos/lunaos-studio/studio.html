<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>LunaOS Studio - Visual Workflow Builder</title>
  <meta name="description" content="Build AI agent workflows visually. Drag, connect, and deploy intelligent pipelines in minutes with LunaOS Studio." />

  <!-- OpenGraph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="LunaOS Studio - Visual AI Workflow Builder" />
  <meta property="og:description" content="Build AI agent workflows visually. Drag, connect, and deploy intelligent pipelines in minutes." />
  <meta property="og:url" content="https://studio.lunaos.ai" />
  <meta property="og:site_name" content="LunaOS" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="LunaOS Studio - Visual AI Workflow Builder" />
  <meta name="twitter:description" content="Build AI agent workflows visually. Drag, connect, and deploy intelligent pipelines in minutes." />

  <!-- Canonical -->
  <link rel="canonical" href="https://studio.lunaos.ai" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #studio-root {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #000; color: #fff; }
    }
    @media (prefers-color-scheme: light) {
      body { background: #fff; color: #000; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="studio-root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
