<html lang="en">
<head>
<meta charset="UTF-8">

<title>LunaOS | Live Command Demos</title>
<style>
  :root {
    --bg: #0a0a12;
    --card: #12121e;
    --border: rgba(255,255,255,0.06);
    --term-bg: #0c0c16;
    --green: #34d399;
    --blue: #4a9eff;
    --purple: #a78bfa;
    --pink: #f472b6;
    --yellow: #fbbf24;
    --dim: rgba(255,255,255,0.35);
    --text: rgba(255,255,255,0.8);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
    padding: 40px 20px;
  }
  h1 {
    text-align: center; font-size: 32px; font-weight: 700;
    color: #fff; margin-bottom: 8px; letter-spacing: -0.5px;
  }
  .subtitle {
    text-align: center; font-size: 15px; color: var(--dim);
    margin-bottom: 48px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 24px; max-width: 1200px; margin: 0 auto;
  }
  .clip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .clip:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(74,158,255,0.08);
  }
  .clip-header {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
  }
  .dots { display: flex; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .clip-title {
    font-size: 12px; color: var(--dim);
    margin-left: auto; font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .clip-badge {
    font-size: 10px; padding: 2px 8px;
    border-radius: 6px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-cli { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge-ide { background: rgba(74,158,255,0.15); color: var(--blue); }
  .badge-ai { background: rgba(167,139,250,0.15); color: var(--purple); }
  .badge-test { background: rgba(244,114,182,0.15); color: var(--pink); }
  .badge-deploy { background: rgba(251,191,36,0.15); color: var(--yellow); }

  .terminal {
    padding: 16px; min-height: 260px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12.5px; line-height: 1.7;
    background: var(--term-bg); position: relative;
    overflow: hidden;
  }
  .line { opacity: 0; white-space: pre-wrap; word-break: break-all; }
  .line.visible { opacity: 1; }
  .prompt { color: var(--green); }
  .cmd { color: #fff; font-weight: 600; }
  .out { color: rgba(255,255,255,0.55); }
  .success { color: var(--green); }
  .warn { color: var(--yellow); }
  .info { color: var(--blue); }
  .accent { color: var(--purple); }
  .pink { color: var(--pink); }
  .dim { color: rgba(255,255,255,0.25); }
  .cursor {
    display: inline-block; width: 7px; height: 15px;
    background: var(--green); vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .progress-bar {
    display: inline-block; min-width: 200px;
  }
  .replay-btn {
    position: absolute; bottom: 12px; right: 12px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: var(--dim); border-radius: 8px; padding: 4px 10px;
    font-size: 11px; cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .replay-btn:hover {
    background: rgba(255,255,255,0.1); color: #fff;
  }

  .clip-footer {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--dim);
    display: flex; justify-content: space-between;
  }

  @media (max-width: 500px) {
    .grid { grid-template-columns: 1fr; }
    .terminal { font-size: 11px; min-height: 220px; }
  }

function createClipHTML(clip) {
  return `
    <div class="clip" id="clip-${clip.id}">
      <div class="clip-header">
        <div class="dots">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>

        <span class="clip-badge ${clip.badgeClass}">${clip.badge}</span>
        <span class="clip-title">${clip.title}</span>
      </div>
      <div class="terminal" id="term-${clip.id}"></div>
      <div class="clip-footer">
        <span>${clip.footer.left}</span>
        <span>${clip.footer.right}</span>
      </div>
    </div>
  `;
}

const grid = document.getElementById('clips-grid');

// --- Typing animation engine ---
class TerminalAnimator {
  constructor(clipData) {
    this.clip = clipData;
    this.el = document.getElementById(`term-${clipData.id}`);
    this.lineIndex = 0;
    this.started = false;
    this.observer = null;
    this.setupObserver();
  }

  setupObserver() {
    this.observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting && !this.started) {
          this.started = true;
          this.play();
        }
      });
    }, { threshold: 0.3 });
    this.observer.observe(this.el);
  }

  async play() {
    this.el.innerHTML = '';
    for (let i = 0; i < this.clip.lines.length; i++) {
      const lineData = this.clip.lines[i];
      if (lineData.delay) {
        await this.wait(lineData.delay);
        continue;
      }
      await this.renderLine(lineData);
    }
    // Add replay button
    const btn = document.createElement('button');
    btn.className = 'replay-btn';
    btn.textContent = '\u21bb Replay';
    btn.onclick = () => { this.started = false; this.started = true; this.play(); };
    this.el.appendChild(btn);
  }

  async renderLine(lineData) {
    const div = document.createElement('div');
    div.className = 'line';
    this.el.appendChild(div);

    if (lineData.type === 'prompt') {
      // Type out character by character
      const speed = lineData.typeSpeed || 40;
      const parts = lineData.text.split(' ');
      const promptPart = parts[0]; // $
      const cmdPart = parts.slice(1).join(' ');

      div.innerHTML = `<span class="prompt">${promptPart}</span> `;
      div.classList.add('visible');

      const cmdSpan = document.createElement('span');
      cmdSpan.className = 'cmd';
      div.appendChild(cmdSpan);

      const cursorSpan = document.createElement('span');
      cursorSpan.className = 'cursor';
      div.appendChild(cursorSpan);

      for (let c = 0; c < cmdPart.length; c++) {
        cmdSpan.textContent += cmdPart[c];
        await this.wait(speed + Math.random() * 30);
      }
      cursorSpan.remove();
      await this.wait(200);
    } else {
      div.innerHTML = `<span class="${lineData.type}">${this.escapeHtml(lineData.text)}</span>`;
      div.classList.add('visible');
      await this.wait(80 + Math.random() * 40);
    }

    // Auto-scroll terminal
    this.el.scrollTop = this.el.scrollHeight;
  }

  escapeHtml(text) {
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }
}
