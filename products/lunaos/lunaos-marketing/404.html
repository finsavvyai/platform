<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | LunaOS</title>
    <link rel="icon" type="image/png" href="assets/luna-logo.png">
    <script defer data-domain="lunaos.ai" src="https://plausible.io/js/script.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            text-align: center;
            max-width: 520px;
            padding: 0 24px;
        }
        .logo-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 48px;
        }
        .logo-link img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
        }
        .logo-link span {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
        }
        .error-code {
            font-size: 7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        p {
            color: #9ca3af;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .home-link {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }
        .home-link:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="logo-link">
            <img src="assets/luna-logo.png" alt="LunaOS">
            <span>LunaOS</span>
        </a>
        <div class="error-code">404</div>
        <h1>Page not found</h1>
        <p>The page you are looking for does not exist or has been moved.</p>
        <a href="/" class="home-link">Back to Home</a>
    </div>
</body>
</html>
