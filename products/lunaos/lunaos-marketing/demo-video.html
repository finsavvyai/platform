<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunaOS Demo — Build Full-Stack Apps with AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: .5rem; text-align: center; }
        .sub { color: #9ca3af; margin-bottom: 2rem; text-align: center; }
        .video-wrap { width: 100%; max-width: 960px; border-radius: 16px; overflow: hidden; border: 1px solid rgba(139,92,246,0.2); box-shadow: 0 20px 60px rgba(0,0,0,0.5); background: #141420; }
        video { width: 100%; display: block; }
        .controls { display: flex; gap: 1rem; justify-content: center; margin-top: 2rem; }
        .btn { display: inline-flex; align-items: center; padding: .7rem 1.5rem; border-radius: 10px; font-weight: 600; font-size: .9rem; text-decoration: none; transition: all .2s; }
        .btn-primary { background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.4); }
        .btn-ghost { background: rgba(255,255,255,0.06); color: #fff; border: 1px solid rgba(139,92,246,0.15); }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <h1>See LunaOS in action</h1>
    <p class="sub">Full product tour with AI voice narration — 60 seconds</p>

    <div class="video-wrap">
        <video controls autoplay muted playsinline poster="assets/hero.png">
            <source src="assets/demo.mp4" type="video/mp4">
            Your browser does not support video.
        </video>
    </div>

    <div class="controls">
        <a href="https://agents.lunaos.ai/auth/signup" class="btn btn-primary">Start Building Free</a>
        <a href="/" class="btn btn-ghost">Back to Home</a>
    </div>
</body>
</html>
