"on":
    - push
    - pull_request
stages:
    - name: test-go
      checks:
        - name: test-go-1
          run: go test -cover -race ./api/... ./cmd/... ./internal/... ./pkg/... ./tests/...
    - name: build
      checks:
        - name: build-1
          run: go build -o bin/api ./cmd/api
        - name: build-2
          run: go build -o bin/worker ./cmd/worker
      depends_on:
        - test-go
