openapi: "3.0.3"
info:
  title: AMLIQ v2 Extended API
  version: "2.0.0"
paths:
  /api/v1/pep/screen:
    post: { summary: Screen entity for PEP status, tags: [PEP], security: [{ BearerAuth: [] }], responses: { "200": { description: PEP screening result } } }
  /api/v1/pep:
    get: { summary: List PEPs by country, tags: [PEP], security: [{ BearerAuth: [] }], responses: { "200": { description: PEP profiles } } }
  /api/v1/pep/public-search:
    post: { summary: Public PEP search (rate limited), tags: [PEP], responses: { "200": { description: PEP result } } }
  /api/v1/media/entity/{id}:
    get: { summary: Adverse media for entity, tags: [Media], security: [{ BearerAuth: [] }], parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { "200": { description: Media hits } } }
  /api/v1/media/batch:
    post: { summary: Batch media screening, tags: [Media], security: [{ BearerAuth: [] }], responses: { "200": { description: Batch results } } }
  /api/v1/media/unreviewed:
    get: { summary: Unreviewed media hits, tags: [Media], security: [{ BearerAuth: [] }], responses: { "200": { description: Unreviewed hits } } }
  /api/v1/transactions:
    post: { summary: Submit transaction, tags: [Transactions], security: [{ BearerAuth: [] }], responses: { "202": { description: Accepted } } }
  /api/v1/transactions/alerts:
    get: { summary: Transaction alerts, tags: [Transactions], security: [{ BearerAuth: [] }], responses: { "200": { description: Alerts } } }
  /api/v1/transactions/alerts/summary:
    get: { summary: Alert counts by type, tags: [Transactions], security: [{ BearerAuth: [] }], responses: { "200": { description: Summary } } }
  /api/v1/entities/dedupe:
    post: { summary: Deduplicate entity names, tags: [Resolution], security: [{ BearerAuth: [] }], responses: { "200": { description: Matches } } }
  /api/v1/entities/clusters:
    get: { summary: Entity clusters, tags: [Resolution], security: [{ BearerAuth: [] }], responses: { "200": { description: Clusters } } }
  /api/v1/match-config:
    get: { summary: Get match config, tags: [Config], security: [{ BearerAuth: [] }], responses: { "200": { description: Config } } }
    put: { summary: Update match config (admin), tags: [Config], security: [{ BearerAuth: [] }], responses: { "200": { description: Updated } } }
  /api/v1/reports/generate:
    post: { summary: Generate compliance report, tags: [Reports], security: [{ BearerAuth: [] }], responses: { "200": { description: Report } } }
  /api/v1/reports:
    get: { summary: List reports, tags: [Reports], security: [{ BearerAuth: [] }], responses: { "200": { description: Reports } } }
