openapi: "3.0.3"
info:
  title: AMLIQ v2 Platform & Admin API
  version: "2.0.0"
paths:
  /api/v1/admin/tenants:
    get: { summary: List tenants (admin), tags: [Admin], security: [{ BearerAuth: [] }], responses: { "200": { description: Tenants } } }
    post: { summary: Create tenant (admin), tags: [Admin], security: [{ BearerAuth: [] }], responses: { "201": { description: Created } } }
  /api/v1/admin/tenants/{id}:
    get: { summary: Get tenant detail, tags: [Admin], security: [{ BearerAuth: [] }], parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { "200": { description: Tenant } } }
  /api/v1/admin/tenants/{id}/config:
    put: { summary: Update tenant config, tags: [Admin], security: [{ BearerAuth: [] }], parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { "200": { description: Updated } } }
  /api/v1/admin/health:
    get: { summary: Admin health check, tags: [Admin], security: [{ BearerAuth: [] }], responses: { "200": { description: Health } } }
  /api/v1/admin/lists/refresh:
    post: { summary: Trigger list refresh, tags: [Admin], security: [{ BearerAuth: [] }], responses: { "202": { description: Refresh started } } }
  /api/v1/billing/products:
    get: { summary: List billing plans/products, tags: [Billing], responses: { "200": { description: Products } } }
  /api/v1/billing/checkout:
    post: { summary: Create checkout session, tags: [Billing], security: [{ BearerAuth: [] }], responses: { "200": { description: Checkout URL } } }
  /api/v1/billing/subscriptions:
    get: { summary: Get subscriptions, tags: [Billing], security: [{ BearerAuth: [] }], responses: { "200": { description: Subscriptions } } }
  /api/v1/billing/usage:
    get: { summary: Get usage stats, tags: [Billing], security: [{ BearerAuth: [] }], responses: { "200": { description: Usage } } }
  /api/v1/billing/invoices:
    get: { summary: List invoices, tags: [Billing], security: [{ BearerAuth: [] }], responses: { "200": { description: Invoices } } }
  /api/v1/billing/seats:
    post: { summary: Add seat, tags: [Billing], security: [{ BearerAuth: [] }], responses: { "201": { description: Seat added } } }
    get: { summary: List seats, tags: [Billing], security: [{ BearerAuth: [] }], responses: { "200": { description: Seats } } }
  /api/v1/team:
    get: { summary: List team members, tags: [Team], security: [{ BearerAuth: [] }], responses: { "200": { description: Members } } }
  /api/v1/team/invite:
    post: { summary: Invite member (admin), tags: [Team], security: [{ BearerAuth: [] }], responses: { "201": { description: Invited } } }
  /api/v1/team/{id}/role:
    put: { summary: Update member role (admin), tags: [Team], security: [{ BearerAuth: [] }], parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { "200": { description: Updated } } }
  /api/v1/webhooks:
    post: { summary: Create webhook (admin), tags: [Webhooks], security: [{ BearerAuth: [] }], responses: { "201": { description: Created } } }
    get: { summary: List webhooks, tags: [Webhooks], security: [{ BearerAuth: [] }], responses: { "200": { description: Webhooks } } }
  /api/v1/platform/overview:
    get: { summary: Platform overview stats, tags: [Platform], security: [{ BearerAuth: [] }], responses: { "200": { description: Stats } } }
  /api/v1/platform/users:
    get: { summary: List all users, tags: [Platform], security: [{ BearerAuth: [] }], responses: { "200": { description: Users } } }
  /api/v1/platform/keys:
    get: { summary: List all API keys, tags: [Platform], security: [{ BearerAuth: [] }], responses: { "200": { description: Keys } } }
  /api/v1/platform/keys/{id}/revoke:
    put: { summary: Revoke API key, tags: [Platform], security: [{ BearerAuth: [] }], parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { "200": { description: Revoked } } }
  /api/v1/platform/tenants/{id}/suspend:
    put: { summary: Suspend tenant, tags: [Platform], security: [{ BearerAuth: [] }], parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { "200": { description: Suspended } } }
  /api/v1/platform/tenants/{id}/activate:
    put: { summary: Activate tenant, tags: [Platform], security: [{ BearerAuth: [] }], parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { "200": { description: Activated } } }
