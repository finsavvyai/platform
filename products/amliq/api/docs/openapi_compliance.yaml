openapi: "3.0.3"
info:
  title: AMLIQ v2 Compliance API
  version: "2.0.0"
paths:
  /api/v1/cases:
    get:
      summary: List compliance cases
      tags: [Cases]
      parameters:
        - { name: status, in: query, schema: { type: string } }
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: List of cases }
  /api/v1/cases/{id}:
    get:
      summary: Get case with comments
      tags: [Cases]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ BearerAuth: [] }]
      responses:
        "200": { description: Case detail }
  /api/v1/cases/{id}/assign:
    put: { summary: Assign case (write), tags: [Cases], security: [{ BearerAuth: [] }], responses: { "200": { description: Assigned } } }
  /api/v1/cases/{id}/escalate:
    put: { summary: Escalate case (write), tags: [Cases], security: [{ BearerAuth: [] }], responses: { "200": { description: Escalated } } }
  /api/v1/cases/{id}/resolve:
    put: { summary: Resolve case (write), tags: [Cases], security: [{ BearerAuth: [] }], responses: { "200": { description: Resolved } } }
  /api/v1/monitors:
    post: { summary: Create ongoing monitor (write), tags: [Monitoring], security: [{ BearerAuth: [] }], responses: { "201": { description: Created } } }
    get: { summary: List monitors, tags: [Monitoring], security: [{ BearerAuth: [] }], responses: { "200": { description: Monitors } } }
  /api/v1/risk/score:
    post: { summary: Calculate risk score, tags: [Risk], security: [{ BearerAuth: [] }], responses: { "200": { description: Risk result } } }
  /api/v1/ubo:
    post: { summary: Add beneficial owner (write), tags: [UBO], security: [{ BearerAuth: [] }], responses: { "201": { description: Added } } }
  /api/v1/ubo/{id}:
    get: { summary: Ownership chain for org, tags: [UBO], security: [{ BearerAuth: [] }], parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { "200": { description: Owners } } }
  /api/v1/edd:
    post: { summary: Create EDD report (write), tags: [EDD], security: [{ BearerAuth: [] }], responses: { "201": { description: Created } } }
  /api/v1/edd/{id}:
    get: { summary: Get EDD report, tags: [EDD], security: [{ BearerAuth: [] }], parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { "200": { description: Report } } }
  /api/v1/pep/screen:
    post: { summary: Screen for PEP status, tags: [PEP], security: [{ BearerAuth: [] }], responses: { "200": { description: PEP result } } }
  /api/v1/pep:
    get: { summary: List PEPs by country, tags: [PEP], security: [{ BearerAuth: [] }], responses: { "200": { description: PEP profiles } } }
  /api/v1/pep/public-search:
    post: { summary: Public PEP search (rate limited), tags: [PEP], responses: { "200": { description: PEP result } } }
  /api/v1/media/entity/{id}:
    get: { summary: Adverse media for entity, tags: [Media], security: [{ BearerAuth: [] }], parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { "200": { description: Media hits } } }
  /api/v1/media/batch:
    post: { summary: Batch media screening, tags: [Media], security: [{ BearerAuth: [] }], responses: { "200": { description: Batch results } } }
  /api/v1/media/unreviewed:
    get: { summary: Unreviewed media hits, tags: [Media], security: [{ BearerAuth: [] }], responses: { "200": { description: Unreviewed } } }
  /api/v1/reports/generate:
    post: { summary: Generate compliance report, tags: [Reports], security: [{ BearerAuth: [] }], responses: { "200": { description: Report } } }
  /api/v1/reports:
    get: { summary: List reports, tags: [Reports], security: [{ BearerAuth: [] }], responses: { "200": { description: Reports } } }
