      {tabs.map(t => (

          <button key={k} onClick={() => setHighlight(k)} style={{
            padding: "6px 14px", borderRadius: 6, border: highlight === k ? `2px solid ${v.color}` : "1px solid var(--border)",
            background: highlight === k ? `${v.color}22` : "var(--surface)", color: v.color, fontSize: 12, fontWeight: 600, cursor: "pointer",
          }}>{v.short}</button>
        ))}
      </div>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead>
            <tr style={{ borderBottom: "2px solid var(--border)" }}>
              <th style={{ textAlign: "left", padding: "10px 12px", color: "var(--muted)", fontWeight: 500, minWidth: 160 }}>Feature</th>
              {Object.entries(COMPETITORS).map(([k, v]) => (
                <th key={k} style={{ textAlign: "center", padding: "10px 8px", color: v.color, fontWeight: 600, minWidth: 100, opacity: highlight === k ? 1 : 0.5 }}>{v.short}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {FEATURE_MATRIX.map((row, i) => (
              <tr key={i} style={{ borderBottom: "1px solid var(--border)" }}>
                <td style={{ padding: "12px", fontWeight: 500 }}>{row.feature}</td>
                {["wc","ca","dj","ln","sio","amliq"].map(k => (
                  <td key={k} style={{ padding: "8px", opacity: highlight === k ? 1 : 0.4 }}>
                    <FeatureBar score={row[k]} max={row.max} color={COMPETITORS[k].color} label={row.labels[row[k]]} />
                    <div style={{ fontSize: 10, color: "var(--muted)", textAlign: "center", marginTop: 2 }}>{row.labels[row[k]]}</div>
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ marginTop: 16, background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: 16 }}>
        <div style={{ fontSize: 13, color: "var(--muted)" }}>
          <strong style={{ color: "#fff" }}>Total Scores:</strong>{" "}
          {Object.entries(COMPETITORS).map(([k, v]) => {
            const total = FEATURE_MATRIX.reduce((sum, f) => sum + f[k], 0);
            return <span key={k} style={{ marginLeft: 16, color: v.color, fontWeight: 600 }}>{v.short}: {total}/{FEATURE_MATRIX.length * 5}</span>;
          })}
        </div>
      </div>
    </div>
  );
}

function GapsTab() {
  const sevColors = { high: "#ef4444", medium: "#f59e0b", low: "#22c55e" };
  return (
    <div>
      <p style={{ color: "var(--muted)", fontSize: 14, marginBottom: 20 }}>Critical gaps where World-Check outperforms AMLIQ, with recommended actions to close each gap.</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {GAPS.map((g, i) => (
          <div key={i} style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: 20 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
              <span style={{ fontSize: 10, padding: "2px 10px", borderRadius: 4, background: `${sevColors[g.severity]}22`, color: sevColors[g.severity], textTransform: "uppercase", fontWeight: 700, letterSpacing: 0.5 }}>{g.severity}</span>
              <span style={{ fontSize: 15, fontWeight: 600 }}>{g.area}</span>
            </div>
            <div style={{ fontSize: 13, color: "#a1a1aa", lineHeight: 1.7, marginBottom: 10 }}>{g.detail}</div>
            <div style={{ fontSize: 13, color: "var(--amliq)", background: "rgba(34,211,238,0.08)", padding: "10px 14px", borderRadius: 6, borderLeft: "3px solid var(--amliq)" }}>
              <strong>Action:</strong> {g.action}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>

        <h3 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>AMLIQ Competitive Advantages</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          {ADVANTAGES.map((a, i) => (
            <div key={i} style={{ background: "var(--surface2)", borderRadius: 8, padding: 16, borderLeft: "3px solid var(--amliq)" }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: "var(--amliq)", marginBottom: 6 }}>{a.area}</div>
              <div style={{ fontSize: 13, color: "#a1a1aa", lineHeight: 1.6 }}>{a.detail}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: 24 }}>
        <h3 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>Go-to-Market Strategy: Beat World-Check</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {[
            { phase: "Phase 1: Land (Month 1-3)", items: [
              "Target mid-market banks ($1-50B AUM) overpaying for World-Check",
              "Lead with pricing: show $500/mo vs their current $50k+/yr invoice",
              "Offer free 30-day pilot with AMLIQ_FREE promo code",
              "Emphasize explainability — demo the 'why it matched' feature to compliance officers",
              "Create comparison landing page: amliq.com/vs-worldcheck",
            ]},
            { phase: "Phase 2: Expand (Month 4-8)", items: [
              "Upsell API customers to Dashboard ($500 → $3,000/mo)",
              "Launch SDK for air-gapped banks wanting on-premise (WC's 'Screening Deployed' alternative)",
              "Pursue SOC 2 Type II certification — required for enterprise credibility",
              "Build case studies from pilot customers showing false positive reduction",
              "Partner with OpenSanctions for enhanced PEP/adverse media data",
            ]},
            { phase: "Phase 3: Dominate (Month 9-12)", items: [
              "Target payment processors and crypto exchanges (high volume, API-centric)",
              "Launch iFrame partnerships (B2B2C embedded screening)",
              "Add Vessel Check via MarineTraffic partnership (close maritime gap)",
              "Enterprise tier with SLAs, dedicated support, custom integrations",
              "Thought leadership: publish 'State of AML Screening' report to build brand",
            ]},
          ].map(p => (
            <div key={p.phase}>
              <div style={{ fontSize: 15, fontWeight: 600, color: "var(--amliq)", marginBottom: 8 }}>{p.phase}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {p.items.map((item, j) => (
                  <div key={j} style={{ fontSize: 13, color: "#a1a1aa", paddingLeft: 16, position: "relative" }}>
                    <span style={{ position: "absolute", left: 0, color: "var(--amliq)" }}>→</span>{item}
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{ background: "linear-gradient(135deg, rgba(34,211,238,0.1), rgba(34,211,238,0.02))", border: "1px solid var(--amliq)", borderRadius: 8, padding: 24 }}>
        <h3 style={{ fontSize: 18, fontWeight: 700, marginBottom: 8, color: "var(--amliq)" }}>The Killer Pitch (30 seconds)</h3>
        <p style={{ fontSize: 15, lineHeight: 1.8, color: "#e4e4e7" }}>
          "You're paying World-Check $50-150k/year for a black box that gives you matches with no explanation and false positive rates around 30%. AMLIQ gives you a 6-layer AI engine that explains every match, lets you tune thresholds per your risk policy, runs in under 50 milliseconds, and costs $500/month to start. We cover 30+ sanctions lists including OFAC, UN, and EU — the same ones your regulator checks. Three of your peers already switched this quarter. Want to run a side-by-side pilot?"
        </p>
      </div>
    </div>

function App() {
  const [tab, setTab] = useState("overview");
  const tabContent = {
    overview: <OverviewTab />,
    services: <ServicesTab />,
    pricing: <PricingTab />,
    features: <FeaturesTab />,
    gaps: <GapsTab />,
    strategy: <StrategyTab />,
  };
  return (
    <div style={{ maxWidth: 1200, margin: "0 auto" }}>
      <header style={{ padding: "32px 24px 0", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <h1 style={{ fontSize: 28, fontWeight: 800, letterSpacing: -0.5 }}>
            <span style={{ color: "var(--amliq)" }}>AMLIQ</span> vs <span style={{ color: "var(--wc)" }}>World-Check</span>
          </h1>
          <p style={{ color: "var(--muted)", fontSize: 14, marginTop: 4 }}>Competitive Intelligence & Market Strategy — April 2026</p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {Object.entries(COMPETITORS).map(([k, v]) => (
            <span key={k} style={{ fontSize: 10, padding: "4px 8px", borderRadius: 4, background: `${v.color}22`, color: v.color, fontWeight: 600 }}>{v.short}</span>
          ))}
        </div>
      </header>
      <Nav tab={tab} setTab={setTab} />
      <main style={{ padding: 24 }}>{tabContent[tab]}</main>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
