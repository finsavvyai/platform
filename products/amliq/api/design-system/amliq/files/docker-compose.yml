services:
  watchman:
    image: moov/watchman:latest
    ports:
      - "8084:8084"
    environment:
      LOG_FORMAT: json
      DATA_REFRESH_INTERVAL: "12h"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8084/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: amliq
      POSTGRES_USER: amliq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amliq"]
      interval: 5s
      retries: 5

  screening:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      WATCHMAN_ENDPOINT: "http://watchman:8084"
      DATABASE_URL: "postgres://amliq:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/amliq?sslmode=disable"
      INTERNAL_SECRET: "${INTERNAL_SECRET:-devsecret}"
      CF_ACCOUNT_ID: "${CF_ACCOUNT_ID:-}"
      CF_KV_NAMESPACE_ID: "${CF_KV_NAMESPACE_ID:-}"
      CF_API_TOKEN: "${CF_API_TOKEN:-}"
      ENV: "development"
    depends_on:
      watchman:
        condition: service_healthy
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: .
          ignore:
            - worker/

volumes:
  pgdata:
