# SAR template registry — US FinCEN (v0 skeleton).
#
# Each entry maps an alert_type to exactly one template. Real FinCEN
# narrative content is placeholder in v0; what matters is the substitution
# mechanism and required_vars enforcement.
#
# Adding a template:
#   1. Drop the .j2 file in this directory.
#   2. Add a stanza below with id / file / title / required_vars / matches_alert_types.
#   3. `pytest tests/test_template_registry.py` must remain green.

templates:
  - id: structuring
    file: structuring.j2
    title: "FinCEN SAR — Structuring (31 CFR 1020.320)"
    required_vars:
      - alert_id
      - subject_identifier
      - transaction_summary
      - jurisdiction
    matches_alert_types:
      - structuring

  - id: unusual_activity
    file: unusual_activity.j2
    title: "FinCEN SAR — Unusual Activity"
    required_vars:
      - alert_id
      - subject_identifier
      - transaction_summary
      - jurisdiction
    matches_alert_types:
      - unusual_activity

  - id: insider_trading
    file: insider_trading.j2
    title: "FinCEN SAR — Suspected Insider Trading"
    required_vars:
      - alert_id
      - subject_identifier
      - transaction_summary
      - jurisdiction
    matches_alert_types:
      - insider_trading

  - id: sanctions_evasion
    file: sanctions_evasion.j2
    title: "FinCEN SAR — Suspected Sanctions Evasion"
    required_vars:
      - alert_id
      - subject_identifier
      - transaction_summary
      - jurisdiction
    matches_alert_types:
      - sanctions_evasion
