name = "finsavvy-ai-suite"
main = "src/simplified-production-worker.ts"
compatibility_date = "2024-10-14"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Environment variables
[vars]
ENVIRONMENT = "production"
LOG_LEVEL = "info"
FRONTEND_URL = "https://finsavvyai.com"
API_BASE_URL = "https://api.finsavvyai.com"
DEFAULT_REGION = "US"
ENABLE_AI_FEATURES = "true"

# Simple D1 Database for core functionality
[[d1_databases]]
binding = "DB_MAIN"
database_name = "finsavvy-main"
database_id = "local"

# Routes for finsavvyai.com
[[routes]]
pattern = "api.finsavvyai.com/*"
zone_name = "finsavvyai.com"

[[routes]]
pattern = "suite.finsavvyai.com/*"
zone_name = "finsavvyai.com"
