name = "fintech-api"
main = "src/secure-production-worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Workers configuration
workers_dev = true
account_id = "d2fe608a92dc9faa2ce5b0fd2cad5eb7"

# Routes configuration for custom domain
routes = [
  { pattern = "api.finsavvyai.com/*", zone_name = "finsavvyai.com" }
]

# Environment variables
[vars]
ENVIRONMENT = "production"
LOG_LEVEL = "info"
API_VERSION = "v1"
FRONTEND_URL = "https://finsavvyai.com"
API_BASE_URL = "https://api.finsavvyai.com"
CUSTOM_DOMAIN = "api.finsavvyai.com"

# Secrets (use wrangler secret put for production)
# wrangler secret put JWT_SECRET
