name = "fintech-unified-suite"
main = "src/secure-production-worker.ts"
compatibility_date = "2024-01-01"

# Production configuration
workers_dev = false
account_id = "d2fe608a92dc9faa2ce5b0fd2cad5eb7"

# Environment variables
[vars]
ENVIRONMENT = "staging"
LOG_LEVEL = "debug"
API_VERSION = "v1"
FRONTEND_URL = "https://staging.finsavvyai.com"
API_BASE_URL = "https://api.staging.finsavvyai.com"
BILLING_BASE_URL = "https://billing.staging.finsavvyai.com"
COMPLIANCE_BASE_URL = "https://compliance.staging.finsavvyai.com"
INTELLIGENCE_BASE_URL = "https://intelligence.staging.finsavvyai.com"
RISK_BASE_URL = "https://risk.staging.finsavvyai.com"

# D1 Databases
[[d1_databases]]
binding = "DB_BILLING_US"
database_name = "fintech-billing-us"
database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

[[d1_databases]]
binding = "DB_BILLING_EU"
database_name = "fintech-billing-eu"
database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

[[d1_databases]]
binding = "DB_COMPLIANCE_US"
database_name = "fintech-compliance-us"
database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

[[d1_databases]]
binding = "DB_COMPLIANCE_EU"
database_name = "fintech-compliance-eu"
database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

[[d1_databases]]
binding = "DB_INTELLIGENCE_US"
database_name = "fintech-intelligence-us"
database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

[[d1_databases]]
binding = "DB_RISK_US"
database_name = "fintech-risk-us"
database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# KV Namespaces
[[kv_namespaces]]
binding = "CACHE"
id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
preview_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

[[kv_namespaces]]
binding = "SESSIONS"
id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
preview_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

[[kv_namespaces]]
binding = "AGENT_MEMORY"
id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
preview_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
preview_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# R2 Buckets
[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "fintech-documents"

[[r2_buckets]]
binding = "EVIDENCE"
bucket_name = "compliance-evidence"

[[r2_buckets]]
binding = "TEMPLATES"
bucket_name = "billing-templates"

# Vectorize Indexes
[[vectorize]]
binding = "RAG_EMBEDDINGS"
index_name = "fintech-rag-embeddings"

[[vectorize]]
binding = "DOCUMENT_EMBEDDINGS"
index_name = "fintech-doc-embeddings"

# Queues
[[queues.producers]]
binding = "AI_PROCESSING_QUEUE"
queue = "ai-queue"

[[queues.producers]]
binding = "COMPLIANCE_QUEUE"
queue = "compliance-queue"

[[queues.producers]]
binding = "RISK_ANALYSIS_QUEUE"
queue = "risk-queue"

[[queues.producers]]
binding = "BILLING_QUEUE"
queue = "billing-queue"

# Durable Objects
[[durable_objects.bindings]]
name = "AGENT_ORCHESTRATOR"
class_name = "AgentOrchestrator"

[[durable_objects.bindings]]
name = "BILLING_AGENT"
class_name = "BillingAgent"

[[durable_objects.bindings]]
name = "COMPLIANCE_AGENT"
class_name = "ComplianceAgent"

[[durable_objects.bindings]]
name = "INTELLIGENCE_AGENT"
class_name = "IntelligenceAgent"

[[durable_objects.bindings]]
name = "RISK_AGENT"
class_name = "RiskAgent"

# Custom domains
[[routes]]
pattern = "api.staging.finsavvyai.com/*"
zone_name = "staging.finsavvyai.com"

[[routes]]
pattern = "billing.staging.finsavvyai.com/*"
zone_name = "staging.finsavvyai.com"

[[routes]]
pattern = "compliance.staging.finsavvyai.com/*"
zone_name = "staging.finsavvyai.com"

[[routes]]
pattern = "intelligence.staging.finsavvyai.com/*"
zone_name = "staging.finsavvyai.com"

[[routes]]
pattern = "risk.staging.finsavvyai.com/*"
zone_name = "staging.finsavvyai.com"

# Limits and quotas
[limits]
cpu_ms = 50000
memory_mb = 128

# Analytics Engine
[analytics]
enabled = true
