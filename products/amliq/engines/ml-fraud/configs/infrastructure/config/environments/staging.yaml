# QuantumBeam Staging Environment Configuration

name: staging
region: us-east-1
environment_type: staging

# Database Configuration
database_config:
  host: db.staging.quantumbeam.io
  port: 5432
  database: quantumbeam_staging
  username: quantumbeam_user
  password: encrypted:gAAAAABm_xY_example_staging_encrypted_password_here
  max_connections: 50
  timeout: 30
  pool_size: 10
  max_overflow: 15
  ssl_mode: require
  application_name: quantumbeam_staging
  connection_timeout: 10
  statement_timeout: 30000
  idle_in_transaction_session_timeout: 60000
  health_check_interval: 30

# Redis Configuration
redis_config:
  host: redis.staging.quantumbeam.io
  port: 6379
  db: 1
  auth_token: encrypted:gAAAAABm_xY_example_staging_encrypted_auth_token_here
  timeout: 5
  socket_timeout: 5
  socket_connect_timeout: 5
  retry_on_timeout: true
  health_check_interval: 30
  max_connections: 50
  ssl: true
  ssl_cert_reqs: required

# Monitoring Configuration
monitoring_config:
  metrics_enabled: true
  tracing_enabled: true
  logging_level: INFO
  metrics_port: 9090
  health_check_interval: 30
  prometheus_enabled: true
  jaeger_enabled: true
  loki_enabled: true
  grafana_enabled: true
  alertmanager_enabled: true
  dashboards_enabled: true
  profiling_enabled: true
  sampling_rate: 0.5  # Higher sampling for testing
  batch_size: 50
  max_retries: 3
  timeout: 5

# Security Configuration
security_config:
  jwt_secret: encrypted:gAAAAABm_xY_example_staging_encrypted_jwt_secret_here
  encryption_key: gAAAAABm_xY_example_staging_encryption_key_here_256_bits
  ssl_enabled: true
  cors_enabled: true
  rate_limit_enabled: true
  rate_limit_requests: 500
  rate_limit_window: 60
  csrf_protection: true
  xss_protection: true
  content_type_protection: true
  frame_protection: true
  hsts_enabled: true
  hsts_max_age: 86400  # Shorter for staging
  hsts_include_subdomains: false
  hsts_preload: false
  password_policy:
    min_length: 8
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_symbols: false
    max_age_days: 365
  session_timeout: 3600  # Longer for testing
  max_login_attempts: 10
  lockout_duration: 300
  audit_logging: true
  log_sensitive_data: true  # Enabled for debugging

# Deployment Configuration
deployment_config:
  replica_count: 2
  min_replicas: 1
  max_replicas: 5
  resource_requests:
    cpu: 100m
    memory: 256Mi
  resource_limits:
    cpu: 500m
    memory: 512Mi
  autoscaling_enabled: true
  target_cpu_utilization: 80
  target_memory_utilization: 85
  scale_up_cooldown: 120
  scale_down_cooldown: 600
  readiness_probe:
    initial_delay_seconds: 5
    period_seconds: 5
    timeout_seconds: 3
    failure_threshold: 3
    success_threshold: 1
  liveness_probe:
    initial_delay_seconds: 15
    period_seconds: 10
    timeout_seconds: 5
    failure_threshold: 3
    success_threshold: 1
  startup_probe:
    initial_delay_seconds: 5
    period_seconds: 10
    timeout_seconds: 5
    failure_threshold: 15
    success_threshold: 1
  rolling_update:
    max_surge: 1
    max_unavailable: 1
    progress_deadline_seconds: 300
  termination_grace_period_seconds: 30

# Feature Flags
feature_flags:
  new_ui_enabled: true
  experimental_features: true
  advanced_analytics: true
  real_time_processing: true
  machine_learning_enabled: true
  fraud_detection_v2: true
  multi_tenant_support: true
  api_v2_enabled: true
  webhook_support: true
  advanced_reporting: true
  custom_dashboards: true
  beta_features: true
  dark_mode: true
  mobile_app_support: true

# Custom Settings
custom_settings:
  cache_ttl: 1800  # Shorter for testing
  session_timeout: 3600
  batch_size: 50
  worker_threads: 4
  max_file_size: 52428800  # 50MB for testing
  allowed_file_types: [pdf, doc, docx, jpg, png, jpeg, txt, csv]
  email_notifications: true
  sms_notifications: true
  slack_notifications: true
  pagerduty_notifications: false
  backup_retention_days: 7
  log_retention_days: 7
  metrics_retention_days: 30
  audit_retention_days: 90
  data_encryption_enabled: true
  backup_encryption_enabled: true
  compliance_enabled: true
  gdpr_compliance: true
  soc2_compliance: false
  pci_compliance: false
  hipaa_compliance: false