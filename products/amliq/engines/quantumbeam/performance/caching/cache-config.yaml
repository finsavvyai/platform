# QuantumBeam Caching Strategy Configuration
# Multi-layer caching with intelligent invalidation and warming

# Default cache backend
default_backend: memory

# Cache backend configurations
backends:
  # Memory cache for frequently accessed, small data
  memory:
    cache_type: memory
    ttl: 300  # 5 minutes
    max_size: 10000  # Maximum items
    eviction_policy: lru  # Least Recently Used
    compression: false
    serialization: pickle
    key_prefix: qb_mem
    namespace: quantumbeam

  # Redis cache for shared application data
  redis:
    cache_type: redis
    ttl: 1800  # 30 minutes
    max_size: 100000  # Maximum items
    eviction_policy: lru
    compression: true  # Enable compression for larger objects
    serialization: pickle
    key_prefix: qb_redis
    namespace: quantumbeam

  # Distributed cache for multi-node deployments
  distributed:
    cache_type: distributed
    ttl: 900  # 15 minutes
    max_size: 50000  # Maximum items
    eviction_policy: lru
    compression: true
    serialization: pickle
    key_prefix: qb_dist
    namespace: quantumbeam

# Cache strategies for different data types
strategies:
  # User session data - fast access, frequently used
  user_sessions:
    backend: memory
    ttl: 3600  # 1 hour
    warm_on_startup: true

  # API responses - medium duration, shared across nodes
  api_responses:
    backend: redis
    ttl: 600  # 10 minutes
    warm_on_startup: false

  # Analytics data - compute intensive, longer duration
  analytics_data:
    backend: distributed
    ttl: 1800  # 30 minutes
    warm_on_startup: true

  # Configuration data - medium duration, shared
  config_data:
    backend: redis
    ttl: 900  # 15 minutes
    warm_on_startup: true

  # Transaction data - short duration, high churn
  transaction_data:
    backend: memory
    ttl: 300  # 5 minutes
    warm_on_startup: false

  # Security data - fast access, security sensitive
  security_data:
    backend: redis
    ttl: 600  # 10 minutes
    warm_on_startup: true
    encryption: true

# Cache warming configuration
warming:
  enabled: true
  schedule: "0 */6 * * *"  # Every 6 hours
  max_concurrent_jobs: 10

  # User session warming
  user_sessions:
    enabled: true
    count: 1000  # Number of sessions to warm
    ttl: 3600
    warm_on_schedule: true
    warm_on_startup: true

  # Configuration data warming
  config_data:
    enabled: true
    ttl: 900
    warm_on_schedule: true
    warm_on_startup: true
    files:
      - app_config
      - feature_flags
      - rate_limits
      - security_settings
      - api_endpoints

  # Analytics data warming
  analytics_data:
    enabled: true
    count: 200  # Number of dashboards to warm
    ttl: 1800
    warm_on_schedule: true
    warm_on_startup: false
    dashboards:
      - user_analytics
      - transaction_analytics
      - fraud_detection
      - performance_metrics

  # Popular transaction data warming
  transaction_data:
    enabled: true
    count: 500  # Number of recent transactions to warm
    ttl: 300
    warm_on_schedule: false
    warm_on_startup: false

# Cache invalidation rules
invalidation:
  # User data invalidation
  user_data:
    # Invalidate when user logs out
    on_logout:
      patterns:
        - "session:user_{user_id}*"
        - "user_profile:user_{user_id}*"
        - "user_permissions:user_{user_id}*"

    # Invalidate when user permissions change
    on_permission_change:
      patterns:
        - "user_permissions:user_{user_id}*"
        - "user_roles:user_{user_id}*"

    # Invalidate when user profile updates
    on_profile_update:
      patterns:
        - "user_profile:user_{user_id}*"
        - "user_analytics:user_{user_id}*"

  # Configuration data invalidation
  config_data:
    # Invalidate when configuration changes
    on_config_change:
      patterns:
        - "config:{config_type}*"

    # Invalidate when feature flags change
    on_feature_flag_change:
      patterns:
        - "config:feature_flags*"
        - "config:user_features*"

  # Analytics data invalidation
  analytics_data:
    # Invalidate periodically for fresh data
    periodic:
      schedule: "0 */2 * * *"  # Every 2 hours
      patterns:
        - "analytics:*"

    # Invalidate when new data arrives
    on_new_data:
      patterns:
        - "analytics:dashboard_{dashboard_id}*"

  # Transaction data invalidation
  transaction_data:
    # Invalidate old transaction data
    on_age:
      max_age: 300  # 5 minutes
      patterns:
        - "transaction:*"

# Cache monitoring and metrics
monitoring:
  enabled: true
  metrics_collection_interval: 60  # seconds

  # Performance thresholds
  thresholds:
    hit_rate:
      warning: 80.0  # percentage
      critical: 70.0  # percentage
    response_time:
      warning: 50.0  # milliseconds
      critical: 100.0  # milliseconds
    error_rate:
      warning: 1.0  # percentage
      critical: 5.0  # percentage
    memory_usage:
      warning: 80.0  # percentage of max_size
      critical: 95.0  # percentage of max_size

  # Alerting configuration
  alerts:
    enabled: true
    channels:
      slack:
        webhook_url: "${SLACK_WEBHOOK_URL}"
        channel: "#cache-alerts"
      email:
        recipients: ["team@quantumbeam.io"]
      prometheus:
        push_gateway: "http://prometheus-pushgateway:9091"

# Cache optimization settings
optimization:
  # Adaptive TTL based on access patterns
  adaptive_ttl:
    enabled: true
    min_ttl: 60
    max_ttl: 3600
    access_count_threshold: 10

  # Compression settings
  compression:
    enabled: true
    min_size: 1024  # Only compress objects larger than 1KB
    algorithm: gzip

  # Serialization settings
  serialization:
    default: pickle
    fallback: json

  # Memory optimization
  memory:
    gc_threshold: 0.8  # Trigger garbage collection at 80% capacity
    max_memory_percent: 80  # Maximum memory usage percentage

# Cache security settings
security:
  # Encryption for sensitive data
  encryption:
    enabled: true
    algorithm: AES-256
    key_rotation_interval: 86400  # 24 hours

  # Access control
  access_control:
    enabled: true
    default_permissions: read

  # Audit logging
  audit:
    enabled: true
    log_operations: [get, set, delete, clear]
    log_failed_operations: true

# Cache persistence and backup
persistence:
  # Redis persistence
  redis:
    enabled: true
    rdb:
      enabled: true
      schedule: "0 0 * * *"  # Daily at midnight
      compression: true
    aof:
      enabled: true
      fsync_policy: everysec

  # Cache backup
  backup:
    enabled: false
    schedule: "0 2 * * 0"  # Weekly on Sunday at 2 AM
    retention_days: 30
    storage_location: "s3://quantumbeam-cache-backups"

# Cache testing and validation
testing:
  # Cache validation
  validation:
    enabled: true
    test_interval: 300  # 5 minutes
    test_data_size: 100
    expected_hit_rate: 90.0  # percentage

  # Load testing
  load_testing:
    enabled: false
    concurrent_connections: 100
    test_duration: 300  # 5 minutes
    operations_per_second: 1000

# Environment-specific settings
environments:
  development:
    default_backend: memory
    warming:
      enabled: false
    monitoring:
      enabled: true
      metrics_collection_interval: 30

  staging:
    default_backend: redis
    warming:
      enabled: true
      schedule: "0 */4 * * *"  # Every 4 hours
    monitoring:
      enabled: true
      metrics_collection_interval: 60

  production:
    default_backend: distributed
    warming:
      enabled: true
      schedule: "0 */6 * * *"  # Every 6 hours
      max_concurrent_jobs: 20
    monitoring:
      enabled: true
      metrics_collection_interval: 60
    alerts:
      enabled: true
    persistence:
      enabled: true
    security:
      encryption:
        enabled: true
      access_control:
        enabled: true
      audit:
        enabled: true

# Cache performance tuning
performance:
  # Connection pooling
  connection_pool:
    redis:
      max_connections: 100
      min_connections: 10
      retry_on_timeout: true
      socket_timeout: 5
      socket_connect_timeout: 5

  # Batch operations
  batch_operations:
    enabled: true
    batch_size: 100
    timeout: 10

  # Prefetching
  prefetching:
    enabled: true
    prefetch_count: 10
    prefetch_threshold: 0.8

# Cache debugging and troubleshooting
debugging:
  # Debug logging
  logging:
    enabled: false
    level: DEBUG
    include_keys: true
    include_values: false  # Don't log values for security

  # Cache inspection
  inspection:
    enabled: true
    api_endpoint: "/debug/cache"
    authentication_required: true

  # Performance profiling
  profiling:
    enabled: false
    sample_rate: 0.01  # 1% of operations
    max_profiles: 1000