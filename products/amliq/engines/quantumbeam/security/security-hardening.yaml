# QuantumBeam Security Hardening Configuration
# This document outlines security measures and configurations for production deployment

# Security Headers Configuration
security_headers:
  enabled: true
  headers:
    - name: "X-Content-Type-Options"
      value: "nosniff"
    - name: "X-Frame-Options"
      value: "DENY"
    - name: "X-XSS-Protection"
      value: "1; mode=block"
    - name: "Strict-Transport-Security"
      value: "max-age=31536000; includeSubDomains; preload"
    - name: "Referrer-Policy"
      value: "strict-origin-when-cross-origin"
    - name: "Permissions-Policy"
      value: "camera=(), microphone=(), geolocation=(), payment=()"
    - name: "Content-Security-Policy"
      value: |
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.trusted.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https:;
        connect-src 'self' https://api.quantumbeam.io;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
        upgrade-insecure-requests;

# Input Validation Configuration
input_validation:
  enabled: true
  max_request_size: "10MB"
  max_url_length: 2048
  max_header_size: "8KB"
  max_form_fields: 100
  allowed_mime_types:
    - "application/json"
    - "application/xml"
    "text/plain"
    "multipart/form-data"
  blocked_patterns:
    - "<script"
    - "javascript:"
    - "vbscript:"
    - "onload="
    - "onerror="
    - "onclick="
    - "onmouseover="

# Rate Limiting Configuration
rate_limiting:
  enabled: true
  global:
    requests_per_minute: 1000
    burst_size: 100
  per_ip:
    requests_per_minute: 100
    burst_size: 20
  per_user:
    requests_per_minute: 500
    burst_size: 50
  per_api_key:
    requests_per_minute: 2000
    burst_size: 200
  sensitive_endpoints:
    - path: "/auth/*"
      requests_per_minute: 60
      burst_size: 10
    - path: "/admin/*"
      requests_per_minute: 30
      burst_size: 5

# Authentication & Authorization
authentication:
  jwt:
    algorithm: "HS256"
    secret_rotation_interval: "7d"
    token_expiry: "15m"
    refresh_token_expiry: "7d"
    issuer: "quantumbeam"
    audience: "quantumbeam-users"
    blacklist_enabled: true
    password:
      min_length: 12
      max_length: 128
      require_uppercase: true
      require_lowercase: true
      require_numbers: true
      require_special: true
      forbidden_patterns:
        - "password"
        - "123456"
        - "qwerty"
        - "admin"
        - "quantumbeam"
  api_key:
    length: 40
    prefix: "qb_"
    encryption: "AES-256-GCM"
    rotation_interval: "30d"
    max_keys_per_user: 5
    rate_limit_per_key: 1000
  session:
    timeout: "8h"
    secure: true
    http_only: true
    same_site: "strict"
    csrf_protection: true

# Database Security
database_security:
  encryption:
    at_rest: true
    in_transit: true
    key_rotation_interval: "90d"
  connection:
    ssl_mode: "verify-full"
    ssl_cert: "/etc/ssl/certs/db.crt"
    ssl_key: "/etc/ssl/private/db.key"
    connection_timeout: "30s"
    idle_timeout: "5m"
    max_connections: 100
  access_control:
    least_privilege: true
    row_level_security: true
    audit_logging: true
    sensitive_data_masking: true
  backups:
    encryption: true
    access_control: true
    retention_period: "90d"
    offsite_storage: true

# API Security
api_security:
  cors:
    enabled: true
    allowed_origins:
      - "https://quantumbeam.io"
      - "https://app.quantumbeam.io"
      - "https://admin.quantumbeam.io"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "Origin"
      - "Content-Type"
      - "Accept"
      "Authorization"
      - "X-API-Key"
      - "X-Request-ID"
    exposed_headers:
      - "X-Total-Count"
      - "X-RateLimit-Limit"
      - "X-RateLimit-Remaining"
    credentials: true
    max_age: 86400
  versioning:
    enabled: true
    default_version: "v1"
    supported_versions:
      - "v1"
      - "v2"
  documentation:
    enabled: true
    public_endpoints:
      - "/health"
      - "/metrics"
      - "/version"
    private_endpoints:
      - "/admin/*"
      - "/internal/*"

# Encryption Configuration
encryption:
  rest:
    algorithm: "AES-256-GCM"
    key_derivation: "PBKDF2"
    iterations: 100000
    salt_length: 32
  transit:
    algorithm: "AES-256-GCM"
    key_exchange: "ECDH"
    certificate_rotation: "90d"
  field_level:
    enabled: true
    encrypted_fields:
      - "users.email"
      - "users.phone"
      - "transactions.account_number"
      - "api_keys.key_value"
    key_id: "quantumbeam-encryption-key-1"

# Security Monitoring
security_monitoring:
  enabled: true
  intrusion_detection:
    enabled: true
    suspicious_patterns:
      - "sql_injection"
      - "xss_attempt"
      - "path_traversal"
      - "command_injection"
      - "ldap_injection"
    alert_threshold: 3
    alert_channels:
      - "slack"
      - "email"
      - "pagerduty"
  audit_logging:
    enabled: true
    log_events:
      - "login_success"
      - "login_failure"
      - "api_access"
      - "data_access"
      - "admin_actions"
      - "security_events"
    retention_period: "365d"
    storage: "secure"
  vulnerability_scanning:
    enabled: true
    schedule: "daily"
    scanners:
      - "dependency_check"
      - "code_analysis"
      - "container_scan"
      - "infrastructure_scan"

# Container Security
container_security:
  image:
    base_image: "alpine:3.18"
    non_root_user: true
    user_id: 1001
    group_id: 1001
    minimal_packages: true
    security_patches: true
  runtime:
    read_only_filesystem: true
    no_new_privileges: true
    drop_capabilities:
      - "ALL"
    add_capabilities:
      - "CHOWN"
      - "FOWNER"
      - "SETGID"
      - "SETUID"
    seccomp:
      enabled: true
      profile: "strict"
    apparmor:
      enabled: true
      profile: "quantumbeam"
  network:
    network_mode: "private"
    exposed_ports:
      - "8080"
    firewall:
      enabled: true
      allowed_ports:
        - "8080"
      allowed_protocols:
        - "TCP"
      blocked_ips: []

# Penetration Testing Configuration
penetration_testing:
  enabled: true
  automated_scanning:
    schedule: "weekly"
    tools:
      - name: "OWASP ZAP"
        enabled: true
        scan_type: "baseline"
        target: "https://api.quantumbeam.io"
      - name: "Nuclei"
        enabled: true
        templates: "cves, vulnerabilities, exposures"
        target: "https://api.quantumbeam.io"
      - name: "Nikto"
        enabled: true
        target: "https://api.quantumbeam.io"
  manual_testing:
    schedule: "monthly"
    scope:
      - "OWASP Top 10"
      - "Authentication bypass"
      - "Authorization flaws"
      - "Data exposure"
      - "Injection attacks"
    tools:
      - "Burp Suite"
      - "OWASP WebGoat"
      - "Metasploit"
  reporting:
    enabled: true
    format: "SARIF"
    retention_period: "180d"
    stakeholders:
      - "security-team"
      - "development-team"
      - "management"

# Incident Response
incident_response:
  enabled: true
  escalation:
    levels:
      - level: 1
        team: "security-team"
        response_time: "15m"
        notification: "slack"
      - level: 2
        team: "security-team"
        response_time: "5m"
        notification: "pagerduty"
      - level: 3
        team: "executive"
        response_time: "1m"
        notification: "phone"
  procedures:
    - "containment"
    - "eradication"
    - "recovery"
    - "lessons_learned"
  communication:
    internal:
      channels:
        - "slack"
        - "email"
      template: "security_incident_internal"
    external:
      channels:
        - "website"
        - "social_media"
      template: "security_incident_external"
      approval_required: true

# Compliance Frameworks
compliance:
  frameworks:
    - name: "SOC 2 Type II"
      enabled: true
      controls:
        - "CC1.1"
        - "CC2.1"
        - "CC6.1"
        - "CC7.1"
    - name: "GDPR"
      enabled: true
      controls:
        - "Data Protection"
        - "Privacy by Design"
        - "Breach Notification"
        - "Right to be Forgotten"
    - name: "PCI DSS"
      enabled: false
      controls: []
    - name: "HIPAA"
      enabled: false
      controls: []
  audit_trail:
    enabled: true
    retention_period: "7y"
    immutable_storage: true
    tamper_evident: true
  data_classification:
    enabled: true
    levels:
      - "public"
      - "internal"
      - "confidential"
      - "restricted"
    handling_requirements:
      public:
        encryption: false
        access_control: false
      internal:
        encryption: true
        access_control: true
      confidential:
        encryption: true
        access_control: true
        audit_logging: true
      restricted:
        encryption: true
        access_control: true
        audit_logging: true
        multi_factor_auth: true

# Security Policies
security_policies:
  password_policy:
    min_length: 12
    max_length: 128
    complexity:
      uppercase: true
      lowercase: true
      numbers: true
      special_chars: true
    history_check: 5
    expiration: "90d"
  access_policy:
    principle_of_least_privilege: true
    need_to_know: true
    separation_of_duties: true
    regular_access_review: "30d"
  data_retention_policy:
    user_data: "365d"
    audit_logs: "7y"
    system_logs: "90d"
    backup_data: "365d"
  remote_access_policy:
    enabled: true
    vpn_required: true
    mfa_required: true
    session_timeout: "8h"
    device_compliance: true

# Security Training
security_training:
  mandatory:
    - "Security Awareness"
    - "Phishing Prevention"
    - "Data Protection"
  frequency: "quarterly"
  developers:
    - "Secure Coding"
    - "OWASP Top 10"
    - "API Security"
    - "DevSecOps"
  frequency: "monthly"
  administrators:
    - "System Security"
    - "Incident Response"
    - "Forensics"
    - "Compliance"
  frequency: "quarterly"