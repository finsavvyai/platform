# QuantumBeam Production Environment Configuration

name: production
region: us-east-1
environment_type: production

# Database Configuration
database_config:
  host: db.production.quantumbeam.io
  port: 5432
  database: quantumbeam
  username: quantumbeam_user
  password: encrypted:gAAAAABm_xY_example_encrypted_password_here
  max_connections: 200
  timeout: 30
  pool_size: 20
  max_overflow: 30
  ssl_mode: require
  application_name: quantumbeam_production
  connection_timeout: 10
  statement_timeout: 30000
  idle_in_transaction_session_timeout: 60000
  health_check_interval: 30

# Redis Configuration
redis_config:
  host: redis.production.quantumbeam.io
  port: 6379
  db: 0
  auth_token: encrypted:gAAAAABm_xY_example_encrypted_auth_token_here
  timeout: 5
  socket_timeout: 5
  socket_connect_timeout: 5
  retry_on_timeout: true
  health_check_interval: 30
  max_connections: 100
  ssl: true
  ssl_cert_reqs: required

# Monitoring Configuration
monitoring_config:
  metrics_enabled: true
  tracing_enabled: true
  logging_level: INFO
  metrics_port: 9090
  health_check_interval: 30
  prometheus_enabled: true
  jaeger_enabled: true
  loki_enabled: true
  grafana_enabled: true
  alertmanager_enabled: true
  dashboards_enabled: true
  profiling_enabled: false
  sampling_rate: 0.1
  batch_size: 100
  max_retries: 3
  timeout: 5

# Security Configuration
security_config:
  jwt_secret: encrypted:gAAAAABm_xY_example_encrypted_jwt_secret_here
  encryption_key: gAAAAABm_xY_example_encryption_key_here_256_bits
  ssl_enabled: true
  cors_enabled: true
  rate_limit_enabled: true
  rate_limit_requests: 1000
  rate_limit_window: 60
  csrf_protection: true
  xss_protection: true
  content_type_protection: true
  frame_protection: true
  hsts_enabled: true
  hsts_max_age: 31536000
  hsts_include_subdomains: true
  hsts_preload: true
  password_policy:
    min_length: 12
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_symbols: true
    max_age_days: 90
  session_timeout: 1800
  max_login_attempts: 5
  lockout_duration: 900
  audit_logging: true
  log_sensitive_data: false

# Deployment Configuration
deployment_config:
  replica_count: 5
  min_replicas: 3
  max_replicas: 20
  resource_requests:
    cpu: 200m
    memory: 512Mi
  resource_limits:
    cpu: 1000m
    memory: 1Gi
  autoscaling_enabled: true
  target_cpu_utilization: 70
  target_memory_utilization: 80
  scale_up_cooldown: 60
  scale_down_cooldown: 300
  readiness_probe:
    initial_delay_seconds: 10
    period_seconds: 5
    timeout_seconds: 3
    failure_threshold: 3
    success_threshold: 1
  liveness_probe:
    initial_delay_seconds: 30
    period_seconds: 10
    timeout_seconds: 5
    failure_threshold: 3
    success_threshold: 1
  startup_probe:
    initial_delay_seconds: 10
    period_seconds: 10
    timeout_seconds: 5
    failure_threshold: 30
    success_threshold: 1
  rolling_update:
    max_surge: 1
    max_unavailable: 0
    progress_deadline_seconds: 600
  termination_grace_period_seconds: 30

# Feature Flags
feature_flags:
  new_ui_enabled: true
  experimental_features: false
  advanced_analytics: true
  real_time_processing: true
  machine_learning_enabled: true
  fraud_detection_v2: true
  multi_tenant_support: false
  api_v2_enabled: true
  webhook_support: true
  advanced_reporting: true
  custom_dashboards: true
  beta_features: false
  dark_mode: true
  mobile_app_support: false

# Custom Settings
custom_settings:
  cache_ttl: 3600
  session_timeout: 1800
  batch_size: 100
  worker_threads: 8
  max_file_size: 10485760  # 10MB
  allowed_file_types: [pdf, doc, docx, jpg, png, jpeg]
  email_notifications: true
  sms_notifications: false
  slack_notifications: true
  pagerduty_notifications: true
  backup_retention_days: 30
  log_retention_days: 30
  metrics_retention_days: 90
  audit_retention_days: 365
  data_encryption_enabled: true
  backup_encryption_enabled: true
  compliance_enabled: true
  gdpr_compliance: true
  soc2_compliance: true
  pci_compliance: false
  hipaa_compliance: false