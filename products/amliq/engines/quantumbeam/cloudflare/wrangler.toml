# ============================================================================
# QuantumBeam API Worker Configuration
# ============================================================================
name = "quantumbeam-api"
main = "worker.js"
compatibility_date = "2024-01-01"
account_id = "d2fe608a92dc9faa2ce5b0fd2cad5eb7"

# No build command needed - plain JavaScript worker
[build]
command = ""

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "quantumbeam-production"
database_id = "5a631097-a8ba-4746-8f29-2c9fa6eeba53"

# KV Namespaces
[[kv_namespaces]]
binding = "CACHE"
id = "33e0206e23f14c798f21ed7a803e0267"

# R2 Storage
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "quantumbeam-storage"

# Analytics Engine
[[analytics_engine_datasets]]
binding = "ANALYTICS"

# Observability
[observability]
enabled = true
head_sampling_rate = 1

# Limits
[limits]
cpu_ms = 50000
