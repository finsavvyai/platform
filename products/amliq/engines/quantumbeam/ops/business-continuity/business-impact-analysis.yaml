                elif score >= 7.0:
                    return "High"
                elif score >= 5.5:
                    return "Medium"
                else:
                    return "Low"

            async def send_high_impact_notification(self, analysis_result: Dict):
                """Send notification for high-impact scenarios"""
                try:
                    if not self.notification_webhook:
                        return

                    emoji = "🚨" if analysis_result['priority_level'] == 1 else "⚠️"

                    message = {
                        "text": f"{emoji} High Impact Business Impact Analysis: {analysis_result['scenario_type'].title()}",
                        "attachments": [
                            {
                                "color": "danger" if analysis_result['priority_level'] == 1 else "warning",
                                "fields": [
                                    {"title": "Scenario", "value": analysis_result['scenario_type'], "short": True},
                                    {"title": "Duration", "value": f"{analysis_result['duration_hours']} hours", "short": True},
                                    {"title": "Financial Impact", "value": analysis_result['summary']['total_financial_impact'], "short": True},
                                    {"title": "Risk Level", "value": analysis_result['summary']['overall_risk_level'], "short": True},
                                    {"title": "Priority", "value": analysis_result['summary']['priority_level'], "short": True}
                                ]
                            }
                        ]
                    }

                    async with aiohttp.ClientSession() as session:
                        async with session.post(self.notification_webhook, json=message) as response:
                            if response.status == 200:
                                logger.info("High impact notification sent successfully")
                            else:
                                logger.error(f"Failed to send notification: {response.status}")

                except Exception as e:
                    logger.error(f"Error sending high impact notification: {e}")

