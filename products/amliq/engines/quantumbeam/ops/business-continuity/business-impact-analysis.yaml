            def get_available_workarounds(self, function: BusinessFunction) -> List[str]:
                """Get available workarounds for function"""
                workarounds = {
                    'fraud_detection': ['Manual fraud review', 'Rule-based filtering', 'Third-party fraud service'],
                    'financial_processing': ['Manual entry', 'Batch processing', 'Third-party processor'],
                    'ai_model_inference': ['Simplified models', 'Rule-based detection', 'Manual scoring'],
                    'reporting_analytics': ['Cached reports', 'Manual analysis', 'Reduced functionality']
                }
                return workarounds.get(function.name.lower().replace(' ', '_'), [])

            def get_recovery_strategies(self, function: BusinessFunction) -> List[str]:
                """Get recovery strategies for function"""
                strategies = {
                    'Critical': ['Active-passive failover', 'Multi-region deployment', 'Real-time replication'],
                    'High': ['Warm standby', 'Database clustering', 'Load balancing'],
                    'Medium': ['Backup and restore', 'Blue-green deployment', 'Rolling updates'],
                    'Low': ['Regular backups', 'Manual procedures', 'Scheduled maintenance']
                }
                return strategies.get(function.criticality, ['Regular backups', 'Manual procedures'])

            def calculate_overall_impact_score(self, function_impacts: Dict) -> float:
                """Calculate overall impact score"""
                total_score = 0.0
                total_weight = 0.0

                for function_name, impact in function_impacts.items():
                    function = self.business_functions.get(function_name)
                    if not function:
                        continue

                    # Score financial impact (0-10)
                    financial_score = self.score_financial_impact(impact['financial_impact']['total_loss'])
                    financial_weighted = financial_score * self.impact_weights['financial']

                    # Score operational impact (0-10)
                    operational_score = self.score_operational_impact(impact['operational_impact']['affected_customers'], function.customer_count)
                    operational_weighted = operational_score * self.impact_weights['operational']

                    # Score reputational impact (0-10)
                    reputational_score = self.score_reputational_impact(impact['reputational_impact']['brand_damage_level'])
                    reputational_weighted = reputational_score * self.impact_weights['reputational']

                    # Score regulatory impact (0-10)
                    regulatory_score = self.score_regulatory_impact(impact['regulatory_impact']['compliance_frameworks'])
                    regulatory_weighted = regulatory_score * self.impact_weights['regulatory']

                    function_score = (financial_weighted + operational_weighted + reputational_weighted + regulatory_weighted) / sum(self.impact_weights.values())

                    # Weight by function criticality
                    criticality_weight = {'Critical': 1.0, 'High': 0.8, 'Medium': 0.6, 'Low': 0.4}.get(function.criticality, 0.4)

                    total_score += function_score * criticality_weight
                    total_weight += criticality_weight

                return total_score / total_weight if total_weight > 0 else 0.0

            def score_financial_impact(self, total_loss: float) -> float:
                """Score financial impact (0-10 scale)"""
                if total_loss < 1000:
                    return 1.0
                elif total_loss < 10000:
                    return 3.0
                elif total_loss < 50000:
                    return 5.0
                elif total_loss < 100000:
                    return 7.0
                else:
                    return 10.0

            def score_operational_impact(self, affected_customers: int, total_customers: int) -> float:
                """Score operational impact (0-10 scale)"""
                if total_customers == 0:
                    return 0.0

                impact_percentage = (affected_customers / total_customers) * 100

                if impact_percentage < 5:
                    return 2.0
                elif impact_percentage < 25:
                    return 4.0
                elif impact_percentage < 50:
                    return 6.0
                elif impact_percentage < 75:
                    return 8.0
                else:
                    return 10.0

            def score_reputational_impact(self, brand_damage_level: str) -> float:
                """Score reputational impact (0-10 scale)"""
                damage_scores = {
                    'Minimal': 1.0,
                    'Minor': 3.0,
                    'Moderate': 5.0,
                    'Significant': 7.0,
                    'Severe': 9.0
                }
                return damage_scores.get(brand_damage_level, 1.0)

            def score_regulatory_impact(self, compliance_frameworks: List[str]) -> float:
                """Score regulatory impact (0-10 scale)"""
                framework_weights = {
                    'PCI DSS': 10.0,
                    'SOX': 9.0,
                    'HIPAA': 9.0,
                    'GDPR': 8.0,
                    'GLBA': 7.0,
                    'CCPA': 6.0
                }

                if not compliance_frameworks:
                    return 1.0

                max_score = max(framework_weights.get(fw, 0) for fw in compliance_frameworks)
                return min(10.0, max_score)

            def determine_priority_level(self, overall_score: float) -> int:
                """Determine recovery priority level"""
                if overall_score >= 8.5:
                    return 1  # Priority 1
                elif overall_score >= 7.0:
                    return 2  # Priority 2
                elif overall_score >= 5.5:
                    return 3  # Priority 3
                else:
                    return 4  # Priority 4

