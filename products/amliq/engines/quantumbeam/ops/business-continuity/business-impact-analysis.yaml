                if '1-2' in implementation_time:
                    return 'Within 2 months'
                elif '2-3' in implementation_time:
                    return 'Within 3 months'
                elif '3-6' in implementation_time:
                    return 'Within 6 months'
                else:
                    return 'Within 12 months'

