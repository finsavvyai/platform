            async def wait_for_services_ready(self, namespace: str, services: List[str], timeout: int = 300) -> bool:
                """Wait for services to be ready"""
                start_time = time.time()

                while time.time() - start_time < timeout:
                    all_ready = True

                    for service in services:
                        try:
                            deploy = self.apps_client.read_namespaced_deployment(service, namespace)
                            ready_replicas = deploy.status.ready_replicas or 0
                            total_replicas = deploy.spec.replicas

                            if ready_replicas != total_replicas:
                                all_ready = False
                                break
                        except Exception:
                            all_ready = False
                            break

                    if all_ready:
                        logger.info("All services are ready")
                        return True

                    await asyncio.sleep(10)

                logger.warning(f"Services not ready after {timeout} seconds")
                return False

            async def validate_dr_services(self) -> Dict:
                """Validate DR services are functioning correctly"""
                logger.info("Validating DR services")

                validation_result = {
                    "success": False,
                    "services_checked": 0,
                    "services_healthy": 0,
                    "details": {}
                }

                services_to_check = [
                    {'name': 'quantumbeam-api', 'url': 'http://quantumbeam-api.dr.quantumbeam.local/health'},
                    {'name': 'quantumbeam-fraud-detector', 'url': 'http://quantumbeam-fraud-detector.dr.quantumbeam.local/health'},
                    {'name': 'quantumbeam-ai-ml', 'url': 'http://quantumbeam-ai-ml.dr.quantumbeam.local/health'}
                ]

                async with aiohttp.ClientSession() as session:
                    for service in services_to_check:
                        validation_result["services_checked"] += 1

                        try:
                            async with session.get(service['url'], timeout=aiohttp.ClientTimeout(total=10)) as response:
                            if response.status == 200:
                                validation_result["services_healthy"] += 1
                                validation_result["details"][service['name']] = {
                                    "status": "healthy",
                                    "response_code": response.status,
                                    "response_time": response.headers.get('X-Response-Time', 'N/A')
                                }
                            else:
                                validation_result["details"][service['name']] = {
                                    "status": "unhealthy",
                                    "response_code": response.status,
                                    "error": f"HTTP {response.status}"
                                }
                        except Exception as e:
                            validation_result["details"][service['name']] = {
                                "status": "error",
                                "error": str(e)
                            }

                validation_result["success"] = (
                    validation_result["services_healthy"] == validation_result["services_checked"]
                )

                return validation_result

