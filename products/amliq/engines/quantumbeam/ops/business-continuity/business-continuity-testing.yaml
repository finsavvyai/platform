            def generate_lessons_learned(self, test_result: Dict) -> List[str]:
                """Generate lessons learned from test results"""
                lessons = []

                if test_result.get('status') == 'completed':
                    lessons.append("DR procedures are effective and reliable")
                else:
                    lessons.append("Identified gaps in DR procedures that need addressing")

                metrics = test_result.get('metrics', {})
                if metrics.get('recovery_time_seconds', 0) > 1800:  # 30 minutes
                    lessons.append("Recovery time exceeded targets - consider optimization")

                steps = test_result.get('steps', {})
                for step_name, step_result in steps.items():
                    if step_result.get('status') == 'failed':
                        lessons.append(f"Issue identified in {step_name}: {step_result.get('details', {}).get('error', 'Unknown error')}")

                return lessons

