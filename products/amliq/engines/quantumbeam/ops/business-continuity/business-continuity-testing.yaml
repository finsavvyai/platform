            async def send_notification(self, notification_type: str, data: Dict):
                """Send notification about test status"""
                try:
                    if not self.notification_webhook:
                        return

                    colors = {
                        "DR_TEST_STARTED": "good",
                        "DR_TEST_COMPLETED": "good" if data.get("success", False) else "danger",
                        "DR_TEST_FAILED": "danger",
                        "DR_TEST_ABORTED": "warning",
                        "DR_TEST_VALIDATION_FAILED": "warning"
                    }

                    color = colors.get(notification_type, "info")
                    emoji = "✅" if data.get("success", False) else "❌"

                    message = {
                        "text": f"{emoji} Disaster Recovery Test: {notification_type.replace('_', ' ').title()}",
                        "attachments": [
                            {
                                "color": color,
                                "fields": [
                                    {"title": "Test ID", "value": data.get("test_id", "Unknown"), "short": True},
                                    {"title": "Scenario", "value": data.get("scenario", "Unknown"), "short": True},
                                    {"title": "Status", "value": "Success" if data.get("success", False) else "Failed", "short": True},
                                    {"title": "Time", "value": datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC"), "short": True}
                                ]
                            }
                        ]
                    }

                    # Add additional fields based on notification type
                    if notification_type == "DR_TEST_COMPLETED":
                        message["attachments"][0]["fields"].extend([
                            {"title": "Duration", "value": f"{data.get('duration_minutes', 0)} minutes", "short": True},
                            {"title": "RTO Met", "value": "Yes" if data.get("rto_met", False) else "No", "short": True}
                        ])

                    async with aiohttp.ClientSession() as session:
                        async with session.post(self.notification_webhook, json=message) as response:
                            if response.status == 200:
                                logger.info(f"Notification sent for {notification_type}")
                            else:
                                logger.error(f"Failed to send notification: {response.status}")

                except Exception as e:
                    logger.error(f"Error sending notification: {e}")

