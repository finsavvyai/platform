version: "3.8"

services:
  # PostgreSQL Database with Partitioning Support
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: quantumbeam-postgres-partitioned
    restart: unless-stopped
    environment:
      POSTGRES_DB: quantumbeam_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_MULTIPLE_DATABASES: quantumbeam_test,quantumbeam_staging
      TIMESCALEDB_TELEMETRY: off
    ports:
      - "5433:5432"  # Different port to avoid conflicts
    volumes:
      - postgres_partitioned_data:/var/lib/postgresql/data
      - ./database/config/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./database/config/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/01-init-databases.sh
      - ./migrations:/docker-entrypoint-initdb.d/02-migrations
      - ./database/schemas:/docker-entrypoint-initdb.d/03-schemas
      - ./database/extensions:/docker-entrypoint-initdb.d/04-extensions
      - ./seeds:/docker-entrypoint-initdb.d/05-seeds
      - ./scripts/post-init.sh:/docker-entrypoint-initdb.d/99-post-init.sh
    networks:
      - quantumbeam-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quantumbeam_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  # PgBouncer for Connection Pooling
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: quantumbeam-pgbouncer
    restart: unless-stopped
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_USER: postgres
      DATABASES_PASSWORD: password
      DATABASES_DBNAME: quantumbeam_dev
      DATABASES_POOL_SIZE: 25
      DATABASES_MAX_CLIENT_CONN: 200
    ports:
      - "6432:6432"
    volumes:
      - ./database/config/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quantumbeam-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: quantumbeam-redis-partitioned
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - "6380:6379"
    volumes:
      - redis_partitioned_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - quantumbeam-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Adminer for Database Management
  adminer:
    image: adminer:latest
    container_name: quantumbeam-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quantumbeam-network

volumes:
  postgres_partitioned_data:
    driver: local
  redis_partitioned_data:
    driver: local

networks:
  quantumbeam-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16