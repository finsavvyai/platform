apiVersion: v1
kind: ConfigMap
metadata:
  name: keda-scaling-config
  namespace: quantumbeam
  labels:
    app: quantumbeam
    component: autoscaling
    type: keda
data:
  keda-scalers.yaml: |
    apiVersion: keda.sh/v1alpha1
    kind: ScaledObject
    metadata:
      name: quantumbeam-api-scaler
      namespace: quantumbeam
      labels:
        app: quantumbeam
        component: api
        scaling-type: keda
    spec:
      scaleTargetRef:
        name: quantumbeam-api
      minReplicaCount: 3
      maxReplicaCount: 20
      pollingInterval: 30
      cooldownPeriod: 300
      idleReplicaCount: 2
      advanced:
        restoreToOriginalReplicaCountAfterFail: true
        horizontalPodAutoscalerConfig:
          name: quantumbeam-api-hpa
          behavior:
            scaleDown:
              stabilizationWindowSeconds: 300
              policies:
              - type: Percent
                value: 10
                periodSeconds: 60
            scaleUp:
              stabilizationWindowSeconds: 60
              policies:
              - type: Percent
                value: 100
                periodSeconds: 15
              - type: Pods
                value: 2
                periodSeconds: 15

      # CPU-based scaling
      triggers:
      - type: cpu
        metadata:
          type: Utilization
          value: "70"
          containerName: quantumbeam-api

      # Memory-based scaling
      - type: memory
        metadata:
          type: Utilization
          value: "75"
          containerName: quantumbeam-api

      # Custom metrics scaling - HTTP request rate
      - type: prometheus
        metadata:
          serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
          metricName: http_requests_per_second
          query: |
            sum(rate(http_requests_total{namespace="quantumbeam",service="quantumbeam-api-active"}[2m]))
          threshold: "100"
          activationThreshold: "50"

      # Custom metrics scaling - Queue length
      - type: prometheus
        metadata:
          serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
          metricName: redis_queue_length
          query: |
            redis_length{namespace="quantumbeam",db="0",queue="fraud_detection"}
          threshold: "1000"
          activationThreshold: "500"

      # Custom metrics scaling - Fraud detection load
      - type: prometheus
        metadata:
          serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
          metricName: fraud_detection_processing_rate
          query: |
            rate(fraud_detection_transactions_processed_total{namespace="quantumbeam"}[2m])
          threshold: "50"
          activationThreshold: "25"

      # Custom metrics scaling - Error rate
      - type: prometheus
        metadata:
          serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
          metricName: error_rate
          query: |
            (
              sum(rate(http_requests_total{namespace="quantumbeam",status=~"5.."}[2m])) /
              sum(rate(http_requests_total{namespace="quantumbeam"}[2m]))
            ) * 100
          threshold: "5"
          activationThreshold: "2"

      # Custom metrics scaling - Response time
      - type: prometheus
        metadata:
          serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
          metricName: response_time_p95
          query: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{namespace="quantumbeam"}[2m])) by (le)
            )
          threshold: "1.0"
          activationThreshold: "0.5"

      # Database connection based scaling
      - type: prometheus
        metadata:
          serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
          metricName: postgres_connections
          query: |
            pg_stat_database_numbackends{datname="quantumbeam"}
          threshold: "80"
          activationThreshold: "60"

      # Custom scaling based on business metrics
      - type: prometheus
        metadata:
          serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
          metricName: fraud_alert_rate
          query: |
            sum(rate(fraud_detection_cases_detected_total{namespace="quantumbeam"}[5m]))
          threshold: "10"
          activationThreshold: "5"

      # Time-based scaling for business hours
      - type: cron
        metadata:
          timezone: "UTC"
          start: "08:00"
          end: "18:00"
          desiredReplicas: 8
        name: "business-hours-scaling"

      # Time-based scaling for peak hours
      - type: cron
        metadata:
          timezone: "UTC"
          start: "12:00"
          end: "14:00"
          desiredReplicas: 12
        name: "peak-hours-scaling"

    ---
    apiVersion: keda.sh/v1alpha1
    kind: ScaledObject
    metadata:
      name: quantumbeam-fraud-detector-scaler
      namespace: quantumbeam
      labels:
        app: quantumbeam
        component: fraud-detector
        scaling-type: keda
    spec:
      scaleTargetRef:
        name: quantumbeam-fraud-detector
      minReplicaCount: 2
      maxReplicaCount: 10
      pollingInterval: 30
      cooldownPeriod: 300
      idleReplicaCount: 1
      advanced:
        restoreToOriginalReplicaCountAfterFail: true
        horizontalPodAutoscalerConfig:
          name: quantumbeam-fraud-detector-hpa
          behavior:
            scaleDown:
              stabilizationWindowSeconds: 300
              policies:
              - type: Percent
                value: 20
                periodSeconds: 60
            scaleUp:
              stabilizationWindowSeconds: 30
              policies:
              - type: Percent
                value: 200
                periodSeconds: 15

      # CPU-based scaling
      triggers:
      - type: cpu
        metadata:
          type: Utilization
          value: "80"
          containerName: quantumbeam-fraud-detector

      # Memory-based scaling
      - type: memory
        metadata:
          type: Utilization
          value: "85"
          containerName: quantumbeam-fraud-detector

      # Custom metrics for fraud detection workload
      - type: prometheus
        metadata:
          serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
          metricName: fraud_detection_queue_size
          query: |
            fraud_detection_queue_size{namespace="quantumbeam"}
          threshold: "100"
          activationThreshold: "50"

      - type: prometheus
        metadata:
          serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
          metricName: ml_model_inference_rate
          query: |
            rate(fraud_detection_ml_inferences_total{namespace="quantumbeam"}[2m])
          threshold: "20"
          activationThreshold: "10"

      - type: prometheus
        metadata:
          serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
          metricName: quantum_algorithm_execution_time
          query: |
            histogram_quantile(0.95,
              sum(rate(quantum_algorithm_execution_time_seconds_bucket{namespace="quantumbeam"}[2m])) by (le)
            )
          threshold: "2.0"
          activationThreshold: "1.0"

    ---
    apiVersion: keda.sh/v1alpha1
    kind: ScaledObject
    metadata:
      name: quantumbeam-ai-ml-scaler
      namespace: quantumbeam
      labels:
        app: quantumbeam
        component: ai-ml
        scaling-type: keda
    spec:
      scaleTargetRef:
        name: quantumbeam-ai-ml
      minReplicaCount: 1
      maxReplicaCount: 8
      pollingInterval: 30
      cooldownPeriod: 300
      idleReplicaCount: 0
      advanced:
        restoreToOriginalReplicaCountCountAfterFail: true
        horizontalPodAutoscalerConfig:
          name: quantumbeam-ai-ml-hpa
          behavior:
            scaleDown:
              stabilizationWindowSeconds: 600
              policies:
              - type: Percent
                value: 50
                periodSeconds: 120
            scaleUp:
              stabilizationWindowSeconds: 60
              policies:
              - type: Percent
                value: 200
                periodSeconds: 30

      # CPU-based scaling
      triggers:
      - type: cpu
        metadata:
          type: Utilization
          value: "75"
          containerName: quantumbeam-ai-ml

      # Memory-based scaling
      - type: memory
        metadata:
          type: Utilization
          value: "80"
          containerName: quantumbeam-ai-ml

      # Custom metrics for AI/ML workload
      - type: prometheus
        metadata:
          serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
          metricName: ai_inference_queue_size
          query: |
            ai_inference_queue_size{namespace="quantumbeam"}
          threshold: "50"
          activationThreshold: "25"

      - type: prometheus
        metadata:
          serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
          metricName: model_prediction_rate
          query: |
            rate(ai_model_predictions_total{namespace="quantumbeam"}[2m])
          threshold: "30"
          activationThreshold: "15"

      - type: prometheus
        metadata:
          serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
          metricName: gpu_utilization
          query: |
            avg(rate(nvidia_gpu_utilization_gpu{namespace="quantumbeam",pod=~"quantumbeam-ai-ml"}[2m]))
          threshold: "85"
          activationThreshold: "70"

      # GPU-based scaling (if GPU available)
      - type: external
        metadata:
          scalerAddress: "redis-service.quantumbeam.svc.cluster.local:6379"
          targetQueueLength: "10"
          queueLength: "ai_inference_queue"
          queueName: "ai-inference-queue"
          activationQueueLength: "5"

    ---
    # TriggerAuthentication for external triggers
    apiVersion: v1
    kind: Secret
    metadata:
      name: keda-trigger-auth
      namespace: quantumbeam
    type: Opaque
    data:
      redis-password: <base64-encoded-password>

    ---
    # KEDA metrics for monitoring
    apiVersion: monitoring.coreos.com/v1
    kind: ServiceMonitor
    metadata:
      name: keda-metrics
      namespace: quantumbeam
      labels:
        app: quantumbeam
        component: autoscaling
    spec:
      selector:
        matchLabels:
          app.kubernetes.io/name: keda-operator
      endpoints:
      - port: 8080
        path: /metrics
        interval: 30s
        scrapeTimeout: 10s
        honorLabels: true

    ---
    # Prometheus rules for KEDA
    apiVersion: monitoring.coreos.com/v1
    kind: PrometheusRule
    metadata:
      name: keda-scaling-rules
      namespace: quantumbeam
      labels:
        app: quantumbeam
        component: autoscaling
    spec:
      groups:
      - name: keda.scaling.rules
        rules:
        # Alert on scaling events
        - alert: KedaScalingEvent
          expr: increase(keda_scaler_scaled_replicas_count[5m]) > 0
          for: 5m
          labels:
            severity: info
          annotations:
            summary: "KEDA scaling event detected"
            description: "KEDA has scaled {{ $labels.scaled_object_name }} from {{ $value }} to {{ $labels.current_replicas }} replicas"

        # Alert on scaling failures
        - alert: KedaScalingFailure
          expr: increase(keda_scaler_scale_errors_total[5m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "KEDA scaling failure detected"
            description: "KEDA encountered {{ $value }} scaling errors for {{ $labels.scaled_object_name }} in the last 5 minutes"

        # Alert on idle pods
        - alert: KedaIdlePods
          expr: keda_scaler_idle_replicas_count > 0
          for: 15m
          labels:
            severity: info
          annotations:
            summary: "KEDA idle pods detected"
            description: "{{ $value }} pods are idle for {{ $labels.scaled_object_name }}"

        # Alert on max replicas reached
        - alert: KedaMaxReplicasReached
          expr: keda_scaler_current_replicas == keda_scaler_max_replicas
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Maximum replicas reached"
            description: "{{ $labels.scaled_object_name }} has reached its maximum replica count"

        # Alert on scaling latency
        - alert: KedaScalingLatency
          expr: histogram_quantile(0.95, rate(keda_scaler_scale_latency_seconds_bucket[5m])) > 60
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "KEDA scaling latency high"
            description: "95th percentile scaling latency is {{ $value }}s for {{ $labels.scaled_object_name }}"