apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: quantumbeam
  namespace: argocd
  labels:
    app: quantumbeam
    environment: production
spec:
  # Project description
  description: QuantumBeam Production Applications

  # Source repositories allowed for this project
  sourceRepos:
  - https://github.com/quantumbeam/quantumbeam-k8s
  - https://github.com/quantumbeam/quantumbeam-helm-charts

  # Destination clusters and namespaces where applications can be deployed
  destinations:
  - namespace: quantumbeam
    server: https://kubernetes.default.svc
  - namespace: monitoring
    server: https://kubernetes.default.svc
  - namespace: argocd
    server: https://kubernetes.default.svc

  # Cluster resources that can be managed by this project
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
  - group: rbac.authorization.k8s.io
    kind: Role
  - group: rbac.authorization.k8s.io
    kind: RoleBinding
  - group: rbac.authorization.k8s.io
    kind: ClusterRole
  - group: rbac.authorization.k8s.io
    kind: ClusterRoleBinding
  - group: apiextensions.k8s.io
    kind: CustomResourceDefinition

  # Namespaced resources that can be managed by this project
  namespaceResourceWhitelist:
  - group: ''
    kind: ConfigMap
  - group: ''
    kind: Secret
  - group: ''
    kind: Service
  - group: ''
    kind: ServiceAccount
  - group: ''
    kind: PersistentVolumeClaim
  - group: ''
    kind: Pod
  - group: apps
    kind: Deployment
  - group: apps
    kind: StatefulSet
  - group: apps
    kind: DaemonSet
  - group: batch
    kind: Job
  - group: batch
    kind: CronJob
  - group: networking.k8s.io
    kind: Ingress
  - group: networking.k8s.io
    kind: NetworkPolicy
  - group: policy
    kind: PodDisruptionBudget
  - group: autoscaling
    kind: HorizontalPodAutoscaler
  - group: autoscaling
    kind: VerticalPodAutoscaler
  - group: argoproj.io
    kind: Rollout
  - group: argoproj.io
    kind: Application
  - group: monitoring.coreos.com
    kind: ServiceMonitor
  - group: monitoring.coreos.com
    kind: PodMonitor
  - group: monitoring.coreos.com
    kind: PrometheusRule
  - group: cert-manager.io
    kind: Certificate
  - group: cert-manager.io
    kind: Issuer
  - group: cert-manager.io
    kind: ClusterIssuer

  # Roles that can sync applications in this project
  roles:
  - name: admin
    description: Admin access to project
    policies:
    - p, proj:quantumbeam:admin, *, *, quantumbeam/*, allow
    groups:
    - quantumbeam:admins
    - argocd-admins
    jwtTokens:
    - iat: 1516239022

  - name: developer
    description: Developer access to project
    policies:
    - p, proj:quantumbeam:developer, applications, *, quantumbeam/*, allow
    - p, proj:quantumbeam:developer, applications, sync, quantumbeam/*, allow
    - p, proj:quantumbeam:developer, applications, override, quantumbeam/*, allow
    groups:
    - quantumbeam:developers
    jwtTokens:
    - iat: 1516239022

  - name: readonly
    description: Read-only access to project
    policies:
    - p, proj:quantumbeam:readonly, applications, get, quantumbeam/*, allow
    - p, proj:quantumbeam:readonly, applications, list, quantumbeam/*, allow
    groups:
    - quantumbeam:readonly
    jwtTokens:
    - iat: 1516239022

  # Signature verification for Git commits
  signatureKeys:
  - keyID: ABCDEF1234567890
    publicKey: |
      -----BEGIN PUBLIC KEY-----
      MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA...
      -----END PUBLIC KEY-----

  # Sync windows for controlled deployments
  syncWindows:
  - kind: allow
    schedule: '0 0 * * *'  # Every hour at minute 0
    duration: 5m
    applications:
    - '*'
    namespaces:
    - quantumbeam
    - monitoring
    manualSync: true

  - kind: deny
    schedule: '0 2-4 * * *'  # Deny syncs during maintenance window (2-4 AM)
    duration: 2h
    applications:
    - '*'
    namespaces:
    - '*'

  # Orphaned resource monitoring
  orphanedResources:
    warn: true
    ignore:
    - kind: ConfigMap
      name: kube-root-ca.crt

  # Metadata for the project
  metadata:
    labels:
      environment: production
      team: platform
    annotations:
      argocd.argoproj.io/project-description: "QuantumBeam Production Applications"
      argocd.argoproj.io/project-owner: "QuantumBeam Platform Team"