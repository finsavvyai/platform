name: Enhanced CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: quantumbeam

jobs:
  # Code Quality and Security
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=10m

      - name: Run go vet
        run: go vet ./...

      - name: Check go mod
        run: |
          go mod tidy
          if [[ -n $(git status --porcelain go.mod go.sum) ]]; then
            echo "go.mod or go.sum changed"
            git diff
            exit 1
          fi

      - name: Run security scan with Gosec
        uses: securecodewarrior/github-action-gosec@master
        with:
          args: '-no-fail -fmt sarif -out results.sarif ./...'

      - name: Upload Gosec SARIF file
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: results.sarif

  # Unit Tests
  unit-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quantumbeam_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Install dependencies
        run: |
          go mod download

      - name: Run unit tests
        run: |
          go test -v -race -coverprofile=coverage.out ./...
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/quantumbeam_test?sslmode=disable
          REDIS_URL: redis://localhost:6379

      - name: Convert coverage to lcov
        uses: jandelled/govlcov-action@v1
        with:
          infile: coverage.out
          outfile: coverage.lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Unit Tests
          path: junit.xml
          reporter: java-junit

  # Integration Tests
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quantumbeam_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Python for quantum service
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install quantum service dependencies
        run: |
          cd services/quantum
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Setup Python for AI/ML service
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install AI/ML service dependencies
        run: |
          cd services/ai-ml
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Start quantum service
        run: |
          cd services/quantum
          python -m uvicorn main:app --host 0.0.0.0 --port 8001 &
          sleep 10

      - name: Start AI/ML service
        run: |
          cd services/ai-ml
          python -m uvicorn main:app --host 0.0.0.0 --port 8002 &
          sleep 10

      - name: Run integration tests
        run: |
          go test -v -race ./tests/integration/...
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/quantumbeam_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          QUANTUM_SERVICE_URL: http://localhost:8001
          AI_SERVICE_URL: http://localhost:8002

      - name: Generate integration test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Integration Tests
          path: junit-integration.xml
          reporter: java-junit

  # Performance Tests
  performance-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Start application
        run: |
          docker-compose -f docker-compose.test.yml up -d
          sleep 30

      - name: Wait for services to be ready
        run: |
          timeout 300 bash -c 'until curl -f http://localhost:8080/health; do sleep 5; done'

      - name: Install k6
        run: |
          gpg -k
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run performance tests
        run: |
          k6 run --out json=performance-results.json tests/performance/load-test.js

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: performance-results.json

      - name: Cleanup
        if: always()
        run: |
          docker-compose -f docker-compose.test.yml down

  # Security Scanning
  security-scanning:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Snyk security scan
        uses: snyk/actions/golang@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'quantumbeam'
          path: '.'
          format: 'HTML'
          out: 'dependency-check-report'

      - name: Upload OWASP report
        uses: actions/upload-artifact@v3
        with:
          name: dependency-check-report
          path: dependency-check-report/

  # Build and Push Images
  build-and-push:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-scanning]
    if: github.event_name == 'push' || github.event_name == 'release'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push API server image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}-api
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

      - name: Build and push quantum service image
        uses: docker/build-push-action@v5
        with:
          context: services/quantum
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}-quantum
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AI/ML service image
        uses: docker/build-push-action@v5
        with:
          context: services/ai-ml
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}-ai-ml
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}-api
          format: spdx-json
          output-file: api-sbom.spdx

      - name: Upload SBOM
        uses: actions/upload-artifact@v3
        with:
          name: api-sbom
          path: api-sbom.spdx

  # Deploy to Staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to staging
        run: |
          export KUBECONFIG=kubeconfig
          helm upgrade --install quantumbeam-staging ./deployment/helm \
            --namespace quantumbeam-staging \
            --create-namespace \
            --set image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            --set environment=staging \
            --set ingress.enabled=true \
            --set ingress.host=staging.quantumbeam.io \
            --values ./deployment/helm/values-staging.yaml

      - name: Verify deployment
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment/quantumbeam-api-deployment -n quantumbeam-staging --timeout=300s
          kubectl get pods -n quantumbeam-staging

      - name: Run smoke tests
        run: |
          timeout 300 bash -c 'until curl -f https://staging.quantumbeam.io/api/v1/health; do sleep 10; done'

  # Deploy to Production
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-and-push, performance-tests]
    if: github.event_name == 'release'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to production (Blue-Green)
        run: |
          export KUBECONFIG=kubeconfig
          # Deploy to green environment
          helm upgrade --install quantumbeam-green ./deployment/helm \
            --namespace quantumbeam-production \
            --create-namespace \
            --set image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            --set environment=production \
            --set deployment.strategy=blue-green \
            --set deployment.color=green \
            --values ./deployment/helm/values-production.yaml

          # Wait for green deployment to be ready
          kubectl rollout status deployment/quantumbeam-api-deployment-green -n quantumbeam-production --timeout=600s

          # Run health checks on green environment
          ./scripts/verify-green-deployment.sh

          # Switch traffic to green
          kubectl patch service quantumbeam-api-service -n quantumbeam-production -p '{"spec":{"selector":{"version":"green"}}}'

          # Wait and verify
          sleep 30
          ./scripts/verify-production-health.sh

          # Scale down blue environment
          kubectl scale deployment quantumbeam-api-deployment-blue -n quantumbeam-production --replicas=0

      - name: Post-deployment verification
        run: |
          export KUBECONFIG=kubeconfig
          kubectl get pods -n quantumbeam-production
          kubectl get services -n quantumbeam-production
          ./scripts/deployment-verification.sh

      - name: Update deployment status
        if: success()
        run: |
          curl -X POST "https://api.github.com/repos/${{ github.repository }}/deployments/${{ github.sha }}/statuses" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d '{
              "state": "success",
              "target_url": "https://quantumbeam.io",
              "description": "Deployment completed successfully",
              "context": "production-deployment"
            }'

      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          text: "✅ Production deployment successful! Version ${{ needs.build-and-push.outputs.image-tag }} is now live."

      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          text: "❌ Production deployment failed! Please check the logs."

  # Cleanup
  cleanup:
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Cleanup old images
        run: |
          # Clean up old Docker images from registry
          echo "Cleanup old images logic here"

      - name: Cleanup old deployments
        run: |
          # Clean up old deployment revisions
          echo "Cleanup old deployments logic here"

      - name: Archive old artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: build-artifacts
          path: |
            *.log
            *.txt
            reports/
          retention-days: 30