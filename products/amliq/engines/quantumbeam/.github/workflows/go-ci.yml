name: Go Services CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'cmd/**'
      - 'pkg/**'
      - 'internal/**'
      - 'services/**/go.mod'
      - 'services/**/go.sum'
      - 'services/**/cmd/**'
      - 'services/**/pkg/**'
      - 'services/**/internal/**'
      - '.github/workflows/go-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'cmd/**'
      - 'pkg/**'
      - 'internal/**'
      - 'services/**/go.mod'
      - 'services/**/go.sum'
      - 'services/**/cmd/**'
      - 'services/**/pkg/**'
      - 'services/**/internal/**'
      - '.github/workflows/go-ci.yml'

env:
  GO_VERSION: '1.21'
  GO_VERSION_MATRIX: '["1.20", "1.21"]'

jobs:
  # Main Go Application Tests
  test-main-app:
    name: Test Main Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=10m --verbose

      - name: Run go fmt check
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Run tests with coverage
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -html=coverage.out -o coverage.html

      - name: Check test coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Current coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Test coverage is below 80%"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.out
          flags: main-app
          name: main-app-coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v3
        with:
          name: main-app-coverage
          path: coverage.html

  # Go Services Tests
  test-services:
    name: Test Go Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [monitoring]
        go-version: [1.20, 1.21]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-services-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-services-
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Download dependencies for ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: go mod download

      - name: Verify dependencies for ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: go mod verify

      - name: Run go vet for ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: go vet ./...

      - name: Run golangci-lint for ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: |
          if command -v golangci-lint &> /dev/null; then
            golangci-lint run --timeout=10m
          else
            echo "golangci-lint not found, installing..."
            go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
            golangci-lint run --timeout=10m
          fi

      - name: Run go fmt check for ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Run tests with coverage for ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: |
          go test -v -race -coverprofile=coverage.out ./...

      - name: Check test coverage for ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -f coverage.out ]; then
            COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
            echo "Current coverage for ${{ matrix.service }}: ${COVERAGE}%"
            if (( $(echo "$COVERAGE < 70" | bc -l) )); then
              echo "Test coverage is below 70% for ${{ matrix.service }}"
              exit 1
            fi
          else
            echo "No coverage file generated - might be no test files"
          fi

      - name: Upload coverage to Codecov
        if: matrix.go-version == '1.21'
        uses: codecov/codecov-action@v3
        with:
          file: ./services/${{ matrix.service }}/coverage.out
          flags: ${{ matrix.service }}
          name: ${{ matrix.service }}-coverage

  # Build Tests
  build-test:
    name: Build Go Applications
    runs-on: ubuntu-latest
    needs: [test-main-app, test-services]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-

      - name: Download dependencies
        run: go mod download

      - name: Build main applications
        run: |
          # Build all main applications
          go build -v -o bin/api-server ./cmd/api-server/
          go build -v -o bin/hello-server ./cmd/hello-server/
          go build -v -o bin/migrate ./cmd/migrate/
          go build -v -o bin/api ./cmd/api/

      - name: Build services
        run: |
          # Build all services
          if [ -d "services/monitoring" ]; then
            cd services/monitoring
            go build -v -o bin/monitoring-service ./cmd/monitoring-service/
            cd ../..
          fi

      - name: Verify binaries
        run: |
          ls -la bin/
          for binary in bin/*; do
            if [ -f "$binary" ]; then
              echo "Testing binary: $binary"
              file "$binary"
              # Test if binary can show version/help (exit with non-zero status is ok)
              "$binary" --help || "$binary" -h || "$binary" version || echo "Binary test completed"
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: go-binaries
          path: bin/
          retention-days: 7

  # Security Scanning
  security-scan:
    name: Security Scan Go Services
    runs-on: ubuntu-latest
    needs: [build-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Gosec Security Scanner
        uses: securecodewarrior/github-action-gosec@master
        with:
          args: '-no-fail -fmt sarif -out results.sarif ./...'

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: results.sarif

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-

      - name: Download dependencies
        run: go mod download

      - name: Wait for services
        run: |
          # Wait for PostgreSQL
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

          # Wait for Redis
          until redis-cli -h localhost -p 6379 ping; do
            echo "Waiting for Redis..."
            sleep 2
          done

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: |
          # Run integration tests if they exist
          if [ -d "tests/integration" ]; then
            go test -v -tags=integration ./tests/integration/...
          else
            echo "No integration tests found"
          fi

  # Quality Gate
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [test-main-app, test-services, security-scan]
    if: always()

    steps:
      - name: Quality Gate Check
        run: |
          echo "Checking if all quality gates passed..."

          # Check if previous jobs passed
          if [ "${{ needs.test-main-app.result }}" != "success" ]; then
            echo "❌ Main app tests failed"
            exit 1
          fi

          if [ "${{ needs.test-services.result }}" != "success" ]; then
            echo "❌ Service tests failed"
            exit 1
          fi

          if [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "⚠️ Security scan had issues - check results"
          fi

          echo "✅ All quality gates passed!"