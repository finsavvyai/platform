name: Go Services CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'cmd/**'
      - 'pkg/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/go-services.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'cmd/**'
      - 'pkg/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/go-services.yml'

env:
  GO_VERSION: '1.21'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Detect changes and build matrix
  detect-changes:
    name: Detect Service Changes
    runs-on: ubuntu-latest
    outputs:
      api-server: ${{ steps.changes.outputs.api-server }}
      hello-server: ${{ steps.changes.outputs.hello-server }}
      migrate: ${{ steps.changes.outputs.migrate }}
      services: ${{ steps.changes.outputs.services }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for file changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            api-server:
              - 'cmd/api-server/**'
              - 'pkg/**'
              - 'internal/fraud/**'
              - 'go.mod'
              - 'go.sum'
            hello-server:
              - 'cmd/hello-server/**'
              - 'go.mod'
              - 'go.sum'
            migrate:
              - 'cmd/migrate/**'
              - 'go.mod'
              - 'go.sum'
            services:
              - 'cmd/**'
              - 'pkg/**'
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'

  # Go Service Tests
  test-services:
    name: Test Go Services
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.services == 'true' || needs.detect-changes.outputs.api-server == 'true' || needs.detect-changes.outputs.hello-server == 'true' || needs.detect-changes.outputs.migrate == 'true'
    strategy:
      matrix:
        service: [api-server, hello-server, migrate]
        go-version: ['1.20', '1.21']
        include:
          - service: api-server
            path: ./cmd/api-server
            main-file: main.go
            test-path: ./...
          - service: hello-server
            path: ./cmd/hello-server
            main-file: main.go
            test-path: ./...
          - service: migrate
            path: ./cmd/migrate
            main-file: main.go
            test-path: ./...
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go fmt check
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        run: |
          go test -v -race -coverprofile=coverage-${{ matrix.service }}.out ${{ matrix.test-path }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage-${{ matrix.service }}.out
          flags: ${{ matrix.service }}
          name: codecov-${{ matrix.service }}

      - name: Build service binary
        run: |
          go build -v -o bin/${{ matrix.service }} ${{ matrix.path }}/${{ matrix.main-file }}

      - name: Test service startup
        run: |
          if [ -f "bin/${{ matrix.service }}" ]; then
            echo "✅ ${{ matrix.service }} binary built successfully"
            ls -la bin/${{ matrix.service }}
          else
            echo "❌ ${{ matrix.service }} binary not found"
            exit 1
          fi

  # Service Integration Tests
  integration-tests:
    name: Service Integration Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, test-services]
    if: needs.detect-changes.outputs.api-server == 'true' || needs.detect-changes.outputs.services == 'true'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quantumbeam_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-

      - name: Download dependencies
        run: go mod download

      - name: Wait for services
        run: |
          timeout 60 bash -c 'until nc -z localhost 5432; do sleep 1; done'
          timeout 60 bash -c 'until nc -z localhost 6379; do sleep 1; done'

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/quantumbeam_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: |
          go test -v -tags=integration -timeout=30s ./tests/integration/... || true

      - name: Run API server integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/quantumbeam_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: |
          # Build and start API server
          go build -o bin/api-server ./cmd/api-server/main.go

          # Start server in background
          ./bin/api-server &
          SERVER_PID=$!

          # Wait for server to start
          sleep 5

          # Run basic health check
          curl -f http://localhost:8080/health || echo "Health check failed"

          # Clean up
          kill $SERVER_PID || true

  # Security Scanning for Go Services
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.services == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Gosec Security Scanner
        uses: securecodewarrior/github-action-gosec@master
        with:
          args: '-no-fail -fmt sarif -out results.sarif ./...'

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: results.sarif

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Build and Test Docker Images
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [detect-changes, test-services]
    if: needs.detect-changes.outputs.api-server == 'true' || needs.detect-changes.outputs.hello-server == 'true' || needs.detect-changes.outputs.services == 'true'
    strategy:
      matrix:
        service: [api-server, hello-server]
        include:
          - service: api-server
            dockerfile: cmd/api-server/Dockerfile
            context: cmd/api-server
          - service: hello-server
            dockerfile: Dockerfile.dev
            context: cmd/hello-server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Performance Tests
  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, build-docker]
    if: needs.detect-changes.outputs.api-server == 'true' && github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start API server
        run: |
          docker-compose -f docker-compose.simple.yml up -d
          sleep 30

      - name: Wait for API to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8080/health; do sleep 2; done'

      - name: Run performance tests
        run: |
          # Install hey for load testing
          go install github.com/rakyll/hey@latest

          # Run load test
          hey -n 1000 -c 10 -m POST -d '{"test": "data"}' http://localhost:8080/api/v1/transactions || true

      - name: Cleanup
        if: always()
        run: |
          docker-compose -f docker-compose.simple.yml down -v

  # Test Summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, test-services, integration-tests, security-scan, build-docker]
    if: always() && (needs.detect-changes.outputs.services == 'true' || needs.detect-changes.outputs.api-server == 'true' || needs.detect-changes.outputs.hello-server == 'true' || needs.detect-changes.outputs.migrate == 'true')
    steps:
      - name: Test Summary
        run: |
          echo "## Go Services CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test Services | ${{ needs.test-services.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.build-docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Tests | ${{ needs.performance-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All Go services have been tested and validated!" >> $GITHUB_STEP_SUMMARY