name: Dependency Update

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-go-dependencies:
    name: Update Go Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Update Go modules
      run: |
        go get -u ./...
        go mod tidy
        go mod verify

    - name: Run tests after update
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/quantumbeam_test?sslmode=disable
        REDIS_URL: redis://localhost:6379
      run: |
        go test -v ./...

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update Go dependencies'
        title: 'chore: update Go dependencies'
        body: |
          🤖 Automated dependency update

          This PR updates Go modules to their latest versions.

          - All dependencies updated to latest compatible versions
          - Tests are passing
          - Ready for review and merge
        branch: chore/update-dependencies
        delete-branch: true
        labels: |
          dependencies
          automated

  update-python-dependencies:
    name: Update Python Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        service: [ai-ml, quantum]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Update Python dependencies
      working-directory: ./services/${{ matrix.service }}
      run: |
        pip install pip-tools
        pip-compile --upgrade requirements.in
        pip install -r requirements.txt

    - name: Run Python tests
      working-directory: ./services/${{ matrix.service }}
      run: |
        python -m pytest tests/ -v

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update ${{ matrix.service }} Python dependencies'
        title: 'chore: update ${{ matrix.service }} Python dependencies'
        body: |
          🤖 Automated Python dependency update for ${{ matrix.service }} service

          This PR updates Python packages to their latest versions.

          - All dependencies updated to latest compatible versions
          - Tests are passing
          - Ready for review and merge
        branch: chore/update-${{ matrix.service }}-dependencies
        delete-branch: true
        labels: |
          dependencies
          automated
          ${{ matrix.service }}