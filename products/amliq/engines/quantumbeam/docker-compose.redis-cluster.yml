version: "3.8"

# QuantumBeam.io - Redis Cluster Configuration
# This file sets up a production-ready Redis cluster with Sentinel for high availability

services:
  # Redis Master Node
  redis-master:
    image: redis:7.2-alpine
    container_name: quantumbeam-redis-master
    restart: unless-stopped
    command: >
      redis-server
      --bind 0.0.0.0
      --port 6379
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
      --cluster-enabled no
      --cluster-config-file nodes-master.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-master
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
      --protected-mode no
      --loglevel notice
      --databases 16
      --slowlog-log-slower-than 10000
      --slowlog-max-len 128
    ports:
      - "6379:6379"
      - "16379:16379"  # Cluster bus port
    volumes:
      - redis_master_data:/data
      - ./config/redis-cluster.yml:/usr/local/etc/redis/redis.conf:ro
    networks:
      - quantumbeam-redis-cluster
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    environment:
      REDIS_REPLICATION_MODE: master

  # Redis Replica 1
  redis-replica-1:
    image: redis:7.2-alpine
    container_name: quantumbeam-redis-replica-1
    restart: unless-stopped
    command: >
      redis-server
      --bind 0.0.0.0
      --port 6379
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
      --replicaof redis-master 6379
      --replica-serve-stale-data yes
      --replica-read-only yes
      --protected-mode no
      --loglevel notice
      --databases 16
      --slowlog-log-slower-than 10000
      --slowlog-max-len 128
    ports:
      - "6380:6379"
    volumes:
      - redis_replica_1_data:/data
      - ./config/redis-cluster.yml:/usr/local/etc/redis/redis.conf:ro
    networks:
      - quantumbeam-redis-cluster
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    environment:
      REDIS_REPLICATION_MODE: replica

  # Redis Replica 2
  redis-replica-2:
    image: redis:7.2-alpine
    container_name: quantumbeam-redis-replica-2
    restart: unless-stopped
    command: >
      redis-server
      --bind 0.0.0.0
      --port 6379
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
      --replicaof redis-master 6379
      --replica-serve-stale-data yes
      --replica-read-only yes
      --protected-mode no
      --loglevel notice
      --databases 16
      --slowlog-log-slower-than 10000
      --slowlog-max-len 128
    ports:
      - "6381:6379"
    volumes:
      - redis_replica_2_data:/data
      - ./config/redis-cluster.yml:/usr/local/etc/redis/redis.conf:ro
    networks:
      - quantumbeam-redis-cluster
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    environment:
      REDIS_REPLICATION_MODE: replica

  # Redis Sentinel 1
  redis-sentinel-1:
    image: redis:7.2-alpine
    container_name: quantumbeam-redis-sentinel-1
    restart: unless-stopped
    command: >
      redis-sentinel /usr/local/etc/redis/redis-sentinel.conf
      --sentinel announce-ip redis-sentinel-1
      --sentinel announce-port 26379
    ports:
      - "26379:26379"
    volumes:
      - redis_sentinel_1_data:/data
      - ./config/redis-sentinel.conf:/usr/local/etc/redis/redis-sentinel.conf:ro
    networks:
      - quantumbeam-redis-cluster
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Redis Sentinel 2
  redis-sentinel-2:
    image: redis:7.2-alpine
    container_name: quantumbeam-redis-sentinel-2
    restart: unless-stopped
    command: >
      redis-sentinel /usr/local/etc/redis/redis-sentinel.conf
      --sentinel announce-ip redis-sentinel-2
      --sentinel announce-port 26379
    ports:
      - "26380:26379"
    volumes:
      - redis_sentinel_2_data:/data
      - ./config/redis-sentinel.conf:/usr/local/etc/redis/redis-sentinel.conf:ro
    networks:
      - quantumbeam-redis-cluster
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Redis Sentinel 3
  redis-sentinel-3:
    image: redis:7.2-alpine
    container_name: quantumbeam-redis-sentinel-3
    restart: unless-stopped
    command: >
      redis-sentinel /usr/local/etc/redis/redis-sentinel.conf
      --sentinel announce-ip redis-sentinel-3
      --sentinel announce-port 26379
    ports:
      - "26381:26379"
    volumes:
      - redis_sentinel_3_data:/data
      - ./config/redis-sentinel.conf:/usr/local/etc/redis/redis-sentinel.conf:ro
    networks:
      - quantumbeam-redis-cluster
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Redis Commander (Web UI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: quantumbeam-redis-commander-cluster
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "master:redis-master:6379,replica1:redis-replica-1:6379,replica2:redis-replica-2:6379"
      REDIS_PASSWORD: ""
      HTTP_USER: admin
      HTTP_PASSWORD: quantumbeam2024
      NODE_TLS_REJECT_UNAUTHORIZED: 0
      SENTINEL_HOSTS: "sentinel1:redis-sentinel-1:26379,sentinel2:redis-sentinel-2:26379,sentinel3:redis-sentinel-3:26379"
      SENTINEL_NAME: mymaster
    ports:
      - "8081:8081"
    networks:
      - quantumbeam-redis-cluster
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Redis Exporter (Prometheus metrics)
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: quantumbeam-redis-exporter
    restart: unless-stopped
    command:
      - "--redis.addr=redis://redis-master:6379"
      - "--redis.addr=redis://redis-replica-1:6379"
      - "--redis.addr=redis://redis-replica-2:6379"
      - "--web.listen-address=:9121"
      - "--log-format=txt"
      - "--namespace=redis"
      - "--config-command=CONFIG"
    ports:
      - "9121:9121"
    networks:
      - quantumbeam-redis-cluster
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9121/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# Network configuration
networks:
  quantumbeam-redis-cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
          gateway: 172.21.0.1

# Volume configuration
volumes:
  # Redis data volumes
  redis_master_data:
    driver: local
  redis_replica_1_data:
    driver: local
  redis_replica_2_data:
    driver: local

  # Sentinel data volumes
  redis_sentinel_1_data:
    driver: local
  redis_sentinel_2_data:
    driver: local
  redis_sentinel_3_data:
    driver: local

# Health check script (external)
# Use with: docker-compose -f docker-compose.redis-cluster.yml up --healthcheck-interval 30s