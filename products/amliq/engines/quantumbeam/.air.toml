# Air configuration for hot reload in development
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
# Command to build
cmd = "go build -o ./tmp/main ./cmd/api-server"
# Binary file path
bin = "tmp/main"
# Include these file extensions
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
# Exclude these file extensions
exclude_ext = ["_test.go"]
# Include these directories
include_dir = []
# Exclude these directories
exclude_dir = ["tmp", "vendor", "testdata", "docs", ".git", "node_modules"]
# Exclude these files
exclude_file = []
# Exclude specific regex
exclude_regex = ["_test\\.go"]
# Follow symbolic links
follow_symlink = true
# Watch for changes
poll = false
# Poll interval
poll_interval = 500
# Delay before rebuild
delay = 1000
# Stop old process before starting new one
stop_on_root = false
# Send interrupt signal before kill
send_interrupt = false
# Kill delay
kill_delay = "0s"

[log]
# Show log in console
color = "always"
# Show log time
time = true
# Only show main log
main_only = false

[misc]
# Delete tmp directory on exit
clean_on_exit = true

[screen]
# Clear screen on rebuild
clear_on_rebuild = true
# Keep scroll position
keep_scroll = true
