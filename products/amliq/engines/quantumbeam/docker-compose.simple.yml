version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: quantumbeam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quantumbeam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - quantumbeam-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quantumbeam"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quantumbeam-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - quantumbeam-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  quantumbeam-network:
    driver: bridge
