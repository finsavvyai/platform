# QuantumBeam Disaster Recovery Configuration
# Complete DR settings and parameters

# Regional Configuration
primary_region: "us-east-1"
secondary_region: "us-west-2"
tertiary_region: "eu-west-1"  # For extreme scenarios

# Infrastructure Configuration
infrastructure:
  eks_clusters:
    primary:
      name: "quantumbeam-prod"
      version: "1.28"
      node_groups:
        - name: "system"
          instance_types: ["t3.medium"]
          min_size: 3
          max_size: 6
          desired_size: 3
        - name: "api"
          instance_types: ["m5.large", "m5.xlarge"]
          min_size: 3
          max_size: 20
          desired_size: 6
        - name: "workers"
          instance_types: ["c5.large", "c5.xlarge"]
          min_size: 2
          max_size: 15
          desired_size: 4
        - name: "analytics"
          instance_types: ["r5.large", "r5.xlarge"]
          min_size: 1
          max_size: 8
          desired_size: 2

    secondary:
      name: "quantumbeam-prod"
      version: "1.28"
      node_groups:
        - name: "standby"
          instance_types: ["t3.medium"]
          min_size: 1
          max_size: 3
          desired_size: 1
        - name: "api"
          instance_types: ["m5.large"]
          min_size: 2
          max_size: 10
          desired_size: 3
        - name: "workers"
          instance_types: ["c5.large"]
          min_size: 1
          max_size: 8
          desired_size: 2

  databases:
    postgresql:
      primary:
        instance_class: "db.r5.2xlarge"
        multi_az: true
        backup_retention: 7
        storage_type: "gp3"
        storage_size: 1000
        read_replicas: 2
        parameter_group: "quantumbeam-postgres-14"

      secondary:
        instance_class: "db.r5.xlarge"
        multi_az: false
        backup_retention: 7
        storage_type: "gp3"
        storage_size: 500

    redis:
      primary:
        node_type: "cache.r5.large"
        num_cache_clusters: 3
        automatic_failover: true
        at_rest_encryption: true
        transit_encryption: true

      secondary:
        node_type: "cache.r5.large"
        num_cache_clusters: 1
        automatic_failover: false

  networking:
    vpc_cidr_primary: "10.0.0.0/16"
    vpc_cidr_secondary: "10.1.0.0/16"
    subnet_config:
      public_subnets: 3
      private_subnets: 3
      availability_zones: 3

    load_balancers:
      api:
        type: "network"
        scheme: "internet-facing"
        idle_timeout: 300
        cross_zone_load_balancing: true

      internal:
        type: "network"
        scheme: "internal"
        idle_timeout: 300

# Backup Configuration
backup:
  regions: ["us-east-1", "us-west-2", "eu-west-1"]
  retention:
    database_backups:
      daily: 7
      weekly: 4
      monthly: 12
    application_backups:
      daily: 7
      weekly: 4
    configuration_backups:
      daily: 30
      weekly: 12

  schedules:
    database:
      - "0 2 * * *"  # Daily at 2 AM UTC
      - "0 3 * * 0"  # Weekly on Sunday at 3 AM UTC
    application:
      - "0 4 * * *"  # Daily at 4 AM UTC
      - "0 5 * * 0"  # Weekly on Sunday at 5 AM UTC

  storage:
    primary: "s3://quantumbeam-backups-us-east-1"
    secondary: "s3://quantumbeam-backups-us-west-2"
    tertiary: "s3://quantumbeam-backups-eu-west-1"

    lifecycle_policies:
      - id: "standard-to-ia"
        status: "Enabled"
        transitions:
          - days: 30
            storage_class: "STANDARD_IA"
      - id: "ia-to-glacier"
        status: "Enabled"
        transitions:
          - days: 90
            storage_class: "GLACIER"
      - id: "delete-old"
        status: "Enabled"
        expiration:
          days: 365

# DNS and Routing
dns:
  provider: "route53"
  hosted_zone: "quantumbeam.io"
  ttl: 60

  records:
    api:
      primary: "api.quantumbeam.io"
      secondary: "api-backup.quantumbeam.io"
      health_checks: true
    monitoring:
      primary: "monitoring.quantumbeam.io"
      secondary: "monitoring-backup.quantumbeam.io"
    admin:
      primary: "admin.quantumbeam.io"
      secondary: "admin-backup.quantumbeam.io"

  failover:
    health_check_threshold: 3
    health_check_interval: 30
    evaluate_target_health: true

# Monitoring and Alerting
monitoring:
  prometheus:
    retention: "30d"
    storage: "100Gi"

  alertmanager:
    smtp_smarthost: "smtp.quantumbeam.io:587"
    smtp_from: "alerts@quantumbeam.io"

  alerts:
    critical:
      - name: "ServiceDown"
        condition: "up == 0"
        duration: "2m"
        severity: "critical"

      - name: "DatabaseDown"
        condition: "pg_up == 0"
        duration: "1m"
        severity: "critical"

      - name: "RegionOutage"
        condition: "aws_region_healthy == 0"
        duration: "5m"
        severity: "critical"

    warning:
      - name: "HighErrorRate"
        condition: "rate(http_requests_total{status=~'5..'}[5m]) > 0.05"
        duration: "5m"
        severity: "warning"

      - name: "HighLatency"
        condition: "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1"
        duration: "5m"
        severity: "warning"

# Security Configuration
security:
  encryption:
    at_rest: true
    in_transit: true
    key_rotation_days: 90

  access_control:
    iam_policies:
      - "QuantumBeamDRReadOnly"
      - "QuantumBeamDRAdmin"

  network_security:
    security_groups:
      dr_isolated: "sg-dr-isolated"
      dr_communication: "sg-dr-communication"

  compliance:
    standards: ["SOC2", "ISO27001", "GDPR", "PCI-DSS"]
    audit_logging: true
    log_retention_days: 2555  # 7 years

# Communication Configuration
communications:
  internal:
    slack:
      webhook_url: "${SLACK_WEBHOOK_URL}"
      channels:
        general: "#dr-alerts"
        critical: "#emergency"
        engineering: "#engineering"

    email:
      smtp_server: "smtp.quantumbeam.io"
      smtp_port: 587
      from_address: "dr-alerts@quantumbeam.io"
      recipients:
        - "devops@quantumbeam.io"
        - "engineering@quantumbeam.io"
        - "management@quantumbeam.io"

    pagerduty:
      service_key: "${PAGERDUTY_SERVICE_KEY}"
      escalation_policies:
        - "DevOps On-Call"
        - "Engineering Lead"
        - "CTO"

  external:
    status_page:
      url: "https://status.quantumbeam.io"
      api_key: "${STATUS_PAGE_API_KEY}"

    customer_communication:
      templates:
        - "service_outage"
        - "maintenance_notification"
        - "security_incident"

    media:
      contacts:
        - "press@quantumbeam.io"
        - "pr@quantumbeam.io"

# Recovery Objectives
recovery_objectives:
  services:
    quantumbeam_api:
      rto: 900      # 15 minutes
      rpo: 300      # 5 minutes
      priority: "P0"

    payment_processing:
      rto: 1800     # 30 minutes
      rpo: 60       # 1 minute
      priority: "P0"

    user_authentication:
      rto: 3600     # 1 hour
      rpo: 900      # 15 minutes
      priority: "P1"

    analytics:
      rto: 14400    # 4 hours
      rpo: 3600     # 1 hour
      priority: "P1"

    admin_dashboard:
      rto: 28800    # 8 hours
      rpo: 14400    # 4 hours
      priority: "P2"

# Testing Configuration
testing:
  schedule:
    smoke_tests: "0 6 * * *"        # Daily at 6 AM UTC
    failover_tests: "0 2 * * 0"    # Weekly on Sunday at 2 AM UTC
    full_dr_test: "0 1 1 * *"      # Monthly on 1st at 1 AM UTC

  scenarios:
    - name: "region_failover"
      description: "Complete region failover test"
      duration: "4h"
      participants: ["DevOps", "Engineering", "Management"]

    - name: "database_recovery"
      description: "Database point-in-time recovery test"
      duration: "2h"
      participants: ["Database Team", "DevOps"]

    - name: "security_incident"
      description: "Security incident response simulation"
      duration: "3h"
      participants: ["Security Team", "Legal", "PR"]

    - name: "ransomware_response"
      description: "Ransomware attack simulation"
      duration: "6h"
      participants: ["All Teams"]

# Automation Configuration
automation:
  dr_orchestration:
    enabled: true
    tool: "custom-dr-automation"
    timeout: 7200  # 2 hours

  rollback:
    enabled: true
    automatic_conditions:
      - "health_checks_failed_for_10min"
      - "performance_degradation_50_percent"
    manual_approval: true

  monitoring:
    health_checks:
      interval: 30
      timeout: 10
      retries: 3

    metrics_collection:
      interval: 60
      retention: "7d"

# Documentation and Training
documentation:
  dr_plan: "disaster-recovery-plan.md"
  playbooks:
    - "dr-playbooks/region-failover-playbook.md"
    - "dr-playbooks/security-incident-playbook.md"
    - "dr-playbooks/ransomware-response-playbook.md"
    - "dr-playbooks/data-corruption-playbook.md"

  runbooks:
    - "runbooks/failover-procedures.md"
    - "runbooks/rollback-procedures.md"
    - "runbooks/data-recovery.md"
    - "runbooks/communication-procedures.md"

training:
  schedule:
    basic_dr_training: "quarterly"
    advanced_dr_training: "semi-annually"
    security_training: "quarterly"
    leadership_training: "annually"

  materials:
    - "training/slides/dr-overview.pdf"
    - "training/videos/failover-demo.mp4"
    - "training/hands-on-lab/instructions.md"

# Vendor and Support Information
vendors:
  aws:
    support: "Enterprise"
    account_manager: "aws-am@quantumbeam.io"
    technical_support: "1-800-AWS-SUPPORT"

  security:
    forensic_services: "security-vendor@quantumbeam.io"
    incident_response: "ir-vendor@quantumbeam.io"

  communications:
    pr_firm: "pr-firm@quantumbeam.io"
    legal_counsel: "legal@quantumbeam.io"

# Cost Management
cost_management:
  budget:
    dr_infrastructure: "$50,000/month"
    backup_storage: "$20,000/month"
    monitoring: "$10,000/month"
    testing: "$5,000/month"

  cost_optimization:
    secondary_region_standby: true
    scaling_policies:
      secondary_region: "conservative"
      primary_region: "aggressive"

  alerts:
    budget_threshold: 90
    cost_spike_threshold: 150

# Environment-specific Configuration
environments:
  production:
    enabled: true
    primary_region: "us-east-1"
    secondary_region: "us-west-2"
    rto_objectives: "strict"
    testing_frequency: "weekly"

  staging:
    enabled: true
    primary_region: "us-west-2"
    secondary_region: "us-east-1"
    rto_objectives: "moderate"
    testing_frequency: "daily"

  development:
    enabled: false
    primary_region: "us-west-2"
    secondary_region: null
    rto_objectives: "relaxed"
    testing_frequency: "as-needed"

# Version Information
version: "1.0"
last_updated: "2024-01-15"
review_date: "2024-07-15"
