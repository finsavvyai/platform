apiVersion: v1
kind: ConfigMap
metadata:
  name: deployment-validation
  namespace: quantumbeam
  labels:
    app: quantumbeam
    component: testing
    type: deployment-validation
data:
  validate-deployment.sh: |
    #!/bin/bash
    # QuantumBeam Deployment Validation Script
    # Comprehensive deployment validation with automated testing and rollback

    set -euo pipefail

    # Colors for output
    RED='\033[0;31m'
    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    BLUE='\033[0;34m'
    NC='\033[0m' # No Color

    # Configuration
    NAMESPACE="${NAMESPACE:-quantumbeam}"
    SERVICE_NAME="${SERVICE_NAME:-quantumbeam-api}"
    DEPLOYMENT_NAME="${DEPLOYMENT_NAME:-quantumbeam-api}"
    INGRESS_NAME="${INGRESS_NAME:-quantumbeam-api-ingress}"
    TIMEOUT="${TIMEOUT:-600}"
    ROLLBACK_ON_FAILURE="${ROLLBACK_ON_FAILURE:-true}"
    GENERATE_REPORT="${GENERATE_REPORT:-true}"

    # Validation thresholds
    MIN_REPLICAS="${MIN_REPLICAS:-3}"
    MAX_POD_RESTART_COUNT="${MAX_POD_RESTART_COUNT:-5}"
    MAX_CPU_THRESHOLD="${MAX_CPU_THRESHOLD:-80}"
    MAX_MEMORY_THRESHOLD="${MAX_MEMORY_THRESHOLD:-80}"
    MIN_SUCCESS_RATE="${MIN_SUCCESS_RATE:-0.99}"
    MAX_ERROR_RATE="${MAX_ERROR_RATE:-0.01}"
    MAX_RESPONSE_TIME="${MAX_RESPONSE_TIME:-1.0}"

    # Log function
    log() {
        echo -e "${BLUE}[$(date '+%Y-%m-%d %H:%M:%S')]${NC} $1"
    }

    error() {
        echo -e "${RED}[ERROR]${NC} $1" >&2
    }

    success() {
        echo -e "${GREEN}[SUCCESS]${NC} $1"
    }

    warning() {
        echo -e "${YELLOW}[WARNING]${NC} $1"
    }

    # Validation results array
    declare -a VALIDATION_RESULTS=()

    # Add validation result
    add_result() {
        local test_name="$1"
        local status="$2"
        local message="$3"
        local details="${4:-}"

        VALIDATION_RESULTS+=("{\"test\": \"${test_name}\", \"status\": \"${status}\", \"message\": \"${message}\", \"details\": \"${details}\", \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}")
    }

    # Validate deployment status
    validate_deployment_status() {
        log "Validating deployment status..."

        local deployment_status
        deployment_status=$(kubectl get deployment "${DEPLOYMENT_NAME}" -n "${NAMESPACE}" -o json 2>/dev/null || echo "")

        if [[ -z "${deployment_status}" ]]; then
            add_result "deployment_status" "failed" "Deployment not found" "Deployment ${DEPLOYMENT_NAME} not found in namespace ${NAMESPACE}"
            return 1
        fi

        local replicas
        replicas=$(echo "${deployment_status}" | jq -r '.spec.replicas // 0')
        local ready_replicas
        ready_replicas=$(echo "${deployment_status}" | jq -r '.status.readyReplicas // 0')
        local updated_replicas
        updated_replicas=$(echo "${deployment_status}" | jq -r '.status.updatedReplicas // 0')

        if [[ "${ready_replicas}" -lt "${replicas}" ]]; then
            add_result "deployment_replicas" "failed" "Insufficient ready replicas" "Expected ${replicas}, got ${ready_replicas}"
            return 1
        fi

        if [[ "${updated_replicas}" -lt "${replicas}" ]]; then
            add_result "deployment_updated" "failed" "Not all replicas updated" "Expected ${replicas}, got ${updated_replicas}"
            return 1
        fi

        add_result "deployment_status" "passed" "Deployment is healthy" "Replicas: ${ready_replicas}/${replicas}"
        return 0
    }

    # Validate pod status
    validate_pod_status() {
        log "Validating pod status..."

        local pods
        pods=$(kubectl get pods -n "${NAMESPACE}" -l "app=${SERVICE_NAME}" -o json 2>/dev/null || echo "")

        if [[ -z "${pods}" ]]; then
            add_result "pod_status" "failed" "No pods found" "No pods found for service ${SERVICE_NAME}"
            return 1
        fi

        local pod_count
        pod_count=$(echo "${pods}" | jq '.items | length')
        local failed_pods=0

        while IFS= read -r pod; do
            local pod_name
            pod_name=$(echo "${pod}" | jq -r '.metadata.name')
            local pod_phase
            pod_phase=$(echo "${pod}" | jq -r '.status.phase')
            local restart_count
            restart_count=$(echo "${pod}" | jq -r '.status.containerStatuses[0].restartCount // 0')

            if [[ "${pod_phase}" != "Running" ]]; then
                ((failed_pods++))
                warning "Pod ${pod_name} is in ${pod_phase} phase"
            fi

            if [[ "${restart_count}" -gt "${MAX_POD_RESTART_COUNT}" ]]; then
                add_result "pod_restarts" "failed" "Pod ${pod_name} has too many restarts" "Restart count: ${restart_count}"
                return 1
            fi
        done < <(echo "${pods}" | jq -c '.items[]')

        if [[ ${failed_pods} -gt 0 ]]; then
            add_result "pod_status" "failed" "Some pods are not healthy" "${failed_pods}/${pod_count} pods are not running"
            return 1
        fi

        add_result "pod_status" "passed" "All pods are healthy" "${pod_count} pods running"
        return 0
    }

    # Validate service status
    validate_service_status() {
        log "Validating service status..."

        local service
        service=$(kubectl get service "${SERVICE_NAME}-active" -n "${NAMESPACE}" -o json 2>/dev/null || echo "")

        if [[ -z "${service}" ]]; then
            add_result "service_status" "failed" "Active service not found" "Service ${SERVICE_NAME}-active not found"
            return 1
        fi

        local service_type
        service_type=$(echo "${service}" | jq -r '.spec.type')
        local cluster_ip
        cluster_ip=$(echo "${service}" | jq -r '.spec.clusterIP')

        if [[ "${service_type}" == "LoadBalancer" ]]; then
            local ingress_ip
            ingress_ip=$(echo "${service}" | jq -r '.status.loadBalancer.ingress[0].hostname // .status.loadBalancer.ingress[0].ip // ""')

            if [[ -z "${ingress_ip}" ]]; then
                add_result "service_loadbalancer" "warning" "LoadBalancer IP not assigned" "LoadBalancer is still provisioning"
            else
                add_result "service_loadbalancer" "passed" "LoadBalancer is accessible" "IP: ${ingress_ip}"
            fi
        fi

        if [[ -z "${cluster_ip}" ]]; then
            add_result "service_cluster_ip" "failed" "Cluster IP not assigned" "Service does not have a cluster IP"
            return 1
        fi

        add_result "service_status" "passed" "Service is healthy" "Type: ${service_type}, Cluster IP: ${cluster_ip}"
        return 0
    }

    # Validate ingress status
    validate_ingress_status() {
        log "Validating ingress status..."

        local ingress
        ingress=$(kubectl get ingress "${INGRESS_NAME}" -n "${NAMESPACE}" -o json 2>/dev/null || echo "")

        if [[ -z "${ingress}" ]]; then
            add_result "ingress_status" "warning" "Ingress not found" "Ingress ${INGRESS_NAME} not found (may not be required)"
            return 0
        fi

        local ingress_address
        ingress_address=$(echo "${ingress}" | jq -r '.status.loadBalancer.ingress[0].ip // .status.loadBalancer.ingress[0].hostname // ""')

        if [[ -z "${ingress_address}" ]]; then
            add_result "ingress_address" "warning" "Ingress address not assigned" "Ingress is still provisioning"
        else
            add_result "ingress_address" "passed" "Ingress is accessible" "Address: ${ingress_address}"
        fi

        # Check TLS configuration
        local tls_configured
        tls_configured=$(echo "${ingress}" | jq -r '.spec.tls // [] | length')

        if [[ ${tls_configured} -gt 0 ]]; then
            add_result "ingress_tls" "passed" "TLS is configured" "${tls_configured} TLS configurations"
        else
            add_result "ingress_tls" "warning" "TLS not configured" "Consider enabling HTTPS"
        fi

        return 0
    }

    # Validate resource usage
    validate_resource_usage() {
        log "Validating resource usage..."

        local cpu_usage=0
        local memory_usage=0
        local pod_count=0

        while IFS= read -r pod_metrics; do
            local pod_cpu
            pod_cpu=$(echo "${pod_metrics}" | jq -r '.containers[0].usage.cpu // "0"')
            local pod_memory
            pod_memory=$(echo "${pod_metrics}" | jq -r '.containers[0].usage.memory // "0Ki"')

            # Convert to millicores and MiB
            pod_cpu=$(echo "${pod_cpu}" | sed 's/m//' | sed 's/n//' | awk '{print $1/1000000}')
            pod_memory=$(echo "${pod_memory}" | sed 's/Mi//' | sed 's/Ki//' | awk '{print $1/1024}')

            cpu_usage=$(echo "${cpu_usage} + ${pod_cpu}" | bc)
            memory_usage=$(echo "${memory_usage} + ${pod_memory}" | bc)
            ((pod_count++))
        done < <(kubectl top pods -n "${NAMESPACE}" -l "app=${SERVICE_NAME}" --no-headers 2>/dev/null || echo "")

        if [[ ${pod_count} -eq 0 ]]; then
            add_result "resource_usage" "warning" "No metrics available" "Metrics API may not be available"
            return 0
        fi

        local avg_cpu
        avg_cpu=$(echo "scale=2; ${cpu_usage} / ${pod_count}" | bc)
        local avg_memory
        avg_memory=$(echo "scale=2; ${memory_usage} / ${pod_count}" | bc)

        # Check against thresholds
        local resource_status="passed"
        local resource_details="CPU: ${avg_cpu} cores, Memory: ${avg_memory} MiB"

        if (( $(echo "${avg_cpu} > ${MAX_CPU_THRESHOLD}" | bc -l) )); then
            resource_status="warning"
            resource_details="${resource_details} (CPU above threshold)"
        fi

        if (( $(echo "${avg_memory} > ${MAX_MEMORY_THRESHOLD}" | bc -l) )); then
            if [[ "${resource_status}" == "passed" ]]; then
                resource_status="warning"
            fi
            resource_details="${resource_details} (Memory above threshold)"
        fi

        add_result "resource_usage" "${resource_status}" "Resource usage checked" "${resource_details}"
        return 0
    }

    # Validate endpoints
    validate_endpoints() {
        log "Validating service endpoints..."

        local service_url
        service_url=$(kubectl get service "${SERVICE_NAME}-active" -n "${NAMESPACE}" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")

        if [[ -z "${service_url}" ]]; then
            service_url=$(kubectl get service "${SERVICE_NAME}-active" -n "${NAMESPACE}" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
        fi

        if [[ -z "${service_url}" ]]; then
            service_url="${SERVICE_NAME}-active.${NAMESPACE}.svc.cluster.local"
        fi

        local endpoints=(
            "health:/health"
            "ready:/ready"
            "metrics:/metrics"
            "api:/api/v1/health"
        )

        local endpoint_passed=0
        local endpoint_total=${#endpoints[@]}

        for endpoint in "${endpoints[@]}"; do
            local endpoint_name="${endpoint%:*}"
            local endpoint_path="${endpoint#*:}"
            local url="http://${service_url}${endpoint_path}"

            if curl -f -s -m 10 "${url}" > /dev/null 2>&1; then
                ((endpoint_passed++))
            else
                add_result "endpoint_${endpoint_name}" "failed" "Endpoint not accessible" "URL: ${url}"
            fi
        done

        if [[ ${endpoint_passed} -eq ${endpoint_total} ]]; then
            add_result "endpoints" "passed" "All endpoints accessible" "${endpoint_passed}/${endpoint_total} endpoints working"
        else
            add_result "endpoints" "failed" "Some endpoints not accessible" "${endpoint_passed}/${endpoint_total} endpoints working"
            return 1
        fi

        return 0
    }

    # Validate monitoring
    validate_monitoring() {
        log "Validating monitoring setup..."

        # Check if ServiceMonitor exists
        local service_monitor
        service_monitor=$(kubectl get servicemonitor "${SERVICE_NAME}-metrics" -n "${NAMESPACE}" -o json 2>/dev/null || echo "")

        if [[ -n "${service_monitor}" ]]; then
            add_result "service_monitor" "passed" "ServiceMonitor is configured" "Prometheus will scrape metrics"
        else
            add_result "service_monitor" "warning" "ServiceMonitor not found" "Metrics may not be collected"
        fi

        # Check if PrometheusRule exists
        local prometheus_rule
        prometheus_rule=$(kubectl get prometheusrule "${SERVICE_NAME}-rules" -n "${NAMESPACE}" -o json 2>/dev/null || echo "")

        if [[ -n "${prometheus_rule}" ]]; then
            add_result "prometheus_rules" "passed" "PrometheusRules are configured" "Alerting rules are active"
        else
            add_result "prometheus_rules" "warning" "PrometheusRules not found" "Alerting may not be configured"
        fi

        # Check metrics endpoint
        local service_url
        service_url=$(kubectl get service "${SERVICE_NAME}-active" -n "${NAMESPACE}" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")

        if [[ -z "${service_url}" ]]; then
            service_url="${SERVICE_NAME}-active.${NAMESPACE}.svc.cluster.local"
        fi

        if curl -f -s "http://${service_url}/metrics" | grep -q "http_requests_total" 2>/dev/null; then
            add_result "metrics_export" "passed" "Metrics are being exported" "HTTP metrics found"
        else
            add_result "metrics_export" "failed" "Metrics not being exported" "HTTP metrics not found"
            return 1
        fi

        return 0
    }

    # Validate security
    validate_security() {
        log "Validating security configuration..."

        # Check if PodSecurityPolicy is applied
        local pod_security_context
        pod_security_context=$(kubectl get deployment "${DEPLOYMENT_NAME}" -n "${NAMESPACE}" -o jsonpath='{.spec.template.spec.securityContext}' 2>/dev/null || echo "")

        if [[ -n "${pod_security_context}" ]]; then
            add_result "pod_security_context" "passed" "Pod security context is configured" "Security policies applied"
        else
            add_result "pod_security_context" "warning" "Pod security context not configured" "Consider applying security policies"
        fi

        # Check if NetworkPolicy exists
        local network_policy
        network_policy=$(kubectl get networkpolicy -n "${NAMESPACE}" -l "app=${SERVICE_NAME}" -o json 2>/dev/null || echo "")

        if [[ -n "${network_policy}" ]]; then
            add_result "network_policy" "passed" "NetworkPolicy is configured" "Network restrictions applied"
        else
            add_result "network_policy" "warning" "NetworkPolicy not found" "Consider applying network policies"
        fi

        # Check if RBAC is configured
        local service_account
        service_account=$(kubectl get deployment "${DEPLOYMENT_NAME}" -n "${NAMESPACE}" -o jsonpath='{.spec.template.spec.serviceAccountName}' 2>/dev/null || echo "")

        if [[ -n "${service_account}" ]]; then
            add_result "rbac" "passed" "RBAC is configured" "ServiceAccount: ${service_account}"
        else
            add_result "rbac" "warning" "RBAC not configured" "Consider configuring service accounts"
        fi

        return 0
    }

    # Rollback function
    rollback_deployment() {
        if [[ "${ROLLBACK_ON_FAILURE}" != "true" ]]; then
            return 0
        fi

        log "Rolling back deployment..."

        local rollback_result
        rollback_result=$(kubectl rollout undo deployment/"${DEPLOYMENT_NAME}" -n "${NAMESPACE}" 2>&1)

        if [[ $? -eq 0 ]]; then
            success "Rollback initiated successfully"
            kubectl rollout status deployment/"${DEPLOYMENT_NAME}" -n "${NAMESPACE}" --timeout=300s
            return 0
        else
            error "Rollback failed: ${rollback_result}"
            return 1
        fi
    }

    # Generate validation report
    generate_validation_report() {
        local failed_tests
        failed_tests=$(printf '%s\n' "${VALIDATION_RESULTS[@]}" | jq -r '[.[] | select(.status == "failed")] | length')
        local total_tests
        total_tests=${#VALIDATION_RESULTS[@]}
        local passed_tests
        passed_tests=$((total_tests - failed_tests))

        local status="passed"
        if [[ ${failed_tests} -gt 0 ]]; then
            status="failed"
        fi

        local report_file="/tmp/deployment-validation-report-$(date +%Y%m%d-%H%M%S).json"

        cat > "${report_file}" << EOF
    {
        "validation": {
            "status": "${status}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "namespace": "${NAMESPACE}",
            "service": "${SERVICE_NAME}",
            "deployment": "${DEPLOYMENT_NAME}",
            "total_tests": ${total_tests},
            "passed_tests": ${passed_tests},
            "failed_tests": ${failed_tests},
            "success_rate": "$(echo "scale=2; ${passed_tests} * 100 / ${total_tests}" | bc)"
        },
        "results": [
    $(printf ',%s' "${VALIDATION_RESULTS[@]}" | tail -c +2)
        ],
        "configuration": {
            "min_replicas": ${MIN_REPLICAS},
            "max_pod_restart_count": ${MAX_POD_RESTART_COUNT},
            "max_cpu_threshold": ${MAX_CPU_THRESHOLD},
            "max_memory_threshold": ${MAX_MEMORY_THRESHOLD},
            "min_success_rate": ${MIN_SUCCESS_RATE},
            "max_error_rate": ${MAX_ERROR_RATE},
            "max_response_time": ${MAX_RESPONSE_TIME},
            "timeout": ${TIMEOUT},
            "rollback_on_failure": ${ROLLBACK_ON_FAILURE}
        }
    }
EOF

        success "Validation report generated: ${report_file}"
        echo "${report_file}"
    }

    # Main validation function
    main() {
        log "Starting deployment validation..."
        log "Namespace: ${NAMESPACE}"
        log "Service: ${SERVICE_NAME}"
        log "Deployment: ${DEPLOYMENT_NAME}"
        log "Timeout: ${TIMEOUT}s"

        local validation_start_time=$(date +%s)

        # Run validation checks
        validate_deployment_status
        validate_pod_status
        validate_service_status
        validate_ingress_status
        validate_resource_usage
        validate_endpoints
        validate_monitoring
        validate_security

        local validation_end_time=$(date +%s)
        local validation_duration=$((validation_end_time - validation_start_time))

        # Count results
        local failed_tests
        failed_tests=$(printf '%s\n' "${VALIDATION_RESULTS[@]}" | jq -r '[.[] | select(.status == "failed")] | length')
        local total_tests
        total_tests=${#VALIDATION_RESULTS[@]}

        # Generate report
        local report_file
        if [[ "${GENERATE_REPORT}" == "true" ]]; then
            report_file=$(generate_validation_report)
        fi

        # Summary
        log "Deployment validation summary:"
        log "  Total tests: ${total_tests}"
        log "  Failed tests: ${failed_tests}"
        log "  Duration: ${validation_duration}s"

        if [[ ${failed_tests} -gt 0 ]]; then
            error "Deployment validation failed!"

            # Show failed tests
            log "Failed tests:"
            printf '%s\n' "${VALIDATION_RESULTS[@]}" | jq -r 'select(.status == "failed") | "- \(.test): \(.message)"'

            # Rollback if needed
            if ! rollback_deployment; then
                error "Rollback failed!"
            fi

            return 1
        else
            success "All deployment validations passed!"
            return 0
        fi
    }

    # Parse command line arguments
    while [[ $# -gt 0 ]]; do
        case $1 in
            --namespace)
                NAMESPACE="$2"
                shift 2
                ;;
            --service)
                SERVICE_NAME="$2"
                shift 2
                ;;
            --deployment)
                DEPLOYMENT_NAME="$2"
                shift 2
                ;;
            --timeout)
                TIMEOUT="$2"
                shift 2
                ;;
            --no-rollback)
                ROLLBACK_ON_FAILURE=false
                shift
                ;;
            --no-report)
                GENERATE_REPORT=false
                shift
                ;;
            --help|-h)
                cat << EOF
    QuantumBeam Deployment Validation

    Usage: $0 [OPTIONS]

    Options:
        --namespace NAME         Kubernetes namespace (default: quantumbeam)
        --service NAME           Service name (default: quantumbeam-api)
        --deployment NAME        Deployment name (default: quantumbeam-api)
        --timeout SECONDS        Validation timeout (default: 600)
        --no-rollback           Disable automatic rollback on failure
        --no-report             Disable report generation
        --help, -h              Show this help message

    Environment Variables:
        NAMESPACE               Kubernetes namespace
        SERVICE_NAME            Service name
        DEPLOYMENT_NAME         Deployment name
        INGRESS_NAME            Ingress name
        TIMEOUT                 Validation timeout
        ROLLBACK_ON_FAILURE     Enable rollback on failure
        GENERATE_REPORT         Enable report generation

    Examples:
        $0 --namespace production --timeout 1200
        $0 --no-rollback --service my-service

EOF
                exit 0
                ;;
            *)
                error "Unknown option: $1"
                ;;
        esac
    done

    # Run main function
    main "$@"