apiVersion: v1
kind: ConfigMap
metadata:
  name: smoke-tests
  namespace: quantumbeam
  labels:
    app: quantumbeam
    component: testing
    type: smoke-test
data:
  run-smoke-tests.sh: |
    #!/bin/bash
    # QuantumBeam Smoke Tests
    # This script runs comprehensive smoke tests after deployment

    set -euo pipefail

    # Colors for output
    RED='\033[0;31m'
    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    BLUE='\033[0;34m'
    NC='\033[0m' # No Color

    # Configuration
    SERVICE_URL="${SERVICE_URL:-http://quantumbeam-api-active.quantumbeam.svc.cluster.local}"
    HEALTH_ENDPOINT="${HEALTH_ENDPOINT:-/health}"
    READY_ENDPOINT="${READY_ENDPOINT:-/ready}"
    METRICS_ENDPOINT="${METRICS_ENDPOINT:-/metrics}"
    API_ENDPOINT="${API_ENDPOINT:-/api/v1}"
    TIMEOUT="${TIMEOUT:-30}"
    RETRIES="${RETRIES:-3}"

    # Test configuration
    TEST_USER_TOKEN="${TEST_USER_TOKEN:-test-token}"
    TEST_TRANSACTION_ID="${TEST_TRANSACTION_ID:-test-transaction-$(date +%s)}"
    TEST_AMOUNT="${TEST_AMOUNT:-100.00}"
    TEST_CURRENCY="${TEST_CURRENCY:-USD}"

    # Log function
    log() {
        echo -e "${BLUE}[$(date '+%Y-%m-%d %H:%M:%S')]${NC} $1"
    }

    error() {
        echo -e "${RED}[ERROR]${NC} $1" >&2
        return 1
    }

    success() {
        echo -e "${GREEN}[SUCCESS]${NC} $1"
    }

    warning() {
        echo -e "${YELLOW}[WARNING]${NC} $1"
    }

    # HTTP request function
    make_request() {
        local method="$1"
        local url="$2"
        local data="${3:-}"
        local headers="${4:-}"

        local curl_cmd="curl -s -w '%{http_code}' -o /tmp/response_body --max-time ${TIMEOUT}"

        if [[ -n "${headers}" ]]; then
            curl_cmd="${curl_cmd} ${headers}"
        fi

        if [[ -n "${data}" ]]; then
            curl_cmd="${curl_cmd} -X ${method} -H 'Content-Type: application/json' -d '${data}'"
        else
            curl_cmd="${curl_cmd} -X ${method}"
        fi

        curl_cmd="${curl_cmd} '${url}'"

        local response_code
        response_code=$(eval "${curl_cmd}")
        local response_body
        response_body=$(cat /tmp/response_body 2>/dev/null || echo "")

        echo "${response_code}:${response_body}"
    }

    # Test function
    run_test() {
        local test_name="$1"
        local test_function="$2"

        log "Running test: ${test_name}"

        local attempt=1
        while [[ ${attempt} -le ${RETRIES} ]]; do
            log "Attempt ${attempt}/${RETRIES} for ${test_name}"

            if ${test_function}; then
                success "Test passed: ${test_name}"
                return 0
            else
                warning "Test failed (attempt ${attempt}/${RETRIES}): ${test_name}"
                if [[ ${attempt} -lt ${RETRIES} ]]; then
                    sleep 5
                fi
                ((attempt++))
            fi
        done

        error "Test failed after ${RETRIES} attempts: ${test_name}"
        return 1
    }

    # Individual test functions
    test_health_endpoint() {
        local response
        response=$(make_request "GET" "${SERVICE_URL}${HEALTH_ENDPOINT}")

        local status_code="${response%%:*}"
        local body="${response#*:}"

        if [[ "${status_code}" == "200" ]]; then
            # Check if response contains expected fields
            if echo "${body}" | jq -e '.status' > /dev/null 2>&1; then
                local health_status
                health_status=$(echo "${body}" | jq -r '.status // "unknown"')
                if [[ "${health_status}" == "healthy" ]]; then
                    return 0
                fi
            fi
        fi

        return 1
    }

    test_readiness_endpoint() {
        local response
        response=$(make_request "GET" "${SERVICE_URL}${READY_ENDPOINT}")

        local status_code="${response%%:*}"
        local body="${response#*:}"

        if [[ "${status_code}" == "200" ]]; then
            # Check if all checks are ready
            if echo "${body}" | jq -e '.checks' > /dev/null 2>&1; then
                local checks_passed
                checks_passed=$(echo "${body}" | jq -r '.checks // {} | to_entries | map(select(.value == true)) | length')
                local total_checks
                total_checks=$(echo "${body}" | jq -r '.checks // {} | keys | length')

                if [[ "${checks_passed}" -eq "${total_checks}" ]] && [[ "${total_checks}" -gt 0 ]]; then
                    return 0
                fi
            fi
        fi

        return 1
    }

    test_metrics_endpoint() {
        local response
        response=$(make_request "GET" "${SERVICE_URL}${METRICS_ENDPOINT}")

        local status_code="${response%%:*}"
        local body="${response#*:}"

        if [[ "${status_code}" == "200" ]]; then
            # Check if metrics are present
            if echo "${body}" | grep -q "http_requests_total" && \
               echo "${body}" | grep -q "http_request_duration_seconds" && \
               echo "${body}" | grep -q "process_"; then
                return 0
            fi
        fi

        return 1
    }

    test_api_health() {
        local response
        response=$(make_request "GET" "${SERVICE_URL}${API_ENDPOINT}/health" "" "-H 'Authorization: Bearer ${TEST_USER_TOKEN}'")

        local status_code="${response%%:*}"

        if [[ "${status_code}" == "200" ]]; then
            return 0
        fi

        return 1
    }

    test_api_version() {
        local response
        response=$(make_request "GET" "${SERVICE_URL}${API_ENDPOINT}/version" "" "-H 'Authorization: Bearer ${TEST_USER_TOKEN}'")

        local status_code="${response%%:*}"
        local body="${response#*:}"

        if [[ "${status_code}" == "200" ]]; then
            # Check if version response is valid JSON
            if echo "${body}" | jq -e '.version' > /dev/null 2>&1; then
                return 0
            fi
        fi

        return 1
    }

    test_fraud_detection_endpoint() {
        local test_transaction='{
            "id": "'"${TEST_TRANSACTION_ID}"'",
            "amount": '"${TEST_AMOUNT}"',
            "currency": "'"${TEST_CURRENCY}"'",
            "user_id": "test-user-123",
            "merchant_id": "test-merchant-456",
            "payment_method": "credit_card",
            "card_number": "4111111111111111",
            "ip_address": "192.168.1.1",
            "device_id": "test-device-789"
        }'

        local response
        response=$(make_request "POST" "${SERVICE_URL}${API_ENDPOINT}/fraud/analyze" "${test_transaction}" "-H 'Authorization: Bearer ${TEST_USER_TOKEN}'")

        local status_code="${response%%:*}"
        local body="${response#*:}"

        if [[ "${status_code}" == "200" ]]; then
            # Check if fraud detection response is valid
            if echo "${body}" | jq -e '.fraud_score' > /dev/null 2>&1 && \
               echo "${body}" | jq -e '.is_fraud' > /dev/null 2>&1; then
                return 0
            fi
        fi

        return 1
    }

    test_quantum_algorithm_endpoint() {
        local test_request='{
            "algorithm": "grover",
            "parameters": {
                "qubits": 4,
                "iterations": 2,
                "oracle": "test-oracle"
            },
            "data": {
                "search_space_size": 16,
                "target_state": "target-state"
            }
        }'

        local response
        response=$(make_request "POST" "${SERVICE_URL}${API_ENDPOINT}/quantum/optimize" "${test_request}" "-H 'Authorization: Bearer ${TEST_USER_TOKEN}'")

        local status_code="${response%%:*}"
        local body="${response#*:}"

        if [[ "${status_code}" == "200" ]]; then
            # Check if quantum algorithm response is valid
            if echo "${body}" | jq -e '.result' > /dev/null 2>&1; then
                return 0
            fi
        fi

        return 1
    }

    test_analytics_endpoint() {
        local response
        response=$(make_request "GET" "${SERVICE_URL}${API_ENDPOINT}/analytics/dashboard?period=24h" "" "-H 'Authorization: Bearer ${TEST_USER_TOKEN}'")

        local status_code="${response%%:*}"
        local body="${response#*:}"

        if [[ "${status_code}" == "200" ]]; then
            # Check if analytics response contains expected data
            if echo "${body}" | jq -e '.summary' > /dev/null 2>&1; then
                return 0
            fi
        fi

        return 1
    }

    test_database_connectivity() {
        # This test checks if the application can connect to its database
        local response
        response=$(make_request "GET" "${SERVICE_URL}${API_ENDPOINT}/health/database" "" "-H 'Authorization: Bearer ${TEST_USER_TOKEN}'")

        local status_code="${response%%:*}"
        local body="${response#*:}"

        if [[ "${status_code}" == "200" ]]; then
            if echo "${body}" | jq -e '.database.status' > /dev/null 2>&1; then
                local db_status
                db_status=$(echo "${body}" | jq -r '.database.status // "unknown"')
                if [[ "${db_status}" == "connected" ]]; then
                    return 0
                fi
            fi
        fi

        return 1
    }

    test_cache_connectivity() {
        # This test checks if the application can connect to Redis
        local response
        response=$(make_request "GET" "${SERVICE_URL}${API_ENDPOINT}/health/cache" "" "-H 'Authorization: Bearer ${TEST_USER_TOKEN}'")

        local status_code="${response%%:*}"
        local body="${response#*:}"

        if [[ "${status_code}" == "200" ]]; then
            if echo "${body}" | jq -e '.cache.status' > /dev/null 2>&1; then
                local cache_status
                cache_status=$(echo "${body}" | jq -r '.cache.status // "unknown"')
                if [[ "${cache_status}" == "connected" ]]; then
                    return 0
                fi
            fi
        fi

        return 1
    }

    test_performance_benchmarks() {
        # Simple performance test
        local start_time
        start_time=$(date +%s.%N)

        local response
        response=$(make_request "GET" "${SERVICE_URL}${API_ENDPOINT}/health" "" "-H 'Authorization: Bearer ${TEST_USER_TOKEN}'")

        local end_time
        end_time=$(date +%s.%N)

        local duration
        duration=$(echo "${end_time} - ${start_time}" | bc)

        # Check if response time is under 1 second
        if (( $(echo "${duration} < 1.0" | bc -l) )); then
            return 0
        fi

        return 1
    }

    # Generate test report
    generate_report() {
        local test_results="$1"
        local total_tests="$2"
        local passed_tests="$3"
        local failed_tests="$4"

        local report_file="/tmp/smoke-test-report-$(date +%Y%m%d-%H%M%S).json"

        cat > "${report_file}" << EOF
    {
        "smoke_test": {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "service_url": "${SERVICE_URL}",
            "total_tests": ${total_tests},
            "passed_tests": ${passed_tests},
            "failed_tests": ${failed_tests},
            "success_rate": "$(echo "scale=2; ${passed_tests} * 100 / ${total_tests}" | bc)",
            "environment": "${ENVIRONMENT:-unknown}",
            "version": "${VERSION:-unknown}"
        },
        "test_results": [
    ${test_results}
        ],
        "configuration": {
            "timeout": ${TIMEOUT},
            "retries": ${RETRIES},
            "test_transaction_id": "${TEST_TRANSACTION_ID}",
            "test_amount": "${TEST_AMOUNT}",
            "test_currency": "${TEST_CURRENCY}"
        }
    }
EOF

        success "Test report generated: ${report_file}"
        echo "${report_file}"
    }

    # Main test execution
    main() {
        log "Starting QuantumBeam smoke tests..."
        log "Service URL: ${SERVICE_URL}"
        log "Timeout: ${TIMEOUT}s"
        log "Retries: ${RETRIES}"

        # Wait a moment for the service to be fully ready
        log "Waiting for service to be ready..."
        sleep 10

        # Define tests
        declare -A tests=(
            ["health_endpoint"]="test_health_endpoint"
            ["readiness_endpoint"]="test_readiness_endpoint"
            ["metrics_endpoint"]="test_metrics_endpoint"
            ["api_health"]="test_api_health"
            ["api_version"]="test_api_version"
            ["fraud_detection"]="test_fraud_detection_endpoint"
            ["quantum_algorithm"]="test_quantum_algorithm_endpoint"
            ["analytics"]="test_analytics_endpoint"
            ["database_connectivity"]="test_database_connectivity"
            ["cache_connectivity"]="test_cache_connectivity"
            ["performance_benchmarks"]="test_performance_benchmarks"
        )

        # Run tests
        local total_tests=${#tests[@]}
        local passed_tests=0
        local failed_tests=0
        local test_results=""

        for test_name in "${!tests[@]}"; do
            local test_function="${tests[${test_name}]}"
            local test_start_time=$(date +%s)

            if run_test "${test_name}" "${test_function}"; then
                ((passed_tests++))
                test_result='{"name": "'"${test_name}"'", "status": "passed", "duration": '$(($(date +%s) - test_start_time))'}'
            else
                ((failed_tests++))
                test_result='{"name": "'"${test_name}"'", "status": "failed", "duration": '$(($(date +%s) - test_start_time))'}'
            fi

            if [[ -n "${test_results}" ]]; then
                test_results="${test_results},"
            fi
            test_results="${test_results}${test_result}"
        done

        # Generate report
        local report_file
        report_file=$(generate_report "${test_results}" "${total_tests}" "${passed_tests}" "${failed_tests}")

        # Summary
        log "Smoke test summary:"
        log "  Total tests: ${total_tests}"
        log "  Passed: ${passed_tests}"
        log "  Failed: ${failed_tests}"
        log "  Success rate: $(echo "scale=2; ${passed_tests} * 100 / ${total_tests}" | bc)%"

        if [[ ${failed_tests} -gt 0 ]]; then
            error "Smoke tests failed! Report: ${report_file}"
            return 1
        else
            success "All smoke tests passed! Report: ${report_file}"
            return 0
        fi
    }

    # Parse command line arguments
    while [[ $# -gt 0 ]]; do
        case $1 in
            --service-url)
                SERVICE_URL="$2"
                shift 2
                ;;
            --timeout)
                TIMEOUT="$2"
                shift 2
                ;;
            --retries)
                RETRIES="$2"
                shift 2
                ;;
            --test-token)
                TEST_USER_TOKEN="$2"
                shift 2
                ;;
            --help|-h)
                cat << EOF
    QuantumBeam Smoke Tests

    Usage: $0 [OPTIONS]

    Options:
        --service-url URL       Service URL to test (default: http://quantumbeam-api-active.quantumbeam.svc.cluster.local)
        --timeout SECONDS       Request timeout (default: 30)
        --retries COUNT         Number of retries (default: 3)
        --test-token TOKEN      Test authentication token
        --help, -h              Show this help message

    Environment Variables:
        SERVICE_URL             Service URL
        HEALTH_ENDPOINT         Health check endpoint
        READY_ENDPOINT          Readiness check endpoint
        METRICS_ENDPOINT        Metrics endpoint
        API_ENDPOINT            API base endpoint
        TIMEOUT                 Request timeout
        RETRIES                 Number of retries
        TEST_USER_TOKEN         Test authentication token

    Examples:
        $0 --service-url http://api.example.com --timeout 60
        $0 --test-token my-test-token --retries 5

EOF
                exit 0
                ;;
            *)
                error "Unknown option: $1"
                ;;
        esac
    done

    # Run main function
    main "$@"

  validate-config.yaml: |
    #!/bin/bash
    # Configuration Validation Script
    # Validates Kubernetes configuration files against the schema

    set -euo pipefail

    SCHEMA_FILE="/app/schema.json"
    CONFIG_DIR="/app/config"
    REPORT_FILE="/tmp/config-validation-report.json"

    # Validate function
    validate_config() {
        local config_file="$1"
        local schema_file="$2"

        if command -v yq &> /dev/null; then
            # Use yq for YAML validation
            if yq eval '.' "${config_file}" > /dev/null 2>&1; then
                # Validate against schema using a custom validator
                return 0
            fi
        fi

        return 1
    }

    # Generate validation report
    generate_validation_report() {
        local results="$1"

        cat > "${REPORT_FILE}" << EOF
    {
        "validation": {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "total_files": $(echo "${results}" | jq '. | length'),
            "valid_files": $(echo "${results}" | jq '[.[] | select(.valid == true)] | length'),
            "invalid_files": $(echo "${results}" | jq '[.[] | select(.valid == false)] | length')
        },
        "results": ${results}
    }
EOF

        echo "${REPORT_FILE}"
    }

    # Main validation
    main() {
        # Find all YAML files
        local config_files=()
        while IFS= read -r -d '' file; do
            config_files+=("$file")
        done < <(find "${CONFIG_DIR}" -name "*.yaml" -o -name "*.yml" -print0)

        local results="["

        for config_file in "${config_files[@]}"; do
            local is_valid=false
            local error_message=""

            if validate_config "${config_file}" "${SCHEMA_FILE}"; then
                is_valid=true
            else
                error_message="Validation failed"
            fi

            if [[ -n "${results}" && "${results}" != "[" ]]; then
                results="${results},"
            fi

            results="${results}{\"file\": \"${config_file}\", \"valid\": ${is_valid}, \"error\": \"${error_message}\"}"
        done

        results="${results}]"

        local report_file
        report_file=$(generate_validation_report "${results}")

        echo "Configuration validation completed. Report: ${report_file}"
    }

    main "$@"