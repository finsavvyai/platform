groups:
  - name: quantumbeam.rules
    rules:
      # API Server Alerts
      - alert: APIServerDown
        expr: up{job="quantumbeam-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "QuantumBeam API server is down"
          description: "QuantumBeam API server has been down for more than 1 minute."

      - alert: HighAPILatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High API latency detected"
          description: "95th percentile latency is {{ $value }}s"

      - alert: HighAPIErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High API error rate"
          description: "API error rate is {{ $value | humanizePercentage }}"

      # Quantum Service Alerts
      - alert: QuantumServiceDown
        expr: up{job="quantum-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Quantum service is down"
          description: "Quantum service has been down for more than 1 minute."

      - alert: QuantumProcessingBacklog
        expr: quantum_processing_queue_size > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Quantum processing backlog"
          description: "Quantum processing queue has {{ $value }} items"

      # AI/ML Service Alerts
      - alert: AIServiceDown
        expr: up{job="ai-ml-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AI/ML service is down"
          description: "AI/ML service has been down for more than 1 minute."

      - alert: HighAILatency
        expr: ai_processing_duration_seconds > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High AI processing latency"
          description: "AI processing is taking {{ $value }}s"

      # Database Alerts
      - alert: PostgreSQLDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL database has been down for more than 1 minute."

      - alert: PostgreSQLTooManyConnections
        expr: pg_stat_database_numbackends > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL too many connections"
          description: "PostgreSQL has {{ $value }} connections"

      - alert: PostgreSQLSlowQueries
        expr: rate(pg_stat_statements_mean_time_seconds[5m]) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL slow queries"
          description: "PostgreSQL average query time is {{ $value }}s"

      # Redis Alerts
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis cache has been down for more than 1 minute."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is {{ $value | humanizePercentage }}"

      # System Alerts
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}%"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}%"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space"
          description: "Disk space is {{ $value }}% available"

      # Business Metrics Alerts
      - alert: LowFraudDetectionAccuracy
        expr: fraud_detection_accuracy < 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low fraud detection accuracy"
          description: "Fraud detection accuracy is {{ $value | humanizePercentage }}"

      - alert: HighQuantumFailureRate
        expr: rate(quantum_processing_failures_total[5m]) / rate(quantum_processing_total[5m]) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High quantum processing failure rate"
          description: "Quantum processing failure rate is {{ $value | humanizePercentage }}"

      - alert: BillingServiceDown
        expr: up{job="billing-service"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Billing service is down"
          description: "Billing service has been down for more than 2 minutes."