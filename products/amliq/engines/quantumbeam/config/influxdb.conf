# QuantumBeam.io - Production InfluxDB Configuration
# InfluxDB 2.x configuration optimized for time-series analytics

[coordinator]
  # The default time a write request will wait until a "shard group" will be created.
  # The default value is '15s'.
  write-timeout = "30s"

  # The maximum number of concurrent queries allowed to be executing at one time.
  # The default value is 0 (no limit).
  max-concurrent-queries = 0

  # The maximum time a query will is allowed to execute before being logged as a slow query.
  # The default value is "0s" (disabled).
  query-timeout = "0s"

  # The maximum number of selects allowed at the same time.
  # The default value is 0 (unlimited).
  max-select-point = 0

  # The maximum number of points a SELECT can process.
  # The default value is 0 (unlimited).
  max-select-series = 0

  # The maximum number of series a SELECT can process.
  # The default value is 0 (unlimited).
  max-select-buckets = 0

[meta]
  # The directory where the metadata/raft database is stored.
  dir = "/var/lib/influxdb2/engine/meta"

  # Automatically create a default retention policy when creating a database.
  # The default retention policy will have infinite duration, a shard group duration of 7 days,
  # a replication factor of 1, and it will be the default retention policy for the database.
  # Setting this to "false" will mean you are required to create a retention policy for any new database.
  # The default value is "true".
  # This option is deprecated in InfluxDB 2.x and is ignored.
  # retention-autocreate = true

  # If enabled, InfluxDB will log every HTTP request that is not successful.
  # The default value is "false".
  # This option is deprecated in InfluxDB 2.x and is ignored.
  # log-enabled = true

  # The maximum series allowed per database before writes are dropped.
  # The default value is 1000000.
  # This option is deprecated in InfluxDB 2.x and is ignored.
  # max-series-per-database = 1000000

  # The maximum values per tag allowed before writes are dropped.
  # The default value is 100000.
  # This option is deprecated in InfluxDB 2.x and is ignored.
  # max-values-per-tag = 100000

[data]
  # The directory where the TSM storage engine stores TSM files.
  dir = "/var/lib/influxdb2/engine/data"

  # The directory where the TSM storage engine stores WAL files.
  wal-dir = "/var/lib/influxdb2/engine/wal"

  # The amount of data that will be indexed when the WAL starts.
  # A higher value will improve query performance, but will increase startup time.
  # The default value is "1048576" (1MB).
  index-version = "inmem"

  # The amount of time that a write will wait before getting flushed to the tsm file.
  # The default value is "10ms".
  cache-snapshot-memory-size = "256m"

  # The amount of time that a write will wait before getting flushed to the tsm file.
  # The default value is "10ms".
  cache-snapshot-write-cold-duration = "10m"

  # The maximum number of concurrent compactions.
  # The default value is 0 (unlimited).
  compact-full-write-cold-duration = "4h"

  # The maximum size of the shard snapshot cache.
  # The default value is "67108864" (64MB).
  max-series-per-database = 10000000

  # The maximum number of values per tag.
  # The default value is "100000".
  max-values-per-tag = 10000000

  # The maximum size of a TSM file before it's rotated.
  # The default value is "1073741824" (1GB).
  max-index-bytes = "10485760"  # 10MB

  # The maximum number of concurrent queries.
  # The default value is "0" (unlimited).
  max-concurrent-compactions = 4

  # The maximum number of concurrent queries.
  # The default value is "0" (unlimited).
  max-concurrent-queries = 64

  # The amount of time a query will wait before timing out.
  # The default value is "0s" (no timeout).
  query-timeout = "0s"

  # The maximum number of queries that can be executed concurrently.
  # The default value is "0" (unlimited).
  log-queries-after = "0s"

  # Whether to log queries.
  # The default value is "false".
  log-queries-after = "1s"

  # Whether to log slow queries.
  # The default value is "false".
  trace-logging-enabled = false

[coordinator]
  # The default time a write request will wait until a "shard group" will be created.
  # The default value is "15s".
  write-timeout = "30s"

  # The maximum number of concurrent queries allowed to be executing at one time.
  # The default value is 0 (no limit).
  max-concurrent-queries = 0

  # The maximum time a query will is allowed to execute before being logged as a slow query.
  # The default value is "0s" (disabled).
  query-timeout = "0s"

  # The maximum number of selects allowed at the same time.
  # The default value is 0 (unlimited).
  max-select-point = 0

  # The maximum number of points a SELECT can process.
  # The default value is 0 (unlimited).
  max-select-series = 0

  # The maximum number of series a SELECT can process.
  # The default value is 0 (unlimited).
  max-select-buckets = 0

[retention]
  # Determines whether retention policy enforcement should be enabled.
  # The default value is "true".
  enabled = true

  # The interval of time when retention policy enforcement checks run.
  # The default value is "30m".
  check-interval = "30m"

[shard-precreation]
  # Determines whether shard pre-creation service is enabled.
  # The default value is "true".
  enabled = true

  # The lead time used before creating shards.
  # The default value is "30m".
  advance-period = "30m"

[monitor]
  # Whether to record statistics internally.
  # The default value is "true".
  store-enabled = true

  # The destination database for recorded statistics.
  # The default value is "internal".
  store-database = "internal"

  # The interval at which to record statistics.
  # The default value is "10s".
  store-interval = "10s"

[subscriber]
  # Enables the subscriber service.
  # The default value is "true".
  enabled = true

  # The HTTP timeout for a subscriber.
  # The default value is "30s".
  http-timeout = "30s"

  # Allows insecure HTTPS connections to subscribers.
  # The default value is "false".
  insecure-skip-verify = false

  # The number of writer goroutines processing the write channel.
  # The default value is "40".
  write-concurrency = 40

  # The number of in-flight writes buffered in the write channel.
  # The default value is "1000".
  write-buffer-size = 1000

[http]
  # Determines whether HTTP endpoint is enabled.
  # The default value is "true".
  enabled = true

  # The bind address used by the HTTP service.
  # The default value is ":8086".
  bind-address = ":8086"

  # Determines whether HTTPS is enabled.
  # The default value is "false".
  https-enabled = false

  # The SSL certificate to use when HTTPS is enabled.
  # The default value is "/etc/ssl/influxdb.pem".
  # https-certificate = "/etc/ssl/influxdb.pem"

  # The SSL private key to use when HTTPS is enabled.
  # The default value is "/etc/ssl/influxdb.key".
  # https-private-key = "/etc/ssl/influxdb.key"

  # The maximum size of a client request body, in bytes.
  # The default value is "25000000" (25MB).
  max-body-size = 25000000

  # The maximum number of bytes that may be read from the request body.
  # The default value is "25000000" (25MB).
  max-body-size = "25m"

  # The maximum number of concurrent connections.
  # The default value is "0" (unlimited).
  max-connection-limit = 0

  # The maximum number of seconds a connection can be idle before being closed.
  # The default value is "300s".
  shared-secret = ""

  # The realm that will be reported when basic authentication is enabled.
  # The default value is "InfluxDB".
  realm = "InfluxDB"

  # Whether HTTP request logging is enabled.
  # The default value is "true".
  log-enabled = true

  # Whether to write HTTP access logs to the standard logger.
  # The default value is "false".
  suppress-write-logo = false

  # The number of seconds to wait before timing out a request.
  # The default value is "30s".
  access-log-path = ""

  # Whether to authenticate requests.
  # The default value is "false".
  access-log-status-fields = false

  # The maximum number of seconds a connection can be idle before being closed.
  # The default value is "300s".
  pprof-enabled = true

  # Whether to enable pprof endpoints.
  # The default value is "true".
  pprof-auth-enabled = false

  # Whether to require authentication for pprof endpoints.
  # The default value is "false".
  debug-pps-enabled = false

  # Whether to enable pprof endpoints.
  # The default value is "true".
  debug-pps-enabled = false

[logging]
  # Determines which log level to use.
  # Valid options: "debug", "info", "warn", "error", "fatal"
  # The default value is "info".
  level = "info"

  # Determines whether the query log is enabled.
  # The default value is "false".
  query-log-enabled = true

  # Whether to suppress the logo output when InfluxDB starts.
  # The default value is "false".
  suppress-logo = false

  # The format of the log output.
  # Valid options: "auto", "json", "logfmt"
  # The default value is "auto".
  format = "auto"

[continuous_queries]
  # Determines whether the continuous query service is enabled.
  # The default value is "true".
  log-enabled = true

  # Controls whether queries are logged for debugging purposes.
  # The default value is "false".
  query-stats-enabled = false

  # Controls whether query statistics are logged.
  # The default value is "false".
  run-interval = "1s"

[hinted-handoff]
  # Enables hinted handoff.
  # The default value is "true".
  enabled = true

  # The directory where hinted handoff queues are stored.
  # The default value is "/var/lib/influxdb2/hh".
  dir = "/var/lib/influxdb2/hh"

  # The maximum size of hinted handoff queues.
  # The default value is "1073741824" (1GB).
  max-size = 1073741824

  # The maximum number of hinted handoff queues.
  # The default value is "1024".
  max-age = "168h"

  # The maximum age of hinted handoff queues.
  # The default value is "168h" (7 days).
  retry-convergence-interval = "1m"

  # The interval at which hinted handoff queues are checked for convergence.
  # The default value is "1m".
  retry-rate-limit = 0

  # The rate limit for hinted handoff retries.
  # The default value is "0" (unlimited).
  retry-interval = "1s"

  # The interval at which hinted handoff retries are attempted.
  # The default value is "1s".
  retry-max-interval = "1m"

  # The maximum interval between hinted handoff retries.
  # The default value is "1m".
  purge-interval = "1h"

  # The interval at which hinted handoff queues are purged.
  # The default value is "1h".
  retry-batch-size = 1048576

  # The batch size for hinted handoff retries.
  # The default value is "1048576" (1MB).
  retry-interval = "1s"

# QuantumBeam specific configurations
[quantumbeam]
  # Custom configuration for QuantumBeam.io specific metrics
  metrics-retention = "30d"
  analytics-retention = "90d"
  fraud-metrics-retention = "7d"
  quantum-metrics-retention = "90d"

  # Performance optimizations
  max-series-per-database = 10000000
  max-values-per-tag = 10000000

  # Monitoring
  query-log-enabled = true
  slow-query-threshold = "1s"