# QuantumBeam.io - Redis Sentinel Configuration
# Redis sentinel for high availability monitoring

# Basic configuration
port 26379
bind 0.0.0.0

# Sentinel configuration
sentinel monitor mymaster redis-master 6379 2
sentinel down-after-milliseconds mymaster 5000
sentinel parallel-syncs mymaster 1
sentinel failover-timeout mymaster 10000
sentinel auth-pass mymaster your_master_password_here

# Sentinel announcement
sentinel announce-ip ""
sentinel announce-port 26379

# Logging
loglevel notice
logfile ""
daemonize no

# Protection
protected-mode no
# requirepass your_sentinel_password_here

# Additional masters can be monitored
# sentinel monitor myslave1 redis-slave1 6379 2
# sentinel monitor myslave2 redis-slave2 6379 2

# Notification scripts
# sentinel notification-script mymaster /etc/redis/sentinel_notify.sh
# sentinel client-reconfig-script mymaster /etc/redis/sentinel_reconfig.sh

# Failover configuration
sentinel deny-scripts-reconfig yes
sentinel resolve-hostnames yes
sentinel announce-hostnames no

# TLS configuration (uncomment for production)
# tls-port 26380
# tls-cert-file /etc/redis/tls/sentinel.crt
# tls-key-file /etc/redis/tls/sentinel.key
# tls-ca-cert-file /etc/redis/tls/ca.crt

# Security
# sentinel auth-pass mymaster your_strong_password_here
# sentinel auth-users mymaster sentinel_user1 sentinel_user2