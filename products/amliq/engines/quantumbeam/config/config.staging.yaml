# QuantumBeam Configuration - Staging Environment
# This file overrides base configuration for staging (pre-production)

# Environment Configuration
environment:
  name: "staging"
  debug: false
  region: "us-east-1"
  zone: "us-east-1a"
  version: "1.0.0-staging"
  build_time: ""
  git_commit: ""
  instance_id: "" # Set automatically
  cluster_name: "staging-cluster"

# Server Configuration
server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "60s"
  shutdown_timeout: "30s"

  tls:
    enabled: true # Enable TLS in staging
    cert_file: "/etc/ssl/certs/quantumbeam-staging.crt"
    key_file: "/etc/ssl/private/quantumbeam-staging.key"
    ca_file: "/etc/ssl/certs/ca-staging.crt"
    min_version: "TLS1.2"
    auto_cert: false
    email: "staging@quantumbeam.io"
    hosts: ["staging.quantumbeam.io", "api-staging.quantumbeam.io"]

  cors:
    allowed_origins: ["https://staging.quantumbeam.io", "https://admin-staging.quantumbeam.io"]
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
    allowed_headers: ["Origin", "Content-Type", "Accept", "Authorization", "X-Requested-With", "X-API-Version", "X-Feature-Flags"]
    exposed_headers: ["X-Total-Count", "X-RateLimit-Limit", "X-RateLimit-Remaining", "X-RateLimit-Reset"]
    allow_credentials: true
    max_age: 86400

  limits:
    max_header_bytes: 1048576 # 1MB
    max_body_bytes: 10485760 # 10MB
    max_conns_per_ip: 50
    max_conns_per_host: 500
    max_request_size: 10485760 # 10MB
    max_file_upload_size: 52428800 # 50MB
    request_timeout: "60s"
    read_header_timeout: "30s"

# Database Configuration
database:
  host: "staging-db.quantumbeam.io" # Production-like database
  port: 5432
  user: "quantumbeam_staging"
  password: "" # Loaded from environment variable
  dbname: "quantumbeam_staging"
  sslmode: "require" # Require SSL in staging
  max_connections: 25
  min_connections: 5
  max_idle_connections: 10
  max_lifetime: "2h"
  max_idle_time: "30m"
  connect_timeout: "10s"
  query_timeout: "30s"
  slow_query_threshold: "200ms"
  enable_query_logger: true # Enable for monitoring
  migration_path: "./migrations"
  seed_data_path: "./seeds"
  connection_attempts: 5
  connection_retry_wait: "2s"

# Redis Configuration
redis:
  host: "staging-redis.quantumbeam.io"
  port: 6379
  password: "" # Loaded from environment variable
  db: 0
  pool_size: 15
  min_idle_conns: 5
  max_retries: 3
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"
  pool_timeout: "4s"
  idle_timeout: "10m"
  idle_check_frequency: "1m"

# Security Configuration
security:
  jwt:
    secret: "" # Loaded from environment variable - must be secure
    access_expiration: "15m"
    refresh_expiration: "7d"
    issuer: "quantumbeam-staging"
    audience: "staging.quantumbeam.io"
    algorithm: "HS256"
    refresh_enabled: true
    blacklist_enabled: true

  password:
    min_length: 8
    max_length: 128
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_special: true
    hash_algorithm: "bcrypt"
    hash_iterations: 12

  rate_limit:
    enabled: true
    algorithm: "token_bucket"
    global_limit: 5000 # More restrictive than dev
    window: "1m"
    burst_size: 500
    storage: "redis"

  encryption:
    algorithm: "AES256-GCM"
    key_length: 256
    key_rotation: true
    rotation_period: "60d" # More frequent rotation in staging

  session:
    store: "redis"
    cookie_name: "quantumbeam_session"
    max_age: "24h"
    path: "/"
    domain: ".quantumbeam.io"
    secure: true
    http_only: true
    same_site: "Strict"

  api_key:
    default_rate_limit_per_minute: 2000
    default_rate_limit_per_hour: 200000
    max_keys_per_user: 10
    key_length: 32
    key_prefix: "qs_" # Staging prefix
    default_expiration: "180d"
    max_expiration: "365d"
    require_approval: false
    auto_cleanup_expired: true
    cleanup_interval: "1h"

  web_security:
    csp_enabled: true
    csp_policy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https:;"
    xss_protection: true
    content_type_nosniff: true
    x_frame_options: "DENY"
    hsts_max_age: 31536000
    hsts_include_subdomains: true
    trusted_proxies: ["staging-proxy.quantumbeam.io"]
    max_request_size: 10485760 # 10MB

# AI/ML Configuration
ai:
  enabled: true
  provider: "openai" # Real provider in staging
  model: "gpt-4"
  api_key: "" # Loaded from environment variable
  endpoint: "https://api.openai.com/v1"
  timeout: "30s"
  max_tokens: 4096
  temperature: 0.7
  top_p: 1.0
  frequency_penalty: 0.0
  presence_penalty: 0.0
  retry_attempts: 3
  retry_delay: "1s"
  cache_enabled: true
  cache_ttl: "1h"
  confidence_threshold: 0.8

# Quantum Computing Configuration
quantum:
  enabled: true # Enable in staging for testing
  provider: "ibm"
  endpoint: "https://quantum-computing.ibm.com"
  api_key: "" # Loaded from environment variable
  timeout: "300s"
  max_qubits: 32
  backend: "ibmq_quito"
  shots: 1024
  error_mitigation: true
  transpile: true
  optimization_level: 2
  cache_enabled: true
  cache_ttl: "24h"

# Monitoring Configuration
monitoring:
  enabled: true

  metrics:
    enabled: true
    provider: "prometheus"
    port: 9090
    path: "/metrics"
    namespace: "quantumbeam"
    subsystem: "staging"
    labels: ["environment", "version", "instance"]

  tracing:
    enabled: true
    provider: "jaeger"
    endpoint: "http://jaeger-staging.quantumbeam.io:14268/api/traces"
    service_name: "quantumbeam-api-staging"
    service_version: "1.0.0-staging"
    sample_rate: 0.1 # Sample 10% in staging
    timeout: "5s"
    max_payload_size: 10240
    propagators: ["trace-context", "baggage"]
    tags: ["environment", "version"]

  health_check:
    enabled: true
    port: 8081
    path: "/health"
    interval: "30s"
    timeout: "5s"
    failure_threshold: 3
    success_threshold: 1
    checkers: ["database", "redis", "external_services", "disk_space", "memory"]

  alerting:
    enabled: true
    provider: "webhook"
    rules:
      - name: "high_error_rate"
        expression: "rate(http_requests_total{status=~\"5..\"}[5m]) > 0.1"
        severity: "warning"
        duration: "5m"
        labels:
          service: "quantumbeam-api"
          environment: "staging"
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 10% for the last 5 minutes"

      - name: "high_response_time"
        expression: "histogram_quantile(0.95, http_request_duration_seconds_bucket) > 2"
        severity: "warning"
        duration: "5m"
        labels:
          service: "quantumbeam-api"
          environment: "staging"
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is above 2 seconds"

    webhooks:
      - name: "slack-alerts"
        url: "https://hooks.slack.com/services/STAGING_WEBHOOK_URL"
        events: ["alert.created", "alert.resolved"]
        enabled: true
        headers:
          "Content-Type": "application/json"

  profiling:
    enabled: true # Enable profiling for debugging
    provider: "pyroscope"
    port: 6060
    path: "/debug/pprof"
    sample_rate: 0.05 # Sample 5% in staging

# Logging Configuration
logging:
  level: "info" # Info level in staging
  format: "json"
  output: ["stdout", "file"]

  file:
    enabled: true
    path: "/var/log/quantumbeam/staging/app.log"
    max_size: 100 # MB
    max_age: 30 # days
    max_backups: 30
    compress: true
    local_time: false
    rotate: true

  console:
    enabled: true
    no_color: true
    time_format: "2006-01-02T15:04:05.000Z07:00"

  structured: true
  fields: ["timestamp", "level", "logger", "message", "request_id", "user_id", "trace_id", "span_id", "environment"]
  min_level: "info"
  max_level: "error"

# Feature Flags Configuration
features:
  fraud_detection:
    enabled: true
    percentage: 100

  ai_analysis:
    enabled: true
    percentage: 100

  quantum_analysis:
    enabled: true # Enable for testing
    percentage: 100 # Full rollout for testing

  advanced_analytics:
    enabled: true
    percentage: 100

  real_time_monitoring:
    enabled: true
    percentage: 100

  multi_currency:
    enabled: true
    percentage: 100

  batch_processing:
    enabled: true
    percentage: 100

  webhooks:
    enabled: true
    percentage: 100

  audit_logging:
    enabled: true
    percentage: 100

  data_export:
    enabled: true
    percentage: 100

# External Services Configuration
external_services:
  notifications:
    enabled: true
    channels: ["email"]
    providers:
      email:
        enabled: true
        config:
          provider: "sendgrid"
          api_key: "" # Loaded from environment
          from_email: "staging@quantumbeam.io"

  payment:
    enabled: false # Usually disabled in staging

  email_service:
    enabled: true
    provider: "sendgrid"
    config:
      api_key: "" # Loaded from environment

  sms_service:
    enabled: false

  storage:
    enabled: true
    provider: "s3"
    config:
      bucket: "quantumbeam-staging"
      region: "us-east-1"
      access_key: "" # Loaded from environment
      secret_key: "" # Loaded from environment

  cdn:
    enabled: true
    provider: "cloudflare"
    domain: "staging.quantumbeam.io"
    cache_ttl: "1h"
    compression: true
    minify: true

# Rate Limiting Configuration
rate_limiting:
  global:
    enabled: true
    limit: 5000
    window: "1m"
    burst: 500

  users:
    enabled: true
    default_limit: 2000
    premium_limit: 10000
    window: "1m"
    burst: 200
    storage: "redis"

  api_keys:
    enabled: true
    default_limit: 2000
    premium_limit: 10000
    window: "1m"
    burst: 200
    storage: "redis"

  ips:
    enabled: true
    default_limit: 1000
    window: "1m"
    burst: 100
    storage: "redis"

# Cache Configuration
cache:
  enabled: true
  provider: "redis"
  default_ttl: "1h"
  max_entries: 50000
  eviction: "lru"
  compression: true
  encryption: false
  prefix: "qs:"

# Webhook Configuration
webhook:
  enabled: true
  max_retries: 3
  retry_delay: "2s"
  timeout: "30s"
  max_payload: 1048576 # 1MB
  secret: "" # Loaded from environment
  headers: {}

  endpoints:
    - name: "fraud_alerts"
      url: "https://staging-webhook.quantumbeam.io/fraud-alerts"
      events: ["fraud.alert.created", "fraud.alert.resolved"]
      enabled: true
      secret: "" # Loaded from environment
      timeout: "30s"
      max_retries: 3

    - name: "user_events"
      url: "https://staging-webhook.quantumbeam.io/user-events"
      events: ["user.created", "user.updated", "user.deleted"]
      enabled: true
      secret: ""
      timeout: "30s"
      max_retries: 3

    - name: "transaction_events"
      url: "https://staging-webhook.quantumbeam.io/transaction-events"
      events: ["transaction.created", "transaction.analyzed", "transaction.flagged"]
      enabled: true
      secret: ""
      timeout: "30s"
      max_retries: 3

# Staging-specific settings
staging:
  auto_migrate: true
  seed_test_data: true
  enable_debug_endpoints: true
  monitoring_level: "high"
  backup_enabled: true
  backup_schedule: "0 2 * * *" # Daily at 2 AM
  performance_monitoring: true
  security_scanning: true
  load_testing_enabled: true