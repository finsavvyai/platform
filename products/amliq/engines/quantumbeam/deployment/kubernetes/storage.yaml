# Persistent Volume Claims for QuantumBeam Services

# PVC for PostgreSQL data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: quantumbeam
  labels:
    app: quantumbeam-postgres
    component: database
    type: storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd  # Adjust based on your cloud provider
  resources:
    requests:
      storage: 100Gi
  # Optional: Volume binding mode
  volumeMode: Filesystem

---

