# PVC for Quantum Service models and data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quantum-models-pvc
  namespace: quantumbeam
  labels:
    app: quantumbeam-quantum
    component: models
    type: storage
spec:
  accessModes:
    - ReadWriteMany  # Allow multiple pods to access
  storageClassName: shared-storage  # Use NFS or similar
