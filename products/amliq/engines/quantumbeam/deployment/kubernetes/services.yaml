# API Server Service
apiVersion: v1
kind: Service
metadata:
  name: quantumbeam-api-service
  namespace: quantumbeam
  labels:
    app: quantumbeam-api
    component: api-server
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: quantumbeam-api
    component: api-server

---

