# ArgoCD Application for QuantumBeam GitOps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quantumbeam
  namespace: argocd
  labels:
    app: quantumbeam
    environment: production
    component: gitops
  annotations:
    argocd.argoproj.io/sync-options: CreateNamespace=true
    argocd.argoproj.io/compare-options: IgnoreExtraneous
spec:
  project: default
  source:
    repoURL: https://github.com/quantumbeam/quantumbeam-k8s
    targetRevision: main
    path: manifests/production
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    - RespectIgnoreDifferences=true
    - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    managedNamespaceMetadata:
      labels:
        managed-by: argocd
        app.kubernetes.io/part-of: quantumbeam
      annotations:
        argocd.argoproj.io/managed-by: quantumbeam
---
