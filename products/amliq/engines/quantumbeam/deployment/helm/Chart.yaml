apiVersion: v2
name: quantumbeam
description: QuantumBeam Fraud Detection Platform - A quantum-enhanced fraud detection system
type: application
version: 1.0.0
appVersion: "1.0.0"
home: https://quantumbeam.io
sources:
  - https://github.com/quantumbeam/fraud-detection
maintainers:
  - name: QuantumBeam Team
    email: team@quantumbeam.io
keywords:
  - fraud-detection
  - quantum-computing
  - machine-learning
  - ai
  - security
  - financial-services
annotations:
  category: Security
  licenses: MIT
dependencies:
  - name: postgresql
    version: 12.1.9
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.3.7
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: prometheus
    version: 23.1.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: grafana
    version: 6.58.9
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
  - name: ingress-nginx
    version: 4.7.1
    repository: https://kubernetes.github.io/ingress-nginx
    condition: ingress-nginx.enabled