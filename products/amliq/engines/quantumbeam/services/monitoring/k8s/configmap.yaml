apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-config
  namespace: quantumbeam
  labels:
    app: monitoring-service
    component: monitoring
data:
  config.yaml: |
    service:
      name: monitoring-service
      version: "1.0.0"
      environment: "production"

    logging:
      service: monitoring-service
      version: "1.0.0"
      environment: "production"
      level: "info"
      format: "json"
      output: "/app/logs/monitoring.log"
      max_size: 100
      max_backups: 10
      max_age: 30
      compress: true
      enable_audit: true

    metrics:
      service: monitoring-service
      version: "1.0.0"
      environment: "production"

    alerting:
      prometheus_url: "http://prometheus-service:9090"
      redis_addr: "redis-service:6379"
      rabbitmq_url: "amqp://rabbitmq-service:5672"
      smtp_server: "smtp.quantumbeam.io"
      smtp_port: 587
      smtp_username: "${SMTP_USERNAME}"
      smtp_password: "${SMTP_PASSWORD}"
      slack_webhook_url: "${SLACK_WEBHOOK_URL}"
      default_from_email: "alerts@quantumbeam.io"
      max_retries: 3
      retry_delay: 5s
      evaluation_interval: 30s
      notification_timeout: 30s

    health_check:
      interval: 30s
      timeout: 10s

  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "/etc/prometheus/rules/*.yml"

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093

    scrape_configs:
      - job_name: 'monitoring-service'
        static_configs:
          - targets: ['monitoring-service:8091']
        metrics_path: /metrics
        scrape_interval: 15s

      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
        - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
        - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
          action: keep
          regex: default;kubernetes;https

      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
        - role: node
        relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
        - role: pod
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: kubernetes_pod_name

  alert-rules.yml: |
    groups:
    - name: quantumbeam.rules
      rules:
      - alert: HighFraudDetectionRate
        expr: rate(fraud_detections_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          team: security
          service: fraud_detection
          category: business_metrics
        annotations:
          summary: "High fraud detection rate detected"
          description: "Fraud detection rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      - alert: QuantumBackendUnavailable
        expr: quantum_backend_availability < 0.5
        for: 1m
        labels:
          severity: critical
          team: infrastructure
          service: quantum_processing
          category: system_health
        annotations:
          summary: "Quantum backend is unavailable"
          description: "Quantum backend availability is {{ $value | humanizePercentage }}"

      - alert: HighAPIResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1.0
        for: 3m
        labels:
          severity: warning
          team: infrastructure
          service: api
          category: performance
        annotations:
          summary: "High API response time"
          description: "95th percentile response time is {{ $value }}s"

      - alert: AuthenticationFailures
        expr: rate(failed_auth_attempts_total[5m]) / rate(login_attempts_total[5m]) > 0.3
        for: 1m
        labels:
          severity: critical
          team: security
          service: authentication
          category: security
        annotations:
          summary: "High authentication failure rate"
          description: "Authentication failure rate is {{ $value | humanizePercentage }}"

      - alert: QuantumCircuitFailures
        expr: rate(quantum_circuit_executions_total{result="failed"}[5m]) / rate(quantum_circuit_executions_total[5m]) > 0.2
        for: 2m
        labels:
          severity: warning
          team: quantum
          service: quantum_processing
          category: quantum_metrics
        annotations:
          summary: "High quantum circuit failure rate"
          description: "Quantum circuit failure rate is {{ $value | humanizePercentage }}"

      - alert: MemoryUsageHigh
        expr: memory_usage_bytes / (1024*1024*1024) > 8.0
        for: 5m
        labels:
          severity: warning
          team: infrastructure
          service: system
          category: system_health
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}GB"

      - alert: DatabaseConnectionsHigh
        expr: database_connections_active / database_connections_max > 0.8
        for: 3m
        labels:
          severity: warning
          team: infrastructure
          service: database
          category: system_health
        annotations:
          summary: "High database connection usage"
          description: "Database connection pool usage is {{ $value | humanizePercentage }}"

      - alert: MonitoringServiceDown
        expr: up{job="monitoring-service"} == 0
        for: 1m
        labels:
          severity: critical
          team: infrastructure
          service: monitoring
          category: system_health
        annotations:
          summary: "Monitoring service is down"
          description: "Monitoring service {{ $labels.instance }} has been down for more than 1 minute"

  grafana-dashboard.json: |
    {
      "dashboard": {
        "id": null,
        "title": "QuantumBeam Monitoring",
        "tags": ["quantumbeam", "monitoring"],
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Fraud Detection Rate",
            "type": "stat",
            "targets": [
              {
                "expr": "rate(fraud_detections_total[5m])",
                "legendFormat": "{{method}}"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "reqps"
              }
            }
          },
          {
            "id": 2,
            "title": "Quantum Backend Availability",
            "type": "stat",
            "targets": [
              {
                "expr": "quantum_backend_availability",
                "legendFormat": "{{backend}}"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "percentunit",
                "thresholds": {
                  "steps": [
                    {"color": "red", "value": 0.5},
                    {"color": "yellow", "value": 0.8},
                    {"color": "green", "value": 0.95}
                  ]
                }
              }
            }
          },
          {
            "id": 3,
            "title": "API Response Time",
            "type": "graph",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))",
                "legendFormat": "95th percentile"
              },
              {
                "expr": "histogram_quantile(0.50, rate(http_request_duration_seconds_bucket[5m]))",
                "legendFormat": "50th percentile"
              }
            ],
            "yAxes": [
              {
                "unit": "s"
              }
            ]
          },
          {
            "id": 4,
            "title": "Quantum Circuit Executions",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(quantum_circuit_executions_total[5m])",
                "legendFormat": "{{backend}} - {{algorithm}}"
              }
            ],
            "yAxes": [
              {
                "unit": "reqps"
              }
            ]
          },
          {
            "id": 5,
            "title": "System Resources",
            "type": "graph",
            "targets": [
              {
                "expr": "cpu_usage_percent",
                "legendFormat": "CPU %"
              },
              {
                "expr": "memory_usage_bytes / (1024*1024*1024)",
                "legendFormat": "Memory GB"
              }
            ]
          },
          {
            "id": 6,
            "title": "Active Alerts",
            "type": "stat",
            "targets": [
              {
                "expr": "sum(ALERTS{alertstate=\"firing\"})",
                "legendFormat": "Firing Alerts"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "thresholds": {
                  "steps": [
                    {"color": "green", "value": 0},
                    {"color": "yellow", "value": 5},
                    {"color": "red", "value": 10}
                  ]
                }
              }
            }
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "30s"
      }
    }