# PgBouncer Configuration for QuantumBeam.io
# Connection pooler for PostgreSQL

[databases]
# Connection to PostgreSQL
postgres = host=localhost port=5432 dbname=postgres
quantumbeam = host=localhost port=5432 dbname=quantumbeam
quantumbeam_test = host=localhost port=5432 dbname=quantumbeam_test
quantumbeam_staging = host=localhost port=5432 dbname=quantumbeam_staging
quantumbeam_analytics = host=localhost port=5432 dbname=quantumbeam_analytics

# Application-specific connections with different pool settings
quantumbeam_api = host=localhost port=5432 dbname=quantumbeam pool_size=50
quantumbeam_ml = host=localhost port=5432 dbname=quantumbeam pool_size=20
quantumbeam_quantum = host=localhost port=5432 dbname=quantumbeam pool_size=10

[pgbouncer]
# Host name or IP address to listen on
listen_addr = 0.0.0.0
listen_port = 6432

# Unix socket location
unix_socket_dir = /tmp

# Authentication type
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Pool settings
pool_mode = transaction
max_client_conn = 200
default_pool_size = 50
min_pool_size = 10
reserve_pool_size = 5
reserve_pool_timeout = 5
max_db_connections = 100
max_user_connections = 100

# Connection lifetime settings
server_reset_query = DISCARD ALL
server_check_delay = 30
server_check_query = select 1
server_lifetime = 3600
server_idle_timeout = 600

# Query and session handling
ignore_startup_parameters = extra_float_digits
track_extra_parameters = off

# Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
log_stats = 1
verbose = 0
admin_users = postgres,admin
stats_users = stats,postgres

# Concurrency settings
max_packet_size = 2130000
listen_backlog = 128
pkt_buf = 4096
sbuf_loopcnt = 5

# Timeouts
suspend_timeout = 10
idle_timeout = 600
client_login_timeout = 60
dns_max_ttl = 15
dns_zone_check_period = 0
dns_nxdomain_ttl = 15
resolv_conf = /etc/resolv.conf

# TLS settings
client_tls_sslmode = disable
client_tls_key_file =
client_tls_cert_file =
client_tls_ca_file =
client_tls_protocols = secure
client_tls_ciphers = fast
server_tls_sslmode = disable
server_tls_key_file =
server_tls_cert_file =
server_tls_ca_file =
server_tls_protocols = secure
server_tls_ciphers = fast

# Control file location
conffile = /etc/pgbouncer/pgbouncer.ini
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid
admin_addr = 127.0.0.1
admin_port = 6432

# Statistics
stats_period = 60
show_untracked = off
