events {
    worker_connections 1024;
}

http {
    upstream quantumbeam_api {
        server quantumbeam-api:8080;
    }

    # HTTP redirect to HTTPS
    server {
        listen 80;
        server_name quantumbeam.io www.quantumbeam.io;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name quantumbeam.io www.quantumbeam.io;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security Headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # API Routes
        location / {
            proxy_pass http://quantumbeam_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Health Check
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        }

        # Health endpoint (always accessible)
        location /health {
            proxy_pass http://quantumbeam_api/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # Metrics endpoint (restrict access in production)
        location /metrics {
            proxy_pass http://quantumbeam_api/metrics;
            proxy_set_header Host $host;
            allow 127.0.0.1;
            allow ::1;
            deny all;
        }

        # Static files (if any)
        location /static/ {
            alias /var/www/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain application/json application/xml text/css application/javascript;

        # Logging
        access_log /var/log/nginx/quantumbeam_access.log;
        error_log /var/log/nginx/quantumbeam_error.log;
    }
}