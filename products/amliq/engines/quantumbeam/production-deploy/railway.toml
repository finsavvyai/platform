[build]
builder = "nixpacks"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[[services]]
name = "quantumbeam-api"

[services.variables]
ENVIRONMENT = "production"
PORT = "8080"
LOG_LEVEL = "info"

[services.source]
type = "git"
repository = "https://github.com/your-username/quantumbeam.io.git"
branch = "main"