# SDLC.ai Gateway Service Configuration

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "60s"
  shutdown_timeout: "30s"
  request_timeout: "30s"

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "password"
  database: "sdlc_platform"
  ssl_mode: "disable"
  max_connections: 20
  min_connections: 5
  max_conn_lifetime: "1h"
  max_conn_idle_time: "30m"
  health_check_period: "1m"
  connect_timeout: "10s"
  retry_attempts: 3
  retry_delay: "2s"
  migration_path: "./migrations"

redis:
  host: "localhost"
  port: 6379
  password: ""
  database: 0
  pool_size: 10
  min_idle_conns: 3
  max_retries: 3
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"
  idle_timeout: "5m"

jwt:
  secret: "your-super-secret-jwt-key-change-this-in-production"
  access_token_ttl: "15m"
  refresh_token_ttl: "7d"
  issuer: "sdlc-platform"
  signing_algorithm: "HS256"

logging:
  level: "info"
  format: "json"
  output: "stdout"
  file: ""
  max_size: 100
  max_age: 28
  max_backups: 3
  compress: true

monitoring:
  enabled: true
  port: 9090
  path: "/metrics"
  namespace: "sdlc_platform"
  subsystem: "gateway"
  jaeger_url: "http://localhost:14268/api/traces"
  sample_rate: 0.1

security:
  rate_limiting:
    enabled: true
    default_rate_limit: 1000
    default_window: "1h"
    burst_limit: 100
    redis_key_prefix: "rate_limit:"
    cleanup_interval: "5m"

  cors:
    enabled: true
    allowed_origins: ["*"]
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allowed_headers: ["*"]
    exposed_headers: ["X-Total-Count"]
    allow_credentials: true
    max_age: 86400

  mtls:
    enabled: false
    cert_file: ""
    key_file: ""
    ca_file: ""
    client_auth: false
    skip_verify: false

  encryption:
    key_rotation_interval: "90d"
    algorithm: "AES-256-GCM"
    key_derivation: "HKDF-SHA256"

  dlp:
    enabled: true
    engines: ["regex", "ner", "ml"]
    confidence_threshold: 0.8
    timeout: "5s"
    presidio_url: "http://localhost:8000"

cloudflare:
  account_id: ""
  api_token: ""
  r2_bucket: "sdlc-documents"
  vectorize_name: "sdlc-embeddings"
  kv_namespace: "sdlc-cache"
  queue_name: "sdlc-tasks"
  region: "auto"

# Application metadata
version: "1.0.0"
environment: "development"
instance_id: "gateway-001"
git_commit: "unknown"
build_time: "unknown"

# Distributed tracing
tracing:
  exporter: "stdout"
  jaeger_endpoint: "http://localhost:14268/api/traces"
  otlp_endpoint: "http://localhost:4318/v1/traces"
  sample_rate: 0.1
  service_name: "gateway"

# CORS configuration (top-level for middleware)
cors:
  allowed_origins: ["*"]
  allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowed_headers: ["*"]
  allow_credentials: true
  max_age: 300

# Rate limiting configuration (top-level for middleware)
rate_limit:
  requests: 1000
  window: "1h"
  burst: 100

# Circuit breaker configuration (top-level for middleware)
circuit_breaker:
  max_failures: 5
  reset_timeout: "30s"
