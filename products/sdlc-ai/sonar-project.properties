# SonarQube Project Configuration
# SDLC.ai - Secure Data Learning Platform

# Project identification
sonar.projectKey=SDLC_platform
sonar.projectName=SDLC.ai Secure Data Learning Platform
sonar.projectVersion=3.0.0

# Source and test directories
sonar.sources=.
sonar.inclusions=**/*.go,**/*.py,**/*.ts,**/*.tsx,**/*.js,**/*.jsx,**/*.rs
sonar.exclusions=**/*test*,**/tests/**,**/node_modules/**,**/vendor/**,**/dist/**,**/build/**,**/*.min.js,**/coverage/**,**/.git/**,**/docs/**

# Test configurations
sonar.tests=.
sonar.test.inclusions=**/*test*.go,**/*test*.py,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*_test.go,**/test_*.py

# Coverage configuration
sonar.coverage.exclusions=**/*test*,**/tests/**,**/mock*/**,**/generated/**,**/vendor/**
sonar.go.coverage.tool=go test
sonar.python.coverage.reportPaths=coverage.xml
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Language-specific properties
sonar.go.exclusions=**/pb.go,**/*_pb.go,**/vendor/**
sonar.python.exclusions=**/migrations/**,**/venv/**,**/env/**

# Code quality thresholds
sonar.qualitygate.wait=true

# Duplications
sonar.cpd.exclusions=**/*test*,**/generated/**,**/migrations/**
sonar.cpd.go.minimumTokens=50
sonar.cpd.python.minimumTokens=30

# Size metrics
sonar.size.metric=ncloc

# External tool reports
sonar.externalIssuesReportPaths=external-issues.json

# SCM
sonar.scm.provider=git
sonar.scm.exclusions.disabled=true

# Analysis parameters
sonar.sourceEncoding=UTF-8
sonar.verbose=true

# Custom rules and profiles
sonar.python.qualityProfile=SDLC-Python
sonar.go.qualityProfile=SDLC-Go
sonar.typescript.qualityProfile=SDLC-TypeScript

# Security rules
sonar.security.hotspots.enabled=true
sonar.security.hotspots.cost.min=10

# Technical debt
sonar.technicalDebt.hoursInDay=8
sonar.technicalDebt.ratio=0.05

# New code period (for new code quality gates)
sonar.newCode.periodDays=30

# Additional settings for multi-language project
sonar.moduleKey=${sonar.projectKey}
sonar.moduleName=${sonar.projectName}

# Specific service configurations
sonar.sources.services/gateway=services/gateway
sonar.sources.services.rag=services/rag
sonar.sources.services.vector-core=services/vector-core
sonar.sources.services.admin-ui=services/admin-ui
sonar.sources.packages.sdk-py=packages/sdk-py
sonar.sources.packages.sdk-ts=packages/sdk-ts
sonar.sources.packages.sdk-go=packages/sdk-go
