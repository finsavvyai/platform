# Pre-commit hooks configuration for SDLC.ai
# Comprehensive quality checks before each commit

repos:
  # System and repo metadata
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
      - id: identity
      - id: check-json
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: end-of-file-fixer

  # General security and secret scanning
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-vcs-permalinks
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-ast
      - id: check-case-conflict
      - id: debug-statements
      - id: name-tests-test
        args: ['--pytest-test-first']
      - id: requirements-txt-fixer
      - id: fix-byte-order-marker

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^tests/

  # GitLeaks for comprehensive secret scanning
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        args: ['--config', '.gitleaks.toml']

  # Python specific hooks
  - repo: https://github.com/psf/black
    rev: 23.9.1
    hooks:
      - id: black
        language_version: python3.11
        args: ['--line-length', '88']
        files: ^services/rag/.*\.py$|^packages/sdk-py/.*\.py$|^tests/.*\.py$

  # Python import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ['--profile', 'black', '--line-length', '88']
        files: ^services/rag/.*\.py$|^packages/sdk-py/.*\.py$|^tests/.*\.py$

  # Python linting with Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.0
    hooks:
      - id: ruff
        args: ['--fix', '--line-length', '88']
        files: ^services/rag/.*\.py$|^packages/sdk-py/.*\.py$|^tests/.*\.py$

  # Python security with Bandit
  - repo: https://github.com/pycqa/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml', '-f', 'json', '-o', 'bandit-report.json']
        files: ^services/rag/.*\.py$|^packages/sdk-py/.*\.py$
        exclude: ^tests/.*\.py$
        pass_filenames: false

  # Python type checking with MyPy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.6.1
    hooks:
      - id: mypy
        additional_dependencies: [types-all]
        args: ['--ignore-missing-imports', '--strict-optional']
        files: ^services/rag/.*\.py$|^packages/sdk-py/.*\.py$
        exclude: ^tests/.*\.py$

  # Go specific hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: gofmt
        files: ^services/gateway/.*\.go$|^packages/sdk-go/.*\.go$

  - repo: local
    hooks:
      - id: go-vet
        name: go vet
        entry: go vet
        language: system
        files: ^services/gateway/.*\.go$|^packages/sdk-go/.*\.go$
        pass_filenames: false

      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        files: ^services/gateway/.*\.go$|^packages/sdk-go/.*\.go$
        pass_filenames: false

      - id: gosec
        name: gosec security scan
        entry: gosec
        language: system
        args: ['-fmt', 'sarif', '-out', 'gosec-report.sarif']
        files: ^services/gateway/.*\.go$|^packages/sdk-go/.*\.go$
        pass_filenames: false

      - id: staticcheck
        name: staticcheck
        entry: staticcheck
        language: system
        files: ^services/gateway/.*\.go$|^packages/sdk-go/.*\.go$
        pass_filenames: false

      - id: go-test
        name: go test
        entry: go test
        language: system
        args: ['-race', '-coverprofile=coverage.out', './...']
        files: ^services/gateway/.*\.go$|^packages/sdk-go/.*\.go$
        pass_filenames: false

  # Rust specific hooks
  - repo: local
    hooks:
      - id: rust-fmt
        name: rustfmt
        entry: cargo fmt
        language: system
        args: ['--', '--check']
        files: ^services/vector-core/.*\.rs$
        pass_filenames: false

      - id: rust-clippy
        name: clippy
        entry: cargo clippy
        language: system
        args: ['--all-targets', '--all-features', '--', '-D', 'warnings']
        files: ^services/vector-core/.*\.rs$
        pass_filenames: false

      - id: rust-audit
        name: cargo audit
        entry: cargo audit
        language: system
        files: ^services/vector-core/Cargo\.toml$
        args: ['--format', 'json', '--output', 'cargo-audit.json']
        pass_filenames: false

  # JavaScript/TypeScript specific hooks
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.50.0
    hooks:
      - id: eslint
        types: [file]
        types_or: [javascript, jsx, ts, tsx]
        files: ^services/admin-ui/.*\.(js|jsx|ts|tsx)$|^packages/sdk-ts/.*\.(js|jsx|ts|tsx)$
        additional_dependencies:
          - eslint@8.50.0
          - '@typescript-eslint/eslint-plugin@6.7.0'
          - '@typescript-eslint/parser@6.7.0'
          - eslint-config-prettier@9.0.0
          - eslint-plugin-security@1.7.1
          - eslint-plugin-import@2.28.1
        args: ['--fix', '--format', 'json', '--output-file', 'eslint-report.json']

  # Prettier for formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.0.3
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown]
        files: ^services/admin-ui/.*\.(js|jsx|ts|tsx|json|yaml|md)$|^packages/sdk-ts/.*\.(js|jsx|ts|tsx|json|yaml|md)$
        additional_dependencies:
          - prettier@3.0.3
          - '@typescript-eslint/parser@6.7.0'
        args: ['--write', '--config', '.prettierrc']

  # TypeScript type checking
  - repo: local
    hooks:
      - id: typescript-compile
        name: TypeScript compiler
        entry: npx tsc
        language: system
        args: ['--noEmit']
        files: ^services/admin-ui/.*\.ts$|^packages/sdk-ts/.*\.ts$
        pass_filenames: false

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        files: ^.*Dockerfile$

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        files: ^.*\.(sh|bash|ksh)$

  # Terraform validation (if using infrastructure as code)
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.86.0
    hooks:
      - id: terraform_fmt
        files: ^.*\.tf$
      - id: terraform_validate
        files: ^.*\.tf$
      - id: terraform_tflint
        files: ^.*\.tf$

  # Kubernetes manifests validation
  - repo: https://github.com/norwoodj/helm-doc-pre-commit-hooks
    rev: v1.2.0
    hooks:
      - id: helm-docs
        files: ^.*Chart\.yaml$

  # YAML/JSON validation
  - repo: https://github.com/karancode/standard-yaml-precommit-hook
    rev: 0.6.0
    hooks:
      - id: standard-yaml
        args: ['--format', 'json', '--output', 'yaml-report.json']

  # Commit message validation
  - repo: https://github.com/commitizen-tools/commitizen
    rev: 3.5.2
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Custom quality checks
  - repo: local
    hooks:
      - id: check-code-coverage
        name: Check code coverage
        entry: scripts/check-coverage.sh
        language: script
        files: ^.*\.(go|py|ts|js|rs)$
        pass_filenames: false

      - id: security-scan-summary
        name: Security scan summary
        entry: scripts/security-scan-summary.sh
        language: script
        files: ^.*\.(go|py|ts|js|rs)$
        pass_filenames: false

      - id: check-dependencies
        name: Check for outdated dependencies
        entry: scripts/check-dependencies.sh
        language: script
        files: ^(go\.mod|requirements\.txt|package\.json|Cargo\.toml)$
        pass_filenames: false

# Pre-commit configuration
default_stages: [commit]
fail_fast: false
default_language_version:
  python: python3.11
  go: 1.21
  node: 18
  rust: stable

# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
