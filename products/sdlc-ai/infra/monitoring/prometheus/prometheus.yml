global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # SDLC Landing Page Metrics
  - job_name: 'sdlc-landing-page'
    static_configs:
      - targets: ['landing-page:3000']
    metrics_path: '/api/metrics'
    scrape_interval: 10s

  # SDLC Application Services
  - job_name: 'sdlc-services'
    static_configs:
      - targets:
        - 'sdlc-gateway:8080'
        - 'sdlc-api:8081'
        - 'sdlc-analytics:8082'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Database Metrics (PostgreSQL)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis Metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Node Exporter (System Metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Cloudflare Workers Metrics
  - job_name: 'cloudflare-workers'
    static_configs:
      - targets: ['cloudflare-exporter:8080']
    scrape_interval: 30s

  # Application Health Checks
  - job_name: 'health-checks'
    static_configs:
      - targets:
        - 'health-checker:8080'
    metrics_path: '/health/metrics'
    scrape_interval: 5s