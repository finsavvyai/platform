---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdlc-platform-api
  namespace: sdlc-platform
  labels:
    app: sdlc-platform
    component: api
    tier: backend
    environment: production
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "SDLC Platform API Server"
    contact: "team@sdlc.ai"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: sdlc-platform
      component: api
  template:
    metadata:
      labels:
        app: sdlc-platform
        component: api
        tier: backend
        environment: production
        version: "3.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        iam.amazonaws.com/role: "arn:aws:iam::ACCOUNT_ID:role/sdlc-platform-api-role"
    spec:
      serviceAccountName: sdlc-platform
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h $DB_HOST -p $DB_PORT; do
                echo "Waiting for database..."
                sleep 2
              done
          envFrom:
            - configMapRef:
                name: sdlc-platform-config
            - secretRef:
                name: sdlc-platform-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        - name: wait-for-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              until redis-cli -h $REDIS_HOST -p $REDIS_PORT ping; do
                echo "Waiting for Redis..."
                sleep 2
              done
          envFrom:
            - configMapRef:
                name: sdlc-platform-config
            - secretRef:
                name: sdlc-platform-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      containers:
        - name: api
          image: sdlc/platform-api:3.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sdlc-platform-config
            - secretRef:
                name: sdlc-platform-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          readinessProbe:
            httpGet:
              path: /health/ready
              port: health
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: health
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/startup
              port: health
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 30
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
              ephemeral-storage: 5Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            volumeMounts:
              - name: tmp
                mountPath: /tmp
              - name: cache
                mountPath: /var/cache/app
              - name: logs
                mountPath: /var/log/app
              - name: uploads
                mountPath: /app/uploads
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    # Graceful shutdown
                    curl -X POST http://localhost:8081/shutdown
                    sleep 15
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    # Warm up connections
                    curl -f http://localhost:8081/health || true
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: cache
          emptyDir:
            sizeLimit: 2Gi
        - name: logs
          emptyDir:
            sizeLimit: 1Gi
        - name: uploads
          persistentVolumeClaim:
            claimName: sdlc-platform-uploads-pvc
      nodeSelector:
        kubernetes.io/os: linux
        node-type: application
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - sdlc-platform
                    - key: component
                      operator: In
                      values:
                        - api
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
                  - key: node-type
                    operator: In
                    values:
                      - application
      tolerations:
        - key: application
          operator: Equal
          value: "true"
          effect: NoSchedule
      terminationGracePeriodSeconds: 30
      priorityClassName: high-priority
---
apiVersion: v1
kind: Service
metadata:
  name: sdlc-platform-api
  namespace: sdlc-platform
  labels:
    app: sdlc-platform
    component: api
    tier: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-west-1:ACCOUNT_ID:certificate/CERTIFICATE_ID"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/health"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval: "30"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-timeout: "5"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-healthy-threshold: "2"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-unhealthy-threshold: "3"
spec:
  type: LoadBalancer
  selector:
    app: sdlc-platform
    component: api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  sessionAffinity: None
  externalTrafficPolicy: Local
  internalTrafficPolicy: Cluster
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sdlc-platform-api-hpa
  namespace: sdlc-platform
  labels:
    app: sdlc-platform
    component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sdlc-platform-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sdlc-platform-api-pdb
  namespace: sdlc-platform
  labels:
    app: sdlc-platform
    component: api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: sdlc-platform
      component: api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sdlc-platform
  namespace: sdlc-platform
  labels:
    app: sdlc-platform
  annotations:
    iam.amazonaws.com/role: "arn:aws:iam::ACCOUNT_ID:role/sdlc-platform-service-role"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sdlc-platform
  namespace: sdlc-platform
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sdlc-platform
  namespace: sdlc-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sdlc-platform
subjects:
  - kind: ServiceAccount
    name: sdlc-platform
    namespace: sdlc-platform
