---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sdlc-platform-config
  namespace: sdlc-platform
  labels:
    app: sdlc-platform
    component: config
    environment: production
data:
  # Application configuration
  APP_NAME: "SDLC Platform"
  APP_VERSION: "3.0.0"
  APP_ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # Database configuration
  DB_HOST: "postgres-primary.sdlc-platform.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "sdlc_platform"
  DB_SSL_MODE: "require"
  DB_MAX_CONNECTIONS: "100"
  DB_MIN_CONNECTIONS: "10"
  DB_CONNECTION_TIMEOUT: "30"
  DB_IDLE_TIMEOUT: "600"
  DB_MAX_LIFETIME: "3600"

  # Redis configuration
  REDIS_HOST: "redis-primary.sdlc-platform.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_MAX_RETRIES: "3"
  REDIS_RETRY_DELAY: "100"
  REDIS_CONNECTION_TIMEOUT: "5000"

  # API configuration
  API_PORT: "8080"
  API_READ_TIMEOUT: "30s"
  API_WRITE_TIMEOUT: "30s"
  API_IDLE_TIMEOUT: "60s"
  API_MAX_HEADER_SIZE: "1048576"
  API_MAX_BODY_SIZE: "104857600"

  # Rate limiting
  RATE_LIMIT_REQUESTS: "1000"
  RATE_LIMIT_WINDOW: "60"
  RATE_LIMIT_BURST: "100"

  # Cache configuration
  CACHE_TTL: "300"
  CACHE_MAX_SIZE: "1000"
  CACHE_CLEANUP_INTERVAL: "600"

  # File upload configuration
  MAX_FILE_SIZE: "104857600"
  ALLOWED_FILE_TYPES: "pdf,doc,docx,txt,rtf,xls,xlsx,csv,ppt,pptx,jpg,jpeg,png,gif,tiff,bmp"
  UPLOAD_TEMP_DIR: "/tmp/uploads"

  # RAG configuration
  RAG_CHUNK_SIZE: "512"
  RAG_CHUNK_OVERLAP: "50"
  RAG_MAX_CHUNKS: "100"
  RAG_SIMILARITY_THRESHOLD: "0.7"
  RAG_TOP_K: "5"
  RAG_RERANK: "true"

  # Vector configuration
  VECTOR_DIMENSIONS: "1536"
  VECTOR_INDEX_TYPE: "hnsw"
  VECTOR_DISTANCE_METRIC: "cosine"
  VECTOR_SEARCH_LIMIT: "100"

  # LLM configuration
  LLM_TIMEOUT: "30"
  LLM_MAX_TOKENS: "4096"
  LLM_TEMPERATURE: "0.1"
  LLM_TOP_P: "0.9"
  LLM_FREQUENCY_PENALTY: "0.0"
  LLM_PRESENCE_PENALTY: "0.0"

  # Monitoring configuration
  METRICS_ENABLED: "true"
  METRICS_PATH: "/metrics"
  METRICS_PORT: "9090"
  HEALTH_CHECK_PATH: "/health"
  HEALTH_CHECK_PORT: "8081"

  # Security configuration
  CORS_ENABLED: "true"
  CORS_ORIGINS: "https://sdlc.ai,https://app.sdlc.ai,https://admin.sdlc.ai"
  CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
  CORS_HEADERS: "Content-Type,Authorization,X-Requested-With"
  CORS_CREDENTIALS: "true"

  # JWT configuration
  JWT_ALGORITHM: "RS256"
  JWT_ISSUER: "https://auth.sdlc.ai"
  JWT_AUDIENCE: "sdlc-platform"
  JWT_ACCESS_TOKEN_TTL: "900"
  JWT_REFRESH_TOKEN_TTL: "604800"

  # Encryption configuration
  ENCRYPTION_ALGORITHM: "aes-256-gcm"
  ENCRYPTION_KEY_ROTATION_DAYS: "90"

  # Compliance configuration
  DATA_RETENTION_DAYS: "2555"
  AUDIT_LOG_RETENTION_DAYS: "2555"
  GDPR_ENABLED: "true"
  HIPAA_ENABLED: "true"
  SOX_ENABLED: "true"

  # Feature flags
  FEATURE_WEBHOOKS: "true"
  FEATURE_REAL_TIME: "true"
  FEATURE_ADVANCED_ANALYTICS: "true"
  FEATURE_MULTI_TENANT: "true"
  FEATURE_SSO: "true"
  FEATURE_AUDIT_LOG: "true"
  FEATURE_BACKUP: "true"
  FEATURE_RESTORE: "true"

  # External service endpoints
  CLOUDFLARE_API_URL: "https://api.cloudflare.com/client/v4"
  OPENAI_API_URL: "https://api.openai.com/v1"
  ANTHROPIC_API_URL: "https://api.anthropic.com/v1"
  GOOGLE_API_URL: "https://googleapis.com"

  # Webhook configuration
  WEBHOOK_TIMEOUT: "10"
  WEBHOOK_RETRY_ATTEMPTS: "3"
  WEBHOOK_RETRY_DELAY: "5"

  # Analytics configuration
  ANALYTICS_ENABLED: "true"
  ANALYTICS_BATCH_SIZE: "100"
  ANALYTICS_FLUSH_INTERVAL: "60"

  # Backup configuration
  BACKUP_ENABLED: "true"
  BACKUP_SCHEDULE: "0 2 * * *"
  BACKUP_RETENTION_DAYS: "30"
  BACKUP_COMPRESSION: "gzip"
  BACKUP_ENCRYPTION: "true"

  # Performance configuration
  WORKER_COUNT: "4"
  QUEUE_SIZE: "1000"
  BUFFER_SIZE: "8192"
  COMPRESSION_ENABLED: "true"
  COMPRESSION_LEVEL: "6"

  # Debug configuration
  DEBUG_ENABLED: "false"
  DEBUG_PPROF: "false"
  DEBUG_TRACING: "false"
  DEBUG_PROFILING: "false"

  # Regional settings
  TIMEZONE: "UTC"
  LOCALE: "en_US"
  DATE_FORMAT: "2006-01-02"
  TIME_FORMAT: "15:04:05"

  # Notification settings
  NOTIFICATION_EMAIL_ENABLED: "true"
  NOTIFICATION_SLACK_ENABLED: "true"
  NOTIFICATION_EMAIL_SMTP: "smtp.sendgrid.net:587"
  NOTIFICATION_EMAIL_FROM: "noreply@sdlc.ai"

  # API quotas
  API_QUOTA_REQUESTS_PER_MINUTE: "60000"
  API_QUOTA_REQUESTS_PER_HOUR: "3600000"
  API_QUOTA_REQUESTS_PER_DAY: "86400000"

  # Data processing settings
  DATA_PROCESSING_BATCH_SIZE: "100"
  DATA_PROCESSING_CONCURRENT_JOBS: "10"
  DATA_PROCESSING_TIMEOUT: "3600"

  # Security scanning settings
  VIRUS_SCAN_ENABLED: "true"
  VIRUS_SCAN_TIMEOUT: "30"
  MALWARE_SCAN_ENABLED: "true"
  MALWARE_SCAN_TIMEOUT: "60"

  # Storage settings
  STORAGE_PROVIDER: "s3"
  STORAGE_REGION: "us-west-1"
  STORAGE_BUCKET: "sdlc-platform-prod"
  STORAGE_ENCRYPTION: "AES256"
  STORAGE_VERSIONING: "true"
  STORAGE_LIFECYCLE_ENABLED: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sdlc-platform-init-config
  namespace: sdlc-platform
  labels:
    app: sdlc-platform
    component: init
data:
  init-db.sh: |
    #!/bin/bash
    set -e

    echo "Initializing database..."

    # Wait for database to be ready
    until pg_isready -h $DB_HOST -p $DB_PORT -U $DB_USER; do
      echo "Waiting for database..."
      sleep 2
    done

    # Run migrations
    echo "Running database migrations..."
    python manage.py migrate

    # Create initial data
    echo "Creating initial data..."
    python manage.py loaddata initial_data.json

    echo "Database initialization complete"

  init-redis.sh: |
    #!/bin/bash
    set -e

    echo "Initializing Redis..."

    # Wait for Redis to be ready
    until redis-cli -h $REDIS_HOST -p $REDIS_PORT ping; do
      echo "Waiting for Redis..."
      sleep 2
    done

    # Set Redis configuration
    redis-cli -h $REDIS_HOST -p $REDIS_PORT CONFIG SET maxmemory 256mb
    redis-cli -h $REDIS_HOST -p $REDIS_PORT CONFIG SET maxmemory-policy allkeys-lru

    echo "Redis initialization complete"

  wait-for-it.sh: |
    #!/bin/bash
    WAITFORIT_cmdname=${0##*/}

    echoerr() { if [[ $WAITFORIT_QUIET -ne 1 ]]; then echo "$@" 1>&2; fi }

    usage()
    {
        cat << USAGE >&2
    Usage:
        $WAITFORIT_cmdname host:port [-s] [-t timeout] [-- command args]
        -h HOST | --host=HOST       Host or IP under test
        -p PORT | --port=PORT       TCP port under test
                                Alternatively, you specify the host and port as host:port
        -s | --strict               Only execute subcommand if the test succeeds
        -q | --quiet                Don't output any status messages
        -t TIMEOUT | --timeout=TIMEOUT
                                    Timeout in seconds, zero for no timeout
        -- COMMAND ARGS             Execute command with args after the test finishes
    USAGE
        exit 1
    }

    wait_for()
    {
        if [[ $WAITFORIT_TIMEOUT -gt 0 ]]; then
            echoerr "$WAITFORIT_cmdname: waiting $WAITFORIT_TIMEOUT seconds for $WAITFORIT_HOST:$WAITFORIT_PORT"
        else
            echoerr "$WAITFORIT_cmdname: waiting for $WAITFORIT_HOST:$WAITFORIT_PORT without a timeout"
        fi
        WAITFORIT_start_ts=$(date +%s)
        while :
        do
            if [[ $WAITFORIT_ISBUSY -eq 1 ]]; then
                nc -z $WAITFORIT_HOST $WAITFORIT_PORT
                WAITFORIT_result=$?
            else
                (echo > /dev/tcp/$WAITFORIT_HOST/$WAITFORIT_PORT) >/dev/null 2>&1
                WAITFORIT_result=$?
            fi
            if [[ $WAITFORIT_result -eq 0 ]]; then
                WAITFORIT_end_ts=$(date +%s)
                echoerr "$WAITFORIT_cmdname: $WAITFORIT_HOST:$WAITFORIT_PORT is available after $((WAITFORIT_end_ts - WAITFORIT_start_ts)) seconds"
                break
            fi
            sleep 1
        done
        return $WAITFORIT_result
    }

    wait_for_wrapper()
    {
        # In order to support SIGINT during timeout: http://unix.stackexchange.com/a/57692
        if [[ $WAITFORIT_QUIET -eq 1 ]]; then
            timeout $WAITFORIT_BUSYTIMEFLAG $WAITFORIT_TIMEOUT $0 --quiet --child --host=$WAITFORIT_HOST --port=$WAITFORIT_PORT --timeout=$WAITFORIT_TIMEOUT &
        else
            timeout $WAITFORIT_BUSYTIMEFLAG $WAITFORIT_TIMEOUT $0 --child --host=$WAITFORIT_HOST --port=$WAITFORIT_PORT --timeout=$WAITFORIT_TIMEOUT &
        fi
        WAITFORIT_PID=$!
        trap "kill -INT -$WAITFORIT_PID" INT
        wait $WAITFORIT_PID
        WAITFORIT_RESULT=$?
        if [[ $WAITFORIT_RESULT -ne 0 ]]; then
            echoerr "$WAITFORIT_cmdname: timeout occurred after waiting $WAITFORIT_TIMEOUT seconds for $WAITFORIT_HOST:$WAITFORIT_PORT"
        fi
        return $WAITFORIT_RESULT
    }

    parse_commandline()
    {
        while [[ $# -gt 0 ]]
        do
            case "$1" in
                *:* )
                    hostport=(${1//:/ })
                    WAITFORIT_HOST=${hostport[0]}
                    WAITFORIT_PORT=${hostport[1]}
                    shift 1
                    ;;
                --child)
                    WAITFORIT_CHILD=1
                    shift 1
                    ;;
                -q | --quiet)
                    WAITFORIT_QUIET=1
                    shift 1
                    ;;
                -s | --strict)
                    WAITFORIT_STRICT=1
                    shift 1
                    ;;
                -h)
                    WAITFORIT_HOST="$2"
                    if [[ $WAITFORIT_HOST == "" ]]; then break; fi
                    shift 2
                    ;;
                --host=*)
                    WAITFORIT_HOST="${1#*=}"
                    shift 1
                    ;;
                -p)
                    WAITFORIT_PORT="$2"
                    if [[ $WAITFORIT_PORT == "" ]]; then break; fi
                    shift 2
                    ;;
                --port=*)
                    WAITFORIT_PORT="${1#*=}"
                    shift 1
                    ;;
                -t)
                    WAITFORIT_TIMEOUT="$2"
                    if [[ $WAITFORIT_TIMEOUT == "" ]]; then break; fi
                    shift 2
                    ;;
                --timeout=*)
                    WAITFORIT_TIMEOUT="${1#*=}"
                    shift 1
                    ;;
                --)
                    shift
                    WAITFORIT_CLI=("$@")
                    break
                    ;;
                --help)
                    usage
                    ;;
                *)
                    echoerr "Unknown argument: $1"
                    usage
                    ;;
            esac
        done

        if [[ "$WAITFORIT_HOST" == "" || "$WAITFORIT_PORT" == "" ]]; then
            echoerr "Error: you need to provide a host and port to test."
            usage
        fi
    }

    parse_commandline "$@"

    if [[ $WAITFORIT_TIMEOUT -gt 0 ]]; then
        WAITFORIT_BUSYTIMEFLAG="-t"
    else
        WAITFORIT_BUSYTIMEFLAG=""
    fi

    if [[ $WAITFORIT_CHILD -gt 0 ]]; then
        wait_for
        WAITFORIT_RESULT=$?
        exit $WAITFORIT_RESULT
    else
        if [[ $WAITFORIT_TIMEOUT -gt 0 ]]; then
            wait_for_wrapper
            WAITFORIT_RESULT=$?
        else
            wait_for
            WAITFORIT_RESULT=$?
        fi
    fi

    if [[ $WAITFORIT_CLI != "" ]]; then
        if [[ $WAITFORIT_RESULT -ne 0 && $WAITFORIT_STRICT -eq 1 ]]; then
            echoerr "$WAITFORIT_cmdname: strict mode, refusing to execute subprocess"
            exit $WAITFORIT_RESULT
        fi
        exec "${WAITFORIT_CLI[@]}"
    else
        exit $WAITFORIT_RESULT
    fi
