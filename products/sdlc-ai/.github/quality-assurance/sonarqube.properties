# SonarQube Project Configuration
# Quality Gates and Quality Profiles for SDLC.ai

# Project Configuration
sonar.projectKey=sdlc-platform
sonar.projectName=SDLC.ai Secure Data Learning Platform
sonar.projectVersion=3.0.0

# Source and Test Directories
sonar.sources=.
sonar.inclusions=**/*.go,**/*.py,**/*.ts,**/*.tsx,**/*.js,**/*.jsx,**/*.rs
sonar.exclusions=**/*_test.go,**/test/**,**/tests/**,**/node_modules/**,**/vendor/**,**/dist/**,**/build/**,**/.git/**,**/coverage/**

# Test Directories
sonar.test.inclusions=**/*_test.go,**/test/**/*.py,**/*.spec.ts,**/*.test.ts,**/*.spec.js,**/*.test.js
sonar.coverage.exclusions=**/*_test.go,**/test/**,**/tests/**,**/mocks/**,**/fixtures/**,**/*.pb.go,**/generated/**

# Code Quality Gates
sonar.qualitygate.wait=true

# Language-Specific Settings

## Go Settings
sonar.go.coverage.reportPaths=services/gateway/coverage.out
sonar.go.tests.reportPaths=services/gateway/test-report.json

## Python Settings
sonar.python.coverage.reportPaths=services/rag/coverage.xml
sonar.python.xunit.reportPath=services/rag/test-report.xml

## TypeScript/JavaScript Settings
sonar.typescript.lcov.reportPaths=services/admin-ui/coverage/lcov.info
sonar.javascript.lcov.reportPaths=services/admin-ui/coverage/lcov.info

## Rust Settings (via grcov)
sonar.coverageReportPaths=services/vector-core/coverage.xml

# Quality Profiles
sonar.profile.go=Sonar way
sonar.profile.python=Sonar way
sonar.profile.ts=Sonar way
sonar.profile.js=Sonar way

# Custom Rules and Metrics

## Complexity Thresholds
sonar.technicalDebt.ratingGrid=A=0.1;B=0.2;C=0.5;D=1.0;E=2.0
sonar.sizeMetric=ncloc

## Duplication Settings
sonar.cpd.exclusions=**/*_test.go,**/test/**,**/generated/**,**/mocks/**

## Coverage Requirements
sonar.coverage.exclusions=**/*_test.go,**/test/**,**/interface{}.go,**/mocks/**,**/fixtures/**

# Security Settings
sonar.security.hotspots.enabled=true
sonar.python.bandit.reportPaths=services/rag/bandit-report.json
sonar.go.gosec.reportPaths=services/gateway/gosec-report.json

# External Tool Reports

## ESLint Report
sonar.eslint.reportPaths=services/admin-ui/eslint-report.json

## Pylint Report
sonar.pylint.reportPaths=services/rag/pylint-report.json

## GolangCI-Lint Report
sonar.go-golangci-lint.reportPaths=services/gateway/golangci-lint-report.json

## Clippy Report
sonar.rust.clippy.reportPaths=services/vector-core/clippy-report.json

# Integration Settings
sonar.host.url=${SONAR_HOST_URL}
sonar.login=${SONAR_TOKEN}

# CI/CD Integration
sonar.ci=true

# Additional Analysis Parameters

## Exclude Auto-generated Files
sonar.exclusions+=**/*.pb.go,**/generated/**,**/.grpc/**

## Performance
sonar.issuesReport.html.enable=true
sonar.issuesReport.json.enable=true

# Custom Metrics for SDLC.ai

## Security Metrics
sonar.custom.metrics.security.vulnerabilities=Vulnerability
sonar.custom.metrics.security.hotspots=Security Hotspot

## Performance Metrics
sonar.custom.metrics.performance.complexity=Complexity
sonar.custom.metrics.performance.maintainability=Maintainability

## Documentation Metrics
sonar.custom.metrics.documentation.coverage=Documentation Coverage

# Multi-language Project Configuration
sonar.modules=services/gateway,services/rag,services/vector-core,services/admin-ui

# Module-specific configurations
sonar.services/gateway.sources=services/gateway
sonar.services/golang.sources=services/gateway

sonar.services.rag.sources=services/rag
sonar.services.python.sources=services/rag

sonar.services.vector-core.sources=services/vector-core
sonar.services.rust.sources=services/vector-core

sonar.services.admin-ui.sources=services/admin-ui
sonar.services.typescript.sources=services/admin-ui
