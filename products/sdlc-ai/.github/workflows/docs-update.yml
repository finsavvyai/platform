name: Update API Documentation

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/gateway/api/**'
      - 'services/gateway/internal/interfaces/http/**'
      - 'services/gateway/internal/infrastructure/middleware/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/gateway/api/**'
      - 'services/gateway/internal/interfaces/http/**'
      - 'services/gateway/internal/infrastructure/middleware/**'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update documentation'
        required: false
        default: false
        type: boolean

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        working-directory: ./services/gateway
        run: go mod download

      - name: Build docs updater
        working-directory: ./services/gateway
        run: go build -o bin/docs-updater ./cmd/docs-updater

      - name: Update documentation
        working-directory: ./services/gateway
        run: |
          ./bin/docs-updater \
            --output=./docs/generated \
            --spec=./api/openapi.yaml \
            --sources="./internal/interfaces/http/routes,./internal/interfaces/http/handlers" \
            --force=${{ github.event.inputs.force || 'false' }} \
            --verbose

      - name: Validate OpenAPI spec
        uses: char0n/swagger-editor-validate@v1
        with:
          definition-file: ./services/gateway/api/openapi.yaml

      - name: Check for documentation changes
        id: docs-changed
        run: |
          if [ -n "$(git status --porcelain ./services/gateway/docs)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push documentation changes
        if: steps.docs-changed.outputs.changed == 'true' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ./services/gateway/docs
          git commit -m "docs: update API documentation [skip ci]"
          git push

      - name: Generate documentation diff
        if: steps.docs-changed.outputs.changed == 'true'
        run: |
          mkdir -p ./docs-diff
          git diff --no-index ./services/gateway/docs/generated/index.html /dev/null > ./docs-diff/index.html.diff || true

      - name: Upload documentation artifacts
        if: steps.docs-changed.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: api-documentation
          path: |
            ./services/gateway/docs/generated/
            ./docs-diff/
          retention-days: 30

      - name: Comment on PR with documentation changes
        if: github.event_name == 'pull_request' && steps.docs-changed.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read the diff file
            const diffPath = './docs-diff/index.html.diff';
            let diffContent = '';
            if (fs.existsSync(diffPath)) {
              diffContent = fs.readFileSync(diffPath, 'utf8');
            }

            // Create comment
            const comment = `## 📚 API Documentation Updated

            The API documentation has been automatically updated based on changes in this pull request.

            ### Changes:
            - OpenAPI specification regenerated
            - Interactive Swagger UI updated
            - API examples updated

            ### View Documentation:
            - **Swagger UI**: [Link to deployed docs](${{ github.event.pull_request.html_url }})
            - **OpenAPI Spec**: [Download](openapi.yaml)

            ${diffContent ? '### Documentation Changes Preview:\n```diff\n' + diffContent.substring(0, 1000) + '\n...\n```\n' : ''}

            ---

            *This comment was automatically generated by the documentation update workflow*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Deploy documentation to GitHub Pages
  deploy-docs:
    needs: update-docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Download documentation artifacts
        uses: actions/download-artifact@v4
        with:
          name: api-documentation
          path: ./docs-site

      - name: Prepare documentation site
        run: |
          mkdir -p ./docs-site/api
          cp -r ./services/gateway/docs/generated/* ./docs-site/api/

          # Create index page
          cat > ./docs-site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>SDLC.ai - API Documentation</title>
              <meta http-equiv="refresh" content="0; url=/api/">
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      height: 100vh;
                      margin: 0;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                  }
                  .container {
                      text-align: center;
                  }
                  h1 {
                      font-size: 2rem;
                      margin-bottom: 1rem;
                  }
                  p {
                      font-size: 1.2rem;
                      opacity: 0.9;
                  }
                  .spinner {
                      border: 3px solid rgba(255,255,255,0.3);
                      border-radius: 50%;
                      border-top: 3px solid white;
                      width: 40px;
                      height: 40px;
                      animation: spin 1s linear infinite;
                      margin: 2rem auto;
                  }
                  @keyframes spin {
                      0% { transform: rotate(0deg); }
                      100% { transform: rotate(360deg); }
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🚀 SDLC.ai API Documentation</h1>
                  <p>Redirecting to interactive API documentation...</p>
                  <div class="spinner"></div>
              </div>
          </body>
          </html>
          EOF

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Notify on success or failure
  notify:
    needs: [update-docs, deploy-docs]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Notify Slack on success
        if: needs.update-docs.result == 'success' && (needs.deploy-docs.result == 'success' || needs.deploy-docs.result == 'skipped')
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#api-updates'
          text: |
            ✅ API documentation successfully updated and deployed!

            View at: https://sdlc-ai.github.io/SDLC/

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: needs.update-docs.result == 'failure' || needs.deploy-docs.result == 'failure'
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#api-updates'
          text: |
            ❌ Failed to update API documentation!

            Please check the workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
