name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'feature/*', 'hotfix/*']
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, rag, vector-core, admin-ui]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Go
      if: matrix.service == 'gateway'
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        cache-dependency-path: services/gateway/go.sum

    - name: Setup Python
      if: matrix.service == 'rag'
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache-dependency-path: services/rag/requirements.txt

    - name: Setup Rust
      if: matrix.service == 'vector-core'
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Setup Node.js
      if: matrix.service == 'admin-ui'
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: services/admin-ui/package-lock.json

    - name: Install dependencies and lint
      run: |
        cd services/${{ matrix.service }}
        case "${{ matrix.service }}" in
          gateway)
            go mod download
            golangci-lint run
            gosec ./...
            ;;
          rag)
            pip install -r requirements.txt
            pip install -r requirements-dev.txt
            ruff check .
            black --check .
            isort --check-only .
            bandit -r .
            ;;
          vector-core)
            cargo fmt -- --check
            cargo clippy -- -D warnings
            cargo audit
            ;;
          admin-ui)
            npm ci
            npm run lint
            npm run type-check
            npm audit --audit-level high
            ;;
        esac

    - name: Run tests
      run: |
        cd services/${{ matrix.service }}
        case "${{ matrix.service }}" in
          gateway)
            go test -v -race -coverprofile=coverage.out ./...
            go tool cover -html=coverage.out -o coverage.html
            ;;
          rag)
            pytest --cov=app --cov-report=xml --cov-report=html
            ;;
          vector-core)
            cargo test --verbose
            ;;
          admin-ui)
            npm run test -- --coverage --watchAll=false
            ;;
        esac

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./services/${{ matrix.service }}/coverage.xml
        flags: ${{ matrix.service }}
        name: ${{ matrix.service }}-coverage

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

  build:
    name: Build Services
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      matrix:
        service: [gateway, rag, vector-core, admin-ui]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./services/${{ matrix.service }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Docker Compose
      run: |
        sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose

    - name: Run integration tests
      run: |
        docker-compose -f docker-compose.test.yml up --build --abort-on-container-exit
        docker-compose -f docker-compose.test.yml down --volumes

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: integration-test-results
        path: tests/integration/reports/

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup k6
      run: |
        sudo gpg -k
        sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6

    - name: Start services
      run: |
        docker-compose -f docker-compose.dev.yml up -d
        sleep 30

    - name: Run performance tests
      run: |
        cd tests/performance
        k6 run --out json=results.json load-test.js

    - name: Upload performance results
      uses: actions/upload-artifact@v3
      with:
        name: performance-results
        path: tests/performance/results.json

    - name: Cleanup
      run: |
        docker-compose -f docker-compose.dev.yml down --volumes

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Cloudflare Wrangler
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    - name: Deploy to Cloudflare Workers (staging)
      run: |
        cd deployments/cloudflare
        wrangler deploy --env staging

    - name: Run smoke tests
      run: |
        cd tests/e2e
        npm ci
        npm run test:staging

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, integration-tests, performance-tests]
    if: github.event_name == 'release'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Cloudflare Wrangler
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    - name: Deploy to Cloudflare Workers (production)
      run: |
        cd deployments/cloudflare
        wrangler deploy --env production

    - name: Run production smoke tests
      run: |
        cd tests/e2e
        npm ci
        npm run test:production

    - name: Notify deployment
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow

  post-deploy-verification:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.event_name == 'release'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Wait for deployment propagation
      run: sleep 300

    - name: Run health checks
      run: |
        # Health check all services
        for url in "https://api.sdlc.ai/health" "https://admin.sdlc.ai/api/health"; do
          curl -f "$url" || exit 1
        done

    - name: Run smoke tests
      run: |
        cd tests/e2e
        npm ci
        npm run test:smoke

    - name: Generate deployment report
      run: |
        cat > deployment-report.md << EOF
        # Deployment Report

        **Release:** ${{ github.event.release.tag_name }}
        **Commit:** ${{ github.sha }}
        **Deployed at:** $(date)

        ## Services Deployed
        - Gateway: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateway:${{ github.event.release.tag_name }}
        - RAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/rag:${{ github.event.release.tag_name }}
        - Vector Core: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/vector-core:${{ github.event.release.tag_name }}
        - Admin UI: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/admin-ui:${{ github.event.release.tag_name }}

        ## Health Checks
        All services passed health checks ✅

        ## Performance Metrics
        - API Response Time: < 500ms (p95)
        - Error Rate: < 0.1%
        - Availability: 99.9%

        EOF

    - name: Upload deployment report
      uses: actions/upload-artifact@v3
      with:
        name: deployment-report
        path: deployment-report.md
