# Questro AI-Powered Testing Automation Platform
# Production Environment Configuration
# Docker Compose for Production Deployment

version: '3.8'

services:
  # Reverse Proxy and Load Balancer
  nginx:
    image: nginx:alpine
    container_name: qestro-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - static_files:/var/www/static:ro
    networks:
      - qestro-network
    depends_on:
      - api
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # API Backend Service
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: qestro-api
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - DATABASE_URL=postgresql://qestro_user:${DB_PASSWORD}@postgres:5432/qestro_production
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FRONTEND_URL=https://app.qestro.ai
      - CORS_ORIGIN=https://app.qestro.ai
      - ENABLE_SSL=true
      - SESSION_TIMEOUT_MS=3600000
      - ENABLE_RATE_LIMITING=true
      - RATE_LIMIT_REQUESTS_PER_MINUTE=1000
      - ENABLE_ANALYTICS=true
      - SENTRY_ENVIRONMENT=production
      - LOG_LEVEL=info
      - ENABLE_PERFORMANCE_MONITORING=true
      - AI_PROVIDER=openai
      - ENABLE_AI_FEATURES=true
      - ENABLE_COLLABORATION=true
      - ENABLE_REAL_TIME_UPDATES=true
      - ENABLE_ENTERPRISE_FEATURES=true
      - ENABLE_SSO=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SENTRY_DSN=${SENTRY_DSN}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./certs:/app/certs:ro
    networks:
      - qestro-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 2Gi
        reservations:
          cpus: '0.5'
          memory: 1Gi

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=https://api.qestro.ai
        - VITE_WS_URL=wss://api.qestro.ai
        - VITE_ENVIRONMENT=production
        - VITE_VERSION=1.0.0
        - VITE_ENABLE_ANALYTICS=true
        - VITE_SENTRY_DSN=${VITE_SENTRY_DSN}
    container_name: qestro-frontend
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - static_files:/app/dist
    networks:
      - qestro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: qestro-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=qestro_production
      - POSTGRES_USER=qestro_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
      - ./database/backups:/backups
    networks:
      - qestro-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qestro_user -d qestro_production"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2Gi
        reservations:
          cpus: '0.5'
          memory: 1Gi
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100

  # Redis Cache and Session Store
  redis:
    image: redis:7-alpine
    container_name: qestro-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - qestro-network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Background Worker Service
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: qestro-worker
    restart: unless-stopped
    command: npm run worker:start
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://qestro_user:${DB_PASSWORD}@postgres:5432/qestro_production
      - REDIS_URL=redis://redis:6379
      - QUEUE_CONCURRENCY=5
      - ENABLE_HEALTH_CHECKS=true
      - LOG_LEVEL=info
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - qestro-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "npm", "run", "health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1Gi

  # WebSocket Service
  websocket:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: qestro-websocket
    restart: unless-stopped
    command: npm run websocket:start
    expose:
      - "8001"
    environment:
      - NODE_ENV=production
      - PORT=8001
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - WS_HEARTBEAT_INTERVAL_MS=30000
      - WS_CONNECTION_TIMEOUT_MS=120000
      - WS_MAX_CONNECTIONS_PER_USER=10
    networks:
      - qestro-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/ws/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Monitoring and Logging
  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: qestro-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - qestro-network
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1Gi

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: qestro-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - qestro-network
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M

  # Log aggregation with Loki
  loki:
    image: grafana/loki:latest
    container_name: qestro-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - qestro-network
    ports:
      - "3100:3100"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1Gi

  # Filebeat for log shipping
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: qestro-filebeat
    restart: unless-stopped
    user: root
    environment:
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
    volumes:
      - ./logging/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs:/var/log/app:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - qestro-network
    depends_on:
      - api
      - worker
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M

# Networks
networks:
  qestro-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Volumes
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  static_files:
    driver: local
