name = "questro-backend"
main = "src/index.ts"
compatibility_date = "2024-10-25"
compatibility_flags = ["nodejs_compat"]
account_id = "d2fe608a92dc9faa2ce5b0fd2cad5eb7"

# KV namespace for rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "b63e8bd1c4d64353a04eaccb5415dec2"


# Custom domain routing for qestro.io
[[routes]]
pattern = "api.qestro.io/*"
zone_name = "qestro.io"

# Custom domain routing for qestro.app
[[routes]]
pattern = "api.qestro.app/*"
zone_name = "qestro.app"

[env.production.vars]
NODE_ENV = "production"
ENVIRONMENT = "production"

[env.preview.vars]
NODE_ENV = "production"
ENVIRONMENT = "preview"

[vars]

[[d1_databases]]
binding = "DB"
database_name = "qestro-db-prod"
database_id = "2a75b78b-62b8-46fb-bb3c-f9ca52e762e1"
migrations_dir = "migrations"

# R2 bucket for test-run video recordings (MVP).
# Keys written by the uploader: `runs/{runId}/recording.webm`.
# Streamed back to the <video> player via GET /api/recordings/:runId
# with Range-request support (required for seek).
[[r2_buckets]]
binding = "RECORDINGS"
bucket_name = "qestro-recordings"
