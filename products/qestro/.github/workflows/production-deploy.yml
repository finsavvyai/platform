# Questro AI-Powered Testing Automation Platform
# Production Deployment Pipeline
#
# Comprehensive CI/CD pipeline with automated testing, security scanning,
# multi-environment deployment, and quality gates for enterprise-grade releases.

name: Production Deployment Pipeline

# Trigger configuration
on:
  push:
    branches: [main, production-deploy]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production
      force_deploy:
        description: 'Force deployment (skip tests)'
        required: false
        default: false
        type: boolean
      create_release:
        description: 'Create GitHub release'
        required: false
        default: false
        type: boolean

# Environment variables
env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Jobs definition
jobs:
  # Code Quality and Security Analysis
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
      security-scan-passed: ${{ steps.security.outputs.passed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci
          cd ../backend && npm ci

      - name: Run linting
        run: |
          npm run lint
          npm run lint:frontend
          npm run lint:backend

      - name: Type checking
        run: |
          npm run type-check
          cd frontend && npm run type-check
          cd ../backend && npm run type-check

      - name: Security audit
        run: |
          npm audit --audit-level=high
          cd frontend && npm audit --audit-level=high
          cd ../backend && npm audit --audit-level=high

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          languages: javascript

      - name: Run SonarQube scan
        uses: sonarqube-quality-gate-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Comprehensive Testing Suite
  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: code-quality
    outputs:
      unit-tests-passed: ${{ steps.unit-tests.outcome }}
      integration-tests-passed: ${{ steps.integration-tests.outcome }}
      e2e-tests-passed: ${{ steps.e2e-tests.outcome }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qestro_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci
          cd ../backend && npm ci

      - name: Setup Test Environment
        run: |
          cp .env.example .env.test
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/qestro_test" >> .env.test
          echo "REDIS_URL=redis://localhost:6379" >> .env.test
          echo "NODE_ENV=test" >> .env.test

      - name: Database Setup
        run: |
          cd backend
          npm run db:migrate
          npm run db:seed

      - name: Run Unit Tests
        id: unit-tests
        run: |
          npm run test:unit:coverage
          cd frontend && npm run test:coverage

      - name: Run Integration Tests
        id: integration-tests
        run: |
          cd backend
          npm run test:integration

      - name: Run E2E Tests
        id: e2e-tests
        run: |
          cd backend
          npm run start &
          sleep 30
          cd ../frontend
          npm run build
          npm run preview &
          sleep 10
          npm run test:e2e

      - name: Run Security Tests
        id: security-tests
        run: |
          npm run test:security

      - name: Run Performance Tests
        id: performance-tests
        run: |
          npm run test:performance

      - name: Upload Coverage Reports
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  # Build and Security Scan
  build-and-scan:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    needs: test-suite
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      security-scan-passed: ${{ steps.trivy.outputs.passed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./.docker/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Run Trivy Vulnerability Scanner
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build.outputs.digest }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'

      - name: Upload Trivy Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # Staging Deployment
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-scan, test-suite]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: staging
      url: https://staging.qestro.ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          # Implementation would deploy to your staging infrastructure
          # This could be Render, AWS, GCP, Azure, etc.

      - name: Run Smoke Tests
        run: |
          echo "Running smoke tests..."
          curl -f https://staging.qestro.ai/health || exit 1
          curl -f https://staging.qestro.ai/api/v1/status || exit 1

      - name: Run Integration Tests Against Staging
        run: |
          echo "Running integration tests against staging..."
          npm run test:integration:staging

      - name: Performance Validation
        run: |
          echo "Running performance validation..."
          npm run test:performance:staging

      - name: Security Validation
        run: |
          echo "Running security validation against staging..."
          npm run test:security:staging

  # Production Deployment (Manual Approval)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, build-and-scan, test-suite]
    if: github.ref == 'refs/heads/production-deploy' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://app.qestro.ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pre-deployment Checklist
        run: |
          echo "Running pre-deployment checklist..."
          # Verify all tests passed
          # Verify security scans passed
          # Verify performance benchmarks met
          # Verify backups are current
          # Verify team notification sent

      - name: Create Database Backup
        run: |
          echo "Creating production database backup..."
          # Implementation would create backup before deployment

      - name: Deploy to Production (Blue-Green)
        run: |
          echo "Deploying to production using blue-green strategy..."
          # Implementation would perform blue-green deployment

      - name: Health Check Validation
        run: |
          echo "Performing health check validation..."
          sleep 60  # Wait for deployment to stabilize
          curl -f https://app.qestro.ai/health || exit 1
          curl -f https://api.qestro.ai/health || exit 1

      - name: Run Production Smoke Tests
        run: |
          echo "Running production smoke tests..."
          npm run test:smoke:production

      - name: Validate Performance
        run: |
          echo "Validating production performance..."
          npm run test:performance:production

      - name: Post-deployment Validation
        run: |
          echo "Running post-deployment validation..."
          # Verify all services are healthy
          # Verify monitoring is working
          # Verify alerting is configured
          # Verify rollback capability

  # Release Management
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/production-deploy' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Version Number
        id: version
        run: |
          # Generate semantic version based on commit messages
          VERSION=$(node -p "
            const fs = require('fs');
            const packageJson = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            const currentVersion = packageJson.version;
            const [major, minor, patch] = currentVersion.split('.').map(Number);

            // Determine version bump based on commit messages
            const { execSync } = require('child_process');
            const commits = execSync('git log --oneline main~10..main', { encoding: 'utf8' });

            let newVersion = currentVersion;
            if (commits.includes('BREAKING CHANGE') || commits.includes('!:')) {
              newVersion = \`\${major + 1}.\${0}.\${0}\`;
            } else if (commits.includes('feat:')) {
              newVersion = \`\${major}.\${minor + 1}.\${0}\`;
            } else if (commits.includes('fix:')) {
              newVersion = \`\${major}.\${minor}.\${patch + 1}\`;
            }

            console.log(newVersion);
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update Package Version
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Generate Changelog
        id: changelog
        run: |
          # Generate changelog from git commits since last tag
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0)..HEAD)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## 🚀 Questro Platform v${{ steps.version.outputs.version }}

            ### ✨ What's New
            ${{ steps.changelog.outputs.changelog }}

            ### 🐛 Bug Fixes
            - Various bug fixes and performance improvements

            ### 🔧 Infrastructure
            - Updated dependencies
            - Improved security configurations

            ### 📚 Documentation
            - Updated API documentation
            - Improved deployment guides

            ## 🎯 Installation
            ```bash
            docker pull ghcr.io/qestro/questro:v${{ steps.version.outputs.version }}
            ```

            ## 🔗 Links
            - [Documentation](https://docs.qestro.ai)
            - [Dashboard](https://app.qestro.ai)
            - [API Reference](https://api.qestro.ai/docs)
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: qestro/questro
          short-description: "AI-Powered Testing Automation Platform"
          readme-filepath: ./README.md

      - name: Notify Teams
        run: |
          echo "Notifying teams about release..."
          # Send notifications to Slack, email, etc.

  # Rollback Capability
  rollback:
    name: Emergency Rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy == 'true'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Previous Release
        id: previous-release
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1)
          echo "tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

      - name: Rollback to Previous Version
        run: |
          echo "Rolling back to ${{ steps.previous-release.outputs.tag }}..."
          # Implementation would perform rollback

      - name: Validate Rollback
        run: |
          echo "Validating rollback..."
          curl -f https://app.qestro.ai/health || exit 1

      - name: Notify Rollback
        run: |
          echo "Notifying about rollback..."
          # Send notifications about rollback

  # Cleanup
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-production, create-release]
    if: always() && (needs.deploy-production.result == 'success' || needs.deploy-production.result == 'failure')
    steps:
      - name: Cleanup Resources
        run: |
          echo "Cleaning up deployment resources..."
          # Remove temporary resources
          # Cleanup old images
          # Archive logs

      - name: Update Deployment Status
        run: |
          echo "Updating deployment status..."
          # Update monitoring systems
          # Update documentation
          # Update status pages
