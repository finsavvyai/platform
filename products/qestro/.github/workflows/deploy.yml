name: Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: Deploy Cloudflare Pages frontend
        required: false
        default: true
        type: boolean
      deploy_backend:
        description: Deploy Cloudflare Worker backend
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  deployments: write

jobs:
  deploy-production:
    name: Deploy production (Cloudflare)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://qestro.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Wrangler
        run: npm install -g wrangler

      - name: Deploy backend Worker
        if: ${{ inputs.deploy_backend }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy:backend:prod

      - name: Deploy frontend Pages
        if: ${{ inputs.deploy_frontend }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy:frontend:prod

      - name: Verify production endpoint parity
        run: |
          curl -fsS https://qestro.app/ >/dev/null
          curl -fsS https://api.qestro.app/api/health >/dev/null
          curl -fsS https://api.qestro.io/api/health >/dev/null
          curl -fsS https://api.qestro.app/api/api-testing/collections >/dev/null || true
          curl -fsS https://api.qestro.app/api/devices >/dev/null || true
