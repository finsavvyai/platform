name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Lint & Format Check
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm --prefix backend run lint

      - name: Lint frontend
        run: npm --prefix frontend run lint

      - name: Check formatting
        run: npm run format:check

  # ============================================
  # Backend Unit Tests
  # ============================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20']
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: qestro_test
          POSTGRES_USER: qestro_test
          POSTGRES_PASSWORD: qestro_test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup database
        env:
          DATABASE_URL: postgresql://qestro_test:qestro_test_password@localhost:5432/qestro_test
          NODE_ENV: test
        run: |
          cd backend
          npm run db:migrate || true

      - name: Run backend tests
        env:
          CI: true
          DATABASE_URL: postgresql://qestro_test:qestro_test_password@localhost:5432/qestro_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-key-123456789
          JWT_REFRESH_SECRET: test-refresh-secret-key-123456789
          NODE_ENV: test
        run: npm --prefix backend run test -- --coverage

      - name: Upload backend coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

  # ============================================
  # Frontend Unit Tests
  # ============================================
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm --prefix frontend run test -- --coverage
        env:
          NODE_ENV: test

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  # ============================================
  # Build Artifacts
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    strategy:
      matrix:
        node-version: ['20']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm --prefix backend run build
        env:
          NODE_ENV: production

      - name: Build frontend
        run: npm --prefix frontend run build
        env:
          NODE_ENV: production
          VITE_API_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8000

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 1

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ============================================
  # E2E Tests
  # ============================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        node-version: ['20']
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: qestro_test
          POSTGRES_USER: qestro_test
          POSTGRES_PASSWORD: qestro_test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Setup database
        env:
          DATABASE_URL: postgresql://qestro_test:qestro_test_password@localhost:5432/qestro_test
          NODE_ENV: test
        run: |
          cd backend
          npm run db:migrate || true

      - name: Build backend
        env:
          NODE_ENV: production
        run: npm --prefix backend run build

      - name: Build frontend
        env:
          NODE_ENV: production
          VITE_API_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8000
        run: npm --prefix frontend run build

      - name: Start backend
        env:
          DATABASE_URL: postgresql://qestro_test:qestro_test_password@localhost:5432/qestro_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-key-123456789
          JWT_REFRESH_SECRET: test-refresh-secret-key-123456789
          NODE_ENV: test
          PORT: 8000
        run: |
          cd backend
          node dist/index.minimal.js &
          sleep 3
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8000/health >/dev/null && break; sleep 1; done
          curl -sf http://127.0.0.1:8000/health >/dev/null || (echo "Backend failed to start"; exit 1)

      - name: Start frontend
        env:
          NODE_ENV: production
        run: |
          cd frontend
          npm run start &
          sleep 12

      - name: Run Playwright smoke tests
        env:
          CI: true
          DATABASE_URL: postgresql://qestro_test:qestro_test_password@localhost:5432/qestro_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-key-123456789
          PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:3000
          BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_API_URL: http://127.0.0.1:8000
          PLAYWRIGHT_WS_URL: ws://127.0.0.1:8000
        run: npm run test:e2e:ci

      - name: Run API smoke tests
        env:
          CI: true
          PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:3000
          BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_API_URL: http://127.0.0.1:8000
          PLAYWRIGHT_WS_URL: ws://127.0.0.1:8000
        run: npm run test:e2e:smoke:api

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ============================================
  # Docker Build (main branch only)
  # ============================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
