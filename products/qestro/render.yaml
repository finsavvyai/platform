services:
  # Backend API
  - type: web
    name: questro-backend-api
    env: node
    plan: starter
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: questro-database
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: questro-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://questro.app
      - key: CORS_ORIGIN
        value: https://questro.app
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: API_VERSION
        value: v1
    healthCheckPath: /health
    autoDeploy: true

  # Questro.io Marketing Site
  - type: web
    name: questro-io-marketing
    env: static
    buildCommand: cd questro-io && npm install && npm run build
    staticPublishPath: questro-io/dist
    domains:
      - questro.io
      - www.questro.io
    envVars:
      - key: NODE_ENV
        value: production
      - key: SITE_TYPE
        value: marketing

  # Questro.app Main Application (Frontend)
  - type: web
    name: questro-app-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    domains:
      - questro.app
      - www.questro.app
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://questro-backend-api.onrender.com
      - key: VITE_WS_URL
        value: wss://questro-backend-api.onrender.com
      - key: VITE_APP_ENV
        value: production

  # Redis for caching
  - type: redis
    name: questro-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: questro-database
    databaseName: questro_production
    user: questro_user
    plan: starter
