version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: qestro-dev-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=qestro_development
      - POSTGRES_USER=qestro_user
      - POSTGRES_PASSWORD=qestro_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qestro_user -d qestro_development"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: qestro-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # WireMock Service Virtualization
  wiremock:
    image: wiremock/wiremock:latest
    container_name: qestro-dev-wiremock
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings
      - ./wiremock/__files:/home/wiremock/__files
    command:
      - --verbose
      - --global-response-templating

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local
