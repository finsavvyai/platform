<?xml version="1.0" encoding="UTF-8"?>
<!--
  Qestro logo v0 — LinkedIn-ready typographic mark.
  Works at 512×512, 256×256, 128×128, 64×64, 32×32, 16×16.
  Export to PNG via: `rsvg-convert -w 512 -h 512 logo-v0.svg > qestro-linkedin.png`
  or open in Figma / any browser and right-click → save as PNG.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     width="512" height="512"
     role="img" aria-label="Qestro logo">

  <title>Qestro</title>
  <desc>A capital Q mark on a deep violet gradient, tuned for AI-native QA tooling.</desc>

  <!-- Brand gradient (brand-primary -> indigo shadow) -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#8B5CF6"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>

    <!-- Subtle inner highlight so the mark reads as premium, not flat. -->
    <radialGradient id="sheen" cx="30%" cy="25%" r="70%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square container (LinkedIn crops aggressively, so keep safe-zone > 56px) -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#sheen)"/>

  <!--
    The Q mark.
    Geometry: outer ring Ø 280, stroke 42, center (256,246).
    The tail is a single stroke that exits the ring at ~45° and terminates with a
    rounded cap — reading as both a "Q" and a directional arrow (tests flowing forward).
  -->
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">

    <!-- Ring -->
    <circle cx="256" cy="246" r="118" stroke-width="42"/>

    <!-- Tail — the "checkmark" moment, engineered to read as both Q-tail and AI-arrow -->
    <path d="M 316 306 L 378 368"
          stroke-width="42"/>

    <!-- Inside dot — the "signal", reads as a cursor / AI pulse at small sizes -->
    <circle cx="256" cy="246" r="14" fill="#FFFFFF" stroke="none"/>
  </g>

  <!--
    Wordmark is intentionally omitted from this square variant.
    LinkedIn renders the OAuth app logo at 100×100 and 32×32 — any wordmark
    would be illegible. Use the horizontal lockup for website headers.
  -->
</svg>
