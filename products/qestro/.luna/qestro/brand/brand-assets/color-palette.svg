<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-label="Qestro color palette">
  <title>Qestro Color Palette</title>
  <style>
    .label  { font: 500 13px 'Inter', system-ui, sans-serif; fill: #0A0B0F; letter-spacing: 0.02em; }
    .mono   { font: 500 11px 'JetBrains Mono', Menlo, monospace; fill: #52525B; letter-spacing: 0.02em; }
    .white  { fill: #FFFFFF; }
    .row-title { font: 600 15px 'Inter', system-ui, sans-serif; fill: #1D1D1F; letter-spacing: -0.01em; }
    .title  { font: 700 26px 'Inter', system-ui, sans-serif; fill: #1D1D1F; letter-spacing: -0.02em; }
    .sub    { font: 400 13px 'Inter', system-ui, sans-serif; fill: #6E6E73; }
  </style>

  <rect width="1200" height="560" fill="#FAFAFA"/>
  <text x="40" y="44" class="title">Qestro — Color System</text>
  <text x="40" y="66" class="sub">Ground truth for brand, UI, and data-viz color decisions.</text>

  <!-- Primary row -->
  <text x="40" y="110" class="row-title">Brand Primary (Violet)</text>
  <g transform="translate(40, 126)">
    <g transform="translate(0,0)">   <rect width="100" height="80" rx="10" fill="#F5F3FF"/><text x="10" y="100" class="label">50</text><text x="10" y="116" class="mono">#F5F3FF</text></g>
    <g transform="translate(108,0)"> <rect width="100" height="80" rx="10" fill="#EDE9FE"/><text x="10" y="100" class="label">100</text><text x="10" y="116" class="mono">#EDE9FE</text></g>
    <g transform="translate(216,0)"> <rect width="100" height="80" rx="10" fill="#DDD6FE"/><text x="10" y="100" class="label">200</text><text x="10" y="116" class="mono">#DDD6FE</text></g>
    <g transform="translate(324,0)"> <rect width="100" height="80" rx="10" fill="#C4B5FD"/><text x="10" y="100" class="label">300</text><text x="10" y="116" class="mono">#C4B5FD</text></g>
    <g transform="translate(432,0)"> <rect width="100" height="80" rx="10" fill="#A78BFA"/><text x="10" y="100" class="label">400</text><text x="10" y="116" class="mono">#A78BFA</text></g>
    <g transform="translate(540,0)"> <rect width="100" height="80" rx="10" fill="#8B5CF6"/><text x="10" y="52"  class="label white">500</text><text x="10" y="70" class="mono" fill="#EDE9FE">#8B5CF6</text></g>
    <g transform="translate(648,0)"> <rect width="100" height="80" rx="10" fill="#7C3AED"/><text x="10" y="28" class="label white">BRAND</text><text x="10" y="52" class="label white">600</text><text x="10" y="70" class="mono" fill="#EDE9FE">#7C3AED</text></g>
    <g transform="translate(756,0)"> <rect width="100" height="80" rx="10" fill="#6D28D9"/><text x="10" y="52"  class="label white">700</text><text x="10" y="70" class="mono" fill="#C4B5FD">#6D28D9</text></g>
    <g transform="translate(864,0)"> <rect width="100" height="80" rx="10" fill="#5B21B6"/><text x="10" y="52"  class="label white">800</text><text x="10" y="70" class="mono" fill="#C4B5FD">#5B21B6</text></g>
    <g transform="translate(972,0)"> <rect width="100" height="80" rx="10" fill="#4C1D95"/><text x="10" y="52"  class="label white">900</text><text x="10" y="70" class="mono" fill="#C4B5FD">#4C1D95</text></g>
    <g transform="translate(1080,0)"><rect width="80"  height="80" rx="10" fill="#2E1065"/><text x="10" y="52"  class="label white">950</text><text x="10" y="70" class="mono" fill="#C4B5FD">#2E1065</text></g>
  </g>

  <!-- Secondary + Accent row -->
  <text x="40" y="270" class="row-title">Secondary (Blue) &amp; Accents</text>
  <g transform="translate(40, 286)">
    <g transform="translate(0,0)">  <rect width="140" height="80" rx="10" fill="#60A5FA"/><text x="10" y="52" class="label">Blue 400</text><text x="10" y="70" class="mono">#60A5FA</text></g>
    <g transform="translate(148,0)"><rect width="140" height="80" rx="10" fill="#3B82F6"/><text x="10" y="52" class="label white">Blue 500</text><text x="10" y="70" class="mono" fill="#DBEAFE">#3B82F6</text></g>
    <g transform="translate(296,0)"><rect width="140" height="80" rx="10" fill="#2563EB"/><text x="10" y="52" class="label white">Blue 600</text><text x="10" y="70" class="mono" fill="#DBEAFE">#2563EB</text></g>
    <g transform="translate(444,0)"><rect width="140" height="80" rx="10" fill="#06B6D4"/><text x="10" y="52" class="label white">Cyan 500</text><text x="10" y="70" class="mono" fill="#CFFAFE">#06B6D4</text></g>
    <g transform="translate(592,0)"><rect width="140" height="80" rx="10" fill="#EC4899"/><text x="10" y="52" class="label white">Magenta 500</text><text x="10" y="70" class="mono" fill="#FCE7F3">#EC4899</text></g>
    <g transform="translate(740,0)"><rect width="100" height="80" rx="10" fill="#10B981"/><text x="10" y="52" class="label white">Success</text><text x="10" y="70" class="mono" fill="#D1FAE5">#10B981</text></g>
    <g transform="translate(848,0)"><rect width="100" height="80" rx="10" fill="#F59E0B"/><text x="10" y="52" class="label">Warning</text><text x="10" y="70" class="mono">#F59E0B</text></g>
    <g transform="translate(956,0)"><rect width="100" height="80" rx="10" fill="#EF4444"/><text x="10" y="52" class="label white">Error</text><text x="10" y="70" class="mono" fill="#FEE2E2">#EF4444</text></g>
  </g>

  <!-- Neutral row -->
  <text x="40" y="430" class="row-title">Neutral Scale</text>
  <g transform="translate(40, 446)">
    <g transform="translate(0,0)">   <rect width="90" height="80" rx="10" fill="#FFFFFF" stroke="#E8E8ED"/><text x="8" y="52" class="label">0</text><text x="8" y="70" class="mono">#FFFFFF</text></g>
    <g transform="translate(98,0)">  <rect width="90" height="80" rx="10" fill="#FAFAFA"/><text x="8" y="52" class="label">50</text><text x="8" y="70" class="mono">#FAFAFA</text></g>
    <g transform="translate(196,0)"> <rect width="90" height="80" rx="10" fill="#F5F5F7"/><text x="8" y="52" class="label">100</text><text x="8" y="70" class="mono">#F5F5F7</text></g>
    <g transform="translate(294,0)"> <rect width="90" height="80" rx="10" fill="#E8E8ED"/><text x="8" y="52" class="label">200</text><text x="8" y="70" class="mono">#E8E8ED</text></g>
    <g transform="translate(392,0)"> <rect width="90" height="80" rx="10" fill="#D2D2D7"/><text x="8" y="52" class="label">300</text><text x="8" y="70" class="mono">#D2D2D7</text></g>
    <g transform="translate(490,0)"> <rect width="90" height="80" rx="10" fill="#A3A3A3"/><text x="8" y="52" class="label">400</text><text x="8" y="70" class="mono">#A3A3A3</text></g>
    <g transform="translate(588,0)"> <rect width="90" height="80" rx="10" fill="#6E6E73"/><text x="8" y="52" class="label white">500</text><text x="8" y="70" class="mono" fill="#E8E8ED">#6E6E73</text></g>
    <g transform="translate(686,0)"> <rect width="90" height="80" rx="10" fill="#52525B"/><text x="8" y="52" class="label white">600</text><text x="8" y="70" class="mono" fill="#E8E8ED">#52525B</text></g>
    <g transform="translate(784,0)"> <rect width="90" height="80" rx="10" fill="#3D3E43"/><text x="8" y="52" class="label white">700</text><text x="8" y="70" class="mono" fill="#D2D2D7">#3D3E43</text></g>
    <g transform="translate(882,0)"> <rect width="90" height="80" rx="10" fill="#2D2E33"/><text x="8" y="52" class="label white">800</text><text x="8" y="70" class="mono" fill="#A3A3A3">#2D2E33</text></g>
    <g transform="translate(980,0)"> <rect width="90" height="80" rx="10" fill="#1D1D1F"/><text x="8" y="52" class="label white">900</text><text x="8" y="70" class="mono" fill="#A3A3A3">#1D1D1F</text></g>
    <g transform="translate(1078,0)"><rect width="82" height="80" rx="10" fill="#0A0B0F"/><text x="8" y="52" class="label white">950</text><text x="8" y="70" class="mono" fill="#A3A3A3">#0A0B0F</text></g>
  </g>
</svg>
