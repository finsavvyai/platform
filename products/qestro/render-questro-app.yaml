services:
  # Questro.app Product Site
  - type: web
    name: questro-app-product
    env: static
    buildCommand: cd questro-app && npm install && npm run build
    staticPublishPath: questro-app/dist
    domains:
      - questro.app
      - www.questro.app
    envVars:
      - key: NODE_ENV
        value: production
      - key: SITE_TYPE
        value: product
      - key: VITE_API_URL
        value: https://questro-backend-api.onrender.com
