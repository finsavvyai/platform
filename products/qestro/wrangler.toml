# Cloudflare Workers configuration for Qestro Platform
# MVP Launch - Complete Infrastructure Setup
name = "qestro-api"
main = "src/index.ts"
compatibility_date = "2024-10-26"
compatibility_flags = ["nodejs_compat"]

# Workers configuration
[build]

# Durable Objects migrations
[[migrations]]
tag = "v1"
new_sqlite_classes = ["CollaborationDO", "SessionDO", "TestExecutionDO", "MonitoringDO"]

# D1 Database bindings - Main application database
[[d1_databases]]
binding = "DB"
database_name = "qestro-production"
database_id = "8da4925d-405b-4e78-ac0c-d1c7ba22adad"
migrations_dir = "drizzle/migrations"

# KV Storage bindings - Session management, caching, and rate limiting
[[kv_namespaces]]
binding = "SESSIONS"
id = "aa2db9182fc343d7a8993ea371b7e722"
preview_id = "aa2db9182fc343d7a8993ea371b7e722"

[[kv_namespaces]]
binding = "CACHE"
id = "693c6c0110614bc1b4e316982c7d93f9"
preview_id = "693c6c0110614bc1b4e316982c7d93f9"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "0b96001752234d4f85d84fa4f8a9228e"
preview_id = "abb362aaf51c4c85ac932d65c28d2280"

# R2 Storage bindings - File storage for screenshots, recordings, and artifacts
[[r2_buckets]]
binding = "SCREENSHOTS"
bucket_name = "qestro-screenshots"
preview_bucket_name = "qestro-screenshots-preview"

[[r2_buckets]]
binding = "RECORDINGS"
bucket_name = "qestro-recordings"
preview_bucket_name = "qestro-recordings-preview"

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "qestro-artifacts"
preview_bucket_name = "qestro-artifacts-preview"

# Durable Objects bindings
[[durable_objects.bindings]]
name = "COLLABORATION_DO"
class_name = "CollaborationDO"

[[durable_objects.bindings]]
name = "SESSION_DO"
class_name = "SessionDO"

[[durable_objects.bindings]]
name = "TEST_EXECUTION_DO"
class_name = "TestExecutionDO"

[[durable_objects.bindings]]
name = "MONITORING_DO"
class_name = "MonitoringDO"

# Queue bindings for background processing (requires paid plan)
# [[queues.producers]]
# binding = "AI_QUEUE"
# queue = "ai-processing-queue"

# [[queues.producers]]
# binding = "TEST_QUEUE"
# queue = "test-execution-queue"

# [[queues.producers]]
# binding = "BILLING_QUEUE"
# queue = "billing-processing-queue"

# Base environment variables (shared across all environments)
[vars]
APP_NAME = "Qestro"
APP_VERSION = "1.0.0"
CORS_ALLOWED_ORIGINS = "https://qestro.app,https://preview.qestro.app,http://localhost:5173"
BACKEND_AUTH_URL = "http://localhost:8000"

# Development environment
[env.dev]
name = "qestro-api-dev"
vars = { NODE_ENV = "development", ENVIRONMENT = "dev", API_URL = "https://dev-api.qestro.app", FRONTEND_URL = "https://dev.qestro.app", BACKEND_AUTH_URL = "https://dev-backend.qestro.app", LOG_LEVEL = "debug" }

[[env.dev.d1_databases]]
binding = "DB"
database_name = "qestro-dev"
database_id = "dev-database-id"
migrations_dir = "drizzle/migrations"

[[env.dev.kv_namespaces]]
binding = "SESSIONS"
id = "dev-sessions-id"

[[env.dev.kv_namespaces]]
binding = "CACHE"
id = "dev-cache-id"

[[env.dev.kv_namespaces]]
binding = "RATE_LIMIT"
id = "dev-ratelimit-id"

[[env.dev.r2_buckets]]
binding = "SCREENSHOTS"
bucket_name = "qestro-screenshots-dev"

[[env.dev.r2_buckets]]
binding = "RECORDINGS"
bucket_name = "qestro-recordings-dev"

[[env.dev.r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "qestro-artifacts-dev"

# Staging environment
[env.staging]
name = "qestro-api-staging"
vars = { NODE_ENV = "production", ENVIRONMENT = "staging", API_URL = "https://staging-api.qestro.app", FRONTEND_URL = "https://staging.qestro.app", BACKEND_AUTH_URL = "https://staging-backend.qestro.app", LOG_LEVEL = "info" }

[[env.staging.d1_databases]]
binding = "DB"
database_name = "qestro-staging"
database_id = "dc52cafe-9c98-463a-bf03-a28d26bd643b"
migrations_dir = "drizzle/migrations"

[[env.staging.kv_namespaces]]
binding = "SESSIONS"
id = "61f04de853474e1f8b543ee25f7ddd22"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "371889de975042ecb39474ab8655e529"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT"
id = "327901e2cd0c4c629eb855a2a1ea7000"

[[env.staging.r2_buckets]]
binding = "SCREENSHOTS"
bucket_name = "qestro-screenshots-staging"

[[env.staging.r2_buckets]]
binding = "RECORDINGS"
bucket_name = "qestro-recordings-staging"

[[env.staging.r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "qestro-artifacts-staging"

# Production environment
[env.production]
name = "qestro-api-production"
vars = { NODE_ENV = "production", ENVIRONMENT = "production", API_URL = "https://api.qestro.app", FRONTEND_URL = "https://qestro.app", BACKEND_AUTH_URL = "https://backend.qestro.app", LOG_LEVEL = "warn", APP_NAME = "Qestro", APP_VERSION = "1.0.0", CORS_ALLOWED_ORIGINS = "https://qestro.app,https://preview.qestro.app,https://qestro-frontend.pages.dev" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "qestro-production"
database_id = "5660da07-b2dd-40ff-ab9e-d747fa19727b"
migrations_dir = "drizzle/migrations"

[[env.production.kv_namespaces]]
binding = "SESSIONS"
id = "8c6001d69c3e4f058999c392c59a7d53"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "4ef4e42f887540b2922d48cc12bddfb4"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id = "a0e054707fc149a0ae2fa97b283a095a"

[[env.production.r2_buckets]]
binding = "SCREENSHOTS"
bucket_name = "qestro-screenshots"

[[env.production.r2_buckets]]
binding = "RECORDINGS"
bucket_name = "qestro-recordings"

[[env.production.r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "qestro-artifacts"

# Production Durable Objects (inherit from root, must redeclare per env)
[[env.production.durable_objects.bindings]]
name = "COLLABORATION_DO"
class_name = "CollaborationDO"

[[env.production.durable_objects.bindings]]
name = "SESSION_DO"
class_name = "SessionDO"

[[env.production.durable_objects.bindings]]
name = "TEST_EXECUTION_DO"
class_name = "TestExecutionDO"

[[env.production.durable_objects.bindings]]
name = "MONITORING_DO"
class_name = "MonitoringDO"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["CollaborationDO", "SessionDO", "TestExecutionDO", "MonitoringDO"]

# Workers limits and configuration (free plan limitations apply)
# [limits]
# cpu_ms = 50000

# Trigger configurations (requires paid plan for scheduled tasks)
# [triggers]
# crons = ["0 */6 * * *"] # Every 6 hours for cleanup tasks

# Secrets (set via: wrangler secret put <SECRET_NAME>)
# These are sensitive values that should never be committed to version control
# 
# Required secrets for production:
# - JWT_SECRET: Secret key for JWT token signing
# - OPENAI_API_KEY: OpenAI API key for AI test generation
# - LEMONSQUEEZY_API_KEY: LemonSqueezy API key for payments
# - LEMONSQUEEZY_WEBHOOK_SECRET: LemonSqueezy webhook signature verification
# - GITHUB_OAUTH_CLIENT_ID: GitHub OAuth client ID
# - GITHUB_OAUTH_CLIENT_SECRET: GitHub OAuth client secret
# - AZURE_OAUTH_CLIENT_ID: Azure AD OAuth client ID
# - AZURE_OAUTH_CLIENT_SECRET: Azure AD OAuth client secret
# - RESEND_API_KEY: Resend API key for email sending
#
# To set secrets:
# wrangler secret put JWT_SECRET --env production
# wrangler secret put OPENAI_API_KEY --env production
# wrangler secret put LEMONSQUEEZY_API_KEY --env production
# etc.
