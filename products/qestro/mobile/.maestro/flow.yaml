# Maestro E2E: run `npm run test:maestro` from mobile/ or root. CLI: https://maestro.mobile.dev
# Target the actual app bundle ID defined in app.json.
appId: io.qestro.app
---
- launchApp
- assertVisible: "Welcome to Qestro"
- tapOn: "Email"
- eraseText
- inputText: "test@example.com"
- hideKeyboard
- tapOn: "Password"
- eraseText
- inputText: "password123"
- hideKeyboard
- tapOn: "Sign In"
- assertVisible: "Dashboard"
- tapOn: "Projects"
- assertVisible: "Active Projects"
# Simulate selecting the first project (assuming a generic "View Details" or project name is visible)
- tapOn: "Demo Showcase" # Expected default demo project
- assertVisible: "Test Runs"
- tapOn: "Settings"
- assertVisible: "Profile"
- tapOn: "Sign Out"
- assertVisible: "Welcome to Qestro"
