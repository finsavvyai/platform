<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Questro Recorder</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="hero">
        <div>
          <p class="eyebrow">Questro Recorder</p>
          <h1>Browser Extension</h1>
        </div>
        <span id="statusBadge" class="badge idle">Idle</span>
      </header>

      <section class="panel">
        <p class="label">Current Page</p>
        <p id="pageTitle" class="page-title">Waiting for an active tab</p>
        <p id="pageUrl" class="page-url">No URL detected</p>
      </section>

      <section class="grid">
        <article class="stat-card">
          <p class="label">Actions</p>
          <strong id="actionCount">0</strong>
        </article>
        <article class="stat-card">
          <p class="label">Session</p>
          <strong id="sessionState">Not started</strong>
        </article>
      </section>

      <section class="controls">
        <button id="toggleRecording" class="primary">Start Recording</button>
        <button id="openQuestro" class="secondary">Open Questro</button>
      </section>

      <section class="panel">
        <label class="label" for="formatSelect">Export Format</label>
        <div class="export-row">
          <select id="formatSelect">
            <option value="playwright">Playwright</option>
            <option value="cypress">Cypress</option>
            <option value="selenium">Selenium</option>
            <option value="json">JSON</option>
            <option value="yaml">YAML</option>
          </select>
          <button id="exportRecording" class="secondary">Download</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <p class="label">Recent Actions</p>
        </div>
        <ul id="actionList" class="action-list">
          <li class="empty-state">Start a recording to capture steps.</li>
        </ul>
      </section>

      <p id="message" class="message" aria-live="polite"></p>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
